<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>节奏徽章 · 音乐节限定</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #1a0a2e 0%, #2d0f4a 50%, #1a0a2e 100%);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
    }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    .result-panel {
      width: 92%;
      max-width: 720px;
      max-height: 86vh;
      overflow-y: auto;
      margin-bottom: 0;
      padding: 28px 24px 32px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 24px 24px 0 0;
      color: #fff;
      transform: translateY(110%);
      opacity: 0;
      transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.35s ease;
      pointer-events: auto;
    }
    .result-panel.show {
      transform: translateY(0);
      opacity: 1;
    }
    .result-panel h2 {
      text-align: center;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #00e5ff, #ff4dd2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .stats-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 22px;
      padding: 14px 10px;
      background: rgba(0,0,0,0.25);
      border-radius: 14px;
    }
    .stat-item { text-align: center; }
    .stat-item .num {
      font-size: 22px;
      font-weight: 700;
      display: block;
      margin-bottom: 4px;
    }
    .stat-item .label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 1px;
    }
    .stat-perfect .num { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.6); }
    .stat-good .num { color: #00e5ff; text-shadow: 0 0 10px rgba(0,229,255,0.5); }
    .stat-miss .num { color: #999; }
    .stat-score .num {
      background: linear-gradient(90deg, #00e5ff, #ff4dd2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .badges-title {
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-align: center;
    }
    .badge-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 22px;
    }
    @media (max-width: 768px) {
      .badge-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .badge-grid { grid-template-columns: 1fr; }
    }
    .badge-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px 10px;
      text-align: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
      position: relative;
      overflow: hidden;
    }
    .badge-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 20px rgba(255,77,210,0.15);
      border-color: rgba(255,77,210,0.35);
    }
    .badge-card.locked {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .badge-card.locked:hover {
      transform: none;
      box-shadow: none;
      border-color: rgba(255,255,255,0.1);
    }
    .badge-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .badge-name {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .badge-desc {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
    }
    .name-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }
    .name-input:focus {
      border-color: rgba(0,229,255,0.6);
      box-shadow: 0 0 0 3px rgba(0,229,255,0.15);
    }
    .name-input::placeholder { color: rgba(255,255,255,0.35); }
    .btn-row {
      display: flex;
      gap: 12px;
    }
    .btn {
      flex: 1;
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: linear-gradient(135deg, #00e5ff 0%, #ff4dd2 100%);
      color: #fff;
      box-shadow: 0 4px 20px rgba(255,77,210,0.35);
    }
    .btn-primary:hover {
      box-shadow: 0 6px 28px rgba(255,77,210,0.55);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.16);
    }
    .modal-mask {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }
    .modal-mask.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: rgba(30,10,50,0.95);
      border: 2px solid;
      border-radius: 24px;
      padding: 28px 32px;
      text-align: center;
      transform: scale(0.85);
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
      min-width: 260px;
    }
    .modal-mask.show .modal-content { transform: scale(1); }
    .modal-badge {
      width: 140px;
      height: 140px;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 0 22px currentColor);
    }
    .modal-name {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: 2px;
    }
    .modal-desc {
      font-size: 13px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 18px;
    }
    .modal-close {
      padding: 10px 28px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .modal-close:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div class="overlay" id="overlay"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
