<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4CAF50;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2E7D32;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="256" height="256" fill="url(#grassGrad)"/>
  <rect width="256" height="256" filter="url(#noise)" opacity="0.3"/>
  <g opacity="0.6">
    <line x1="0" y1="20" x2="256" y2="20" stroke="#1B5E20" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="60" x2="256" y2="60" stroke="#4CAF50" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="100" x2="256" y2="100" stroke="#1B5E20" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="140" x2="256" y2="140" stroke="#4CAF50" stroke-width="1" opacity="0.2"/>
    <line x1="0" y1="180" x2="256" y2="180" stroke="#1B5E20" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="220" x2="256" y2="220" stroke="#4CAF50" stroke-width="1" opacity="0.2"/>
  </g>
</svg>
