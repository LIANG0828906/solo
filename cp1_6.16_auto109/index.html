<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>病毒入侵细胞3D模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2a 100%);
      font-family: sans-serif;
      color: #E0E0E0;
      min-width: 1024px;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      aspect-ratio: 16 / 9;
      max-height: 100vh;
      max-width: 177.78vh;
      margin: 0 auto;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #spike-label {
      position: absolute;
      pointer-events: none;
      background: rgba(10, 10, 26, 0.85);
      color: #E0E0E0;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      line-height: 1.5;
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
      display: none;
      white-space: nowrap;
      z-index: 10;
    }

    #spike-label .label-title {
      color: #00D4FF;
      font-weight: bold;
      margin-bottom: 4px;
      font-size: 14px;
    }

    #spike-label .label-row {
      opacity: 0.9;
    }

    #hint-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 26, 0.75);
      padding: 12px 28px;
      border-radius: 30px;
      font-size: 13px;
      color: #E0E0E0;
      border: 1px solid rgba(0, 212, 255, 0.2);
      transition: opacity 0.8s ease;
      opacity: 1;
      z-index: 20;
      white-space: nowrap;
    }

    #hint-bar.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    #hint-bar span {
      margin: 0 10px;
      opacity: 0.85;
    }

    #hint-bar kbd {
      background: rgba(0, 212, 255, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      margin: 0 3px;
      color: #00D4FF;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="spike-label"></div>
    <div id="hint-bar">
      <span><kbd>鼠标左键</kbd> 旋转视角</span>
      <span><kbd>鼠标滚轮</kbd> 缩放</span>
      <span><kbd>拖拽病毒</kbd> 触放入侵</span>
      <span><kbd>空格</kbd> 慢动作</span>
      <span><kbd>← →</kbd> 逐帧</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
