<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音频可视化 - 粒子星系</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <canvas id="visualizer"></canvas>
  
  <div id="upload-area" class="upload-area">
    <div class="upload-content">
      <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p class="upload-text">点击或拖拽MP3文件到此处</p>
    </div>
    <input type="file" id="file-input" accept="audio/mp3,audio/*" hidden>
  </div>

  <div id="info-panel" class="info-panel hidden">
    <div class="song-info">
      <div class="cover-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="10"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </div>
      <div class="song-details">
        <div id="song-name" class="song-name">未选择歌曲</div>
        <div class="time-info">
          <span id="current-time">0:00</span>
          <span>/</span>
          <span id="total-time">0:00</span>
        </div>
      </div>
    </div>
    <div class="progress-container">
      <div id="progress-bar" class="progress-bar"></div>
    </div>
  </div>

  <div id="control-panel" class="control-panel hidden">
    <button id="play-btn" class="control-btn" title="播放/暂停">
      <svg class="icon-play" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5 3 19 12 5 21 5 3"/>
      </svg>
      <svg class="icon-pause hidden" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16"/>
        <rect x="14" y="4" width="4" height="16"/>
      </svg>
    </button>
    
    <button id="stop-btn" class="control-btn" title="停止">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="6" width="12" height="12"/>
      </svg>
    </button>
    
    <div class="volume-control">
      <svg class="volume-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
      <input type="range" id="volume-slider" min="0" max="100" value="80" class="volume-slider">
    </div>
    
    <div class="theme-selector">
      <select id="theme-select" class="theme-select">
        <option value="aurora">极光梦境</option>
        <option value="neon">霓虹都市</option>
        <option value="lava">熔岩地狱</option>
        <option value="ocean">深海幽蓝</option>
      </select>
    </div>
  </div>

  <div id="fps-counter" class="fps-counter">FPS: --</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
