<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraWeave</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0B0C10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      background: linear-gradient(180deg, #0B0C10 0%, #1F2833 100%);
      transition: background 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" id="bgGradient"></div>
  <div id="app" style="position: relative; z-index: 1; width: 100%; height: 100%;"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
