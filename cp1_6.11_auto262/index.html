<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>朝堂牙笏书写</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
    }

    body {
      background: radial-gradient(ellipse at center, #8B0000 0%, #800000 35%, #5C0000 70%, #3D0A0A 100%);
      position: relative;
    }

    .court-container {
      width: 100%;
      height: 100%;
      display: flex;
      position: relative;
    }

    /* 左侧品级选择区 */
    .rank-panel {
      width: 220px;
      background: linear-gradient(180deg, #4A2C1A 0%, #3D1F0F 100%);
      border-right: 3px solid #D4AF37;
      box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5);
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .panel-title {
      color: #D4AF37;
      font-size: 20px;
      text-align: center;
      font-family: 'Ma Shan Zheng', cursive;
      letter-spacing: 4px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      padding-bottom: 10px;
      border-bottom: 1px solid #D4AF37;
    }

    .rank-select-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .rank-label {
      color: #E8D68C;
      font-size: 14px;
    }

    .rank-select {
      width: 100%;
      padding: 10px 12px;
      background: #2B1A0D;
      color: #F5F0E1;
      border: 2px solid #D4AF37;
      border-radius: 4px;
      font-size: 15px;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      outline: none;
      transition: all 0.3s ease;
    }

    .rank-select:hover {
      border-color: #FFD700;
      box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
    }

    .rank-select option {
      background: #2B1A0D;
      color: #F5F0E1;
    }

    .rank-info {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #8B6914;
      border-radius: 4px;
      padding: 12px;
      color: #E8D68C;
      font-size: 13px;
      line-height: 1.8;
    }

    .rank-info h4 {
      color: #D4AF37;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .tablet-preview {
      width: 100%;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.2);
      border: 1px dashed #8B6914;
      border-radius: 4px;
    }

    .tablet-mini {
      width: 30px;
      height: 100px;
      border-radius: 4px 4px 2px 2px;
      box-shadow: 2px 2px 8px rgba(0, 0, 0, 0.5);
    }

    /* 中央主区域 */
    .main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* 宫墙装饰 */
    .wall-decoration {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: linear-gradient(180deg, rgba(139, 0, 0, 0.8) 0%, transparent 100%);
      pointer-events: none;
    }

    .eave-pattern {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      height: 30px;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 40px,
        #D4AF37 40px,
        #D4AF37 42px
      );
      opacity: 0.3;
    }

    /* 御案 */
    .imperial-desk {
      position: relative;
      width: 800px;
      height: 180px;
      background: linear-gradient(180deg, #3D2314 0%, #2B1A0D 50%, #1A0F08 100%);
      border-radius: 8px;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.6),
        inset 0 2px 0 rgba(212, 175, 55, 0.2);
      margin-top: 40px;
    }

    .imperial-desk::before {
      content: '';
      position: absolute;
      top: 15%;
      left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 50%;
      background: radial-gradient(ellipse at center, rgba(212, 175, 55, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .dragon-pattern {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(212, 175, 55, 0.15);
      font-size: 80px;
      font-family: 'Ma Shan Zheng', cursive;
      user-select: none;
      pointer-events: none;
    }

    .desk-edge {
      position: absolute;
      bottom: 0;
      left: -20px;
      right: -20px;
      height: 20px;
      background: linear-gradient(180deg, #4A2C1A 0%, #2B1A0D 100%);
      border-radius: 4px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    /* 牙笏堆叠 */
    .tablet-stack {
      position: absolute;
      bottom: 30px;
      width: 60px;
      height: 120px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .tablet-stack.left {
      left: 60px;
    }

    .tablet-stack.right {
      right: 60px;
    }

    .stack-tablet {
      width: 45px;
      height: 90px;
      border-radius: 3px 3px 1px 1px;
      position: absolute;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .stack-tablet:nth-child(1) { bottom: 0; transform: rotate(-2deg); }
    .stack-tablet:nth-child(2) { bottom: 8px; transform: rotate(1deg); }
    .stack-tablet:nth-child(3) { bottom: 16px; transform: rotate(-1deg); }

    .jade-tablet {
      background: linear-gradient(135deg, #F5F0E1 0%, #E8E0D0 40%, #D4C8B8 100%);
    }

    .wood-tablet {
      background: linear-gradient(135deg, #D4A574 0%, #C4A882 50%, #A0826D 100%);
    }

    /* 书写区域 */
    .writing-area {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      height: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .tablet-canvas-container {
      position: relative;
      pointer-events: auto;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 0 20px rgba(0, 0, 0, 0.1);
      border: 4px solid #2B1A0D;
      border-radius: 6px 6px 2px 2px;
      background: #E8E0D0;
      transition: transform 0.3s ease;
    }

    .tablet-canvas-container.writing-mode {
      cursor: crosshair;
    }

    #tabletCanvas {
      display: block;
      border-radius: 4px 4px 1px 1px;
    }

    /* 皇帝剪影 */
    .emperor-silhouette {
      position: absolute;
      top: -280px;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 280px;
      opacity: 0;
      pointer-events: none;
      z-index: 5;
    }

    .emperor-silhouette.visible {
      opacity: 1;
    }

    .emperor-robe {
      fill: none;
      stroke: #D4AF37;
      stroke-width: 2;
    }

    .emperor-crown {
      fill: #D4AF37;
      opacity: 0.8;
    }

    /* 朱批画布 */
    #annotationCanvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    /* 操作按钮区 */
    .action-buttons {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      z-index: 20;
    }

    .btn {
      padding: 12px 32px;
      background: linear-gradient(180deg, #4A2C1A 0%, #2B1A0D 100%);
      color: #F5F0E1;
      border: 2px solid #D4AF37;
      border-radius: 6px;
      font-size: 16px;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      letter-spacing: 2px;
    }

    .btn:hover {
      border-color: #FFD700;
      color: #FFD700;
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
      animation: borderGlow 0.6s ease-in-out infinite alternate;
    }

    .btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      animation: none;
    }

    .btn-primary {
      background: linear-gradient(180deg, #8B0000 0%, #800000 100%);
    }

    .btn-primary:hover {
      background: linear-gradient(180deg, #A00000 0%, #8B0000 100%);
    }

    @keyframes borderGlow {
      from {
        box-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
      }
      to {
        box-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
      }
    }

    /* 右侧日志区 */
    .log-panel {
      width: 260px;
      background: linear-gradient(180deg, #E8D68C 0%, #D4C06A 100%);
      border-left: 3px solid #8B6914;
      box-shadow: -4px 0 20px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      z-index: 10;
    }

    .log-header {
      padding: 20px;
      text-align: center;
      border-bottom: 2px solid #8B6914;
      background: rgba(139, 105, 20, 0.2);
    }

    .log-title {
      color: #4A2C1A;
      font-size: 20px;
      font-family: 'Ma Shan Zheng', cursive;
      letter-spacing: 4px;
    }

    .log-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .log-list::-webkit-scrollbar {
      width: 6px;
    }

    .log-list::-webkit-scrollbar-track {
      background: rgba(139, 105, 20, 0.2);
    }

    .log-list::-webkit-scrollbar-thumb {
      background: #8B6914;
      border-radius: 3px;
    }

    .log-item {
      background: rgba(255, 255, 255, 0.3);
      border: 1px solid #8B6914;
      border-radius: 4px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .log-item:hover {
      background: rgba(255, 255, 255, 0.5);
      transform: translateX(-4px);
      box-shadow: 4px 4px 8px rgba(0, 0, 0, 0.2);
    }

    .log-date {
      font-size: 11px;
      color: #6B4E1A;
      margin-bottom: 6px;
    }

    .log-rank {
      font-size: 13px;
      color: #4A2C1A;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .log-annotation {
      font-size: 14px;
      color: #CC3333;
      font-family: 'Ma Shan Zheng', cursive;
      margin-bottom: 6px;
    }

    .log-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: #6B4E1A;
    }

    .log-stars {
      color: #D4AF37;
      font-size: 12px;
      letter-spacing: 2px;
    }

    .empty-log {
      text-align: center;
      color: #8B6914;
      font-size: 13px;
      padding: 40px 20px;
      opacity: 0.7;
    }

    /* 日志折叠按钮（小屏） */
    .log-toggle-btn {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      background: linear-gradient(180deg, #4A2C1A 0%, #2B1A0D 100%);
      border: 2px solid #D4AF37;
      border-radius: 50%;
      color: #D4AF37;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    /* 状态提示 */
    .status-toast {
      position: fixed;
      top: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 12px 28px;
      background: rgba(43, 26, 13, 0.95);
      color: #D4AF37;
      border: 2px solid #D4AF37;
      border-radius: 6px;
      font-size: 15px;
      opacity: 0;
      transition: all 0.3s ease;
      z-index: 1000;
      pointer-events: none;
      font-family: 'Noto Serif SC', serif;
    }

    .status-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* 修改次数指示器 */
    .revision-indicator {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      gap: 6px;
    }

    .revision-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(139, 105, 20, 0.3);
      border: 1px solid #8B6914;
    }

    .revision-dot.used {
      background: #CC3333;
      border-color: #CC3333;
    }

    /* 响应式 */
    @media (max-width: 1200px) {
      .rank-panel {
        width: 180px;
        padding: 20px 15px;
      }
      .log-panel {
        width: 220px;
      }
      .imperial-desk {
        width: 600px;
      }
    }

    @media (max-width: 1000px) {
      .log-panel {
        position: absolute;
        right: 0;
        top: 0;
        height: 100%;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        z-index: 50;
      }
      .log-panel.open {
        transform: translateX(0);
      }
      .log-toggle-btn {
        display: flex;
      }
      .rank-panel {
        width: 160px;
      }
      .imperial-desk {
        width: 500px;
      }
    }
  </style>
</head>
<body>
  <div class="court-container">
    <!-- 左侧品级选择区 -->
    <aside class="rank-panel">
      <div class="panel-title">官员品级</div>
      
      <div class="rank-select-wrapper">
        <label class="rank-label">选择品级</label>
        <select class="rank-select" id="rankSelect">
          <option value="1">一品大员</option>
          <option value="2">二品官员</option>
          <option value="3">三品官员</option>
          <option value="4">四品官员</option>
          <option value="5">五品官员</option>
          <option value="6">六品官员</option>
          <option value="7">七品官员</option>
          <option value="8">八品官员</option>
          <option value="9">九品官员</option>
        </select>
      </div>

      <div class="tablet-preview">
        <div class="tablet-mini jade-tablet" id="tabletMini"></div>
      </div>

      <div class="rank-info" id="rankInfo">
        <h4>一品大员</h4>
        <p>材质：白玉</p>
        <p>宽度：80px</p>
        <p>纹饰：螭龙纹</p>
        <p>格式：全格式奏章</p>
      </div>
    </aside>

    <!-- 中央主区域 -->
    <main class="main-area">
      <div class="wall-decoration">
        <div class="eave-pattern"></div>
      </div>

      <!-- 御案 -->
      <div class="imperial-desk">
        <div class="dragon-pattern">龍</div>
        
        <!-- 左侧玉笏堆叠 -->
        <div class="tablet-stack left">
          <div class="stack-tablet jade-tablet"></div>
          <div class="stack-tablet jade-tablet"></div>
          <div class="stack-tablet jade-tablet"></div>
        </div>

        <!-- 右侧木笏堆叠 -->
        <div class="tablet-stack right">
          <div class="stack-tablet wood-tablet"></div>
          <div class="stack-tablet wood-tablet"></div>
          <div class="stack-tablet wood-tablet"></div>
        </div>

        <div class="desk-edge"></div>
      </div>

      <!-- 书写区域 -->
      <div class="writing-area" id="writingArea">
        <div class="tablet-canvas-container writing-mode" id="tabletContainer">
          <canvas id="tabletCanvas" width="80" height="350"></canvas>
          <canvas id="annotationCanvas" width="80" height="350"></canvas>
          
          <!-- 修改次数指示器 -->
          <div class="revision-indicator" id="revisionIndicator">
            <div class="revision-dot"></div>
            <div class="revision-dot"></div>
            <div class="revision-dot"></div>
          </div>
        </div>
      </div>

      <!-- 皇帝剪影 -->
      <svg class="emperor-silhouette" id="emperorSilhouette" viewBox="0 0 200 280">
        <!-- 皇冠 -->
        <path class="emperor-crown" d="M70,30 L70,20 L85,25 L100,10 L115,25 L130,20 L130,30 L125,35 L75,35 Z"/>
        <!-- 头部轮廓 -->
        <ellipse class="emperor-robe" cx="100" cy="55" rx="25" ry="28"/>
        <!-- 龙袍身体 -->
        <path class="emperor-robe" d="M60,85 Q50,120 55,200 Q60,250 100,260 Q140,250 145,200 Q150,120 140,85 Z"/>
        <!-- 龙袍袖子 -->
        <path class="emperor-robe" d="M60,100 Q30,120 25,180 Q30,200 50,190 Q55,150 65,120 Z"/>
        <path class="emperor-robe" d="M140,100 Q170,120 175,180 Q170,200 150,190 Q145,150 135,120 Z"/>
        <!-- 右手持笔 -->
        <path class="emperor-robe" id="emperorRightHand" d="M150,130 Q170,110 175,90 Q178,80 172,75"/>
        <!-- 笔 -->
        <line class="emperor-robe" id="brushPen" x1="172" y1="75" x2="180" y2="55" stroke-width="2"/>
      </svg>

      <!-- 操作按钮 -->
      <div class="action-buttons">
        <button class="btn btn-primary" id="presentBtn">呈 奏</button>
        <button class="btn" id="clearBtn">清 空</button>
        <button class="btn" id="reviseBtn" disabled>修 改</button>
      </div>
    </main>

    <!-- 右侧日志区 -->
    <aside class="log-panel" id="logPanel">
      <div class="log-header">
        <div class="log-title">朝会奏章</div>
      </div>
      <div class="log-list" id="logList">
        <div class="empty-log">暂无奏章记录</div>
      </div>
    </aside>

    <!-- 日志折叠按钮 -->
    <button class="log-toggle-btn" id="logToggleBtn" style="display:none;">
      📜
    </button>
  </div>

  <!-- 状态提示 -->
  <div class="status-toast" id="statusToast"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
