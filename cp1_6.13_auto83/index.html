<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoPulse - Rhythm Battle Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #game-canvas {
      display: block;
    }

    #hud-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .player-hud {
      position: absolute;
      bottom: 40px;
      width: 200px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #player1-hud {
      left: 60px;
    }

    #player2-hud {
      right: 60px;
    }

    .player-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 10px;
      text-shadow: 0 0 10px currentColor;
    }

    #player1-hud .player-name {
      color: #00aaff;
    }

    #player2-hud .player-name {
      color: #ff6600;
    }

    .glow-circle {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      transition: transform 0.1s ease-out;
    }

    #player1-glow {
      background: radial-gradient(circle, rgba(0, 170, 255, 0.4) 0%, rgba(0, 170, 255, 0.1) 50%, transparent 70%);
      box-shadow: 0 0 30px rgba(0, 170, 255, 0.5), inset 0 0 30px rgba(0, 170, 255, 0.2);
    }

    #player2-glow {
      background: radial-gradient(circle, rgba(255, 102, 0, 0.4) 0%, rgba(255, 102, 0, 0.1) 50%, transparent 70%);
      box-shadow: 0 0 30px rgba(255, 102, 0, 0.5), inset 0 0 30px rgba(255, 102, 0, 0.2);
    }

    .glow-circle.pulse {
      animation: glow-pulse 0.3s ease-out;
    }

    @keyframes glow-pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .keys-container {
      display: flex;
      gap: 15px;
      margin-top: 15px;
    }

    .key {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', sans-serif;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: all 0.1s ease-out;
    }

    #player1-hud .key.active {
      background: rgba(0, 170, 255, 0.6);
      border-color: #00aaff;
      box-shadow: 0 0 20px rgba(0, 170, 255, 0.8);
    }

    #player2-hud .key.active {
      background: rgba(255, 102, 0, 0.6);
      border-color: #ff6600;
      box-shadow: 0 0 20px rgba(255, 102, 0, 0.8);
    }

    .score-display {
      position: absolute;
      top: 120px;
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      font-weight: bold;
      text-shadow: 0 0 20px currentColor;
    }

    #player1-score {
      left: 80px;
      color: #00aaff;
    }

    #player2-score {
      right: 80px;
      color: #ff6600;
    }

    #countdown-container {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #countdown-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #countdown-number {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
      z-index: 1;
    }

    #game-status {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: bold;
      color: white;
      text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
      display: none;
    }

    #game-status.show {
      display: block;
      animation: fade-in 0.5s ease-out;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    #start-button {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 15px 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #00aaff, #ff6600);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 0 30px rgba(0, 170, 255, 0.5);
      transition: all 0.3s ease;
      display: none;
    }

    #start-button:hover {
      transform: translate(-50%, -50%) scale(1.1);
      box-shadow: 0 0 50px rgba(0, 170, 255, 0.8);
    }

    #start-button.show {
      display: block;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
  </style>
</head>
<body>
  <div id="canvas-container">
    <canvas id="game-canvas"></canvas>
    <div id="hud-overlay">
      <div id="countdown-container">
        <div id="countdown-ring">
          <span id="countdown-number">90</span>
        </div>
      </div>
      
      <div id="player1-score">0</div>
      <div id="player2-score">0</div>

      <div id="player1-hud" class="player-hud">
        <div class="player-name">PLAYER 1</div>
        <div id="player1-glow" class="glow-circle"></div>
        <div class="keys-container">
          <div class="key" id="key-a">A</div>
          <div class="key" id="key-s">S</div>
        </div>
      </div>

      <div id="player2-hud" class="player-hud">
        <div class="player-name">PLAYER 2</div>
        <div id="player2-glow" class="glow-circle"></div>
        <div class="keys-container">
          <div class="key" id="key-k">K</div>
          <div class="key" id="key-l">L</div>
        </div>
      </div>

      <div id="game-status">Press SPACE to start</div>
      <button id="start-button">START GAME</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
