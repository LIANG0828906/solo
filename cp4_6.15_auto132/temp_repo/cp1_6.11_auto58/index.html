<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子书法 - Particle Calligraphy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 70%, #0f0f1e 100%);
      font-family: 'Noto Sans SC', sans-serif;
    }

    #font-loader {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      z-index: 100;
      font-family: 'Noto Sans SC', sans-serif;
      transition: opacity 0.5s ease;
    }

    #font-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px;
    }

    #canvas-wrapper {
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
      border-radius: 8px;
      overflow: hidden;
    }

    #canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
    }

    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 10px 20px;
      height: 60px;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 10;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .control-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      white-space: nowrap;
    }

    #color-picker-wrapper {
      position: relative;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #color-picker-wrapper:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    #color-picker {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    #color-preview {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: border-color 0.2s ease;
    }

    #color-picker-wrapper:hover #color-preview {
      border-color: rgba(255, 255, 255, 0.6);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      transition: background 0.2s ease;
    }

    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.35);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #ffffff;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      background: #ffffff;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      color: #ffffff;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    #clear-btn {
      background: #e74c3c;
    }

    #clear-btn:hover {
      background: #ff6b5b;
    }

    #save-btn {
      background: #3498db;
    }

    #save-btn:hover {
      background: #5dade2;
    }

    @media (max-width: 768px) {
      #app {
        padding: 15px;
      }

      #controls {
        bottom: 10px;
        height: 90px;
        gap: 10px;
        padding: 8px 12px;
        flex-wrap: wrap;
        justify-content: center;
        width: calc(100% - 20px);
        max-width: 500px;
      }

      .control-group {
        gap: 6px;
      }

      input[type="range"] {
        width: 80px;
      }

      .control-label {
        font-size: 11px;
      }

      .btn {
        padding: 6px 12px;
        font-size: 12px;
      }

      #color-picker-wrapper {
        width: 32px;
        height: 32px;
      }
    }
  </style>
</head>
<body>
  <div id="font-loader">正在加载字体...</div>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <div id="controls">
    <div class="control-group">
      <div id="color-picker-wrapper">
        <div id="color-preview"></div>
        <input type="color" id="color-picker" value="#ff6b6b" />
      </div>
    </div>
    <div class="control-group">
      <span class="control-label">粒子大小</span>
      <input type="range" id="size-slider" min="2" max="8" step="0.5" value="4" />
    </div>
    <div class="control-group">
      <span class="control-label">生命周期</span>
      <input type="range" id="lifespan-slider" min="2" max="6" step="0.5" value="4" />
    </div>
    <button id="clear-btn" class="btn">清除</button>
    <button id="save-btn" class="btn">保存截图</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
