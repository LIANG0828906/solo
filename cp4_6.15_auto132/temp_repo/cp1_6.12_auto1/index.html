<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Cyber Attack Heatmap | 全球网络攻击热力图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000814;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0f7ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      background: rgba(0, 20, 40, 0.92);
      border: 1px solid rgba(0, 200, 255, 0.6);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      z-index: 1000;
      opacity: 0;
      transform: translate(-50%, -120%);
      transition: opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 150, 255, 0.3),
                  inset 0 0 15px rgba(0, 100, 200, 0.1);
      min-width: 160px;
    }

    #tooltip.visible {
      opacity: 1;
      transform: translate(-50%, -130%);
    }

    #tooltip .tt-title {
      font-size: 15px;
      font-weight: 600;
      color: #00e5ff;
      margin-bottom: 6px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.6);
    }

    #tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      margin: 3px 0;
      gap: 12px;
    }

    #tooltip .tt-label {
      color: #8ab4c7;
    }

    #tooltip .tt-value {
      color: #ffffff;
      font-weight: 600;
    }

    #tooltip .tt-bar {
      height: 4px;
      background: rgba(0, 100, 200, 0.25);
      border-radius: 2px;
      margin-top: 8px;
      overflow: hidden;
    }

    #tooltip .tt-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #00e5ff, #ff2d55);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .fps-counter {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0, 20, 40, 0.7);
      border: 1px solid rgba(0, 150, 255, 0.3);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 12px;
      font-family: 'Consolas', monospace;
      color: #00e5ff;
      z-index: 100;
      backdrop-filter: blur(8px);
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: #000814;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 28px;
      font-weight: 300;
      color: #00e5ff;
      letter-spacing: 8px;
      margin-bottom: 24px;
      text-shadow: 0 0 20px rgba(0, 229, 255, 0.5);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .loading-spinner {
      width: 48px;
      height: 48px;
      border: 2px solid rgba(0, 150, 255, 0.2);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      font-size: 13px;
      color: #5a7a8a;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="tooltip"></div>
    <div class="loading-overlay" id="loading">
      <div class="loading-title">GLOBAL CYBER SHIELD</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">INITIALIZING DEFENSE MATRIX...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
