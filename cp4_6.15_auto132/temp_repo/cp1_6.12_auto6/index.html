<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷宫符文收集 - Rune Maze</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0f0ff;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* 顶部信息栏 */
    #top-bar {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: clamp(20px, 3vw, 40px);
      padding: 12px clamp(20px, 3vw, 36px);
      background: rgba(15, 25, 50, 0.65);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(100, 180, 255, 0.25);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 100, 255, 0.15);
      z-index: 10;
      max-width: 95vw;
    }

    .rune-progress {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .rune-label {
      font-size: clamp(12px, 1.1vw, 14px);
      color: rgba(200, 220, 255, 0.7);
      letter-spacing: 1px;
    }

    .rune-dots {
      display: flex;
      gap: 10px;
    }

    .rune-dot {
      width: clamp(18px, 2vw, 24px);
      height: clamp(18px, 2vw, 24px);
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .rune-dot.collected {
      border-color: transparent;
      transform: scale(1.15);
      box-shadow: 0 0 16px currentColor;
    }

    .rune-dot.collected::after {
      content: '✓';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(10px, 0.9vw, 12px);
      font-weight: bold;
      color: white;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.5);
    }

    .rune-fire { color: #ff5544; }
    .rune-fire.collected { background: #ff5544; }

    .rune-water { color: #44aaff; }
    .rune-water.collected { background: #44aaff; }

    .rune-wind { color: #55dd88; }
    .rune-wind.collected { background: #55dd88; }

    .rune-earth { color: #cc8844; }
    .rune-earth.collected { background: #cc8844; }

    .timer {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: clamp(14px, 1.3vw, 18px);
      font-variant-numeric: tabular-nums;
      font-weight: 500;
      color: #88ddff;
      letter-spacing: 1px;
    }

    .timer-icon {
      font-size: clamp(16px, 1.5vw, 20px);
    }

    /* 迷你地图 */
    #minimap {
      position: absolute;
      top: 20px;
      right: 20px;
      width: clamp(160px, 18vw, 240px);
      height: clamp(160px, 18vw, 240px);
      background: rgba(15, 25, 50, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 180, 255, 0.2);
      border-radius: 16px;
      padding: 10px;
      z-index: 10;
      box-shadow: 0 4px 20px rgba(0, 80, 200, 0.15);
    }

    #minimap-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .minimap-title {
      position: absolute;
      bottom: -22px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: rgba(200, 220, 255, 0.5);
      letter-spacing: 2px;
      white-space: nowrap;
    }

    /* 传送门提示 */
    #portal-hint {
      position: absolute;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 32px;
      background: rgba(50, 200, 120, 0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(100, 255, 180, 0.4);
      border-radius: 12px;
      color: #88ffbb;
      font-size: clamp(14px, 1.3vw, 18px);
      letter-spacing: 2px;
      z-index: 10;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      box-shadow: 0 0 30px rgba(100, 255, 180, 0.2);
      animation: none;
    }

    #portal-hint.visible {
      opacity: 1;
      animation: portalPulse 2s ease-in-out infinite;
    }

    @keyframes portalPulse {
      0%, 100% { box-shadow: 0 0 30px rgba(100, 255, 180, 0.2); }
      50% { box-shadow: 0 0 50px rgba(100, 255, 180, 0.5); }
    }

    /* 屏幕边缘闪烁 */
    #screen-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      transition: opacity 0.1s ease;
    }

    #screen-flash.active {
      animation: edgeFlash 0.5s ease-out;
    }

    @keyframes edgeFlash {
      0% { opacity: 0.6; box-shadow: inset 0 0 120px 40px var(--flash-color); }
      100% { opacity: 0; box-shadow: inset 0 0 0px 0px var(--flash-color); }
    }

    /* 通关界面 */
    #victory-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    #victory-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #victory-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, rgba(20, 60, 120, 0.9) 0%, rgba(40, 100, 160, 0.85) 100%);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .victory-content {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: clamp(30px, 5vw, 60px) clamp(40px, 6vw, 80px);
      background: rgba(10, 30, 60, 0.6);
      border: 2px solid rgba(100, 220, 255, 0.4);
      border-radius: 24px;
      box-shadow: 0 0 80px rgba(100, 200, 255, 0.3);
      transform: scale(0.8);
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #victory-overlay.visible .victory-content {
      transform: scale(1);
    }

    .victory-title {
      font-size: clamp(32px, 5vw, 56px);
      font-weight: 700;
      background: linear-gradient(135deg, #88ddff 0%, #aaffcc 50%, #ffdd88 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 30px;
      letter-spacing: 4px;
    }

    .victory-stats {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: clamp(30px, 5vw, 60px);
      padding: 12px 24px;
      background: rgba(100, 180, 255, 0.08);
      border-radius: 10px;
    }

    .stat-label {
      font-size: clamp(14px, 1.3vw, 18px);
      color: rgba(200, 220, 255, 0.7);
      letter-spacing: 1px;
    }

    .stat-value {
      font-size: clamp(18px, 1.8vw, 24px);
      font-weight: 600;
      color: #88ddff;
      font-variant-numeric: tabular-nums;
    }

    .rune-summary {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
    }

    .rune-summary-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .rune-summary-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      box-shadow: 0 0 12px currentColor;
    }

    .rune-summary-name {
      font-size: 12px;
      color: rgba(200, 220, 255, 0.6);
    }

    #restart-btn {
      padding: 16px 48px;
      font-size: clamp(14px, 1.3vw, 18px);
      font-weight: 600;
      letter-spacing: 3px;
      color: white;
      background: linear-gradient(135deg, #4488dd 0%, #66aaff 100%);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(68, 136, 221, 0.4);
    }

    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(68, 136, 221, 0.6);
    }

    #restart-btn:active {
      transform: translateY(0);
    }

    /* 控制提示 */
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 12px 18px;
      background: rgba(15, 25, 50, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 180, 255, 0.15);
      border-radius: 10px;
      z-index: 10;
      font-size: clamp(11px, 1vw, 13px);
      color: rgba(200, 220, 255, 0.6);
    }

    .control-key {
      display: inline-block;
      padding: 2px 8px;
      margin-right: 6px;
      background: rgba(100, 180, 255, 0.2);
      border-radius: 4px;
      color: #88ccff;
      font-weight: 600;
      font-size: 11px;
    }

    /* 加载/启动界面 */
    #start-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0f1a33 0%, #050810 100%);
      transition: opacity 0.8s ease;
    }

    #start-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .start-content {
      text-align: center;
    }

    .game-title {
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 800;
      letter-spacing: 8px;
      background: linear-gradient(135deg, #66bbff 0%, #88ffcc 50%, #ffcc88 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      text-shadow: 0 0 60px rgba(100, 180, 255, 0.3);
    }

    .game-subtitle {
      font-size: clamp(14px, 1.5vw, 20px);
      color: rgba(180, 210, 255, 0.6);
      letter-spacing: 6px;
      margin-bottom: 60px;
    }

    #start-btn {
      padding: 20px 64px;
      font-size: clamp(16px, 1.5vw, 22px);
      font-weight: 700;
      letter-spacing: 6px;
      color: white;
      background: linear-gradient(135deg, #3366cc 0%, #5599ee 100%);
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 30px rgba(68, 136, 221, 0.5);
    }

    #start-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 50px rgba(68, 136, 221, 0.7);
    }

    .game-intro {
      max-width: 500px;
      margin: 0 auto 50px;
      font-size: clamp(12px, 1.1vw, 15px);
      line-height: 1.8;
      color: rgba(200, 220, 255, 0.6);
    }

    .game-intro strong {
      color: #88ddff;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="canvas-container"></div>

    <!-- 启动界面 -->
    <div id="start-overlay">
      <div class="start-content">
        <h1 class="game-title">符文迷宫</h1>
        <p class="game-subtitle">RUNE · MAZE</p>
        <div class="game-intro">
          在神秘的迷宫中探索，收集<strong>火、水、风、地</strong>四种元素符文，
          激活传送门，逃离这片古老的遗迹。
        </div>
        <button id="start-btn">开始探索</button>
      </div>
    </div>

    <!-- 顶部信息栏 -->
    <div id="top-bar">
      <div class="rune-progress">
        <span class="rune-label">符文</span>
        <div class="rune-dots">
          <div class="rune-dot rune-fire" data-rune="fire" title="火符文"></div>
          <div class="rune-dot rune-water" data-rune="water" title="水符文"></div>
          <div class="rune-dot rune-wind" data-rune="wind" title="风符文"></div>
          <div class="rune-dot rune-earth" data-rune="earth" title="地符文"></div>
        </div>
      </div>
      <div class="timer">
        <span class="timer-icon">⏱</span>
        <span id="timer-value">00:00</span>
      </div>
    </div>

    <!-- 迷你地图 -->
    <div id="minimap">
      <canvas id="minimap-canvas"></canvas>
      <span class="minimap-title">迷你地图</span>
    </div>

    <!-- 传送门提示 -->
    <div id="portal-hint">传送门已激活！前往出口</div>

    <!-- 屏幕边缘闪烁 -->
    <div id="screen-flash"></div>

    <!-- 通关界面 -->
    <div id="victory-overlay">
      <div class="victory-content">
        <h2 class="victory-title">✦ 通关成功 ✦</h2>
        <div class="victory-stats">
          <div class="stat-row">
            <span class="stat-label">通关时间</span>
            <span class="stat-value" id="final-time">00:00</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">符文收集</span>
            <span class="stat-value" id="final-runes">4 / 4</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">迷宫难度</span>
            <span class="stat-value" id="final-difficulty">10×10</span>
          </div>
          <div class="rune-summary">
            <div class="rune-summary-item">
              <div class="rune-summary-dot rune-fire" style="background: #ff5544;"></div>
              <span class="rune-summary-name">火</span>
            </div>
            <div class="rune-summary-item">
              <div class="rune-summary-dot rune-water" style="background: #44aaff;"></div>
              <span class="rune-summary-name">水</span>
            </div>
            <div class="rune-summary-item">
              <div class="rune-summary-dot rune-wind" style="background: #55dd88;"></div>
              <span class="rune-summary-name">风</span>
            </div>
            <div class="rune-summary-item">
              <div class="rune-summary-dot rune-earth" style="background: #cc8844;"></div>
              <span class="rune-summary-name">地</span>
            </div>
          </div>
        </div>
        <button id="restart-btn">再来一局</button>
      </div>
    </div>

    <!-- 控制提示 -->
    <div id="controls-hint">
      <div><span class="control-key">↑</span><span class="control-key">↓</span><span class="control-key">←</span><span class="control-key">→</span> 移动</div>
      <div><span class="control-key">W</span><span class="control-key">A</span><span class="control-key">S</span><span class="control-key">D</span> 移动</div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
