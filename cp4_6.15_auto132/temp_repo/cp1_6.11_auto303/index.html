<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蹴鞠争霸</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@700;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #C2B280;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Noto Serif SC', 'KaiTi', 'STKaiti', serif;
    }

    #game-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #game-title {
      font-family: 'Noto Serif SC', 'KaiTi', 'STKaiti', serif;
      font-size: 36px;
      font-weight: 900;
      color: #5D3A1A;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      margin-bottom: 8px;
      letter-spacing: 8px;
      animation: fadeIn 0.5s ease-in;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    canvas {
      border: 3px solid #8B6914;
      border-radius: 4px;
      display: block;
      animation: fadeIn 0.5s ease-in;
    }

    #controls-bar {
      margin-top: 8px;
      display: flex;
      gap: 16px;
      align-items: center;
      font-family: 'Noto Serif SC', 'KaiTi', 'STKaiti', serif;
      font-size: 13px;
      color: #5D3A1A;
      animation: fadeIn 0.5s ease-in;
    }

    .key-hint {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .key-icon {
      display: inline-block;
      padding: 2px 7px;
      border: 2px solid #B8860B;
      border-radius: 4px;
      background: rgba(184,134,11,0.1);
      font-size: 12px;
      font-weight: bold;
      color: #5D3A1A;
      min-width: 22px;
      text-align: center;
    }

    @media (max-width: 600px) {
      #game-title {
        font-size: 22px;
        letter-spacing: 4px;
      }
      #controls-bar {
        font-size: 10px;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .key-icon {
        padding: 1px 4px;
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-title">蹴鞠争霸</div>
    <canvas id="gameCanvas"></canvas>
    <div id="controls-bar">
      <span class="key-hint"><span class="key-icon">↑↓←→</span> 移动</span>
      <span class="key-hint"><span class="key-icon">空格</span> 传球</span>
      <span class="key-hint"><span class="key-icon">D</span> 射门</span>
      <span class="key-hint"><span class="key-icon">J</span> 扑救</span>
      <span class="key-hint"><span class="key-icon">Enter</span> 开始</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
