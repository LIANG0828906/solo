<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市热力图 - 3D交互式可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    canvas {
      display: block;
    }
    
    .ui-title {
      position: fixed;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: 600;
      color: #ffffff;
      text-shadow: 0 0 10px #00AAFF;
      letter-spacing: 2px;
      z-index: 100;
      pointer-events: none;
    }
    
    .ui-status {
      position: fixed;
      top: 20px;
      right: 20px;
      font-size: 16px;
      color: #ffffff;
      border-bottom: 2px solid #00AAFF;
      padding-bottom: 4px;
      z-index: 100;
      pointer-events: none;
    }
    
    .ui-tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.7);
      color: #ffffff;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 8px;
      pointer-events: none;
      z-index: 200;
      display: none;
      white-space: nowrap;
      backdrop-filter: blur(4px);
    }
    
    .lil-gui {
      --background-color: rgba(20, 20, 30, 0.85) !important;
      --widget-color: rgba(60, 60, 80, 0.8) !important;
      --focus-color: #00AAFF !important;
      --text-color: #ffffff !important;
      --title-background-color: rgba(30, 30, 50, 0.9) !important;
      border-radius: 12px !important;
      overflow: hidden !important;
      backdrop-filter: blur(10px) !important;
    }
    
    .lil-gui .title {
      background-color: rgba(30, 30, 50, 0.9) !important;
      padding: 10px 12px !important;
      font-weight: 600 !important;
    }
    
    .lil-gui .controller {
      padding: 6px 12px !important;
    }
    
    .lil-gui .widget {
      border-radius: 6px !important;
    }
    
    @media (max-width: 768px) {
      .ui-title {
        font-size: 19.2px;
        top: 16px;
        left: 16px;
      }
      
      .ui-status {
        font-size: 12.8px;
        top: 16px;
        right: 16px;
      }
      
      .ui-tooltip {
        font-size: 11.2px;
        padding: 6.4px 9.6px;
      }
      
      .lil-gui {
        transform: scale(0.8);
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div class="ui-title">城市热力图</div>
  <div class="ui-status" id="status-display">人口密度 - 12:00</div>
  <div class="ui-tooltip" id="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
