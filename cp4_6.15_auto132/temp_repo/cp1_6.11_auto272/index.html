<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>三彩窑坊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #A0522D;
      font-family: 'KaiTi', 'STKaiti', serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 36px;
      color: #D4AF37;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      z-index: 100;
      letter-spacing: 8px;
      user-select: none;
    }

    #left-panel {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 220px;
      background: rgba(62, 39, 35, 0.92);
      border: 2px solid #D4AF37;
      border-radius: 10px;
      padding: 15px;
      z-index: 100;
      color: #D4AF37;
      backdrop-filter: blur(5px);
      max-height: 90vh;
      overflow-y: auto;
    }

    #left-panel h3 {
      margin-bottom: 15px;
      text-align: center;
      font-size: 18px;
      border-bottom: 1px solid #D4AF37;
      padding-bottom: 8px;
    }

    .glaze-section {
      margin-bottom: 25px;
    }

    .glaze-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 15px;
    }

    .glaze-btn {
      width: 100%;
      height: 50px;
      border: 2px solid #D4AF37;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 3px;
    }

    .glaze-btn:hover {
      transform: scale(1.05);
    }

    .glaze-btn.active {
      box-shadow: 0 0 10px #D4AF37, 0 0 20px rgba(212, 175, 55, 0.5);
      transform: scale(1.08);
    }

    .glaze-btn span {
      font-size: 12px;
      color: #fff;
      white-space: nowrap;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      background: rgba(0, 0, 0, 0.3);
      padding: 1px 5px;
      border-radius: 3px;
    }

    .brush-section {
      margin-bottom: 20px;
    }

    .brush-slider-container {
      margin-top: 10px;
    }

    .brush-slider-container label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .brush-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #3E2723;
      outline: none;
      border: 1px solid #D4AF37;
    }

    .brush-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #D4AF37;
      cursor: pointer;
      border: 2px solid #fff;
    }

    .brush-size-value {
      text-align: center;
      font-size: 14px;
      margin-top: 5px;
    }

    .temperature-section {
      margin-top: 20px;
    }

    .temp-display {
      text-align: center;
      font-size: 24px;
      margin-bottom: 10px;
      color: #FF6347;
    }

    .temp-slider-container {
      position: relative;
      margin-top: 15px;
    }

    .temp-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 10px;
      border-radius: 5px;
      background: linear-gradient(to right, #4169E1, #32CD32, #FFD700, #FF4500, #8B0000);
      outline: none;
      cursor: pointer;
    }

    .temp-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #CD853F;
      cursor: pointer;
      border: 3px solid #D4AF37;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
      transition: transform 0.1s;
    }

    .temp-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    .temp-slider::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    .rate-slider-container {
      margin-top: 15px;
    }

    .rate-slider-container label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }

    .rate-slider {
      width: 100%;
      -webkit-appearance: none;
      height: 6px;
      border-radius: 3px;
      background: #3E2723;
      outline: none;
      border: 1px solid #D4AF37;
    }

    .rate-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #CD853F;
      cursor: pointer;
      border: 2px solid #D4AF37;
    }

    .rate-value {
      text-align: center;
      font-size: 14px;
      margin-top: 5px;
    }

    #right-panel {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 300px;
      background: rgba(27, 58, 45, 0.9);
      border: 2px solid #D4AF37;
      border-radius: 10px;
      padding: 20px;
      z-index: 100;
      color: #D4AF37;
      backdrop-filter: blur(5px);
    }

    #right-panel h3 {
      margin-bottom: 15px;
      text-align: center;
      font-size: 18px;
      border-bottom: 1px solid #D4AF37;
      padding-bottom: 8px;
    }

    #chart-container {
      width: 100%;
      height: 200px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 5px;
      margin-bottom: 15px;
      position: relative;
    }

    #chart-canvas {
      width: 100%;
      height: 100%;
    }

    .chart-stats {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 15px;
    }

    .chart-stats div {
      text-align: center;
    }

    .chart-stats .value {
      font-size: 18px;
      color: #FF6347;
    }

    .control-buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-btn {
      width: 100%;
      height: 40px;
      border: 2px solid #D4AF37;
      border-radius: 5px;
      background: rgba(62, 39, 35, 0.8);
      color: #D4AF37;
      font-family: 'KaiTi', 'STKaiti', serif;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .control-btn:hover {
      background: #D4AF37;
      color: #3E2723;
    }

    .control-btn:active {
      transform: scale(0.98);
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #report-panel {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(62, 39, 35, 0.95);
      border: 2px solid #D4AF37;
      border-radius: 10px;
      padding: 20px;
      z-index: 100;
      color: #D4AF37;
      display: none;
      min-width: 400px;
      backdrop-filter: blur(5px);
    }

    #report-panel h3 {
      text-align: center;
      margin-bottom: 15px;
      border-bottom: 1px solid #D4AF37;
      padding-bottom: 8px;
    }

    .report-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 14px;
    }

    .report-item {
      padding: 5px;
    }

    .report-item .label {
      color: #aaa;
    }

    .report-item .value {
      color: #FFD700;
      font-size: 16px;
    }

    #mobile-menu-btn {
      display: none;
      position: absolute;
      left: 15px;
      top: 15px;
      width: 45px;
      height: 45px;
      background: rgba(62, 39, 35, 0.9);
      border: 2px solid #D4AF37;
      border-radius: 8px;
      color: #D4AF37;
      font-size: 24px;
      cursor: pointer;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      #left-panel {
        display: none;
        left: 0;
        top: 60px;
        transform: none;
        width: 100%;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      #left-panel.open {
        display: block;
      }

      #right-panel {
        display: none;
        right: 0;
        top: 60px;
        transform: none;
        width: 100%;
        border-radius: 0;
        border-left: none;
        border-right: none;
      }

      #right-panel.open {
        display: block;
      }

      #mobile-menu-btn {
        display: flex;
      }

      #title {
        font-size: 24px;
        top: 10px;
      }

      #report-panel {
        min-width: 90%;
        left: 5%;
        right: 5%;
        transform: none;
      }
    }

    .floor-grid {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100px;
      background: repeating-linear-gradient(
        45deg,
        #696969,
        #696969 1px,
        transparent 1px,
        transparent 20px
      );
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <h1 id="title">三彩窑坊</h1>
    
    <button id="mobile-menu-btn">☰</button>
    
    <div id="left-panel">
      <h3>釉料选择</h3>
      <div class="glaze-section">
        <div class="glaze-options">
          <div class="glaze-btn active" data-color="#B8860B" style="background: #B8860B;" title="黄褐釉">
            <span>黄褐</span>
          </div>
          <div class="glaze-btn" data-color="#2E8B57" style="background: #2E8B57;" title="翠绿釉">
            <span>翠绿</span>
          </div>
          <div class="glaze-btn" data-color="#4169E1" style="background: #4169E1;" title="钴蓝釉">
            <span>钴蓝</span>
          </div>
          <div class="glaze-btn" data-color="#F0F8FF" style="background: #F0F8FF;" title="月白釉">
            <span>月白</span>
          </div>
        </div>
      </div>
      
      <div class="brush-section">
        <h3 style="margin-top: 25px;">笔刷大小</h3>
        <div class="brush-slider-container">
          <input type="range" class="brush-slider" min="8" max="30" value="15" id="brush-size">
          <div class="brush-size-value" id="brush-size-value">15 单位</div>
        </div>
      </div>
      
      <div class="temperature-section">
        <h3>窑炉温度</h3>
        <div class="temp-display" id="temp-display">25°C</div>
        <div class="temp-slider-container">
          <input type="range" class="temp-slider" min="25" max="1250" value="25" id="temp-slider">
        </div>
        <div class="rate-slider-container">
          <label>升温速率</label>
          <input type="range" class="rate-slider" min="10" max="100" value="50" id="rate-slider">
          <div class="rate-value" id="rate-value">50 °C/s</div>
        </div>
      </div>
    </div>
    
    <div id="right-panel">
      <h3>温度曲线</h3>
      <div id="chart-container">
        <canvas id="chart-canvas"></canvas>
      </div>
      <div class="chart-stats">
        <div>
          <div class="value" id="current-temp">25</div>
          <div>当前温度(°C)</div>
        </div>
        <div>
          <div class="value" id="current-rate">0</div>
          <div>升温速率(°C/s)</div>
        </div>
      </div>
      <div class="control-buttons">
        <button class="control-btn" id="btn-start">开始烧制</button>
        <button class="control-btn" id="btn-pause" disabled>暂停</button>
        <button class="control-btn" id="btn-cool" disabled>冷却</button>
      </div>
    </div>
    
    <div id="report-panel">
      <h3>烧制报告</h3>
      <div class="report-content">
        <div class="report-item">
          <div class="label">最高温度</div>
          <div class="value" id="report-max-temp">-</div>
        </div>
        <div class="report-item">
          <div class="label">保温时长</div>
          <div class="value" id="report-hold-time">-</div>
        </div>
        <div class="report-item">
          <div class="label">釉料种类</div>
          <div class="value" id="report-glazes">-</div>
        </div>
        <div class="report-item">
          <div class="label">开片密度</div>
          <div class="value" id="report-crack-density">-</div>
        </div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
