<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>风云镖局 - 押镖行</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'ZCOOL XiaoWei', 'KaiTi', 'STKaiti', serif;
      background: #2c1810;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    .title-font {
      font-family: 'Ma Shan Zheng', 'LiSu', 'STLiti', serif;
    }
    
    .scroll-texture {
      background: 
        linear-gradient(135deg, rgba(255,248,220,0.1) 25%, transparent 25%),
        linear-gradient(225deg, rgba(255,248,220,0.1) 25%, transparent 25%),
        linear-gradient(45deg, rgba(255,248,220,0.1) 25%, transparent 25%),
        linear-gradient(315deg, rgba(255,248,220,0.1) 25%, #FFF8DC 25%);
      background-size: 8px 8px;
    }
    
    @keyframes inkSpread {
      0% { transform: scale(0.8); opacity: 0; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    @keyframes scrollUnroll {
      from { clip-path: inset(0 0 100% 0); }
      to { clip-path: inset(0 0 0 0); }
    }
    
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px #FFD700, 0 0 10px #FFD700; }
      50% { box-shadow: 0 0 20px #FFD700, 0 0 30px #FFD700, 0 0 40px #FFD700; }
    }
    
    @keyframes shake {
      0%, 100% { transform: translate(0, 0); }
      25% { transform: translate(-3px, 2px); }
      50% { transform: translate(2px, -3px); }
      75% { transform: translate(-2px, -2px); }
    }
    
    .shake {
      animation: shake 0.3s ease-in-out;
    }
    
    .ink-spread {
      animation: inkSpread 0.5s ease-out forwards;
    }
    
    .slide-in {
      animation: slideInUp 0.3s ease-out forwards;
    }
    
    .scroll-unroll {
      animation: scrollUnroll 1s ease-out forwards;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
