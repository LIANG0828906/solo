<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古代星象罗盘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "STKaiti", "KaiTi", "楷体", "Georgia", serif;
      background: radial-gradient(ellipse at center, #0A0E27 0%, #1A1F3A 100%);
      min-height: 100vh;
      min-width: 800px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    h1 {
      color: #D4AF37;
      font-size: 2.5rem;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
      letter-spacing: 0.5rem;
    }

    .canvas-wrapper {
      position: relative;
      width: 600px;
      height: 600px;
    }

    #compassCanvas {
      display: block;
      cursor: grab;
    }

    #compassCanvas:active {
      cursor: grabbing;
    }

    .celestial-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 30px;
      height: 30px;
      z-index: 10;
    }

    .divination-panel {
      width: 640px;
      height: 160px;
      background: #F5E6C8;
      border-radius: 8px;
      padding: 1.5rem 2rem;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .divination-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse at 10% 20%, rgba(60, 50, 40, 0.15) 0%, transparent 30%),
        radial-gradient(ellipse at 90% 80%, rgba(60, 50, 40, 0.12) 0%, transparent 25%),
        radial-gradient(ellipse at 50% 50%, rgba(80, 70, 60, 0.08) 0%, transparent 40%),
        radial-gradient(circle at 20% 90%, rgba(50, 40, 30, 0.1) 0%, transparent 20%),
        radial-gradient(circle at 80% 10%, rgba(50, 40, 30, 0.1) 0%, transparent 20%);
      pointer-events: none;
      border-radius: 8px;
    }

    .divination-panel::after {
      content: '';
      position: absolute;
      top: -5px;
      left: -5px;
      right: -5px;
      bottom: -5px;
      border: 2px solid rgba(139, 115, 85, 0.3);
      border-radius: 12px;
      pointer-events: none;
      box-shadow: inset 0 0 20px rgba(139, 115, 85, 0.2);
    }

    .divination-text {
      position: relative;
      color: #8B4513;
      font-size: 1.5rem;
      line-height: 2;
      text-align: center;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "STKaiti", "KaiTi", "楷体", "Georgia", serif;
      opacity: 0;
      transition: opacity 800ms ease;
      z-index: 1;
    }

    .divination-text.visible {
      opacity: 1;
    }

    .divination-text.slide-out-left {
      animation: slideOutLeft 600ms ease forwards;
    }

    .divination-text.slide-in-right {
      animation: slideInRight 600ms ease forwards;
    }

    @keyframes slideOutLeft {
      0% {
        opacity: 1;
        transform: translateX(0);
      }
      100% {
        opacity: 0;
        transform: translateX(-50px);
      }
    }

    @keyframes slideInRight {
      0% {
        opacity: 0;
        transform: translateX(50px);
      }
      100% {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .instructions {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      text-align: center;
      margin-top: 1rem;
    }

    .ripple {
      position: absolute;
      border: 2px solid #FFD700;
      border-radius: 50%;
      pointer-events: none;
      animation: rippleExpand 1.2s ease-out forwards;
    }

    @keyframes rippleExpand {
      0% {
        width: 20px;
        height: 20px;
        opacity: 1;
      }
      100% {
        width: 80px;
        height: 80px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>古 代 星 象 罗 盘</h1>
    
    <div class="canvas-wrapper">
      <canvas id="compassCanvas" width="600" height="600"></canvas>
      <canvas class="celestial-icon" id="celestialIcon" width="30" height="30"></canvas>
    </div>

    <div class="divination-panel">
      <div class="divination-text" id="divinationText">
        旋转罗盘，观星象，知吉凶
      </div>
    </div>

    <p class="instructions">
      拖动罗盘旋转 | 点击山向查看详解 | 星宿连线实时显示
    </p>
  </div>

  <script type="module" src="/src/render.ts"></script>
</body>
</html>
