<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pong Battle!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at center, #16213e 0%, #0f0f23 50%, #000011 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 20px 30px, white, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, white, transparent),
        radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 230px 80px, white, transparent),
        radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.6), transparent),
        radial-gradient(1px 1px at 370px 50px, white, transparent),
        radial-gradient(2px 2px at 450px 180px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 520px 90px, white, transparent),
        radial-gradient(2px 2px at 600px 200px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 680px 60px, white, transparent),
        radial-gradient(2px 2px at 750px 140px, rgba(255,255,255,0.6), transparent);
      background-repeat: repeat;
      background-size: 800px 250px;
      animation: twinkle 4s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .game-title {
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 20px;
      animation: glow 3s ease-in-out infinite alternate;
      text-shadow: 0 0 10px currentColor, 0 0 20px currentColor, 0 0 30px currentColor;
      position: relative;
      z-index: 1;
    }

    @keyframes glow {
      0% {
        color: #0f3460;
        text-shadow: 0 0 10px #0f3460, 0 0 20px #0f3460, 0 0 30px #0f3460;
      }
      50% {
        color: #533483;
        text-shadow: 0 0 10px #533483, 0 0 20px #533483, 0 0 30px #533483;
      }
      100% {
        color: #e94560;
        text-shadow: 0 0 10px #e94560, 0 0 20px #e94560, 0 0 30px #e94560;
      }
    }

    .game-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      width: 100%;
      max-width: 90vw;
    }

    canvas {
      border-radius: 8px;
      box-shadow: 0 0 30px rgba(15, 52, 96, 0.5), 0 0 60px rgba(233, 69, 96, 0.3);
      background: #1a1a2e;
      max-width: 100%;
      max-height: 70vh;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .controls-hint {
      margin-top: 20px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 14px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .controls-hint span {
      margin: 0 20px;
    }

    .key {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-family: monospace;
      margin: 0 2px;
    }
  </style>
</head>
<body>
  <h1 class="game-title">Pong Battle!</h1>
  <div class="game-container">
    <canvas id="gameCanvas" width="800" height="500"></canvas>
  </div>
  <div class="controls-hint">
    <span><span class="key">W</span><span class="key">S</span> 玩家1</span>
    <span><span class="key">空格</span> 暂停</span>
    <span><span class="key">↑</span><span class="key">↓</span> 玩家2</span>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
