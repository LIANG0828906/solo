<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹珠消除游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0f0f1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    #game-container {
      position: relative;
      max-width: 800px;
      width: 100%;
      aspect-ratio: 4 / 3;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 210, 255, 0.3);
      border: 2px solid rgba(0, 210, 255, 0.5);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #1a1a2e;
      border-radius: 16px;
    }

    #loading {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #1a1a2e;
      color: #00d2ff;
      font-size: 24px;
      z-index: 10;
      transition: opacity 0.5s ease;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-text {
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #game-over {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(26, 26, 46, 0.95);
      z-index: 20;
    }

    #game-over.visible {
      display: flex;
    }

    .game-over-title {
      font-size: 48px;
      font-weight: bold;
      color: #ff4757;
      text-shadow: 0 0 20px rgba(255, 71, 87, 0.8);
      margin-bottom: 20px;
    }

    .final-score {
      font-size: 32px;
      color: #ffd32a;
      text-shadow: 0 0 15px rgba(255, 211, 42, 0.6);
      margin-bottom: 40px;
    }

    #restart-btn {
      padding: 16px 48px;
      font-size: 20px;
      font-weight: bold;
      color: white;
      background: linear-gradient(135deg, #00d2ff, #3a7bd5);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(0, 210, 255, 0.4);
    }

    #restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 30px rgba(0, 210, 255, 0.6);
    }

    #restart-btn:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="loading">
      <span class="loading-text">加载中...</span>
    </div>
    <div id="game-over">
      <div class="game-over-title">游戏结束</div>
      <div class="final-score">最终得分: <span id="final-score-value">0</span></div>
      <button id="restart-btn">重新开始</button>
    </div>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
