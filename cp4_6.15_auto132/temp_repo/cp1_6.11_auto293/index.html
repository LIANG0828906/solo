<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乌篷船浮力与稳性模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #A8D5E2;
      font-family: "KaiTi", "楷体", serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #canvas-container {
      width: 70%;
      height: 100%;
      position: relative;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #status-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(245, 240, 225, 0.95);
      border: 3px solid #C2A670;
      border-radius: 8px;
      padding: 15px;
      min-width: 200px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }
    #status-panel h2 {
      font-size: 18px;
      color: #3E3E3E;
      margin-bottom: 12px;
      border-bottom: 2px solid #C2A670;
      padding-bottom: 6px;
    }
    .status-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
      font-size: 14px;
      color: #3E3E3E;
    }
    .status-item .label {
      font-weight: bold;
    }
    .status-item .value {
      font-family: "Courier New", monospace;
      color: #2C5282;
    }
    .stability-tag {
      display: block;
      text-align: center;
      padding: 8px;
      margin-top: 10px;
      border-radius: 6px;
      font-weight: bold;
      color: white;
      font-size: 16px;
    }
    .stability-safe { background-color: #4CAF50; }
    .stability-warning { background-color: #FFC107; }
    .stability-danger { background-color: #F44336; }
    .stability-sunk { background-color: #9C27B0; }
    #control-panel {
      width: 30%;
      height: 100%;
      background: rgba(245, 240, 225, 0.98);
      border-left: 4px solid #C2A670;
      padding: 30px 25px;
      overflow-y: auto;
      background-image: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 15px,
          rgba(194, 166, 112, 0.1) 15px,
          rgba(194, 166, 112, 0.1) 30px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 15px,
          rgba(194, 166, 112, 0.1) 15px,
          rgba(194, 166, 112, 0.1) 30px
        );
    }
    #control-panel h1 {
      font-size: 24px;
      color: #3E3E3E;
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 15px;
      border-bottom: 3px double #8B5A2B;
    }
    .control-group {
      margin-bottom: 30px;
    }
    .control-group label {
      display: block;
      font-size: 14px;
      color: #3E3E3E;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .slider-container {
      position: relative;
    }
    .slider-container input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 12px;
      border-radius: 6px;
      background: linear-gradient(
        to right,
        #8B5A2B 0%,
        #8B5A2B 15%,
        #D4A76A 15%,
        #D4A76A 50%,
        #D4A76A 85%,
        #8B5A2B 85%,
        #8B5A2B 100%
      );
      outline: none;
    }
    .slider-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6B4423, #4A2C1A);
      cursor: pointer;
      border: 2px solid #3E2723;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }
    .slider-container input[type="range"]::-moz-range-thumb {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #6B4423, #4A2C1A);
      cursor: pointer;
      border: 2px solid #3E2723;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
    }
    .value-input {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .value-input input[type="number"] {
      flex: 1;
      padding: 10px 15px;
      font-size: 14px;
      font-family: "KaiTi", "楷体", serif;
      background: linear-gradient(to bottom, #F5F0E1, #EDE4D4);
      border: 2px solid #8B5A2B;
      border-radius: 4px;
      color: #3E3E3E;
      outline: none;
    }
    .value-input span {
      font-size: 14px;
      color: #3E3E3E;
      min-width: 40px;
    }
    .range-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 12px;
      color: #8B5A2B;
    }
    .info-box {
      background: rgba(237, 228, 212, 0.8);
      border: 2px solid #8B5A2B;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
    }
    .info-box h3 {
      font-size: 16px;
      color: #3E3E3E;
      margin-bottom: 10px;
    }
    .info-box p {
      font-size: 13px;
      color: #5D4E37;
      line-height: 1.6;
    }
    #fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.6);
      color: #4CAF50;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: "Courier New", monospace;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="status-panel">
        <h2>船身状态</h2>
        <div class="status-item">
          <span class="label">吃水深度:</span>
          <span class="value" id="draft-value">0.00 cm</span>
        </div>
        <div class="status-item">
          <span class="label">横摇角度:</span>
          <span class="value" id="roll-value">0.00°</span>
        </div>
        <div class="status-item">
          <span class="label">稳性高度GM:</span>
          <span class="value" id="gm-value">0.00 cm</span>
        </div>
        <div class="status-item">
          <span class="label">舱室进水:</span>
          <span class="value" id="flood-value">0%</span>
        </div>
        <span class="stability-tag stability-safe" id="stability-tag">安全</span>
      </div>
      <div id="fps-counter">FPS: 60</div>
    </div>
    <div id="control-panel">
      <h1>乌篷船稳性模拟</h1>
      <div class="control-group">
        <label for="weight-slider">货物总重量</label>
        <div class="slider-container">
          <input type="range" id="weight-slider" min="0" max="800" step="10" value="200">
          <div class="range-labels">
            <span>0斤</span>
            <span>400斤</span>
            <span>800斤</span>
          </div>
        </div>
        <div class="value-input">
          <input type="number" id="weight-input" min="0" max="800" step="10" value="200">
          <span>斤</span>
        </div>
      </div>
      <div class="control-group">
        <label for="offset-slider">货物重心横向偏移</label>
        <div class="slider-container">
          <input type="range" id="offset-slider" min="-30" max="30" step="1" value="0">
          <div class="range-labels">
            <span>-30cm</span>
            <span>0cm</span>
            <span>+30cm</span>
          </div>
        </div>
        <div class="value-input">
          <input type="number" id="offset-input" min="-30" max="30" step="1" value="0">
          <span>cm</span>
        </div>
      </div>
      <div class="info-box">
        <h3>操作说明</h3>
        <p>• 拖拽鼠标旋转视角，滚轮缩放场景</p>
        <p>• 调整货物重量观察船体吃水变化</p>
        <p>• 调整重心偏移观察横摇反应</p>
        <p>• 横摇超过25°或吃水过深将导致进水</p>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
