<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹球对决</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
      font-family: 'Courier New', 'Consolas', monospace;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .game-wrapper {
      position: relative;
    }

    #gameCanvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(78, 205, 196, 0.15);
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-wrapper">
      <canvas id="gameCanvas" width="800" height="500"></canvas>
    </div>
  </div>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
