<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>海洋生态数据可视化与模拟系统</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        min-width: 1280px;
        background: linear-gradient(180deg, #0a1628 0%, #000510 100%);
        font-family: 'Noto Sans SC', sans-serif;
        color: #ffffff;
        -webkit-font-smoothing: antialiased;
      }
      input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        background: transparent;
        cursor: pointer;
        width: 100%;
      }
      input[type='range']::-webkit-slider-runnable-track {
        height: 4px;
        background: rgba(0, 229, 255, 0.2);
        border-radius: 2px;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #00e5ff;
        border: 2px solid #ffffff;
        margin-top: -6px;
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.8);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      input[type='range']::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        box-shadow: 0 0 16px rgba(0, 229, 255, 1);
      }
      input[type='range']::-moz-range-track {
        height: 4px;
        background: rgba(0, 229, 255, 0.2);
        border-radius: 2px;
      }
      input[type='range']::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #00e5ff;
        border: 2px solid #ffffff;
        box-shadow: 0 0 12px rgba(0, 229, 255, 0.8);
      }
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(0, 229, 255, 0.3);
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(0, 229, 255, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
