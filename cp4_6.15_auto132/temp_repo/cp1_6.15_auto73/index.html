<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟粒子星系生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #e5e7eb;
    }
    #app {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    #controls-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 280px;
      height: 100vh;
      z-index: 10;
      background: rgba(20, 20, 30, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-right: 1px solid rgba(139, 92, 246, 0.2);
      padding: 24px 20px;
      overflow-y: auto;
      opacity: 0;
      animation: fadeInPanel 1s ease forwards;
      animation-delay: 0.3s;
    }
    @keyframes fadeInPanel {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    #controls-panel::-webkit-scrollbar {
      width: 4px;
    }
    #controls-panel::-webkit-scrollbar-track {
      background: transparent;
    }
    #controls-panel::-webkit-scrollbar-thumb {
      background: rgba(139, 92, 246, 0.3);
      border-radius: 2px;
    }
    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      background: linear-gradient(135deg, #8B5CF6, #3B82F6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }
    .control-group {
      margin-bottom: 24px;
    }
    .group-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #9ca3af;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .group-label .value {
      color: #c4b5fd;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #8B5CF6, #3B82F6);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(139, 92, 246, 0.4);
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.8), 0 0 30px rgba(139, 92, 246, 0.6);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(139, 92, 246, 0.4);
      cursor: pointer;
    }
    .theme-buttons {
      display: flex;
      gap: 8px;
    }
    .theme-btn {
      flex: 1;
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      background: rgba(139, 92, 246, 0.15);
      color: #e5e7eb;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .theme-btn:hover {
      filter: brightness(1.15);
      transform: scale(1);
    }
    .theme-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }
    .theme-btn.active {
      background: rgba(139, 92, 246, 0.4);
      border-color: rgba(139, 92, 246, 0.8);
    }
    .theme-preview {
      width: 24px;
      height: 24px;
      border-radius: 50%;
    }
    .action-btn {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #8B5CF6, #6366F1);
      color: #ffffff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      letter-spacing: 0.5px;
    }
    .action-btn:hover {
      filter: brightness(1.15);
    }
    .action-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }
    .action-btn.paused {
      background: linear-gradient(135deg, #F59E0B, #EF4444);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="controls-panel">
      <div class="panel-title">粒子星系控制台</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
