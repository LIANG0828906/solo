<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Sculpture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      color: #e0e0e0;
      overflow: hidden;
      font-family: 'Exo 2', sans-serif;
      width: 100vw;
      height: 100vh;
    }
    #app {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    #app canvas { display: block; width: 100%; height: 100%; }

    #status {
      position: fixed;
      top: 20px; left: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      z-index: 10;
      background: rgba(10,10,26,0.7);
      padding: 8px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    #status-icon {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #2ecc71;
      box-shadow: 0 0 6px #2ecc71;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #status-icon.preset { background: #e67e22; box-shadow: 0 0 6px #e67e22; }
    #status-icon.frozen { background: #3498db; box-shadow: 0 0 6px #3498db; }

    #presets {
      position: fixed;
      top: 20px; right: 20px;
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .preset-btn {
      padding: 10px 22px;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      filter: brightness(1);
      letter-spacing: 0.3px;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
    }
    .preset-btn:hover { filter: brightness(1.1); }
    .preset-btn:active { transform: scale(0.95); }
    #preset-nebula { background: linear-gradient(135deg, #9b59b6, #8e44ad); }
    #preset-tornado { background: linear-gradient(135deg, #1abc9c, #16a085); }
    #preset-ripple { background: linear-gradient(135deg, #3498db, #2980b9); }

    #bottom-controls {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      z-index: 10;
    }
    #mic-btn {
      width: 60px; height: 60px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.15);
      background: #e74c3c;
      cursor: pointer;
      position: relative;
      transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
      color: #fff;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #mic-btn.active {
      background: #2ecc71;
      border-color: rgba(46,204,113,0.4);
      box-shadow: 0 0 20px rgba(46,204,113,0.3);
    }
    .ripple-ring {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      border: 2px solid currentColor;
      pointer-events: none;
      animation: ripple-expand 0.6s ease-out forwards;
    }
    @keyframes ripple-expand {
      0% { width: 60px; height: 60px; opacity: 0.6; }
      100% { width: 120px; height: 120px; opacity: 0; }
    }

    .sample-btn {
      padding: 8px 18px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      background: rgba(255,255,255,0.07);
      color: #e0e0e0;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .sample-btn:hover { background: rgba(255,255,255,0.15); }
    .sample-btn.active {
      background: rgba(46,204,113,0.2);
      border-color: #2ecc71;
      color: #2ecc71;
    }

    #screenshot-btn {
      position: fixed;
      bottom: 30px; right: 30px;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.12);
      background: #7f8c8d;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #screenshot-btn:hover { background: #ffffff; color: #333; }

    #freeze-hint {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      font-weight: 600;
      color: rgba(52,152,219,0.7);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    #freeze-hint.visible { opacity: 1; }

    @media (max-width: 767px) {
      #status { top: 10px; left: 10px; font-size: 11px; padding: 6px 12px; }
      #presets {
        top: auto; bottom: 110px; right: 50%;
        transform: translateX(50%);
        flex-direction: column;
        gap: 8px;
      }
      .preset-btn { padding: 8px 16px; font-size: 11px; }
      #bottom-controls { bottom: 20px; gap: 10px; }
      #mic-btn { width: 48px; height: 48px; font-size: 18px; }
      .sample-btn { padding: 6px 12px; font-size: 10px; }
      #screenshot-btn { width: 32px; height: 32px; bottom: 20px; right: 15px; font-size: 13px; }
      #freeze-hint { font-size: 11px; }
      .ripple-ring { animation-name: ripple-expand-mobile; }
      @keyframes ripple-expand-mobile {
        0% { width: 48px; height: 48px; opacity: 0.6; }
        100% { width: 96px; height: 96px; opacity: 0; }
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="status">
    <span id="status-icon"></span>
    <span id="status-mode">实时输入</span>
  </div>

  <div id="presets">
    <button id="preset-nebula" class="preset-btn">星云</button>
    <button id="preset-tornado" class="preset-btn">龙卷风</button>
    <button id="preset-ripple" class="preset-btn">波纹</button>
  </div>

  <div id="bottom-controls">
    <button id="sample-noise" class="sample-btn">白噪音</button>
    <button id="mic-btn">🎤</button>
    <button id="sample-sine" class="sample-btn">正弦波</button>
  </div>

  <button id="screenshot-btn">📷</button>
  <div id="freeze-hint">❄ 已冻结 — 按空格键恢复</div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
