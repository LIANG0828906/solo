<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sketch to 3D - 手绘草图转3D几何体</title>
  <style>
    :root {
      --bg-main: #1a1a2e;
      --bg-panel: #16213e;
      --border-color: #0f3460;
      --text-color: #e0e0e0;
      --divider: #333333;
      --accent-blue: #00BFFF;
      --accent-green: #00ff88;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-main);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s;
    }

    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(0, 191, 255, 0.2);
      border-top-color: var(--accent-blue);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .panel-divider {
      width: 1px;
      background: var(--divider);
      flex-shrink: 0;
    }

    #control-panel {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-right: 1px solid var(--divider);
      padding: 20px;
      overflow-y: auto;
      backdrop-filter: blur(10px);
      box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.3);
      border-radius: 0;
    }

    #main-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #content-row {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    #canvas-wrapper {
      width: 45%;
      position: relative;
      background: white;
      border-right: 1px solid var(--divider);
      min-width: 400px;
      min-height: 300px;
    }

    #drawing-canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: crosshair;
    }

    #recognition-label {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(22, 33, 62, 0.9);
      color: var(--text-color);
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 14px;
      backdrop-filter: blur(10px);
      display: none;
      z-index: 10;
    }

    #recognition-label.show {
      display: block;
    }

    #three-container {
      flex: 1;
      position: relative;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a3e 100%);
      min-width: 0;
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #generate-btn {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 28px;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(0, 191, 255, 0.3);
      z-index: 10;
    }

    #generate-btn:hover {
      background: #33ccff;
      transform: translateX(-50%) scale(1.02);
    }

    #generate-btn:active {
      transform: translateX(-50%) scale(0.95);
      transition: all 0.1s;
    }

    #generate-btn:disabled {
      background: #555;
      cursor: not-allowed;
      box-shadow: none;
    }

    #mesh-toolbar {
      position: absolute;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 4px;
      display: none;
      gap: 4px;
      z-index: 20;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #mesh-toolbar.show {
      display: flex;
    }

    #mesh-toolbar button {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-color);
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    #mesh-toolbar button:hover {
      background: var(--border-color);
    }

    #gallery {
      width: 200px;
      flex-shrink: 0;
      background: var(--bg-panel);
      border-left: 1px solid var(--divider);
      padding: 16px;
      overflow-y: auto;
    }

    #gallery h3 {
      font-size: 15px;
      margin-bottom: 14px;
      color: var(--text-color);
      font-weight: 600;
    }

    .gallery-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .gallery-card {
      width: 100%;
      background: var(--bg-main);
      border: 2px solid transparent;
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .gallery-card:hover {
      border-color: var(--border-color);
    }

    .gallery-card.active {
      border-color: var(--active-color, var(--accent-blue));
      box-shadow: 0 0 15px var(--active-color, var(--accent-blue));
    }

    .gallery-thumb {
      width: 100%;
      height: 100px;
      background: #0a0a2e;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .gallery-label {
      font-size: 11px;
      color: var(--text-color);
      line-height: 1.4;
      word-break: break-all;
    }

    .panel-section {
      margin-bottom: 24px;
    }

    .panel-section h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      color: var(--text-color);
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-color);
    }

    .control-row {
      margin-bottom: 16px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 6px;
      color: #b0b0b0;
    }

    .control-value {
      background: var(--bg-main);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--accent-blue);
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--bg-main);
      border-radius: 3px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--accent-blue);
      cursor: pointer;
      transition: all 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .color-picker {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .color-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: all 0.2s;
      padding: 0;
    }

    .color-btn:hover {
      transform: scale(1.15);
    }

    .color-btn.active {
      border-color: white;
      box-shadow: 0 0 10px currentColor;
    }

    .action-btn {
      width: 100%;
      padding: 10px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      background: var(--bg-main);
      color: var(--text-color);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
    }

    .action-btn:hover {
      background: var(--border-color);
      border-color: var(--accent-blue);
    }

    .action-btn:active {
      transform: scale(0.95);
      transition: all 0.1s;
    }

    .action-btn.primary {
      background: var(--accent-blue);
      border-color: var(--accent-blue);
      color: white;
      font-weight: 600;
    }

    .action-btn.primary:hover {
      background: #33ccff;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      top: 16px;
      width: 40px;
      height: 40px;
      background: var(--bg-panel);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-color);
      font-size: 20px;
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    #toggle-left { left: 16px; }
    #toggle-right { right: 16px; }

    @media (max-width: 1024px) {
      #app {
        flex-direction: column;
      }

      .mobile-toggle {
        display: flex;
      }

      #control-panel {
        position: fixed;
        left: 0;
        top: 0;
        height: 100vh;
        width: 280px;
        z-index: 90;
        transform: translateX(-100%);
        transition: transform 0.3s;
      }

      #control-panel.open {
        transform: translateX(0);
      }

      #gallery {
        position: fixed;
        right: 0;
        top: 0;
        height: 100vh;
        width: 200px;
        z-index: 90;
        transform: translateX(100%);
        transition: transform 0.3s;
      }

      #gallery.open {
        transform: translateX(0);
      }

      #content-row {
        flex-direction: column;
      }

      #canvas-wrapper {
        width: 100%;
        height: 50%;
        border-right: none;
        border-bottom: 1px solid var(--divider);
        min-width: 0;
      }

      #three-container {
        width: 100%;
        height: 50%;
      }

      .panel-divider {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div class="loader"></div>
  </div>

  <button class="mobile-toggle" id="toggle-left">☰</button>
  <button class="mobile-toggle" id="toggle-right">▣</button>

  <div id="app">
    <aside id="control-panel"></aside>
    <div class="panel-divider"></div>

    <main id="main-area">
      <div id="content-row">
        <div id="canvas-wrapper">
          <canvas id="drawing-canvas"></canvas>
          <div id="recognition-label"></div>
        </div>
        <div id="three-container">
          <canvas id="three-canvas"></canvas>
          <button id="generate-btn" disabled>生成 3D</button>
          <div id="mesh-toolbar">
            <button id="btn-delete" title="删除">🗑️</button>
            <button id="btn-clone" title="克隆">📋</button>
            <button id="btn-reset" title="重置参数">↺</button>
          </div>
        </div>
      </div>
    </main>

    <div class="panel-divider"></div>
    <aside id="gallery">
      <h3>对比画廊</h3>
      <div class="gallery-grid" id="gallery-grid"></div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
