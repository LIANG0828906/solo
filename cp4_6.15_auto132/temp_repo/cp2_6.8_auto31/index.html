<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D分子结构查看与编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0a0a2a 0%, #000000 100%);
      font-family: Arial, sans-serif;
      color: white;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 10px 15px;
      border-radius: 8px;
      font-size: 14px;
      min-width: 200px;
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
      z-index: 100;
    }
    #hud.visible {
      opacity: 1;
    }
    #fps {
      position: fixed;
      top: 20px;
      right: 20px;
      color: #00ff00;
      font-size: 18px;
      font-family: monospace;
      text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
      z-index: 100;
      pointer-events: none;
    }
    #selection-info {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px 20px;
      border-radius: 8px;
      font-size: 14px;
      min-width: 200px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 100;
      pointer-events: none;
    }
    #selection-info.visible {
      opacity: 1;
    }
    #selection-info .label {
      color: #aaa;
      font-size: 12px;
      margin-bottom: 5px;
    }
    #selection-info .value {
      color: #4fc3f7;
      font-size: 16px;
    }
    #atom-label {
      position: fixed;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 12px;
      text-shadow: 
        -2px -2px 0 #000,
         2px -2px 0 #000,
        -2px  2px 0 #000,
         2px  2px 0 #000,
         0   -2px 0 #000,
         0    2px 0 #000,
        -2px  0   0 #000,
         2px  0   0 #000;
      pointer-events: none;
      z-index: 50;
      display: none;
      white-space: nowrap;
    }
    #radial-menu {
      position: fixed;
      display: none;
      background: rgba(30, 30, 30, 0.95);
      border-radius: 12px;
      padding: 10px;
      z-index: 200;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }
    #radial-menu h3 {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 10px;
      padding: 0 5px;
      text-align: center;
    }
    #radial-menu .menu-items {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    #radial-menu button {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    #radial-menu button:hover {
      background: rgba(79, 195, 247, 0.3);
      transform: scale(1.1);
    }
    #radial-menu .delete-btn {
      width: 100%;
      margin-top: 10px;
      background: rgba(255, 13, 13, 0.3);
    }
    #radial-menu .delete-btn:hover {
      background: rgba(255, 13, 13, 0.6);
    }
    .lil-gui {
      --background-color: rgba(30, 30, 30, 0.8) !important;
      --widget-color: rgba(255, 255, 255, 0.1) !important;
      --focus-color: rgba(79, 195, 247, 0.3) !important;
      --hover-color: rgba(255, 255, 255, 0.15) !important;
      --font-family: Arial, sans-serif !important;
      --font-size: 14px !important;
      border-radius: 8px !important;
      overflow: hidden !important;
    }
    .lil-gui .name {
      color: white !important;
    }
    .lil-gui .controller .value {
      color: #4fc3f7 !important;
    }
    .lil-gui .slider {
      border-radius: 4px !important;
    }
    .lil-gui .slider .fill {
      background: #4fc3f7 !important;
      border-radius: 4px !important;
      transition: box-shadow 0.1s ease !important;
    }
    .lil-gui .slider.active .fill {
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.6) !important;
    }
  </style>
</head>
<body>
  <div id="hud"></div>
  <div id="fps">FPS: --</div>
  <div id="selection-info">
    <div class="label">已选原子</div>
    <div class="value" id="selection-value">无</div>
  </div>
  <div id="atom-label"></div>
  <div id="radial-menu">
    <h3 id="menu-title">添加原子</h3>
    <div class="menu-items" id="menu-items">
      <button data-element="C">C</button>
      <button data-element="N">N</button>
      <button data-element="O">O</button>
      <button data-element="H">H</button>
      <button data-element="S">S</button>
    </div>
    <button class="delete-btn" id="delete-btn" style="display:none;">删除原子</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
