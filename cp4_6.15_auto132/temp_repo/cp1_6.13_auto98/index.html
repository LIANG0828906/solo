<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ColorChord - 色感训练</title>
    <style>
      :root {
        --color-primary: #2C3E50;
        --color-accent: #1ABC9C;
        --color-error: #E74C3C;
        --color-error-bg: #FADBD8;
        --color-bg-start: #F8F9FA;
        --color-bg-end: #E9ECEF;
        --color-card: #FFFFFF;
        --color-text: #2C3E50;
        --color-text-light: #7F8C8D;
        --radius-lg: 16px;
        --radius-md: 12px;
        --radius-sm: 8px;
        --shadow-soft: 0 4px 20px rgba(44, 62, 80, 0.08);
        --shadow-hover: 0 8px 30px rgba(44, 62, 80, 0.12);
        --font-mono: 'SF Mono', 'Consolas', 'Monaco', monospace;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        background: linear-gradient(135deg, var(--color-bg-start) 0%, var(--color-bg-end) 100%);
        color: var(--color-text);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }

      @keyframes bounce-scale {
        0%   { transform: scale(1); }
        50%  { transform: scale(1.12); }
        100% { transform: scale(1); }
      }

      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      @keyframes ripple {
        0%   { transform: scale(0); opacity: 0.5; }
        100% { transform: scale(4); opacity: 0; }
      }

      @keyframes score-slide {
        0%   { transform: translateY(-100%); opacity: 0; }
        15%  { transform: translateY(0); opacity: 1; }
        85%  { transform: translateY(0); opacity: 1; }
        100% { transform: translateY(100%); opacity: 0; }
      }

      @keyframes panel-slide {
        from { transform: translateX(-100%); }
        to   { transform: translateX(0); }
      }

      @keyframes expand {
        from { max-height: 0; opacity: 0; }
        to   { max-height: 2000px; opacity: 1; }
      }

      .animate-bounce-scale {
        animation: bounce-scale 150ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .animate-fade-in-up {
        animation: fade-in-up 300ms cubic-bezier(0.4, 0, 0.2, 1) both;
      }

      .animate-ripple {
        animation: ripple 600ms ease-out forwards;
      }

      .animate-panel-slide {
        animation: panel-slide 250ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      .animate-expand {
        animation: expand 300ms cubic-bezier(0.4, 0, 0.2, 1);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
