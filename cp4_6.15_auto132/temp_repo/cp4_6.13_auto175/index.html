<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐可视化播放器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h1 {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      text-align: center;
    }

    .upload-area {
      width: 400px;
      height: 100px;
      border: 2px dashed rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.05);
      gap: 6px;
    }

    .upload-area:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 210, 255, 0.3);
      border-color: rgba(255, 255, 255, 0.8);
    }

    .upload-area.dragover {
      border-style: solid;
      border-color: #00d2ff;
      background: rgba(0, 210, 255, 0.1);
    }

    .upload-area p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    .upload-area .file-name {
      color: #00d2ff;
      font-size: 12px;
    }

    .upload-area input {
      display: none;
    }

    canvas {
      width: 800px;
      max-width: 100%;
      height: 450px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      display: block;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      width: 100%;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }

    .control-group label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .control-group select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
    }

    .control-group select:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .presets {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      flex: 1;
      min-width: 120px;
    }

    .preset-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .preset-btn.active {
      outline: 2px solid #fff;
      outline-offset: 2px;
    }

    #presetJapanese {
      background: #87ceeb;
      color: #333;
    }

    #presetCyberpunk {
      background: #ff00ff;
      color: #fff;
    }

    #presetDarkTech {
      background: #0a0a0a;
      color: #fff;
      border: 1px solid #333;
    }

    .progress-wrap {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      height: 30px;
    }

    .progress-container {
      flex: 1;
      height: 100%;
      position: relative;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    #progressBar {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 100%;
      background: transparent;
      position: absolute;
      top: 0;
      left: 0;
      margin: 0;
      cursor: pointer;
      outline: none;
    }

    #progressBar::-webkit-slider-runnable-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    #progressBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 4px;
      height: 100%;
      background: #fff;
      cursor: pointer;
      border: none;
    }

    #progressBar::-moz-range-track {
      width: 100%;
      height: 100%;
      background: transparent;
      border: none;
    }

    #progressBar::-moz-range-thumb {
      width: 4px;
      height: 100%;
      background: #fff;
      cursor: pointer;
      border: none;
      border-radius: 0;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 8px;
      width: 0%;
      pointer-events: none;
      transition: width 0.1s linear;
    }

    .time-display {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
      font-variant-numeric: tabular-nums;
      min-width: 110px;
      text-align: center;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
    }

    .action-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .value-display {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 768px) {
      canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }

      .upload-area {
        width: 100%;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .control-group {
        width: 100%;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 音乐可视化播放器</h1>

    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="audio/mp3,audio/wav,audio/mpeg,audio/x-wav,audio/*">
      <p>拖拽 MP3 / WAV 文件到此处，或点击选择文件</p>
      <span class="file-name" id="fileNameDisplay"></span>
    </div>

    <canvas id="visualizer" width="800" height="450"></canvas>

    <div class="controls">
      <div class="control-group">
        <label>粒子密度</label>
        <input type="range" id="density" min="50" max="500" step="1" value="200">
        <span class="value-display" id="densityValue">200</span>
      </div>
      <div class="control-group">
        <label>频谱敏感度</label>
        <input type="range" id="sensitivity" min="0.5" max="3.0" step="0.1" value="1.5">
        <span class="value-display" id="sensitivityValue">1.5</span>
      </div>
      <div class="control-group">
        <label>混合模式</label>
        <select id="blendMode">
          <option value="normal">正常</option>
          <option value="overlay">叠加</option>
          <option value="softLight">柔光</option>
        </select>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn active" id="presetJapanese">日系清新</button>
      <button class="preset-btn" id="presetCyberpunk">赛博朋克</button>
      <button class="preset-btn" id="presetDarkTech">暗黑科技</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-container">
        <div class="progress-fill" id="progressFill"></div>
        <input type="range" id="progressBar" min="0" max="1" step="0.001" value="0">
      </div>
      <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
    </div>

    <div class="action-buttons">
      <button class="action-btn" id="playPauseBtn">▶️ 播放</button>
      <button class="action-btn" id="screenshotBtn">📸 截图保存</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
