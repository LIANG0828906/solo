<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>像素鱼缸</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a2a;
      color: #ff7043;
      z-index: 9999;
      transition: opacity 0.5s;
    }
    #loading.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .fish-loader {
      width: 48px;
      height: 48px;
      animation: spin 1.5s linear infinite;
      image-rendering: pixelated;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 20px;
      font-size: 16px;
      letter-spacing: 2px;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="loading">
      <svg class="fish-loader" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
        <rect x="4" y="6" width="6" height="4" fill="#ff7043"/>
        <rect x="10" y="5" width="3" height="1" fill="#ff7043"/>
        <rect x="10" y="10" width="3" height="1" fill="#ff7043"/>
        <rect x="13" y="7" width="2" height="2" fill="#ff7043"/>
        <rect x="6" y="7" width="1" height="1" fill="#fff"/>
        <rect x="3" y="5" width="1" height="2" fill="#ff7043"/>
        <rect x="3" y="9" width="1" height="2" fill="#ff7043"/>
      </svg>
      <div class="loading-text">像素鱼缸加载中...</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
