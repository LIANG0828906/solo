<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹幕画布协作</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(ellipse at center, #1A1A2E 0%, #16213E 100%);
      color: #fff;
    }

    #loginModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .login-box {
      background: linear-gradient(135deg, #1A1A2E, #16213E);
      padding: 40px;
      border-radius: 16px;
      border: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.15);
      width: 360px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 24px;
      font-size: 24px;
      background: linear-gradient(90deg, #00D4FF, #FF3366);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-box input {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .login-box input:focus {
      border-color: #00D4FF;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
    }

    .login-box input::placeholder {
      color: rgba(255, 255, 255, 0.4);
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(90deg, #00D4FF, #3366FF);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .login-box button:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
    }

    #app {
      display: none;
      width: 100%;
      height: 100%;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .panel-left {
      width: 120px;
      flex-shrink: 0;
      padding: 16px 12px;
      border-right: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: 2px 0 20px rgba(0, 212, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-right {
      width: 200px;
      flex-shrink: 0;
      padding: 16px 12px;
      border-left: 1px solid rgba(0, 212, 255, 0.3);
      box-shadow: -2px 0 20px rgba(0, 212, 255, 0.1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow-y: auto;
    }

    .panel-right::-webkit-scrollbar {
      width: 4px;
    }

    .panel-right::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .panel-right::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 2px;
    }

    .canvas-wrapper {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
      background: #000000;
      cursor: crosshair;
    }

    .counter {
      position: absolute;
      top: 16px;
      left: 16px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      animation: breathe 2s ease-in-out infinite;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid rgba(0, 212, 255, 0.3);
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .panel-title {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .room-info {
      background: rgba(255, 255, 255, 0.05);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .room-info .label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
    }

    .room-info .value {
      font-size: 13px;
      font-weight: 600;
      color: #00D4FF;
      word-break: break-all;
    }

    .clear-btn {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, #FF3366, #CC0033);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .clear-btn:hover:not(:disabled) {
      box-shadow: 0 0 15px rgba(255, 51, 102, 0.5);
    }

    .clear-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .clear-btn.shake {
      animation: shakeBtn 0.3s ease-in-out;
    }

    @keyframes shakeBtn {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .color-btn {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }

    .color-btn:hover {
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: #fff;
      animation: glow 1.5s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px currentColor, 0 0 10px currentColor; }
      50% { box-shadow: 0 0 15px currentColor, 0 0 25px currentColor; }
    }

    .user-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      position: relative;
      transition: background 0.15s;
    }

    .user-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-count {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    .user-item.is-host .user-name::after {
      content: '👑';
      margin-left: 4px;
      font-size: 12px;
    }

    .like-icon {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%) scale(0);
      font-size: 16px;
      transition: transform 0.2s;
      cursor: pointer;
    }

    .user-item:hover .like-icon {
      transform: translateY(-50%) scale(1);
    }

    .like-icon:hover {
      transform: translateY(-50%) scale(1.3) !important;
    }

    .instructions {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      line-height: 1.5;
      padding: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="loginModal">
    <div class="login-box">
      <h2>🎨 弹幕画布协作</h2>
      <input type="text" id="nicknameInput" placeholder="输入你的昵称" maxlength="12" />
      <input type="text" id="roomInput" placeholder="输入房间号" maxlength="20" />
      <button id="joinBtn">加入房间</button>
    </div>
  </div>

  <div id="app">
    <div class="container">
      <div class="panel-left">
        <div>
          <div class="panel-title">房间信息</div>
          <div class="room-info">
            <div class="label">房间号</div>
            <div class="value" id="roomIdDisplay">-</div>
          </div>
        </div>
        <div>
          <div class="panel-title">操作</div>
          <button class="clear-btn" id="clearBtn" disabled>清空画布</button>
        </div>
        <div>
          <div class="panel-title">说明</div>
          <div class="instructions">
            按住鼠标拖拽发射弹幕<br/>
            拖拽越长，弹幕越大
          </div>
        </div>
      </div>

      <div class="canvas-wrapper">
        <div class="counter" id="counter">0人在线协作中</div>
        <canvas id="canvas"></canvas>
      </div>

      <div class="panel-right">
        <div>
          <div class="panel-title">颜色选择</div>
          <div class="color-palette" id="colorPalette"></div>
        </div>
        <div>
          <div class="panel-title">在线用户</div>
          <div class="user-list" id="userList"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/client.ts"></script>
</body>
</html>
