<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔塔对战 - Magic Tower Duel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #3E2723;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-canvas {
      display: block;
      background-color: #3E2723;
      image-rendering: pixelated;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .start-screen, .game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(62, 39, 35, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
      z-index: 100;
    }

    .game-title {
      font-size: 48px;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      margin-bottom: 30px;
      letter-spacing: 4px;
    }

    .game-subtitle {
      font-size: 20px;
      color: #FFD700;
      opacity: 0.8;
      margin-bottom: 40px;
    }

    .start-btn {
      padding: 15px 40px;
      font-size: 24px;
      background: #1A237E;
      color: #FFD700;
      border: 2px solid #FFD700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      letter-spacing: 2px;
    }

    .start-btn:hover {
      background: #283593;
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .controls-info {
      margin-top: 40px;
      color: #FFD700;
      opacity: 0.7;
      font-size: 14px;
      text-align: center;
      line-height: 2;
    }

    .hidden {
      display: none !important;
    }

    .winner-text {
      font-size: 56px;
      color: #FFD700;
      text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
      margin-bottom: 20px;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .game-stats {
      color: #FFD700;
      font-size: 18px;
      margin-bottom: 30px;
      text-align: center;
      line-height: 2;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="960" height="720"></canvas>
    
    <div id="ui-overlay">
      <div id="start-screen" class="start-screen">
        <h1 class="game-title">魔 塔 对 战</h1>
        <p class="game-subtitle">Magic Tower Duel</p>
        <button id="start-btn" class="start-btn">开 始 游 戏</button>
        <div class="controls-info">
          <p>玩家1: WASD移动 | E交互 | Q道具 | A(对决)攻击</p>
          <p>玩家2: 方向键移动 | Enter交互 | Shift道具 | J(对决)攻击</p>
          <p>目标: 探索3层魔塔，在Boss房击败对方英雄！</p>
        </div>
      </div>
      
      <div id="game-over-screen" class="game-over-screen hidden">
        <h1 id="winner-text" class="winner-text"></h1>
        <div id="game-stats" class="game-stats"></div>
        <button id="restart-btn" class="start-btn">再 来 一 局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/game.ts"></script>
</body>
</html>
