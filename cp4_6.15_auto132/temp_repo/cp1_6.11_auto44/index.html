<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>像素矿工冒险</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #game-container {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
    #game-wrapper {
      position: relative;
      background: #000;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }
    #loading-text {
      color: #FFD700;
      font-size: 24px;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }
    #progress-bar {
      width: 300px;
      height: 20px;
      border: 2px solid #8B4513;
      background: #3B2313;
      position: relative;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF8C00, #FFD700);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-wrapper">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="loading-screen">
        <div id="loading-text">挖掘中...</div>
        <div id="progress-bar">
          <div id="progress-fill"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
