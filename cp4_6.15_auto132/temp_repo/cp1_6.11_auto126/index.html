<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太空陨石躲避 - Space Asteroid Dodge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Orbitron', sans-serif;
      background: radial-gradient(ellipse at center, #0B0D2E 0%, #000000 100%);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .game-wrapper {
      position: relative;
      padding: 15px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0, 191, 255, 0.15);
    }

    #gameCanvas {
      display: block;
      border-radius: 4px;
      cursor: none;
    }

    #gameOverOverlay {
      position: absolute;
      top: 15px;
      left: 15px;
      width: 800px;
      height: 600px;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 4px;
      z-index: 10;
    }

    #gameOverOverlay.active {
      display: flex;
    }

    .game-over-title {
      font-size: 48px;
      font-weight: 900;
      color: #FF4500;
      text-shadow: 0 0 20px rgba(255, 69, 0, 0.8);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .final-score-label {
      font-size: 18px;
      color: #87CEEB;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .final-score {
      font-size: 72px;
      font-weight: 900;
      color: #FFD700;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.6);
      margin-bottom: 40px;
      min-height: 80px;
    }

    .score-digit {
      display: inline-block;
      opacity: 0;
      transform: translateY(20px) scale(0.5);
      animation: digitPop 0.3s ease forwards;
    }

    @keyframes digitPop {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    #restartBtn {
      padding: 16px 48px;
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      background: linear-gradient(135deg, #FF4500 0%, #FF6347 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s ease;
      box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4);
    }

    #restartBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 25px rgba(255, 69, 0, 0.7), 0 0 40px rgba(255, 69, 0, 0.3);
    }

    #restartBtn:active {
      transform: scale(1.02);
    }

    .instructions {
      position: absolute;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      letter-spacing: 1px;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="gameOverOverlay">
      <div class="game-over-title">游戏结束</div>
      <div class="final-score-label">最终得分</div>
      <div class="final-score" id="finalScore"></div>
      <button id="restartBtn">重新开始</button>
    </div>
    <div class="instructions">鼠标控制飞船移动 | 空格键发射子弹</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
