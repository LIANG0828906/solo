<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互式光学实验台</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div class="app-container">
    <div class="canvas-wrapper">
      <canvas id="canvas" width="800" height="600"></canvas>
      <div id="color-info" class="color-info hidden">
        <div class="color-swatch" id="colorSwatch"></div>
        <div class="color-text">
          <div class="color-label">混合颜色</div>
          <div class="color-value" id="colorValue">RGB(0,0,0)</div>
        </div>
      </div>
    </div>

    <aside class="control-panel">
      <h2 class="panel-title">控制面板</h2>

      <section class="panel-section">
        <h3 class="section-title">光源设置</h3>
        <div id="lightControls" class="light-controls"></div>
      </section>

      <section class="panel-section">
        <h3 class="section-title">全局设置</h3>

        <div class="control-row">
          <label for="mirrorOpacity">镜面透明度</label>
          <div class="slider-row">
            <input type="range" id="mirrorOpacity" min="0.3" max="1.0" step="0.05" value="0.7" />
            <span id="opacityValue">0.70</span>
          </div>
        </div>

        <div class="control-row checkbox-row">
          <input type="checkbox" id="showRayPaths" />
          <label for="showRayPaths">显示光线路径</label>
        </div>
      </section>

      <section class="panel-section">
        <h3 class="section-title">添加物体</h3>
        <div class="button-row">
          <button id="addRectMirror" class="btn btn-primary">+ 矩形镜</button>
          <button id="addTriMirror" class="btn btn-primary">+ 三角镜</button>
        </div>
      </section>

      <section class="panel-section">
        <button id="resetBtn" class="btn btn-danger btn-block">重置场景</button>
      </section>

      <section class="panel-section fps-section">
        <div class="fps-info">
          <span class="fps-label">FPS:</span>
          <span id="fpsValue" class="fps-value">60</span>
        </div>
      </section>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
