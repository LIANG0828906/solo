<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhythm Level Editor · 音游关卡编辑器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app" class="app-root">
    <header class="app-header">
      <div class="header-left">
        <div class="logo-mark">
          <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
            <circle cx="16" cy="16" r="14" stroke="#3b82f6" stroke-width="2"/>
            <rect x="10" y="12" width="3" height="10" fill="#22c55e" rx="1"/>
            <rect x="15" y="8" width="3" height="14" fill="#3b82f6" rx="1"/>
            <rect x="20" y="14" width="3" height="8" fill="#ef4444" rx="1"/>
          </svg>
        </div>
        <div class="header-title">
          <h1>Rhythm Editor</h1>
          <span class="subtitle">音游关卡编辑器</span>
        </div>
      </div>
      <div class="header-center">
        <div class="bpm-control">
          <label>BPM</label>
          <input type="number" id="bpmInput" value="120" min="40" max="300" step="1" />
        </div>
        <div class="song-info" id="songInfo">
          <span class="song-label">未加载歌曲</span>
        </div>
      </div>
      <div class="header-right">
        <label class="file-btn" for="fileInput">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          导入音频
        </label>
        <input type="file" id="fileInput" accept="audio/*" hidden />
      </div>
    </header>

    <main class="editor-layout">
      <section class="editor-main" id="editorMain">
        <div class="canvas-wrap">
          <canvas id="waveformCanvas"></canvas>
          <div class="drop-overlay" id="dropOverlay">
            <div class="drop-inner">
              <svg viewBox="0 0 24 24" width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 18V5l12-2v13"/>
                <circle cx="6" cy="18" r="3"/>
                <circle cx="18" cy="16" r="3"/>
              </svg>
              <h2>拖拽音频文件到此处</h2>
              <p>或点击右上角「导入音频」按钮</p>
              <span class="drop-hint">支持 MP3 · WAV · OGG · FLAC · M4A</span>
            </div>
          </div>
          <div class="empty-state" id="emptyState">
            <div class="empty-grid-bg"></div>
            <div class="empty-inner">
              <div class="empty-icon">
                <svg viewBox="0 0 64 64" fill="none" width="72" height="72">
                  <circle cx="32" cy="32" r="28" stroke="#334155" stroke-width="1.5" stroke-dasharray="4 4"/>
                  <path d="M24 20 L24 44 M32 12 L32 52 M40 24 L40 40" stroke="#3b82f6" stroke-width="3" stroke-linecap="round"/>
                </svg>
              </div>
              <h3>开始创建你的关卡</h3>
              <p>导入一首音乐后，点击波形任意位置添加音符</p>
              <div class="feature-tags">
                <span><i class="dot dot-blue"></i>动态波形渲染</span>
                <span><i class="dot dot-green"></i>智能节拍吸附</span>
                <span><i class="dot dot-red"></i>4轨道自由编排</span>
              </div>
            </div>
          </div>
        </div>
        <div class="editor-bottombar">
          <div class="stats-row">
            <div class="stat-item">
              <span class="stat-label">音符总数</span>
              <span class="stat-value" id="noteCount">0</span>
              <span class="stat-max">/ 200</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-label">总时长</span>
              <span class="stat-value mono" id="durationText">--:--</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-item">
              <span class="stat-label">当前轨道</span>
              <span class="stat-value" id="currentTrack">Track 1</span>
            </div>
          </div>
          <div class="actions-row">
            <button class="btn-secondary" id="clearBtn" title="清除所有音符">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/>
                <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6M14 11v6"/>
              </svg>
              清空音符
            </button>
            <button class="btn-primary export-btn" id="exportBtn">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              导出 JSON
            </button>
          </div>
        </div>
      </section>

      <aside class="track-panel">
        <div class="panel-header">
          <h3>轨道配置</h3>
          <button class="add-track-btn" id="addTrackBtn" title="添加轨道">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/>
              <line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
          </button>
        </div>
        <div class="tracks-container" id="tracksContainer"></div>
        <div class="panel-help">
          <div class="help-title">操作指南</div>
          <ul class="help-list">
            <li><strong>左键单击</strong> 波形添加音符</li>
            <li><strong>拖拽音符</strong> 移动到目标轨道</li>
            <li><strong>Shift+点击</strong> 音符可删除</li>
            <li><strong>点击左侧圆点</strong> 切换轨道启用</li>
          </ul>
        </div>
      </aside>
    </main>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
