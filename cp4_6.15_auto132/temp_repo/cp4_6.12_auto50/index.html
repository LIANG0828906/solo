<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>废品回收站模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Courier New', Consolas, monospace;
      background: #3a2f28;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-wrapper {
      position: relative;
      width: 1200px;
      height: 900px;
    }
    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      border: 3px solid #2a2019;
      border-radius: 8px;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,255,255,0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(0,0,0,0.1) 0%, transparent 50%),
        repeating-linear-gradient(45deg, #4a3b32 0px, #4a3b32 2px, #44362d 2px, #44362d 4px),
        #4a3b32;
    }
    #ui-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 1200px;
      height: 900px;
      pointer-events: none;
    }
    #ui-container > * {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="1200" height="900"></canvas>
    <div id="ui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
