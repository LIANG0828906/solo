<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 分子结构查看器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      body {
        background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      }

      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image:
          radial-gradient(2px 2px at 20px 30px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 230px 80px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 300px 200px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 370px 150px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 450px 50px, rgba(255,255,255,0.5), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 520px 180px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 600px 90px, rgba(255,255,255,0.8), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 680px 250px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 750px 30px, rgba(255,255,255,0.6), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 820px 300px, #ffffff, rgba(0,0,0,0)),
          radial-gradient(2px 2px at 900px 120px, rgba(255,255,255,0.7), rgba(0,0,0,0)),
          radial-gradient(1px 1px at 980px 220px, #ffffff, rgba(0,0,0,0));
        background-repeat: repeat;
        background-size: 1000px 400px;
        animation: twinkle 8s ease-in-out infinite;
        pointer-events: none;
        z-index: 0;
      }

      @keyframes twinkle {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
