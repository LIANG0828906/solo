<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>潮汐记忆 - Tide Memory</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000000;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }
    #time-display {
      position: fixed;
      top: 20px;
      left: 20px;
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(8px);
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 100;
      letter-spacing: 1px;
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }
    #port-panel {
      position: fixed;
      width: 200px;
      height: 120px;
      background: rgba(19, 47, 76, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 16px;
      z-index: 200;
      display: none;
      pointer-events: none;
      border: 1px solid rgba(0, 229, 255, 0.3);
      box-shadow: 0 0 30px rgba(0, 229, 255, 0.2);
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    #port-panel.show {
      display: block;
      opacity: 1;
      transform: translateY(0);
    }
    #port-panel .port-name {
      color: #00E5FF;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }
    #port-panel .tide-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      margin-bottom: 4px;
    }
    #port-panel .tide-value {
      font-size: 28px;
      font-weight: 700;
      text-shadow: 0 0 15px currentColor;
    }
    #control-panel {
      position: fixed;
      right: 40px;
      bottom: 40px;
      width: 200px;
      height: 200px;
      background: rgba(13, 27, 42, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 16px;
      padding: 20px;
      z-index: 100;
      border: 1px solid rgba(0, 229, 255, 0.2);
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.15);
    }
    #control-panel .panel-title {
      color: #00E5FF;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      text-align: center;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
    }
    #control-panel .control-group {
      margin-bottom: 20px;
    }
    #control-panel label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      display: block;
      margin-bottom: 8px;
    }
    #control-panel input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(to right, #00BCD4, #00E5FF);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    #control-panel input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #FFFFFF;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
      transition: transform 0.1s ease;
    }
    #control-panel input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    #control-panel input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #FFFFFF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 15px rgba(0, 229, 255, 0.8);
    }
    #control-panel .speed-value {
      color: #00E5FF;
      font-size: 11px;
      text-align: right;
      margin-top: 4px;
      font-weight: 500;
    }
    #control-panel button {
      width: 100%;
      padding: 10px;
      background: linear-gradient(135deg, rgba(0, 188, 212, 0.3), rgba(0, 229, 255, 0.3));
      border: 1px solid rgba(0, 229, 255, 0.5);
      color: #FFFFFF;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s ease;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }
    #control-panel button:hover {
      background: linear-gradient(135deg, rgba(0, 188, 212, 0.5), rgba(0, 229, 255, 0.5));
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.4);
      transform: translateY(-1px);
    }
    #control-panel button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="time-display">00:00</div>
  <div id="port-panel">
    <div class="port-name" id="port-name">港口名称</div>
    <div class="tide-label">当前潮高</div>
    <div class="tide-value" id="tide-value">--</div>
  </div>
  <div id="control-panel">
    <div class="panel-title">控制面板</div>
    <div class="control-group">
      <label for="speed-slider">播放速度</label>
      <input type="range" id="speed-slider" min="0.5" max="20" step="0.5" value="10">
      <div class="speed-value" id="speed-value">10.0x</div>
    </div>
    <button id="reset-btn">重置</button>
  </div>
  <script type="module" src="/dist/bundle.js"></script>
</body>
</html>
