<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>股票模拟盯盘</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
    }

    .chart-container {
      flex: 1;
      position: relative;
      height: 100%;
    }

    #chartCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #panel {
      width: 22%;
      min-width: 280px;
      height: 100%;
      background: linear-gradient(180deg, #16213e 0%, #533483 100%);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .search-container {
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .search-box {
      width: 100%;
      height: 42px;
      padding: 0 16px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.05);
      color: #fff;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }

    .search-box::placeholder {
      color: rgba(255, 255, 255, 0.5);
      transition: opacity 0.2s;
    }

    .search-box:focus {
      border-color: #00d4ff;
      background: rgba(255, 255, 255, 0.1);
    }

    .search-box:focus::placeholder {
      opacity: 0;
    }

    .stock-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .stock-list::-webkit-scrollbar {
      width: 6px;
    }

    .stock-list::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
    }

    .stock-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
    }

    .stock-card {
      position: relative;
      padding: 12px 16px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
      overflow: hidden;
    }

    .stock-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      width: 3px;
      height: 100%;
      background: transparent;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .stock-card:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .stock-card.selected::before {
      box-shadow: 0 0 12px currentColor;
    }

    .stock-card.selected.up::before {
      background: #ff4757;
      color: #ff4757;
    }

    .stock-card.selected.down::before {
      background: #2ed573;
      color: #2ed573;
    }

    .stock-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .stock-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
    }

    .stock-code {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'JetBrains Mono', monospace;
    }

    .stock-price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stock-price {
      font-size: 20px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      transition: color 0.3s;
    }

    .stock-price.up {
      color: #ff4757;
    }

    .stock-price.down {
      color: #2ed573;
    }

    .stock-change {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    .stock-change.up {
      color: #ff4757;
    }

    .stock-change.down {
      color: #2ed573;
    }

    .arrow-icon {
      width: 12px;
      height: 12px;
      animation: bounce 1.5s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    .stock-stats {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
    }

    .stock-stats span {
      font-family: 'JetBrains Mono', monospace;
    }

    .annotate-btn {
      margin-top: 8px;
      width: 100%;
      padding: 6px 12px;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 6px;
      color: #00d4ff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .annotate-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: rgba(0, 212, 255, 0.5);
    }

    .annotation-form {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .annotation-input {
      width: 100%;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      outline: none;
      margin-bottom: 8px;
      resize: none;
      font-family: 'Inter', sans-serif;
    }

    .annotation-input:focus {
      border-color: #00d4ff;
    }

    .annotation-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .color-picker {
      width: 36px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
    }

    .color-picker::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    .color-picker::-webkit-color-swatch {
      border-radius: 4px;
      border: none;
    }

    .submit-annotation {
      flex: 1;
      padding: 6px 12px;
      background: linear-gradient(90deg, #00d4ff, #9d4edd);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .submit-annotation:hover {
      opacity: 0.9;
    }

    .fps-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="chart-container">
      <canvas id="chartCanvas"></canvas>
      <div class="fps-counter" id="fpsCounter">FPS: --</div>
    </div>
    <div id="panel">
      <div class="search-container">
        <input type="text" class="search-box" id="searchBox" placeholder="输入股票代码/名称" autocomplete="off" />
      </div>
      <div class="stock-list" id="stockList"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
