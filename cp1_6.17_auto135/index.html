<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 数据柱状图可视化</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(180deg, #0B0C10 0%, #1F2833 100%);
        color: #ffffff;
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      #canvas-container {
        position: absolute;
        top: 10%;
        left: 10%;
        width: 80%;
        height: 80%;
      }

      .app-title {
        position: absolute;
        top: 20px;
        left: 24px;
        font-size: 20px;
        font-weight: 300;
        color: #ffffff;
        text-shadow: 0 0 10px #00FFAA, 0 0 20px rgba(0, 255, 170, 0.5);
        z-index: 10;
        letter-spacing: 1px;
      }

      .data-selector {
        position: absolute;
        top: 60px;
        left: 24px;
        z-index: 10;
      }

      .data-selector select {
        background: #2C3E50;
        color: #ffffff;
        border: none;
        border-radius: 4px;
        padding: 8px 12px;
        font-size: 14px;
        cursor: pointer;
        outline: none;
        transition: background 0.2s;
      }

      .data-selector select:hover {
        background: #34495E;
      }

      .data-selector select option {
        background: #2C3E50;
        color: #ffffff;
      }

      .hint-text {
        position: absolute;
        top: 20px;
        right: 24px;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.6);
        z-index: 10;
        text-align: right;
        line-height: 1.6;
      }

      .loading {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.6);
        font-size: 16px;
        z-index: 5;
      }

      @media (max-width: 768px) {
        .app-title {
          font-size: 16px;
          top: 12px;
          left: 16px;
        }

        .data-selector {
          top: 48px;
          left: 16px;
        }

        .hint-text {
          font-size: 12px;
          top: 12px;
          right: 16px;
        }

        #canvas-container {
          top: 15%;
          left: 5%;
          width: 90%;
          height: 75%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-title">数据可视化 · 3D 交互柱状图</div>
      <div class="data-selector">
        <select id="dataset-select">
          <option value="economy">年度经济数据</option>
          <option value="population">人口密度数据</option>
        </select>
      </div>
      <div class="hint-text">
        拖拽旋转 · 滚轮缩放 · 双击聚焦
      </div>
      <div id="canvas-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
