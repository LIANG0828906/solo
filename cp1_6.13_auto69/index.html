<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MorphVault - 三维形态存档与变形</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    
    <div class="control-panel">
      <div class="panel-title">形态混合</div>
      <div class="slider-group">
        <div class="slider-item">
          <span class="slider-label">球体</span>
          <input type="range" id="slider-sphere" min="0" max="1" step="0.01" value="0.5" />
          <span class="slider-value" id="value-sphere">0.50</span>
        </div>
        <div class="slider-item">
          <span class="slider-label">立方体</span>
          <input type="range" id="slider-cube" min="0" max="1" step="0.01" value="0.3" />
          <span class="slider-value" id="value-cube">0.30</span>
        </div>
        <div class="slider-item">
          <span class="slider-label">环面</span>
          <input type="range" id="slider-torus" min="0" max="1" step="0.01" value="0.1" />
          <span class="slider-value" id="value-torus">0.10</span>
        </div>
        <div class="slider-item">
          <span class="slider-label">八面体</span>
          <input type="range" id="slider-octa" min="0" max="1" step="0.01" value="0.1" />
          <span class="slider-value" id="value-octa">0.10</span>
        </div>
      </div>
      <button id="save-btn" class="save-btn">保存快照</button>
    </div>
    
    <div class="gallery-sidebar">
      <div class="gallery-header">
        <h2>形态画廊</h2>
        <span class="gallery-count" id="gallery-count">0 / 20</span>
      </div>
      <div class="gallery-grid" id="gallery-grid">
        <div class="gallery-empty">暂无快照<br/>点击"保存快照"添加</div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
