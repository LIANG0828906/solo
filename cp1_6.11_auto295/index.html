<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>宋代庖厨 · 烹饪模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      background: #EDE4D4;
      font-family: 'ZCOOL XiaoWei', 'KaiTi', '楷体', serif;
      font-size: clamp(14px, 2vw, 18px);
      color: #2F2F2F;
      overflow-x: hidden;
    }

    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 16px;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 140, 0, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 99, 71, 0.06) 0%, transparent 50%),
        #EDE4D4;
    }

    .app-title {
      font-family: 'Ma Shan Zheng', 'KaiTi', '楷体', serif;
      font-size: clamp(28px, 4vw, 48px);
      color: #5D3A1A;
      text-align: center;
      letter-spacing: 8px;
      text-shadow: 2px 2px 4px rgba(93, 58, 26, 0.2);
      margin-top: 8px;
    }

    .app-subtitle {
      font-size: clamp(12px, 1.5vw, 16px);
      color: #8B8B83;
      letter-spacing: 4px;
      margin-bottom: 4px;
    }

    .workspace {
      display: flex;
      flex-direction: row;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1280px;
      transition: all 0.3s ease;
    }

    .section {
      transition: all 0.3s ease;
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 8px;
      box-shadow:
        0 8px 32px rgba(47, 47, 47, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
      overflow: hidden;
    }

    .section-label {
      position: absolute;
      top: 10px;
      left: 14px;
      font-family: 'Ma Shan Zheng', 'KaiTi', serif;
      font-size: 18px;
      color: #5D3A1A;
      z-index: 10;
      text-shadow: 1px 1px 2px rgba(245, 222, 179, 0.8);
      pointer-events: none;
    }

    .bottom-area {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-end;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1280px;
    }

    @media (max-width: 1200px) and (min-width: 801px) {
      .workspace {
        flex-direction: row;
      }
    }

    @media (max-width: 800px) {
      .workspace {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
