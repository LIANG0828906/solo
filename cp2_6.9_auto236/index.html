<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古剑锻造模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #2a1e0e;
      font-family: 'Noto Serif SC', serif;
      user-select: none;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .candle-light {
      position: absolute;
      left: 5%;
      top: 50%;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 180, 80, 0.8) 0%, rgba(255, 120, 30, 0.4) 30%, transparent 70%);
      pointer-events: none;
      animation: candleFlicker 2s ease-in-out infinite;
    }

    @keyframes candleFlicker {
      0%, 100% { opacity: 0.9; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    #progress-container {
      position: absolute;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }

    #progress-container.visible {
      opacity: 1;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 150, 50, 0.3);
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6600, #ffaa00);
      width: 0%;
      transition: width 0.2s ease-out;
      box-shadow: 0 0 10px rgba(255, 150, 0, 0.5);
    }

    .progress-label {
      text-align: center;
      color: #d4a574;
      font-size: 14px;
      margin-top: 8px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }

    #message-box {
      position: absolute;
      top: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(42, 30, 14, 0.9);
      color: #d4a574;
      padding: 16px 32px;
      border-radius: 8px;
      border: 1px solid rgba(255, 150, 50, 0.3);
      font-size: 18px;
      opacity: 0;
      transition: opacity 0.3s ease-out;
      pointer-events: none;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      white-space: nowrap;
    }

    #message-box.visible {
      opacity: 1;
    }

    #message-box.error {
      border-color: rgba(255, 80, 80, 0.5);
      color: #ff6666;
    }

    #material-rack {
      position: absolute;
      right: 40px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      pointer-events: auto;
      transition: all 0.3s ease-out;
    }

    #material-rack.bottom {
      right: auto;
      left: 50%;
      top: auto;
      bottom: 30px;
      transform: translateX(-50%);
      flex-direction: row;
    }

    .material-item {
      width: 60px;
      height: 60px;
      border-radius: 8px;
      cursor: grab;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .material-item:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 150, 0, 0.5);
    }

    .material-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .material-item.mystery-iron {
      background: linear-gradient(135deg, #666666, #444444);
      box-shadow: 0 4px 15px rgba(85, 85, 85, 0.4);
    }

    .material-item.meteorite-iron {
      background: linear-gradient(135deg, #aa66cc, #663388);
      box-shadow: 0 4px 15px rgba(136, 68, 170, 0.4);
    }

    .material-item.cold-iron {
      background: linear-gradient(135deg, #4488ff, #2255cc);
      box-shadow: 0 4px 15px rgba(51, 102, 255, 0.4);
    }

    #inscription-panel {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(42, 30, 14, 0.95);
      padding: 40px;
      border-radius: 12px;
      border: 2px solid rgba(255, 150, 50, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease-out;
      z-index: 20;
    }

    #inscription-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #inscription-panel h2 {
      color: #d4a574;
      margin-bottom: 20px;
      font-size: 24px;
      text-align: center;
    }

    #inscription-input {
      width: 300px;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 150, 50, 0.3);
      border-radius: 6px;
      color: #d4a574;
      font-size: 16px;
      font-family: 'Noto Serif SC', serif;
      outline: none;
    }

    #inscription-input:focus {
      border-color: rgba(255, 150, 50, 0.8);
      box-shadow: 0 0 10px rgba(255, 150, 0, 0.3);
    }

    #inscription-submit {
      display: block;
      margin: 20px auto 0;
      padding: 12px 40px;
      background: linear-gradient(135deg, #ff6600, #cc4400);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      font-family: 'Noto Serif SC', serif;
      cursor: pointer;
      transition: transform 0.2s ease-out, box-shadow 0.2s ease-out;
    }

    #inscription-submit:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(255, 100, 0, 0.5);
    }

    #hammer-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -100px);
      color: rgba(255, 150, 50, 0.6);
      font-size: 24px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-out;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      animation: pulse 1.5s ease-in-out infinite;
    }

    #hammer-hint.visible {
      opacity: 1;
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -100px) scale(1); }
      50% { transform: translate(-50%, -100px) scale(1.05); }
    }

    #stage-indicator {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #d4a574;
      font-size: 28px;
      font-weight: 600;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.9);
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }

    #stage-indicator.visible {
      opacity: 1;
    }

    #grind-hint {
      position: absolute;
      bottom: 140px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 150, 50, 0.8);
      font-size: 16px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease-out;
    }

    #grind-hint.visible {
      opacity: 1;
    }

    @media (max-width: 1366px) {
      #progress-container {
        width: 300px;
        bottom: 60px;
      }

      .material-item {
        width: 50px;
        height: 50px;
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-layer">
      <div class="candle-light"></div>
      
      <div id="stage-indicator"></div>
      
      <div id="material-rack">
        <div class="material-item mystery-iron" draggable="true" data-type="mystery">玄铁</div>
        <div class="material-item meteorite-iron" draggable="true" data-type="meteorite">陨铁</div>
        <div class="material-item cold-iron" draggable="true" data-type="cold">寒铁</div>
      </div>

      <div id="progress-container">
        <div class="progress-bar">
          <div class="progress-fill"></div>
        </div>
        <div class="progress-label"></div>
      </div>

      <div id="message-box"></div>
      
      <div id="hammer-hint">点击铁砧锤炼</div>
      <div id="grind-hint">沿剑脊方向（上下）拖拽研磨</div>

      <div id="inscription-panel">
        <h2>刻下剑铭</h2>
        <input type="text" id="inscription-input" placeholder="请输入铭文（4字以内）" maxlength="4">
        <button id="inscription-submit">锻造完成</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
