<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>陨石撞击星球模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #000000;
      font-family: sans-serif;
    }
    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    #scene-container {
      flex: 0 0 70%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <div id="canvas-container"></div>
    </div>
    <div id="panel-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
