<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>流体扩散与色彩混合模拟</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: #FFFFFF;
        background: linear-gradient(135deg, #1A1A2E 0%, #16213E 50%, #1A1A2E 100%);
      }

      #app {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      #canvas-container {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        background-color: rgba(0, 0, 0, 0.4);
        box-shadow: 0 10px 60px rgba(0, 0, 0, 0.5);
      }

      #record-layer {
        position: absolute;
        top: 12px;
        left: 12px;
        z-index: 5;
        pointer-events: none;
        font-family: monospace;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.5);
        line-height: 1.6;
      }

      #color-palette {
        position: fixed;
        left: 20px;
        bottom: 20px;
        z-index: 10;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #color-grid {
        display: grid;
        grid-template-columns: repeat(5, 40px);
        grid-template-rows: repeat(2, 40px);
        gap: 8px;
      }

      .color-swatch {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        border: 1px solid #666;
        cursor: pointer;
        position: relative;
        transition: transform 0.15s ease;
      }

      .color-swatch:hover {
        transform: scale(1.08);
      }

      .color-swatch.selected {
        box-shadow: 0 0 0 2px #FFFFFF;
      }

      .color-swatch .tooltip {
        position: absolute;
        bottom: calc(100% + 6px);
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #fff;
        font-size: 11px;
        padding: 3px 6px;
        border-radius: 4px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.15s;
      }

      .color-swatch:hover .tooltip {
        opacity: 1;
      }

      #color-picker-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 4px;
      }

      #color-picker {
        width: 40px;
        height: 40px;
        border-radius: 6px;
        border: 1px solid #666;
        background: transparent;
        cursor: pointer;
        padding: 0;
      }

      #color-picker-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
      }

      #control-panel {
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: 220px;
        z-index: 10;
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-top-left-radius: 12px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 18px;
        overflow-y: auto;
      }

      .panel-title {
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1px;
        color: #FFFFFF;
        margin-bottom: 4px;
        text-transform: uppercase;
        opacity: 0.9;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .control-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }

      .control-label {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.8);
      }

      .control-value {
        font-size: 12px;
        color: #3498DB;
        font-family: monospace;
        min-width: 36px;
        text-align: right;
      }

      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: #444;
        border-radius: 2px;
        outline: none;
      }

      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        background: #3498DB;
        border-radius: 50%;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      input[type="range"]::-webkit-slider-thumb:hover {
        background: #2980B9;
      }

      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        background: #3498DB;
        border-radius: 50%;
        border: none;
        cursor: pointer;
        transition: background 0.15s ease;
      }

      input[type="range"]::-moz-range-thumb:hover {
        background: #2980B9;
      }

      input[type="color"]::-webkit-color-swatch-wrapper {
        padding: 0;
      }

      input[type="color"]::-webkit-color-swatch {
        border-radius: 5px;
        border: none;
      }

      .btn {
        width: 100%;
        height: 40px;
        border-radius: 8px;
        border: none;
        color: #FFFFFF;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s ease, background 0.15s ease;
        letter-spacing: 0.5px;
      }

      .btn:active {
        transform: scale(0.95);
      }

      .btn-clear {
        background: #E74C3C;
      }

      .btn-clear:active {
        background: #C0392B;
      }

      .btn-save {
        background: #2ECC71;
      }

      .btn-save:active {
        background: #27AE60;
      }

      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 4px 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
        <div id="record-layer"></div>
      </div>

      <div id="color-palette">
        <div id="color-grid"></div>
        <div id="color-picker-wrap">
          <input type="color" id="color-picker" value="#E74C3C" />
          <span id="color-picker-label">自定义颜色</span>
        </div>
      </div>

      <div id="control-panel">
        <div class="panel-title">控制面板</div>
        <div class="divider"></div>

        <div class="control-group">
          <div class="control-row">
            <span class="control-label">粒子释放数量</span>
            <span class="control-value" id="particle-count-val">20</span>
          </div>
          <input type="range" id="particle-count" min="5" max="50" step="1" value="20" />
        </div>

        <div class="control-group">
          <div class="control-row">
            <span class="control-label">流体粘度</span>
            <span class="control-value" id="viscosity-val">1.0</span>
          </div>
          <input type="range" id="viscosity" min="0.1" max="5.0" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <div class="control-row">
            <span class="control-label">涡旋强度</span>
            <span class="control-value" id="vortex-val">1.0</span>
          </div>
          <input type="range" id="vortex" min="0.0" max="3.0" step="0.1" value="1.0" />
        </div>

        <div class="control-group">
          <div class="control-row">
            <span class="control-label">扩散速度</span>
            <span class="control-value" id="diffusion-val">3.0</span>
          </div>
          <input type="range" id="diffusion" min="0.5" max="10.0" step="0.5" value="3.0" />
        </div>

        <div class="divider"></div>

        <button class="btn btn-clear" id="btn-clear">清除画布</button>
        <button class="btn btn-save" id="btn-save">保存快照</button>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
