<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>连连看消除游戏</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #FFC3D0 0%, #D4A5FF 50%, #B8C0FF 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    #game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 720px;
      width: 100%;
      padding: 10px;
    }

    #stats-bar {
      display: flex;
      gap: 12px;
      width: 100%;
      justify-content: center;
      flex-wrap: wrap;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 14px;
      padding: 8px 20px;
      font-size: 15px;
      color: #5a3e6b;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 110px;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .stat-card .stat-value {
      font-family: 'Courier New', 'Consolas', monospace;
      font-weight: 700;
      font-size: 18px;
      color: #7c3aed;
      min-width: 36px;
      text-align: center;
    }

    #canvas-container {
      position: relative;
      border-radius: 16px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      padding: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    #game-canvas {
      display: block;
      border-radius: 12px;
      cursor: pointer;
    }

    #button-bar {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .game-btn {
      border: none;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: transform 0.15s ease, opacity 0.4s ease, box-shadow 0.15s ease;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      outline: none;
    }

    .game-btn:active {
      transform: scale(0.95);
    }

    .game-btn:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    #hint-btn {
      background: linear-gradient(135deg, #FFD700, #FFA500);
    }

    #hint-btn:disabled {
      background: linear-gradient(135deg, #ccc, #999);
      cursor: not-allowed;
      opacity: 0.5;
    }

    #restart-btn {
      background: linear-gradient(135deg, #6DD5FA, #2980B9);
    }

    #quit-btn {
      background: linear-gradient(135deg, #f093fb, #f5576c);
    }

    #victory-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    #victory-overlay.active {
      background: rgba(0,0,0,0.35);
      pointer-events: all;
      opacity: 1;
    }

    #victory-modal {
      background: linear-gradient(135deg, #fff8f0, #f0e6ff);
      border-radius: 24px;
      padding: 36px 44px;
      text-align: center;
      transform: scale(0);
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 12px 48px rgba(0,0,0,0.18);
      position: relative;
      overflow: hidden;
      max-width: 360px;
      width: 90%;
    }

    #victory-overlay.active #victory-modal {
      transform: scale(1);
    }

    #victory-modal h2 {
      font-size: 28px;
      color: #7c3aed;
      margin-bottom: 18px;
    }

    .victory-stat {
      font-size: 16px;
      color: #5a3e6b;
      margin: 6px 0;
    }

    .victory-stat span {
      font-weight: 700;
      color: #7c3aed;
      font-family: 'Courier New', monospace;
    }

    #confetti-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #play-again-btn {
      margin-top: 20px;
      background: linear-gradient(135deg, #a18cd1, #fbc2eb);
      border: none;
      border-radius: 50px;
      padding: 12px 36px;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    #play-again-btn:active {
      transform: scale(0.95);
    }

    @media (max-width: 520px) {
      #game-container { padding: 6px; gap: 8px; }
      #stats-bar { gap: 6px; }
      .stat-card { padding: 5px 10px; font-size: 12px; min-width: 80px; border-radius: 10px; }
      .stat-card .stat-value { font-size: 14px; min-width: 28px; }
      .game-btn { padding: 8px 18px; font-size: 13px; }
      #canvas-container { padding: 4px; border-radius: 12px; }
      #victory-modal { padding: 24px 20px; }
      #victory-modal h2 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="stats-bar">
      <div class="stat-card">步数 <span class="stat-value" id="steps-val">0</span></div>
      <div class="stat-card">用时 <span class="stat-value" id="time-val">00:00</span></div>
      <div class="stat-card">剩余 <span class="stat-value" id="remain-val">80</span></div>
    </div>
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="button-bar">
      <button class="game-btn" id="hint-btn">💡 提示 (3)</button>
      <button class="game-btn" id="restart-btn">🔄 重开</button>
      <button class="game-btn" id="quit-btn">🚪 退出</button>
    </div>
  </div>
  <div id="victory-overlay">
    <div id="victory-modal">
      <canvas id="confetti-canvas"></canvas>
      <h2>🎉 恭喜通关！</h2>
      <div class="victory-stat">用时: <span id="v-time">00:00</span></div>
      <div class="victory-stat">步数: <span id="v-steps">0</span></div>
      <button id="play-again-btn">再来一局</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
