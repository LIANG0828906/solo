<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>熔岩地牢 - Lava Dungeon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0000;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to right,
        #1a0500 0%,
        #2d0a00 25%,
        #1a0500 50%,
        #2d0a00 75%,
        #1a0500 100%
      );
      position: relative;
    }

    #game-container {
      position: relative;
      box-shadow: 0 0 60px rgba(255, 60, 0, 0.4);
      border-radius: 8px;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      border-radius: 8px;
    }

    #hud {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      background: rgba(30, 0, 0, 0.7);
      padding: 10px 30px;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
      z-index: 10;
    }

    .hud-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hud-value {
      display: inline-block;
      transition: transform 0.2s ease-in-out;
    }

    .hud-value.pop {
      transform: scale(1.2);
    }

    #warning-bar-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 30px;
      background: rgba(0, 0, 0, 0.5);
      z-index: 10;
    }

    #warning-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 0%;
      background: linear-gradient(to top, #ff2200, #ffaa00);
      transition: height 0.1s linear;
    }

    #game-over {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      color: #fff;
      z-index: 100;
      display: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    #game-over.visible {
      display: block;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -40%); }
      to { opacity: 1; transform: translate(-50%, -50%); }
    }

    #game-over h2 {
      font-size: 36px;
      margin-bottom: 20px;
      color: #ff6633;
      text-shadow: 0 0 20px rgba(255, 100, 50, 0.8);
    }

    .stat-row {
      font-size: 20px;
      margin: 12px 0;
      display: flex;
      justify-content: space-between;
      gap: 40px;
    }

    .stat-label {
      color: #ccc;
    }

    .stat-value {
      color: #ffdd88;
      font-weight: bold;
    }

    #restart-btn {
      margin-top: 30px;
      padding: 14px 50px;
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #ff4422, #ff8833);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 15px rgba(255, 60, 0, 0.4);
    }

    #restart-btn:hover {
      transform: translateX(-3px);
      box-shadow: 0 6px 25px rgba(255, 60, 0, 0.6);
    }

    #restart-btn:active {
      transform: translateX(0);
    }

    .score-popup {
      position: absolute;
      pointer-events: none;
      color: #ffdd44;
      font-size: 20px;
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255, 220, 80, 0.8);
      animation: scoreFloat 0.8s ease-out forwards;
      z-index: 50;
    }

    @keyframes scoreFloat {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-50px); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="game-container">
      <div id="warning-bar-container">
        <div id="warning-bar"></div>
      </div>
      <div id="hud">
        <div class="hud-item">
          <span>高度:</span>
          <span class="hud-value" id="height-value">0.0</span>
          <span>米</span>
        </div>
        <div class="hud-item">
          <span>💎</span>
          <span class="hud-value" id="crystal-value">0</span>
        </div>
      </div>
      <canvas id="game-canvas"></canvas>
      <div id="game-over">
        <h2>游戏结束</h2>
        <div class="stat-row">
          <span class="stat-label">最终高度</span>
          <span class="stat-value" id="final-height">0.0 米</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">收集水晶</span>
          <span class="stat-value" id="final-crystals">0 颗</span>
        </div>
        <button id="restart-btn">重新开始</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/Game.ts"></script>
</body>
</html>
