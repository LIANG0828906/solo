<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法飞艇 · 浮空岛屿</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0d1b2a 0%, #1b2838 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #loading-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0d1b2a 0%, #1b2838 100%);
      z-index: 100;
      transition: opacity 0.8s ease-out;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .airship-icon {
      position: relative;
      width: 120px;
      height: 120px;
      margin-bottom: 30px;
    }
    .airship-icon .balloon {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 70px;
      background: linear-gradient(180deg, #3949ab 0%, #1a237e 100%);
      border-radius: 50% 50% 45% 45%;
      box-shadow: 0 0 30px rgba(124, 77, 255, 0.5);
    }
    .airship-icon .sail-left,
    .airship-icon .sail-right {
      position: absolute;
      top: 25px;
      width: 30px;
      height: 40px;
      background: rgba(124, 77, 255, 0.6);
      border-radius: 50%;
    }
    .airship-icon .sail-left {
      left: 5px;
      transform: rotate(-20deg);
    }
    .airship-icon .sail-right {
      right: 5px;
      transform: rotate(20deg);
    }
    .airship-icon .basket {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 25px;
      background: linear-gradient(180deg, #6d4c41 0%, #4e342e 100%);
      border-radius: 5px;
    }
    .airship-icon .rope {
      position: absolute;
      top: 55px;
      width: 2px;
      height: 30px;
      background: #8d6e63;
    }
    .airship-icon .rope-left {
      left: 40%;
      transform: rotate(-15deg);
    }
    .airship-icon .rope-right {
      right: 40%;
      transform: rotate(15deg);
    }
    .loading-particles {
      position: absolute;
      width: 100%;
      height: 100%;
      animation: rotate 4s linear infinite;
    }
    .loading-particles span {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      opacity: 0.8;
      box-shadow: 0 0 6px #7c4dff;
    }
    .loading-particles span:nth-child(1) { top: 10%; left: 50%; }
    .loading-particles span:nth-child(2) { top: 30%; left: 90%; animation-delay: 0.2s; }
    .loading-particles span:nth-child(3) { top: 70%; left: 85%; animation-delay: 0.4s; }
    .loading-particles span:nth-child(4) { top: 90%; left: 50%; animation-delay: 0.6s; }
    .loading-particles span:nth-child(5) { top: 70%; left: 15%; animation-delay: 0.8s; }
    .loading-particles span:nth-child(6) { top: 30%; left: 10%; animation-delay: 1s; }
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .loading-text {
      color: #fff;
      font-size: 20px;
      letter-spacing: 4px;
      text-shadow: 0 0 10px rgba(124, 77, 255, 0.8);
    }
    .loading-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }
    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #score-display {
      position: absolute;
      top: 24px;
      left: 24px;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8), 0 0 20px rgba(124, 77, 255, 0.5);
    }
    #status-indicators {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 16px;
    }
    .status-icon {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      font-size: 20px;
      opacity: 0.4;
      transition: all 0.3s ease;
    }
    .status-icon.active {
      opacity: 1;
      box-shadow: 0 0 20px currentColor;
      border-color: currentColor;
    }
    .status-icon.speed { color: #ffffff; }
    .status-icon.shield { color: #00e5ff; }
    .status-icon.buoyancy { color: #8bc34a; }
    .status-icon.attack { color: #ff1744; }
    #flash-border {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      box-shadow: inset 0 0 0 0 transparent;
      transition: box-shadow 0.4s ease-out;
    }
    #flash-border.active {
      box-shadow: inset 0 0 0 8px var(--flash-color, #fff);
    }
    #screen-hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #ffd54f;
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
      display: none;
    }
    #controls-hint {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      letter-spacing: 2px;
    }
    #controls-hint kbd {
      display: inline-block;
      padding: 4px 8px;
      margin: 0 2px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      font-family: monospace;
      color: #fff;
    }
    @media (max-width: 1279px) {
      #screen-hint { display: block; }
      #game-canvas { display: none; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    
    <div id="loading-screen">
      <div class="airship-icon">
        <div class="loading-particles">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="balloon"></div>
        <div class="sail-left"></div>
        <div class="sail-right"></div>
        <div class="rope rope-left"></div>
        <div class="rope rope-right"></div>
        <div class="basket"></div>
      </div>
      <div class="loading-text">正在加载魔法世界<span class="loading-dots"></span></div>
    </div>
    
    <div id="ui-layer">
      <div id="score-display">得分: 0</div>
      <div id="status-indicators">
        <div class="status-icon speed" id="status-speed" title="速度">⚡</div>
        <div class="status-icon shield" id="status-shield" title="护盾">🛡️</div>
        <div class="status-icon buoyancy" id="status-buoyancy" title="浮力">💨</div>
        <div class="status-icon attack" id="status-attack" title="攻击">🔥</div>
      </div>
      <div id="flash-border"></div>
      <div id="controls-hint">
        <kbd>W</kbd><kbd>S</kbd> 前进后退 · 
        <kbd>A</kbd><kbd>D</kbd> 左右偏航 · 
        <kbd>Q</kbd><kbd>E</kbd> 上下升降 · 
        <kbd>R</kbd> 重置
      </div>
      <div id="screen-hint">请使用宽屏设备（最低1280px）</div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
