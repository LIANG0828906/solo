<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>抽象迷宫 3D 交互演示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #0a0a1f 0%, #1a0a2e 50%, #0f1a3d 100%);
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #hud {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }
    #badge-panel {
      position: absolute;
      top: 24px;
      left: 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 16px;
      padding: 16px 20px;
      color: #fff;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    #badge-panel .title {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }
    #badge-icons {
      display: flex;
      gap: 10px;
    }
    .badge-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid rgba(255, 180, 50, 0.6);
      background: transparent;
      transition: all 0.3s ease;
      position: relative;
    }
    .badge-icon.collected {
      background: linear-gradient(135deg, #ffb347 0%, #ffcc33 100%);
      border-color: #ffd700;
      box-shadow: 0 0 12px rgba(255, 200, 50, 0.6);
    }
    #exit-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 40px;
      background: rgba(100, 180, 255, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(150, 200, 255, 0.6);
      border-radius: 50px;
      color: #e0f0ff;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      pointer-events: auto;
      opacity: 0;
      transition: all 0.3s ease;
      box-shadow: 0 0 30px rgba(100, 180, 255, 0.3);
      letter-spacing: 2px;
    }
    #exit-button:hover {
      transform: translate(-50%, -50%) scale(1.08);
      background: rgba(120, 200, 255, 0.35);
      box-shadow: 0 0 50px rgba(100, 180, 255, 0.5);
      border-color: rgba(180, 220, 255, 0.8);
    }
    #exit-button.visible {
      opacity: 1;
    }
    #result-panel {
      position: absolute;
      bottom: -100%;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 480px;
      background: rgba(20, 20, 50, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px 24px 0 0;
      padding: 36px 40px;
      color: #fff;
      pointer-events: auto;
      transition: bottom 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 -10px 60px rgba(0, 0, 0, 0.5);
    }
    #result-panel.visible {
      bottom: 0;
    }
    #result-panel h2 {
      text-align: center;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 28px;
      background: linear-gradient(135deg, #a0d8ff 0%, #c0a8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }
    .stats-row {
      display: flex;
      justify-content: space-around;
      margin-bottom: 32px;
    }
    .stat-item {
      text-align: center;
    }
    .stat-value {
      font-size: 36px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
      text-shadow: 0 0 20px rgba(150, 200, 255, 0.5);
      font-variant-numeric: tabular-nums;
    }
    .stat-label {
      font-size: 13px;
      opacity: 0.7;
      letter-spacing: 1px;
    }
    #replay-btn {
      display: block;
      margin: 0 0 0 auto;
      padding: 14px 32px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 50px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }
    #replay-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 30px rgba(102, 126, 234, 0.5);
    }
    #fade-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0a0a1f;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 100;
    }
    #fade-overlay.visible {
      opacity: 1;
    }
    #start-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.5);
      font-size: 13px;
      letter-spacing: 2px;
      pointer-events: none;
    }
    @media (max-width: 1440px) {
      #badge-panel {
        top: 16px;
        left: 16px;
        padding: 12px 16px;
      }
      #badge-panel .title {
        font-size: 12px;
        margin-bottom: 8px;
      }
      .badge-icon {
        width: 22px;
        height: 22px;
      }
      #result-panel {
        padding: 28px 32px;
      }
      #result-panel h2 {
        font-size: 22px;
        margin-bottom: 20px;
      }
      .stat-value {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud">
      <div id="badge-panel">
        <div class="title">徽章收集</div>
        <div id="badge-icons"></div>
      </div>
      <button id="exit-button">通关出口</button>
      <div id="start-hint">WASD 移动 · 鼠标拖拽旋转视角</div>
      <div id="fade-overlay"></div>
    </div>
    <div id="result-panel">
      <h2>🎉 通关成功</h2>
      <div class="stats-row">
        <div class="stat-item">
          <div class="stat-value" id="stat-time">0</div>
          <div class="stat-label">用时 (秒)</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-badges">0</div>
          <div class="stat-label">收集徽章</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="stat-steps">0</div>
          <div class="stat-label">移动步数</div>
        </div>
      </div>
      <button id="replay-btn">再玩一次</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
