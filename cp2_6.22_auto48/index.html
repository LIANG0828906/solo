<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>水下声纳信号传播三维可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000510;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      color: #a0e0ff;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .overlay-panel {
      position: absolute;
      background: rgba(0, 20, 40, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.1), inset 0 0 20px rgba(0, 100, 150, 0.05);
      z-index: 10;
    }
    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #00ffff;
      text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
      letter-spacing: 2px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 255, 255, 0.15);
    }
    #radar-panel {
      top: 20px;
      right: 20px;
      width: 220px;
      height: 260px;
      padding: 0;
    }
    #radar-canvas {
      display: block;
      margin: 10px auto;
      border-radius: 50%;
    }
    #waveform-panel {
      left: 310px;
      bottom: 20px;
      width: 340px;
      height: 160px;
      padding: 0;
    }
    #waveform-canvas {
      display: block;
      margin: 10px auto;
      border-radius: 6px;
    }
    #snr-panel {
      right: 20px;
      bottom: 20px;
      width: 340px;
      height: 140px;
      padding: 0;
    }
    #snr-canvas {
      display: block;
      margin: 10px auto;
      border-radius: 6px;
    }
    #target-info {
      left: 310px;
      top: 20px;
      width: 280px;
      padding: 0;
    }
    #target-info .info-content {
      padding: 12px 16px;
      font-size: 12px;
      line-height: 2;
    }
    #target-info .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #target-info .info-label {
      color: #60a0c0;
    }
    #target-info .info-value {
      color: #00ffff;
      font-weight: 600;
    }
    #fps-counter {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      font-size: 12px;
      color: #00ffff;
      text-shadow: 0 0 6px rgba(0, 255, 255, 0.5);
      background: rgba(0, 20, 40, 0.6);
      padding: 6px 16px;
      border-radius: 20px;
      border: 1px solid rgba(0, 255, 255, 0.2);
    }
    @media (max-width: 1279px) {
      #waveform-panel, #snr-panel {
        width: 280px;
      }
      #target-info {
        width: 240px;
        left: 270px;
      }
      #waveform-panel {
        left: 270px;
      }
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Orbitron:wght@600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: 60 | 粒子: 10000</div>
    <div id="target-info" class="overlay-panel">
      <div class="panel-title">▎目标探测信息</div>
      <div class="info-content" id="target-info-content">
        <div class="info-row"><span class="info-label">状态</span><span class="info-value" id="t-status">--</span></div>
        <div class="info-row"><span class="info-label">目标距离</span><span class="info-value" id="t-distance">-- m</span></div>
        <div class="info-row"><span class="info-label">方位角</span><span class="info-value" id="t-azimuth">-- °</span></div>
        <div class="info-row"><span class="info-label">俯仰角</span><span class="info-value" id="t-elevation">-- °</span></div>
        <div class="info-row"><span class="info-label">径向速度</span><span class="info-value" id="t-velocity">-- m/s</span></div>
        <div class="info-row"><span class="info-label">多普勒频移</span><span class="info-value" id="t-doppler">-- Hz</span></div>
        <div class="info-row"><span class="info-label">回波强度</span><span class="info-value" id="t-strength">-- dB</span></div>
      </div>
    </div>
    <div id="radar-panel" class="overlay-panel">
      <div class="panel-title">▎俯视雷达</div>
      <canvas id="radar-canvas" width="200" height="200"></canvas>
    </div>
    <div id="waveform-panel" class="overlay-panel">
      <div class="panel-title">▎回波波形（含多普勒效应）</div>
      <canvas id="waveform-canvas" width="320" height="110"></canvas>
    </div>
    <div id="snr-panel" class="overlay-panel">
      <div class="panel-title">▎信噪比 (SNR) 变化曲线</div>
      <canvas id="snr-canvas" width="320" height="90"></canvas>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
