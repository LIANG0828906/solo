<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市声音地图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #control-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      z-index: 100;
      transition: transform 0.3s ease;
      transform: translateY(-60px);
    }
    #control-bar.expanded {
      transform: translateY(0);
    }
    .control-toggle {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 40, 0.85);
      border: none;
      color: white;
      padding: 5px 20px;
      cursor: pointer;
      border-radius: 0 0 10px 10px;
      font-size: 14px;
    }
    .control-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 15px 30px;
      height: 60px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-group label {
      font-size: 14px;
      color: #aaa;
    }
    .view-btn {
      padding: 8px 16px;
      border: 1px solid #4a90d9;
      background: transparent;
      color: #4a90d9;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-btn.active {
      background: #4a90d9;
      color: white;
    }
    .view-btn:hover:not(.active) {
      background: rgba(74, 144, 217, 0.2);
    }
    input[type="range"] {
      width: 120px;
      cursor: pointer;
    }
    #info-panel {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 280px;
      background: rgba(20, 20, 40, 0.75);
      backdrop-filter: blur(10px);
      color: white;
      border-radius: 12px;
      padding: 20px;
      z-index: 50;
      opacity: 0;
      transform: translateX(-320px);
      transition: all 0.4s ease;
      pointer-events: none;
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
    }
    .building-name {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .building-type {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 15px;
    }
    .track-info {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 12px;
      margin-bottom: 15px;
    }
    .track-name {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 8px;
    }
    .volume-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .volume-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a90d9, #6cc0e5);
      border-radius: 3px;
      transition: width 0.1s ease;
    }
    .heatmap-title {
      font-size: 13px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .heatmap {
      display: flex;
      gap: 3px;
      height: 40px;
      align-items: flex-end;
    }
    .heatmap-bar {
      flex: 1;
      background: #4a90d9;
      border-radius: 2px;
      transition: height 0.3s ease;
    }
    .instructions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 20, 40, 0.75);
      color: #aaa;
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 50;
      line-height: 1.8;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="control-bar">
    <button class="control-toggle" id="toggle-btn">▼ 控制面板</button>
    <div class="control-content">
      <div class="control-group">
        <label>视角:</label>
        <button class="view-btn active" id="btn-topview">俯视</button>
        <button class="view-btn" id="btn-firstperson">第一人称</button>
      </div>
      <div class="control-group">
        <label>音量:</label>
        <input type="range" id="volume-slider" min="0" max="100" value="50">
        <span id="volume-value">50</span>
      </div>
      <div class="control-group">
        <label>时间:</label>
        <input type="range" id="time-slider" min="0" max="24" value="12" step="0.1">
        <span id="time-value">12:00</span>
      </div>
    </div>
  </div>

  <div id="info-panel">
    <div class="building-name" id="panel-building-name">建筑名称</div>
    <span class="building-type" id="panel-building-type">功能类型</span>
    <div class="track-info">
      <div class="track-name" id="panel-track-name">环境音轨</div>
      <div class="volume-bar">
        <div class="volume-fill" id="panel-volume-fill"></div>
      </div>
    </div>
    <div class="heatmap-title">24小时声音强度</div>
    <div class="heatmap" id="panel-heatmap"></div>
  </div>

  <div class="instructions">
    🖱️ 拖拽旋转视角 | 滚轮缩放<br>
    👆 单击建筑播放声音<br>
    🖱️ 双击建筑进入详情
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
