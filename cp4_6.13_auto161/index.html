<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市声音地图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1a1a2e;
    }
    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      transition: filter 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #canvas-container.blurred {
      filter: blur(8px) brightness(0.85);
    }
    #control-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      color: white;
      z-index: 100;
      transition: transform 0.3s ease;
      transform: translateY(-60px);
    }
    #control-bar.expanded {
      transform: translateY(0);
    }
    .control-toggle {
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(20, 20, 40, 0.85);
      border: none;
      color: white;
      padding: 5px 20px;
      cursor: pointer;
      border-radius: 0 0 10px 10px;
      font-size: 14px;
    }
    .control-content {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 30px;
      padding: 15px 30px;
      height: 60px;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .control-group label {
      font-size: 14px;
      color: #aaa;
    }
    .view-btn {
      padding: 8px 16px;
      border: 1px solid #4a90d9;
      background: transparent;
      color: #4a90d9;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .view-btn.active {
      background: #4a90d9;
      color: white;
    }
    .view-btn:hover:not(.active) {
      background: rgba(74, 144, 217, 0.2);
    }
    input[type="range"] {
      width: 120px;
      cursor: pointer;
    }
    #info-panel {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 320px;
      background: rgba(15, 15, 35, 0.65);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      border-radius: 16px;
      padding: 24px;
      z-index: 60;
      opacity: 0;
      transform: translateX(-350px);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
    }
    #info-panel.firstperson {
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) scale(1);
      width: 360px;
      background: rgba(15, 15, 35, 0.85);
      border: 1px solid rgba(255, 215, 0, 0.3);
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.1);
    }
    .building-name {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff, #ddd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .building-type {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      margin-bottom: 18px;
      letter-spacing: 0.5px;
    }
    .track-info {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 16px;
      margin-bottom: 18px;
    }
    .track-name {
      font-size: 15px;
      color: #bbb;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .volume-bar {
      width: 100%;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
    }
    .volume-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .volume-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #4a90d9, #6cc0e5, #9ee0f5);
      border-radius: 4px;
      box-shadow: 0 0 10px rgba(108, 192, 229, 0.5);
    }
    .heatmap-title {
      font-size: 13px;
      color: #999;
      margin-bottom: 10px;
      font-weight: 500;
      letter-spacing: 0.3px;
    }
    .heatmap {
      display: flex;
      gap: 3px;
      height: 50px;
      align-items: flex-end;
      padding: 5px 0;
    }
    .heatmap-bar {
      flex: 1;
      background: linear-gradient(180deg, #6cc0e5, #4a90d9);
      border-radius: 2px 2px 0 0;
      transition: height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 3px;
    }
    .instructions {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(20, 20, 40, 0.75);
      color: #aaa;
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 50;
      line-height: 1.8;
    }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
      }
    }
  </script>
</head>
<body>
  <div id="canvas-container"></div>
  
  <div id="control-bar">
    <button class="control-toggle" id="toggle-btn">▼ 控制面板</button>
    <div class="control-content">
      <div class="control-group">
        <label>视角:</label>
        <button class="view-btn active" id="btn-topview">俯视</button>
        <button class="view-btn" id="btn-firstperson">第一人称</button>
      </div>
      <div class="control-group">
        <label>音量:</label>
        <input type="range" id="volume-slider" min="0" max="100" value="50">
        <span id="volume-value">50</span>
      </div>
      <div class="control-group">
        <label>时间:</label>
        <input type="range" id="time-slider" min="0" max="24" value="12" step="0.1">
        <span id="time-value">12:00</span>
      </div>
    </div>
  </div>

  <div id="info-panel">
    <div class="building-name" id="panel-building-name">建筑名称</div>
    <span class="building-type" id="panel-building-type">功能类型</span>
    <div class="track-info">
      <div class="track-name" id="panel-track-name">环境音轨</div>
      <div class="volume-bar">
        <div class="volume-fill" id="panel-volume-fill"></div>
      </div>
    </div>
    <div class="heatmap-title">24小时声音强度</div>
    <div class="heatmap" id="panel-heatmap"></div>
  </div>

  <div class="instructions">
    🖱️ 拖拽旋转视角 | 滚轮缩放<br>
    👆 单击建筑播放声音<br>
    🖱️ 双击建筑进入详情
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
