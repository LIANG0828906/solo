<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2D骨骼动画生成器</title>
  <style>
    :root {
      --bg-primary: #1a1a2e;
      --bg-canvas: #16213e;
      --bg-control: #0f3460;
      --text-primary: #eaeaea;
      --accent: #e94560;
      --grid-line: #2a2a4e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-width: 800px;
      min-height: 100vh;
      padding: 20px;
    }

    .app-header {
      text-align: center;
      margin-bottom: 20px;
    }

    .app-header h1 {
      font-size: 28px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .app-header p {
      font-size: 14px;
      color: var(--text-primary);
      opacity: 0.7;
      margin-top: 6px;
    }

    .main-container {
      display: flex;
      gap: 24px;
      justify-content: center;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .canvas-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-label span {
      font-size: 12px;
      opacity: 0.6;
      font-weight: normal;
    }

    .canvas-wrapper {
      position: relative;
      width: 600px;
      height: 800px;
      background-color: var(--bg-canvas);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    canvas {
      display: block;
      cursor: crosshair;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background-color: var(--bg-control);
      color: var(--text-primary);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease, background-color 0.2s ease;
      user-select: none;
    }

    .btn:hover {
      transform: scale(1.05);
      background-color: #1a4a7a;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background-color: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background-color: #ff5777;
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    .color-picker {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .color-picker-label {
      font-size: 12px;
      opacity: 0.7;
    }

    .color-swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .color-swatch:hover {
      transform: scale(1.15);
    }

    .color-swatch.active {
      border-color: var(--text-primary);
      transform: scale(1.1);
    }

    .timeline-section {
      margin-top: 24px;
      padding: 0 20px;
    }

    .timeline-label {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .timeline-hint {
      font-size: 11px;
      opacity: 0.5;
      font-weight: normal;
    }

    .timeline-container {
      background-color: var(--bg-canvas);
      border-radius: 12px;
      padding: 16px;
      overflow-x: auto;
      overflow-y: hidden;
      white-space: nowrap;
      scrollbar-width: thin;
      scrollbar-color: var(--bg-control) var(--bg-canvas);
    }

    .timeline-container::-webkit-scrollbar {
      height: 8px;
    }

    .timeline-container::-webkit-scrollbar-track {
      background: var(--bg-canvas);
      border-radius: 4px;
    }

    .timeline-container::-webkit-scrollbar-thumb {
      background: var(--bg-control);
      border-radius: 4px;
    }

    .timeline-container::-webkit-scrollbar-thumb:hover {
      background: var(--accent);
    }

    .timeline-frames {
      display: inline-flex;
      gap: 8px;
      align-items: flex-end;
      min-height: 70px;
    }

    .frame-thumb {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      transition: transform 0.15s ease;
    }

    .frame-thumb:hover {
      transform: translateY(-4px);
    }

    .frame-thumb canvas {
      width: 50px;
      height: 40px;
      border-radius: 6px;
      background-color: var(--bg-control);
    }

    .frame-thumb.key-frame canvas {
      border: 2px solid var(--accent);
    }

    .frame-thumb .frame-label {
      font-size: 10px;
      margin-top: 4px;
      opacity: 0.6;
    }

    .frame-thumb.key-frame .frame-label {
      color: var(--accent);
      opacity: 1;
      font-weight: 500;
    }

    .frame-thumb.dragging {
      opacity: 0.5;
    }

    .drag-indicator {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      opacity: 0.6;
    }

    .export-section {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
    }

    .progress-container {
      width: 300px;
      height: 10px;
      background-color: var(--bg-control);
      border-radius: 5px;
      overflow: hidden;
      display: none;
    }

    .progress-container.active {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ff8a9e);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 12px;
      opacity: 0.7;
      min-width: 50px;
      display: none;
    }

    .progress-text.active {
      display: inline;
    }

    .status-text {
      font-size: 12px;
      opacity: 0.6;
    }

    .pose-counter {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .pose-badge {
      padding: 4px 10px;
      background-color: var(--bg-control);
      border-radius: 20px;
      font-size: 12px;
    }

    .pose-badge.current {
      background-color: var(--accent);
      color: white;
    }

    @media (max-width: 1300px) {
      .main-container {
        flex-direction: column;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="app-header">
    <h1>2D 骨骼动画生成器</h1>
    <p>绘制关键姿势 → 自动插值生成流畅动画 → 一键导出 GIF</p>
  </div>

  <div class="main-container">
    <div class="canvas-panel">
      <div class="panel-label">
        <span>姿势编辑器</span>
        <div class="pose-counter" id="poseCounter"></div>
      </div>
      <div class="canvas-wrapper">
        <canvas id="poseCanvas" width="600" height="800"></canvas>
      </div>
      <div class="toolbar">
        <div class="color-picker">
          <span class="color-picker-label">颜色:</span>
          <div class="color-swatch active" style="background-color:#000000" data-color="#000000"></div>
          <div class="color-swatch" style="background-color:#e94560" data-color="#e94560"></div>
          <div class="color-swatch" style="background-color:#00d4ff" data-color="#00d4ff"></div>
          <div class="color-swatch" style="background-color:#7bff7b" data-color="#7bff7b"></div>
          <div class="color-swatch" style="background-color:#ffcc00" data-color="#ffcc00"></div>
        </div>
        <button class="btn" id="undoBtn">撤销</button>
        <button class="btn" id="resetBtn">清空</button>
        <button class="btn btn-primary" id="addPoseBtn">添加姿势</button>
      </div>
      <div class="status-text" id="editorStatus">点击画布添加关节点，至少6个关节 (头、肩、肘、腕、髋、膝)</div>
    </div>

    <div class="canvas-panel">
      <div class="panel-label">
        <span>动画预览</span>
        <span>60 FPS</span>
      </div>
      <div class="canvas-wrapper">
        <canvas id="animCanvas" width="600" height="800"></canvas>
      </div>
      <div class="toolbar">
        <button class="btn" id="playPauseBtn">暂停</button>
        <button class="btn btn-primary" id="generateBtn">生成动画</button>
      </div>
      <div class="status-text" id="animStatus">请先添加2-4个关键姿势</div>
    </div>
  </div>

  <div class="timeline-section">
    <div class="timeline-label">
      <span>时间轴</span>
      <span class="timeline-hint">拖拽关键帧排序 · 双击编辑姿势 · 滚轮滚动</span>
    </div>
    <div class="timeline-container" id="timelineContainer">
      <div class="timeline-frames" id="timelineFrames"></div>
    </div>
  </div>

  <div class="export-section">
    <button class="btn btn-primary" id="exportBtn">导出 GIF</button>
    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <span class="progress-text" id="progressText">0%</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
