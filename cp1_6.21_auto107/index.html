<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVG 抽象艺术图案生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1A1A2E;
      color: #B0B0B0;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .canvas-container {
      flex: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #1A1A2E;
    }

    #svg-canvas {
      background: #1A1A2E;
      border-radius: 8px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .fps-counter {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 4px;
      font-size: 12px;
      color: #FFFFFF;
      font-family: 'Consolas', 'Monaco', monospace;
      z-index: 10;
    }

    .fps-warning {
      color: #FFC107;
      font-size: 16px;
      display: none;
    }

    .fps-warning.show {
      display: inline;
    }

    .button-container {
      display: flex;
      gap: 20px;
      margin-top: 20px;
      justify-content: center;
    }

    .btn {
      height: 40px;
      width: 120px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      color: #FFFFFF;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-save {
      background: #E94560;
    }

    .btn-save:hover {
      background: #C62828;
    }

    .btn-random {
      background: #0F3460;
    }

    .btn-random:hover {
      background: #1A1A2E;
    }

    .control-panel {
      flex: 1;
      min-width: 240px;
      background: #16213E;
      border-left: 1px solid #0F3460;
      padding: 24px;
      overflow-y: auto;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: #E0E0E0;
      margin-bottom: 8px;
    }

    .slider-wrapper {
      width: 100%;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #0F3460;
      outline: none;
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #E94560;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #E94560;
      cursor: pointer;
      border: none;
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.1);
    }

    .slider-value {
      text-align: right;
      font-size: 12px;
      color: #B0B0B0;
      margin-top: 4px;
    }

    .knob-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
    }

    .knob-container {
      position: relative;
      width: 60px;
      height: 60px;
      cursor: pointer;
    }

    .knob-svg {
      width: 100%;
      height: 100%;
      transition: transform 0.2s ease;
    }

    .knob-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: #FFFFFF;
      font-weight: 500;
      pointer-events: none;
    }

    select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #0F3460;
      border-radius: 6px;
      background: #0F3460;
      color: #E0E0E0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      outline: none;
    }

    select:hover {
      border-color: #E94560;
    }

    select:focus {
      border-color: #E94560;
    }

    @media (max-width: 768px) {
      #app {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .canvas-container {
        flex: none;
        width: 100%;
        padding: 20px;
        min-height: 60vh;
      }

      #svg-canvas {
        width: 100%;
        max-width: 600px;
        height: auto;
      }

      .control-panel {
        flex: none;
        width: 100%;
        border-left: none;
        border-top: 1px solid #0F3460;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-container">
      <div class="fps-counter">
        <span id="fps-text">FPS: 60</span>
        <span class="fps-warning" id="fps-warning">⚠️</span>
      </div>
      <svg id="svg-canvas" width="800" height="600" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="button-container">
        <button class="btn btn-save" id="btn-save">保存 SVG</button>
        <button class="btn btn-random" id="btn-random">随机</button>
      </div>
    </div>
    <div class="control-panel" id="control-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
