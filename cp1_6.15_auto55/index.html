<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟乐器波形调制可视化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1a2e;
      --primary-glow: #00d4ff;
      --accent-start: #e94560;
      --accent-end: #0f3460;
      --panel-bg: rgba(26, 26, 46, 0.75);
      --text-primary: #ffffff;
      --text-secondary: rgba(255, 255, 255, 0.7);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-color);
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title {
      position: absolute;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(135deg, var(--primary-glow), var(--accent-start));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      z-index: 10;
      pointer-events: none;
    }

    .subtitle {
      position: absolute;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      z-index: 10;
      pointer-events: none;
    }

    #control-panel {
      position: absolute;
      top: 50%;
      right: 32px;
      transform: translateY(-50%);
      width: 320px;
      background: var(--panel-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      padding: 28px 24px;
      z-index: 100;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      max-height: calc(100vh - 120px);
      overflow-y: auto;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #control-panel::-webkit-scrollbar {
      width: 4px;
    }

    #control-panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #control-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
    }

    .panel-section {
      margin-bottom: 28px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 2px;
      color: var(--primary-glow);
      margin-bottom: 16px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: linear-gradient(180deg, var(--accent-start), var(--accent-end));
      border-radius: 2px;
    }

    .waveform-buttons {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .waveform-btn {
      padding: 14px 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .waveform-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary-glow);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 212, 255, 0.2);
    }

    .waveform-btn:active {
      transform: scale(0.95);
    }

    .waveform-btn.active {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-color: transparent;
      box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
    }

    .waveform-btn.active::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--primary-glow), transparent);
      opacity: 0.3;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.4; }
    }

    .slider-container {
      margin-bottom: 20px;
    }

    .slider-container:last-child {
      margin-bottom: 0;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--text-secondary);
    }

    .slider-value {
      color: var(--primary-glow);
      font-weight: 600;
      font-size: 13px;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      cursor: pointer;
      position: relative;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      cursor: pointer;
      box-shadow: 0 0 15px var(--accent-start), 0 0 30px rgba(233, 69, 96, 0.3);
      transition: all 0.2s ease;
      position: relative;
      z-index: 2;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 0 0 20px var(--accent-start), 0 0 40px rgba(233, 69, 96, 0.5);
    }

    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      cursor: pointer;
      border: none;
      box-shadow: 0 0 15px var(--accent-start);
    }

    .slider::-moz-range-track {
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
    }

    .adsr-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .adsr-item {
      position: relative;
    }

    .adsr-item::before {
      content: attr(data-label);
      position: absolute;
      top: -8px;
      left: 12px;
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent-start);
      background: var(--bg-color);
      padding: 0 6px;
      z-index: 1;
    }

    .adsr-item .slider {
      margin-top: 12px;
    }

    .toggle-btn {
      width: 100%;
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border-radius: 12px;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: var(--primary-glow);
    }

    .toggle-btn:active {
      transform: scale(0.97);
    }

    .toggle-btn.active {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border-color: transparent;
      box-shadow: 0 0 25px rgba(233, 69, 96, 0.4);
    }

    .toggle-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    .toggle-btn.active .toggle-indicator {
      background: var(--primary-glow);
      box-shadow: 0 0 10px var(--primary-glow);
    }

    #play-btn {
      position: absolute;
      bottom: 40px;
      left: 40px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(233, 69, 96, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
    }

    #play-btn::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-glow), var(--accent-start));
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: -1;
      filter: blur(8px);
    }

    #play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 15px 50px rgba(233, 69, 96, 0.6);
    }

    #play-btn:hover::before {
      opacity: 0.5;
    }

    #play-btn:active {
      transform: scale(0.95);
    }

    #play-btn.playing::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--primary-glow);
      animation: ring-pulse 1.5s ease-out infinite;
    }

    @keyframes ring-pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      100% {
        transform: scale(1.5);
        opacity: 0;
      }
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 14px 0 14px 24px;
      border-color: transparent transparent transparent #ffffff;
      margin-left: 6px;
      transition: all 0.3s ease;
    }

    #play-btn.playing .play-icon {
      width: 24px;
      height: 24px;
      border: none;
      background: linear-gradient(90deg, #ffffff 0%, #ffffff 38%, transparent 38%, transparent 62%, #ffffff 62%, #ffffff 100%);
      margin-left: 0;
    }

    .drawer-toggle {
      display: none;
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
      border: none;
      cursor: pointer;
      z-index: 150;
      transition: all 0.3s ease;
    }

    .drawer-toggle::before {
      content: '';
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%);
      width: 40px;
      height: 40px;
      background: rgba(26, 26, 46, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .drawer-toggle::after {
      content: '';
      position: absolute;
      top: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 8px 8px 8px;
      border-color: transparent transparent var(--primary-glow) transparent;
    }

    #control-panel.drawer-open ~ .drawer-toggle::after {
      border-width: 8px 8px 0 8px;
      border-color: var(--primary-glow) transparent transparent transparent;
      top: -2px;
    }

    .fps-counter {
      position: absolute;
      top: 16px;
      right: 16px;
      font-size: 11px;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      background: rgba(0, 0, 0, 0.3);
      padding: 6px 12px;
      border-radius: 8px;
      z-index: 50;
      pointer-events: none;
    }

    .fps-counter .value {
      color: var(--primary-glow);
      font-weight: 600;
    }

    @media (max-width: 1200px) {
      .title {
        font-size: 18px;
        top: 20px;
      }

      .subtitle {
        font-size: 10px;
        top: 52px;
      }

      #control-panel {
        position: fixed;
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        transform: translateY(100%);
        width: 100%;
        max-height: 70vh;
        border-radius: 24px 24px 0 0;
        padding: 24px 20px 40px;
      }

      #control-panel.drawer-open {
        transform: translateY(0);
      }

      .drawer-toggle {
        display: block;
      }

      #play-btn {
        width: 64px;
        height: 64px;
        bottom: 24px;
        left: 24px;
      }

      .play-icon {
        border-width: 10px 0 10px 18px;
      }

      #play-btn.playing .play-icon {
        width: 18px;
        height: 18px;
      }
    }

    @media (max-width: 600px) {
      .title {
        font-size: 14px;
        letter-spacing: 2px;
      }

      .subtitle {
        display: none;
      }

      .waveform-buttons {
        grid-template-columns: repeat(2, 1fr);
      }

      .waveform-btn {
        padding: 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <h1 class="title">SYNTH WAVE LAB</h1>
    <p class="subtitle">虚拟乐器波形调制可视化</p>
    
    <div class="fps-counter">
      FPS: <span class="value" id="fps-value">60</span>
    </div>

    <div id="control-panel">
      <div class="panel-section">
        <h2 class="section-title">波形类型</h2>
        <div class="waveform-buttons" id="waveform-buttons">
          <button class="waveform-btn active" data-wave="sine">正弦波</button>
          <button class="waveform-btn" data-wave="square">方波</button>
          <button class="waveform-btn" data-wave="sawtooth">锯齿波</button>
          <button class="waveform-btn" data-wave="triangle">三角波</button>
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">频率控制</h2>
        <div class="slider-container">
          <div class="slider-label">
            <span>频率</span>
            <span class="slider-value" id="freq-value">440 Hz</span>
          </div>
          <input type="range" class="slider" id="frequency-slider" min="20" max="2000" value="440" step="1">
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">ADSR 包络</h2>
        <div class="adsr-grid">
          <div class="adsr-item" data-label="A">
            <div class="slider-label">
              <span>起音</span>
              <span class="slider-value" id="attack-value">0.1s</span>
            </div>
            <input type="range" class="slider" id="attack-slider" min="0" max="2" value="0.1" step="0.01">
          </div>
          <div class="adsr-item" data-label="D">
            <div class="slider-label">
              <span>衰减</span>
              <span class="slider-value" id="decay-value">0.3s</span>
            </div>
            <input type="range" class="slider" id="decay-slider" min="0" max="2" value="0.3" step="0.01">
          </div>
          <div class="adsr-item" data-label="S">
            <div class="slider-label">
              <span>延音</span>
              <span class="slider-value" id="sustain-value">70%</span>
            </div>
            <input type="range" class="slider" id="sustain-slider" min="0" max="100" value="70" step="1">
          </div>
          <div class="adsr-item" data-label="R">
            <div class="slider-label">
              <span>释音</span>
              <span class="slider-value" id="release-value">0.5s</span>
            </div>
            <input type="range" class="slider" id="release-slider" min="0" max="2" value="0.5" step="0.01">
          </div>
        </div>
      </div>

      <div class="panel-section">
        <h2 class="section-title">效果开关</h2>
        <button class="toggle-btn" id="spectrum-toggle">
          <span class="toggle-indicator"></span>
          <span>频谱分析</span>
        </button>
      </div>
    </div>

    <button class="drawer-toggle" id="drawer-toggle"></button>

    <button id="play-btn">
      <span class="play-icon"></span>
    </button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
