<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太空采矿车</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0B0C10;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }
    #game-wrapper {
      position: relative;
      width: 400px;
      height: 400px;
    }
    #game-canvas {
      display: block;
      border: 1px solid #1F2833;
    }
    #start-screen,
    #game-over-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.92);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }
    #start-screen h1,
    #game-over-screen h1 {
      color: #66FCF1;
      font-size: 32px;
      margin-bottom: 16px;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
    }
    #start-screen p {
      color: #C5C6C7;
      font-size: 14px;
      text-align: center;
      line-height: 1.8;
      margin-bottom: 24px;
    }
    .game-btn {
      background: transparent;
      color: #66FCF1;
      border: 2px solid #66FCF1;
      padding: 12px 32px;
      font-size: 16px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 4px;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    .game-btn:hover {
      transform: scale(1.1);
      background: rgba(102, 252, 241, 0.15);
    }
    #upgrade-panel {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: -200px;
      width: 360px;
      background: rgba(31, 40, 51, 0.95);
      border: 1px solid #45A29E;
      border-radius: 8px;
      padding: 16px;
      z-index: 5;
      opacity: 0;
      visibility: hidden;
      transition: bottom 0.4s ease-out, opacity 0.4s ease-out, visibility 0.4s;
    }
    #upgrade-panel.active {
      bottom: 20px;
      opacity: 1;
      visibility: visible;
    }
    #upgrade-panel h3 {
      color: #66FCF1;
      text-align: center;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .upgrade-buttons {
      display: flex;
      gap: 12px;
    }
    .upgrade-btn {
      flex: 1;
      background: transparent;
      border: 1px solid #45A29E;
      color: #C5C6C7;
      padding: 10px;
      font-family: 'Courier New', monospace;
      cursor: pointer;
      border-radius: 4px;
      font-size: 12px;
      transition: all 0.2s ease;
    }
    .upgrade-btn:hover:not(:disabled) {
      background: rgba(69, 162, 158, 0.3);
      border-color: #66FCF1;
    }
    .upgrade-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .upgrade-btn .cost {
      display: block;
      color: #66FCF1;
      font-size: 11px;
      margin-top: 4px;
    }
    .hidden {
      display: none !important;
    }
    #final-score {
      color: #C5C6C7;
      font-size: 18px;
      margin-bottom: 20px;
    }
    #final-score span {
      color: #66FCF1;
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="game-canvas" width="400" height="400"></canvas>

    <div id="start-screen">
      <h1>太空采矿车</h1>
      <p>
        WASD 或 方向键控制移动<br>
        空格键发射采矿激光<br>
        采集绿色小行星获得矿石<br>
        躲避灰色和红色小行星
      </p>
      <button id="start-btn" class="game-btn">开始游戏</button>
    </div>

    <div id="game-over-screen" class="hidden">
      <h1>游戏结束</h1>
      <div id="final-score">最终得分: <span id="final-score-value">0</span></div>
      <button id="restart-btn" class="game-btn">重新开始</button>
    </div>

    <div id="upgrade-panel">
      <h3>升级面板</h3>
      <div class="upgrade-buttons">
        <button class="upgrade-btn" id="upgrade-shield">
          护盾 (免撞一次)
          <span class="cost">消耗 50 分</span>
        </button>
        <button class="upgrade-btn" id="upgrade-fuel">
          燃料效率
          <span class="cost">消耗 30 分</span>
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/game.ts"></script>
</body>
</html>
