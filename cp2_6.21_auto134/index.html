<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>混沌双摆模拟</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <div class="app-container">
    <h1 class="app-title">混沌双摆模拟</h1>
    <div class="main-content">
      <canvas id="pendulumCanvas" width="800" height="600"></canvas>
      <aside class="control-panel">
        <div class="control-group">
          <h3 class="group-title">显示选项</h3>
          <button id="toggleArmsBtn" class="control-btn active">隐藏摆臂</button>
          <button id="toggleTrailBtn" class="control-btn active">隐藏轨迹</button>
          <button id="clearTrailBtn" class="control-btn">清空轨迹</button>
        </div>
        <div class="control-group">
          <h3 class="group-title">模拟控制</h3>
          <button id="resetBtn" class="control-btn primary">重置</button>
          <div class="slider-container">
            <label for="speedSlider">速度: <span id="speedValue">1.0x</span></label>
            <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0">
          </div>
        </div>
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
