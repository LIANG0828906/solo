<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <title>GemJam - 宝石矿道消除</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #1A0E0A;
        font-family: 'Cinzel', 'Playfair Display', Georgia, serif;
        min-width: 768px;
      }
      
      #root {
        width: 100%;
        height: 100%;
      }
      
      .game-container {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #2C1810 0%, #1A0E0A 70%, #0D0705 100%);
        position: relative;
      }
      
      .game-canvas {
        display: block;
        cursor: grab;
        touch-action: none;
      }
      
      .game-canvas:active {
        cursor: grabbing;
      }
      
      .title {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 48px;
        font-weight: 900;
        color: #B8860B;
        text-shadow: 
          0 0 20px rgba(184, 134, 11, 0.5),
          0 2px 4px rgba(0, 0, 0, 0.8),
          inset 0 2px 4px rgba(255, 248, 220, 0.3);
        letter-spacing: 8px;
        z-index: 10;
        user-select: none;
      }
      
      .mobile-hint {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 0;
        right: 0;
        height: 40px;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        background: rgba(44, 24, 16, 0.9);
        border-top: 2px solid #4A2C1A;
        padding: 8px 16px;
        z-index: 100;
      }
      
      .mobile-hint::-webkit-scrollbar {
        display: none;
      }
      
      .mobile-hint span {
        display: inline-block;
        color: #B8860B;
        font-size: 14px;
        margin-right: 30px;
        animation: scrollHint 15s linear infinite;
      }
      
      @keyframes scrollHint {
        0% { transform: translateX(100vw); }
        100% { transform: translateX(-100%); }
      }
      
      @media (max-width: 768px) {
        html, body {
          min-width: 100%;
        }
        
        .title {
          font-size: 28px;
          letter-spacing: 4px;
          top: 10px;
        }
        
        .mobile-hint {
          display: block;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
