<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>元素收集者</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0F0F1A;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0F0F1A;
    }

    #game-canvas {
      display: block;
      cursor: crosshair;
      box-shadow: 0 0 60px rgba(100, 100, 200, 0.15);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="640" height="960"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
