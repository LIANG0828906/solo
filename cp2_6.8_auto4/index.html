<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Galaxy Explorer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: 'Courier New', Courier, monospace;
      letter-spacing: 2px;
      color: #ffffff;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transform: translateX(0);
      animation: slideIn 400ms ease-out;
      z-index: 100;
    }
    @keyframes slideIn {
      from {
        transform: translateX(320px);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }
    #control-panel h2 {
      font-size: 16px;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff6633, #4477ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .control-group {
      margin-bottom: 18px;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.8);
    }
    .control-value {
      color: #ff6633;
      font-weight: bold;
      transition: transform 0.1s ease;
    }
    .control-value.bump {
      animation: valueBump 0.2s ease;
    }
    @keyframes valueBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #ff6633, #4477ff);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 10px rgba(255, 102, 51, 0.6);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #ffffff;
      border: none;
      box-shadow: 0 0 10px rgba(255, 102, 51, 0.6);
      cursor: pointer;
    }
    #fps-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      z-index: 100;
    }
    #fps-counter.low {
      color: #ff3333;
    }
    #drawer-handle {
      display: none;
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 3px;
      box-shadow: 0 0 8px rgba(255, 102, 51, 0.5);
      z-index: 101;
      cursor: pointer;
    }
    @media (max-width: 768px) {
      #control-panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: 12px 12px 0 0;
        transform: translateY(calc(100% - 40px));
        transition: transform 0.3s ease;
        animation: none;
      }
      #control-panel.open {
        transform: translateY(0);
      }
      #drawer-handle {
        display: block;
        bottom: 36px;
      }
    }
  </style>
</head>
<body>
  <div id="control-panel">
    <h2>GALAXY CONTROLS</h2>
    <div class="control-group">
      <div class="control-label">
        <span>PARTICLES</span>
        <span class="control-value" id="particles-value">3000</span>
      </div>
      <input type="range" id="particles-range" min="2000" max="6000" step="100" value="3000" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>ROTATION SPEED</span>
        <span class="control-value" id="speed-value">1.0</span>
      </div>
      <input type="range" id="speed-range" min="0.1" max="2.0" step="0.1" value="1.0" />
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>COLOR VIVIDNESS</span>
        <span class="control-value" id="vivid-value">1.0</span>
      </div>
      <input type="range" id="vivid-range" min="0.5" max="1.5" step="0.05" value="1.0" />
    </div>
  </div>
  <div id="drawer-handle"></div>
  <div id="fps-counter">FPS: 60</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
