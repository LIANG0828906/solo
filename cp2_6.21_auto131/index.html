<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市夜间车流模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-container {
      width: 800px;
      height: 600px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      right: 0;
      top: 0;
      width: 240px;
      height: 100%;
      background: rgba(30, 30, 30, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 20px;
      display: flex;
      flex-direction: column;
      z-index: 10;
      border-left: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #e0e0e0;
      text-align: center;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 4px;
    }

    .controls-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-evenly;
      align-items: center;
      padding: 8px 0;
      gap: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      width: 100%;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      padding: 0 4px;
      font-size: 13px;
      color: #b0b0b0;
    }

    .control-value {
      font-weight: 600;
      color: #ffa726;
      font-size: 14px;
    }

    .slider-track-container {
      width: 100%;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    input[type="range"].vertical-slider {
      -webkit-appearance: none;
      appearance: none;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 6px;
      height: 110px;
      background: #333;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      padding: 0;
      margin: 0;
    }

    input[type="range"].vertical-slider::-webkit-slider-runnable-track {
      background: #333;
      border-radius: 3px;
      width: 6px;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: #ffa726;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(255, 167, 38, 0.5);
      transition: transform 0.15s ease;
      margin-left: -6px;
    }

    input[type="range"].vertical-slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"].vertical-slider::-moz-range-track {
      background: #333;
      border-radius: 3px;
      width: 6px;
    }

    input[type="range"].vertical-slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #ffa726;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(255, 167, 38, 0.5);
    }

    .color-container {
      width: 100%;
      height: 130px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    input[type="color"] {
      width: 52px;
      height: 110px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #333;
      padding: 4px;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 2px;
    }

    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 6px;
    }

    input[type="color"]::-moz-color-swatch {
      border: none;
      border-radius: 6px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: auto;
      padding-top: 16px;
    }

    .btn {
      padding: 14px 18px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.18s ease;
      background: #42a5f5;
      color: #ffffff;
      letter-spacing: 0.5px;
      user-select: none;
      outline: none;
    }

    .btn:hover {
      background: #64b5f6;
      box-shadow: 0 4px 14px rgba(66, 165, 245, 0.45);
    }

    .btn:active {
      transform: scale(0.95);
      box-shadow: 0 2px 6px rgba(66, 165, 245, 0.35);
    }

    .btn-secondary {
      background: #5c5c5c;
    }

    .btn-secondary:hover {
      background: #707070;
      box-shadow: 0 4px 14px rgba(102, 102, 102, 0.35);
    }

    .btn-secondary:active {
      box-shadow: 0 2px 6px rgba(102, 102, 102, 0.3);
    }

    .fps-display {
      text-align: center;
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 12px;
      color: #66bb6a;
      font-family: 'Consolas', 'Monaco', monospace;
    }

    .fps-display.low {
      color: #ef5350;
    }

    .fps-value {
      font-size: 18px;
      font-weight: bold;
      margin-left: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="control-panel">
      <div class="panel-title">车流模拟控制</div>
      
      <div class="controls-wrapper">
        <div class="control-group">
          <div class="control-label">
            <span>交通密度</span>
            <span class="control-value" id="density-value">40</span>
          </div>
          <div class="slider-track-container">
            <input type="range" class="vertical-slider" id="density-slider" min="10" max="100" step="5" value="40" />
          </div>
        </div>
        
        <div class="control-group">
          <div class="control-label">
            <span>车速</span>
            <span class="control-value" id="speed-value">1.5</span>
          </div>
          <div class="slider-track-container">
            <input type="range" class="vertical-slider" id="speed-slider" min="0.5" max="3.0" step="0.1" value="1.5" />
          </div>
        </div>
        
        <div class="control-group">
          <div class="control-label">
            <span>灯光颜色</span>
          </div>
          <div class="color-container">
            <input type="color" id="color-picker" value="#ffffff" />
          </div>
        </div>
      </div>
      
      <div class="button-group">
        <button class="btn" id="toggle-btn">暂停</button>
        <button class="btn btn-secondary" id="reset-btn">重置视角</button>
      </div>
      
      <div class="fps-display" id="fps-display">
        FPS: <span class="fps-value" id="fps-value">60</span>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
