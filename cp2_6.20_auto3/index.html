<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>沉浸式星空探索</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a2e;
      font-family: 'Exo 2', sans-serif;
      color: #e8e8ff;
      cursor: grab;
    }

    body:active {
      cursor: grabbing;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    .control-panel {
      position: fixed;
      left: 24px;
      bottom: 24px;
      z-index: 100;
      padding: 16px 20px;
      background: rgba(26, 10, 62, 0.45);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(232, 232, 255, 0.15);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-width: 180px;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .button-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .panel-btn {
      position: relative;
      padding: 10px 16px;
      background: rgba(45, 27, 105, 0.6);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      color: #e8e8ff;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      transform-origin: center;
      overflow: hidden;
    }

    .panel-btn:hover {
      background: rgba(255, 215, 0, 0.15);
      border-color: rgba(255, 215, 0, 0.6);
      box-shadow: 0 0 16px rgba(255, 215, 0, 0.2);
      transform: translateY(-1px);
    }

    .panel-btn:active {
      transform: scale(0.94);
      transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .panel-btn.active {
      background: rgba(255, 215, 0, 0.25);
      border-color: #ffd700;
      color: #ffd700;
    }

    .panel-btn .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 215, 0, 0.4);
      transform: scale(0);
      animation: ripple 0.6s ease-out;
      pointer-events: none;
    }

    @keyframes ripple {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .fps-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 12px;
      background: rgba(10, 10, 46, 0.6);
      border-radius: 6px;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .fps-label {
      color: rgba(232, 232, 255, 0.6);
    }

    .fps-value {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      color: #00ff88;
      min-width: 36px;
      text-align: right;
    }

    .fps-value.low {
      color: #ff6b6b;
    }

    .fps-value.medium {
      color: #ffd700;
    }

    .star-info-card {
      position: fixed;
      z-index: 150;
      padding: 20px 24px;
      background: rgba(10, 10, 46, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 12px;
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.5),
                  0 0 32px rgba(255, 215, 0, 0.1);
      min-width: 280px;
      max-width: 360px;
      opacity: 0;
      transform: scale(0.9) translateY(10px);
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .star-info-card.visible {
      opacity: 1;
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    .star-info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
      border-radius: 2px 2px 0 0;
    }

    .info-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .star-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle, #ffd700 0%, #ff6b35 40%, transparent 70%);
      animation: starPulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes starPulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .info-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #ffd700;
      letter-spacing: 0.5px;
    }

    .info-subtitle {
      font-size: 11px;
      color: rgba(232, 232, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    .info-body {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid rgba(232, 232, 255, 0.08);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 12px;
      color: rgba(232, 232, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .info-value {
      font-size: 13px;
      font-weight: 600;
      color: #e8e8ff;
      text-align: right;
    }

    .info-value.constellation {
      color: #a78bfa;
    }

    .info-value.brightness {
      color: #ffd700;
    }

    .info-value.distance {
      color: #60a5fa;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: rgba(232, 232, 255, 0.5);
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-btn:hover {
      background: rgba(255, 107, 107, 0.2);
      color: #ff6b6b;
    }

    @media (max-width: 640px) {
      .control-panel {
        left: 12px;
        bottom: 12px;
        padding: 12px 14px;
        min-width: 150px;
      }

      .panel-title {
        font-size: 11px;
      }

      .panel-btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .star-info-card {
        min-width: 240px;
        max-width: 280px;
        padding: 16px;
      }

      .info-title {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div class="control-panel" id="control-panel">
    <div class="panel-title">星空控制台</div>
    <div class="button-group">
      <button class="panel-btn" id="reset-btn">重置视角</button>
      <button class="panel-btn" id="rotate-btn">自动旋转</button>
    </div>
    <div class="fps-display">
      <span class="fps-label">FPS</span>
      <span class="fps-value" id="fps-value">60</span>
    </div>
  </div>

  <div class="star-info-card" id="star-info-card">
    <button class="close-btn" id="close-info-btn">×</button>
    <div class="info-header">
      <div class="star-icon"></div>
      <div>
        <div class="info-title" id="star-name">--</div>
        <div class="info-subtitle">恒星数据</div>
      </div>
    </div>
    <div class="info-body">
      <div class="info-row">
        <span class="info-label">星座归属</span>
        <span class="info-value constellation" id="star-constellation">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">视亮度</span>
        <span class="info-value brightness" id="star-brightness">--</span>
      </div>
      <div class="info-row">
        <span class="info-label">距离地球</span>
        <span class="info-value distance" id="star-distance">--</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
