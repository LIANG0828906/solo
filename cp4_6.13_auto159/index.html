<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FictionalPortrait - 故事角色形象生成器</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>🎨 FictionalPortrait</h1>
      <p class="subtitle">故事角色形象生成与图鉴管理</p>
    </header>

    <main class="main-container">
      <section class="creation-area">
        <div class="panel">
          <h2>✨ 创建角色</h2>
          
          <form id="characterForm" class="character-form">
            <div class="form-group">
              <label for="characterName">角色名称</label>
              <div class="input-wrapper">
                <input 
                  type="text" 
                  id="characterName" 
                  name="name" 
                  maxlength="20" 
                  placeholder="输入角色名称..."
                  autocomplete="off"
                >
                <span id="nameCount" class="char-count">0/20</span>
              </div>
            </div>

            <div class="form-group">
              <label for="characterDesc">角色描述</label>
              <div class="input-wrapper">
                <textarea 
                  id="characterDesc" 
                  name="description" 
                  maxlength="120" 
                  rows="4"
                  placeholder="描述角色特征，如：白发、红瞳、精灵、森林..."
                ></textarea>
                <span id="descCount" class="char-count">0/120</span>
              </div>
              <p class="hint">支持逗号分隔标签，如：银发,红瞳,机甲,太空</p>
            </div>

            <button type="submit" id="generateBtn" class="generate-btn">
              <span>🎭 生成形象</span>
            </button>
          </form>

          <div class="canvas-section">
            <div class="canvas-wrapper">
              <canvas id="portraitCanvas" width="320" height="320"></canvas>
            </div>
            
            <div class="tweak-buttons">
              <button class="tweak-btn" data-tweak="hair-style" title="换发型" style="--tweak-color: #b39ddb;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                </svg>
              </button>
              <button class="tweak-btn" data-tweak="hair-color" title="换发色" style="--tweak-color: #ffcc80;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8z"/>
                </svg>
              </button>
              <button class="tweak-btn" data-tweak="eye-color" title="换瞳色" style="--tweak-color: #81d4fa;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                </svg>
              </button>
              <button class="tweak-btn" data-tweak="clothing" title="换服装" style="--tweak-color: #ef9a9a;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M6.27 9.93L10.23 3l3.54.01 3.73 6.92L22 9.93v2l-2 2v8H4v-8l-2-2v-2l4.27.09zM8 12v8h8v-8h-3v3h-2v-3H8z"/>
                </svg>
              </button>
              <button class="tweak-btn" data-tweak="background" title="换背景" style="--tweak-color: #a5d6a7;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M14 6l-3.75 5 2.85 3.8-1.6 1.2C9.81 13.75 7 10 7 10l-6 8h22L14 6z"/>
                </svg>
              </button>
              <button class="tweak-btn" data-tweak="random" title="随机全套" style="--tweak-color: #bdbdbd;">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                </svg>
              </button>
            </div>

            <button id="saveBtn" class="save-btn">
              <span>💾 保存到图鉴</span>
            </button>
          </div>
        </div>
      </section>

      <aside class="gallery-area">
        <div class="gallery-panel">
          <h2>📚 角色图鉴</h2>
          
          <div class="search-wrapper">
            <input 
              type="text" 
              id="searchInput" 
              placeholder="搜索角色..."
              class="search-input"
              autocomplete="off"
            >
          </div>

          <div class="character-list" id="characterList">
          </div>

          <div class="gallery-footer">
            <span id="totalCount">共 0 个角色</span>
          </div>
        </div>
      </aside>
    </main>

    <div id="toast" class="toast"></div>

    <div id="confirmDialog" class="confirm-dialog-overlay">
      <div class="confirm-dialog">
        <h3>确认删除</h3>
        <p>确定要删除这个角色吗？此操作无法撤销。</p>
        <div class="confirm-buttons">
          <button id="cancelDelete" class="cancel-btn">取消</button>
          <button id="confirmDelete" class="confirm-btn">删除</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
