<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FictionalPortrait - 故事角色形象生成器</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>🎨 FictionalPortrait</h1>
      <p class="subtitle">故事角色形象生成与图鉴管理</p>
    </header>

    <main class="main-container">
      <!-- 左侧：角色创建区域 -->
      <section class="creation-area">
        <div class="panel">
          <h2>✨ 创建角色</h2>
          
          <form id="characterForm" class="character-form">
            <div class="form-group">
              <label for="characterName">角色名称</label>
              <div class="input-wrapper">
                <input 
                  type="text" 
                  id="characterName" 
                  name="name" 
                  maxlength="20" 
                  placeholder="输入角色名称..."
                  autocomplete="off"
                >
                <span id="nameCount" class="char-count">0/20</span>
              </div>
            </div>

            <div class="form-group">
              <label for="characterDesc">角色描述</label>
              <div class="input-wrapper">
                <textarea 
                  id="characterDesc" 
                  name="description" 
                  maxlength="120" 
                  rows="4"
                  placeholder="描述角色特征，如：白发、红瞳、精灵、森林..."
                ></textarea>
                <span id="descCount" class="char-count">0/120</span>
              </div>
              <p class="hint">支持逗号分隔标签，如：银发,红瞳,机甲,太空</p>
            </div>

            <button type="submit" id="generateBtn" class="generate-btn">
              <span>🎭 生成形象</span>
            </button>
          </form>
