<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>浑天星图 - 中国古代星官探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: #e0e0ff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #label-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
    }

    #search-container {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 100;
    }

    #search-input {
      width: 280px;
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      color: #e0e0ff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      outline: none;
      transition: all 0.3s ease;
    }

    #search-input::placeholder {
      color: rgba(224, 224, 255, 0.5);
    }

    #search-input:focus {
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
    }

    #search-results {
      margin-top: 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }

    #search-results.visible {
      display: block;
    }

    .search-item {
      padding: 10px 18px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .search-item:last-child {
      border-bottom: none;
    }

    .search-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .search-item-name {
      font-size: 14px;
      color: #e0e0ff;
    }

    .search-item-sub {
      font-size: 12px;
      color: rgba(224, 224, 255, 0.5);
      margin-top: 2px;
    }

    #info-panel {
      position: absolute;
      top: 50%;
      left: -400px;
      transform: translateY(-50%);
      width: 360px;
      padding: 28px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index: 100;
      transition: left 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 1;
    }

    #info-panel.visible {
      left: 24px;
    }

    #info-panel.hiding {
      left: -400px;
    }

    #panel-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(224, 224, 255, 0.7);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      line-height: 1;
    }

    #panel-close:hover {
      background: rgba(255, 215, 0, 0.2);
      border-color: rgba(255, 215, 0, 0.4);
      color: #ffd700;
      transform: rotate(90deg);
    }

    #panel-close:active {
      background: rgba(255, 215, 0, 0.3);
      transform: rotate(90deg) scale(0.92);
    }

    #star-name {
      font-size: 36px;
      color: #ffd700;
      font-weight: normal;
      margin-bottom: 8px;
      letter-spacing: 6px;
      text-shadow:
        0 0 20px rgba(255, 215, 0, 0.4),
        0 0 40px rgba(255, 215, 0, 0.2),
        1px 1px 2px rgba(255, 200, 0, 0.6),
        -1px -1px 2px rgba(255, 200, 0, 0.3),
        0 0 8px rgba(255, 215, 0, 0.5);
      -webkit-text-stroke: 0.5px rgba(255, 200, 0, 0.5);
      paint-order: stroke fill;
      font-family: "STKaiti", "KaiTi", "楷体", "华文楷体", "Microsoft YaHei", serif;
    }

    #constellation-name {
      font-size: 14px;
      color: rgba(224, 224, 255, 0.7);
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    #star-description {
      font-size: 15px;
      line-height: 1.8;
      color: #e0e0ff;
      margin-bottom: 20px;
    }

    #star-count {
      font-size: 13px;
      color: rgba(224, 224, 255, 0.6);
      padding: 10px 14px;
      background: rgba(255, 215, 0, 0.08);
      border-radius: 8px;
      border-left: 3px solid #ffd700;
    }

    .star-label {
      color: #e0e0ff;
      font-size: 12px;
      padding: 3px 8px;
      background: rgba(10, 10, 26, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
      transition: all 0.2s ease;
    }

    .star-label.hovered {
      color: #ffd700;
      border-color: rgba(255, 215, 0, 0.5);
      background: rgba(255, 215, 0, 0.1);
      font-size: 14px;
    }

    #hint {
      position: absolute;
      bottom: 24px;
      right: 24px;
      font-size: 12px;
      color: rgba(224, 224, 255, 0.4);
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="label-container"></div>

    <div id="search-container">
      <input type="text" id="search-input" placeholder="搜索星官（中文或拼音）..." />
      <div id="search-results"></div>
    </div>

    <div id="info-panel">
      <button id="panel-close">✕</button>
      <div id="star-name"></div>
      <div id="constellation-name"></div>
      <div id="star-description"></div>
      <div id="star-count"></div>
    </div>

    <div id="hint">拖拽旋转 · 滚轮缩放 · 点击星官查看详情</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
