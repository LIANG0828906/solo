<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>卡牌对战模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --accent-start: #667eea;
      --accent-end: #764ba2;
      --accent-blue: #00d4ff;
      --accent-purple: #9333ea;
      --danger: #e94560;
      --success: #00d68f;
      --warning: #ffd93d;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --text-muted: #666666;
      --card-border: rgba(102, 126, 234, 0.3);
      --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --glow: 0 0 20px rgba(102, 126, 234, 0.5);
    }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100vh;
      min-width: 1024px;
      overflow-x: auto;
      font-family: 'Noto Sans SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
    }

    #game-container {
      width: 100%;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    /* ===== Fade In/Out Transitions ===== */
    .fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .fade-out {
      animation: fadeOut 0.3s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to { opacity: 0; transform: translateY(-10px); }
    }

    /* ===== Particle Canvas ===== */
    .particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* ===== Main Menu ===== */
    .menu-container {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-card {
      background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px;
      width: 450px;
      box-shadow: var(--card-shadow);
      backdrop-filter: blur(10px);
      animation: cardFloat 6s ease-in-out infinite;
    }

    @keyframes cardFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .game-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      font-weight: 700;
      text-align: center;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
      text-shadow: var(--glow);
    }

    .game-subtitle {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-bottom: 32px;
      letter-spacing: 2px;
    }

    .input-group {
      margin-bottom: 24px;
    }

    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .menu-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-tertiary);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 16px;
      transition: all 0.2s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .menu-input:focus {
      outline: none;
      border-color: var(--accent-start);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    }

    .menu-input::placeholder {
      color: var(--text-muted);
    }

    .menu-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .menu-btn {
      position: relative;
      padding: 14px 24px;
      background: var(--bg-tertiary);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      font-family: 'Noto Sans SC', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      overflow: hidden;
    }

    .menu-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .menu-btn:hover::before {
      left: 100%;
    }

    .menu-btn:hover {
      transform: translateY(-2px);
      border-color: var(--accent-start);
      box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
    }

    .menu-btn:active {
      transform: translateY(0);
    }

    .menu-btn.primary {
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      border: none;
    }

    .menu-btn.primary:hover {
      box-shadow: 0 6px 25px rgba(102, 126, 234, 0.5);
    }

    .menu-btn.secondary {
      background: transparent;
      border: 1px solid var(--card-border);
    }

    .menu-btn.danger {
      background: var(--danger);
      border: none;
    }

    .menu-btn.danger:hover {
      box-shadow: 0 4px 20px rgba(233, 69, 96, 0.4);
    }

    .menu-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-icon {
      font-size: 18px;
    }

    .menu-footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ===== Battle Room ===== */
    .battle-container {
      position: relative;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 10px;
    }

    .battle-top, .battle-bottom {
      flex: 0 0 auto;
    }

    .battle-middle {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== Player Info ===== */
    .player-info {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      border-radius: 15px;
      max-width: 400px;
      transition: all 0.3s ease;
    }

    .player-info.drag-target {
      border-color: var(--accent-blue);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.3);
      transform: scale(1.02);
    }

    .player-opponent {
      margin: 0 auto;
    }

    .player-me {
      margin: 0 auto;
    }

    .player-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

    .avatar-text {
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
    }

    .player-details {
      flex: 1;
      min-width: 0;
    }

    .player-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-primary);
    }

    /* ===== HP Bar ===== */
    .hp-bar-container {
      position: relative;
      height: 20px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #00d68f, #ffd93d, #e94560);
      border-radius: 10px;
      transition: width 0.3s ease-out;
      position: relative;
    }

    .hp-bar::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3), transparent);
      border-radius: 10px 10px 0 0;
    }

    .hp-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      font-weight: 600;
      color: white;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      z-index: 1;
    }

    /* ===== Energy Bar ===== */
    .energy-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .energy-dots {
      display: flex;
      gap: 6px;
    }

    .energy-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--bg-tertiary);
      border: 2px solid var(--card-border);
      transition: all 0.3s ease;
    }

    .energy-dot.filled {
      background: radial-gradient(circle at 30% 30%, #66b3ff, #0066cc);
      border-color: var(--accent-blue);
      box-shadow: 0 0 8px rgba(0, 102, 204, 0.6);
      animation: energyPulse 2s ease-in-out infinite;
    }

    @keyframes energyPulse {
      0%, 100% { box-shadow: 0 0 8px rgba(0, 102, 204, 0.6); }
      50% { box-shadow: 0 0 15px rgba(0, 102, 204, 0.9); }
    }

    .energy-text {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .player-stats {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ===== Battlefield ===== */
    .battlefield {
      width: 100%;
      max-width: 800px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .battlefield-grid {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 20px;
      width: 100%;
      height: 80%;
    }

    .battlefield-grid > * {
      display: flex;
      justify-content: center;
      gap: 15px;
    }

    .battlefield-slot {
      width: 120px;
      height: 160px;
      border: 2px dashed var(--card-border);
      border-radius: 12px;
      background: rgba(22, 33, 62, 0.5);
      transition: all 0.3s ease;
    }

    .battlefield-slot:hover {
      border-color: var(--accent-start);
      background: rgba(102, 126, 234, 0.1);
    }

    .slot-content {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== Hand Cards ===== */
    .hand-container {
      display: flex;
      justify-content: center;
      align-items: flex-end;
      height: 220px;
      position: relative;
      perspective: 1000px;
      padding-top: 40px;
    }

    .empty-hand {
      color: var(--text-muted);
      font-size: 16px;
    }

    .hand-card {
      position: absolute;
      width: 140px;
      height: 200px;
      margin: 0 -20px;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-origin: bottom center;
      will-change: transform;
    }

    .hand-card:hover {
      z-index: 100;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, var(--bg-secondary), var(--bg-tertiary));
      border: 2px solid var(--card-border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      box-shadow: var(--card-shadow);
      position: relative;
      overflow: hidden;
    }

    .card-inner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-start), var(--accent-end));
    }

    .card-cost {
      position: absolute;
      top: 8px;
      left: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      box-shadow: 0 2px 8px rgba(102, 126, 234, 0.5);
    }

    .card-name {
      margin-top: 32px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
    }

    .card-type {
      font-size: 10px;
      padding: 3px 8px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-type.attack {
      background: rgba(233, 69, 96, 0.2);
      color: var(--danger);
    }

    .card-type.heal {
      background: rgba(0, 214, 143, 0.2);
      color: var(--success);
    }

    .card-type.draw {
      background: rgba(0, 212, 255, 0.2);
      color: var(--accent-blue);
    }

    .card-type.debuff {
      background: rgba(147, 51, 234, 0.2);
      color: var(--accent-purple);
    }

    .card-description {
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.4;
      flex: 1;
    }

    .card-effect {
      display: flex;
      gap: 8px;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      padding-top: 8px;
      border-top: 1px solid var(--card-border);
    }

    /* ===== Flying Card Animation ===== */
    .flying-card {
      position: fixed;
      width: 100px;
      height: 140px;
      z-index: 1000;
      pointer-events: none;
      z-index: 9999;
    }

    .flying-card .card-inner {
      animation: cardSpin 0.4s ease-in-out;
    }

    @keyframes cardSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* ===== Battle Controls ===== */
    .battle-controls {
      position: absolute;
      right: 20px;
      bottom: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 10;
    }

    .control-btn {
      padding: 12px 24px;
      background: var(--bg-tertiary);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Noto Sans SC', sans-serif;
    }

    .control-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: var(--accent-start);
    }

    .control-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .control-btn.secondary {
      background: transparent;
    }

    /* ===== Turn Indicator ===== */
    .turn-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 8px 24px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      pointer-events: none;
      animation: turnPulse 2s ease-in-out infinite;
    }

    .turn-indicator.my-turn {
      background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
      border: 1px solid var(--accent-start);
      color: var(--accent-blue);
    }

    .turn-indicator.opponent-turn {
      background: rgba(233, 69, 96, 0.2);
      border: 1px solid var(--danger);
      color: var(--danger);
    }

    @keyframes turnPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    /* ===== Result Overlay ===== */
    .result-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .result-card {
      background: linear-gradient(145deg, var(--bg-secondary), var(--bg-primary));
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 48px;
      text-align: center;
      animation: resultPop 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes resultPop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .result-card h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: 48px;
      margin-bottom: 16px;
    }

    .result-card h2.winner {
      color: var(--success);
      text-shadow: 0 0 20px rgba(0, 214, 143, 0.5);
    }

    .result-card h2.loser {
      color: var(--danger);
      text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
    }

    .result-card p {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 18px;
    }

    .result-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
    }

    /* ===== History Page ===== */
    .history-container {
      width: 100%;
      height: 100%;
      padding: 40px;
      overflow-y: auto;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }

    .history-header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 36px;
      background: linear-gradient(135deg, var(--accent-start), var(--accent-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .history-actions {
      display: flex;
      gap: 12px;
    }

    .history-content {
      max-width: 900px;
      margin: 0 auto;
    }

    .empty-history {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-history p:first-child {
      font-size: 24px;
      margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .empty-sub {
      font-size: 14px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .history-item {
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .history-item:hover {
      border-color: var(--accent-start);
    }

    .history-item.expanded {
      border-color: var(--accent-start);
    }

    .history-summary {
      display: flex;
      align-items: center;
      padding: 16px 24px;
      cursor: pointer;
      gap: 20px;
      transition: background 0.2s ease;
    }

    .history-summary:hover {
      background: rgba(102, 126, 234, 0.05);
    }

    .history-result {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      flex-shrink: 0;
    }

    .history-result.win {
      background: rgba(0, 214, 143, 0.2);
      color: var(--success);
    }

    .history-result.lose {
      background: rgba(233, 69, 96, 0.2);
      color: var(--danger);
    }

    .history-players {
      flex: 1;
      font-size: 16px;
      font-weight: 500;
    }

    .history-turns {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .history-hp {
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
    }

    .history-date {
      color: var(--text-muted);
      font-size: 13px;
    }

    .expand-icon {
      color: var(--text-muted);
      transition: transform 0.3s ease;
    }

    .history-item.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .history-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      padding: 0 24px;
    }

    .history-item.expanded .history-details {
      max-height: 500px;
      padding: 0 24px 24px;
    }

    .details-section {
      padding-top: 16px;
      border-top: 1px solid var(--card-border);
      margin-top: 16px;
    }

    .details-section:first-child {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    .details-section h4 {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 12px;
    }

    .key-plays {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .key-plays li {
      display: flex;
      gap: 12px;
      font-size: 13px;
      padding: 8px 12px;
      background: var(--bg-tertiary);
      border-radius: 8px;
      align-items: center;
    }

    .play-turn {
      background: var(--accent-start);
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .play-action {
      flex: 1;
    }

    .play-damage {
      color: var(--danger);
      font-weight: 600;
    }

    .play-heal {
      color: var(--success);
      font-weight: 600;
    }

    .deck-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .mini-card {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .mini-card.attack {
      background: rgba(233, 69, 96, 0.2);
      color: var(--danger);
    }

    .mini-card.heal {
      background: rgba(0, 214, 143, 0.2);
      color: var(--success);
    }

    .mini-card.draw {
      background: rgba(0, 212, 255, 0.2);
      color: var(--accent-blue);
    }

    .mini-card.debuff {
      background: rgba(147, 51, 234, 0.2);
      color: var(--accent-purple);
    }

    .mini-card.more {
      background: var(--bg-tertiary);
      color: var(--text-muted);
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 14px;
      z-index: 9999;
      box-shadow: var(--card-shadow);
      animation: toastIn 0.3s ease-out;
    }

    @keyframes toastIn {
      from { transform: translateX(-50%) translateY(-20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    /* ===== Landscape Warning ===== */
    .landscape-warning {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }

    .warning-content {
      text-align: center;
      padding: 40px;
    }

    .warning-content p {
      margin-top: 20px;
      font-size: 18px;
      color: var(--text-primary);
    }

    .warning-content .warning-sub {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    /* ===== Scrollbar ===== */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-start);
    }

    /* ===== Responsive ===== */
    @media (max-width: 1200px) {
      .hand-card {
        width: 120px;
        height: 170px;
      }

      .battlefield-slot {
        width: 100px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <script type="module" src="/client/main.ts"></script>
</body>
</html>
