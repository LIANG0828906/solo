<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分子结构交互查看器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0d0f18;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #ffffff;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #molecule-cards {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      gap: 24px;
      z-index: 10;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }

    #molecule-cards.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, -50%) scale(0.9);
    }

    .molecule-card {
      width: 200px;
      height: 240px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .molecule-card:hover {
      transform: translateY(-8px);
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(0, 200, 255, 0.4);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 30px rgba(0, 200, 255, 0.15);
    }

    .molecule-formula {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, #00e5ff, #2979ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .molecule-name {
      font-size: 16px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
    }

    .molecule-desc {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      text-align: center;
      line-height: 1.5;
    }

    #info-panel {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 320px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      padding: 24px;
      z-index: 10;
      opacity: 0;
      transform: translateX(400px);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #info-panel.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #panel-title {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .bond-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
      max-height: 400px;
      overflow-y: auto;
    }

    .bond-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      transition: background 0.2s ease;
    }

    .bond-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .bond-label {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.85);
    }

    .bond-length {
      font-size: 15px;
      font-weight: 600;
      color: #4fc3f7;
    }

    .bond-unit {
      font-size: 12px;
      font-weight: 400;
      color: rgba(79, 195, 247, 0.7);
      margin-left: 2px;
    }

    #toggle-view-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #00e5ff 0%, #2979ff 100%);
      border: none;
      border-radius: 12px;
      color: #ffffff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
    }

    #toggle-view-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0, 229, 255, 0.3), 0 5px 15px rgba(41, 121, 255, 0.2);
    }

    #back-btn {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 12px 20px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      z-index: 10;
      opacity: 0;
      transform: translateX(-100px);
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: inherit;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #back-btn.visible {
      opacity: 1;
      transform: translateX(0);
    }

    #back-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(0) translateY(-2px);
    }

    .atom-label {
      position: absolute;
      pointer-events: none;
      background: rgba(255, 255, 255, 0.95);
      color: #1a1e2a;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      min-width: 140px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
      z-index: 20;
      transform: translate(-50%, -50%) scale(0);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .atom-label.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .atom-label.hiding {
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      transition: all 0.2s ease-in;
    }

    .atom-label-element {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .atom-label-info {
      font-size: 11px;
      color: rgba(26, 30, 42, 0.7);
      line-height: 1.5;
    }

    .atom-label::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 50%;
      transform: translateX(-50%);
      width: 0;
      height: 0;
      border-left: 6px solid transparent;
      border-right: 6px solid transparent;
      border-top: 6px solid rgba(255, 255, 255, 0.95);
    }

    #mobile-tab {
      display: none;
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px 16px 0 0;
      padding: 12px 24px;
      z-index: 10;
      cursor: pointer;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }

    #mobile-tab.visible {
      transform: translateY(0);
    }

    #mobile-tab-text {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.9);
      text-align: center;
    }

    #fps-counter {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
      font-family: monospace;
      z-index: 5;
    }

    @media (max-width: 768px) {
      #molecule-cards {
        flex-direction: column;
        gap: 16px;
        padding: 20px;
      }

      .molecule-card {
        width: 100%;
        max-width: 280px;
        height: 160px;
      }

      .molecule-formula {
        font-size: 24px;
      }

      #info-panel {
        top: auto;
        right: 0;
        left: 0;
        bottom: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        transform: translateY(100%);
        max-height: 70vh;
        overflow-y: auto;
      }

      #info-panel.visible {
        transform: translateY(48px);
      }

      #info-panel.mobile-collapsed {
        transform: translateY(calc(100% - 48px));
      }

      #mobile-tab {
        display: block;
      }

      #back-btn {
        top: 16px;
        left: 16px;
        padding: 10px 16px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="molecule-cards">
      <div class="molecule-card" data-molecule="H2O">
        <div class="molecule-formula">H₂O</div>
        <div class="molecule-name">水</div>
        <div class="molecule-desc">生命之源，极性分子</div>
      </div>
      <div class="molecule-card" data-molecule="CO2">
        <div class="molecule-formula">CO₂</div>
        <div class="molecule-name">二氧化碳</div>
        <div class="molecule-desc">线性非极性分子</div>
      </div>
      <div class="molecule-card" data-molecule="C6H6">
        <div class="molecule-formula">C₆H₆</div>
        <div class="molecule-name">苯</div>
        <div class="molecule-desc">芳香环，共轭π键</div>
      </div>
    </div>

    <button id="back-btn">
      <span>←</span>
      <span>返回分子选择</span>
    </button>

    <div id="info-panel">
      <div id="panel-title">分子信息</div>
      <div class="bond-list" id="bond-list"></div>
      <button id="toggle-view-btn">切换至最佳视角</button>
    </div>

    <div id="mobile-tab">
      <div id="mobile-tab-text">▼ 分子信息</div>
    </div>

    <div id="fps-counter"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
