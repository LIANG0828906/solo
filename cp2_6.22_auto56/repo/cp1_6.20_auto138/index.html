<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D角色物理碰撞与动态地形交互模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }
    #app {
      display: flex;
      position: relative;
    }
    #toolbar {
      width: 150px;
      background: #2c3e50;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }
    #toolbar h3 {
      color: #ecf0f1;
      font-size: 14px;
      margin-bottom: 6px;
      text-align: center;
      font-weight: 600;
    }
    .tool-btn {
      padding: 10px 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #ecf0f1;
      background: #34495e;
      transition: all 0.2s ease;
    }
    .tool-btn:hover {
      background: #3498db;
      transform: scale(1.05);
    }
    .tool-btn:active {
      transform: scale(0.95);
      transition: all 0.1s ease;
    }
    .tool-btn.active {
      background: #3498db;
      box-shadow: 0 0 10px rgba(52, 152, 219, 0.6);
    }
    .tool-btn[data-type="ground"] { border-left: 4px solid #555; }
    .tool-btn[data-type="slope"] { border-left: 4px solid #27ae60; }
    .tool-btn[data-type="step"] { border-left: 4px solid #888; }
    .tool-btn[data-type="moving"] { border-left: 4px solid #2980b9; }
    .tool-btn[data-type="oneway"] { border-left: 4px solid rgba(41,128,185,0.5); }
    #canvas-wrap {
      position: relative;
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
      overflow: hidden;
    }
    #game-canvas {
      display: block;
      background: #e0e0e0;
    }
    #reset-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #e74c3c;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      z-index: 10;
    }
    #reset-btn:hover {
      background: #c0392b;
      transform: scale(1.05);
    }
    #reset-btn:active {
      transform: scale(0.95);
      transition: all 0.1s ease;
    }
    #info-panel {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #34495e;
      color: #bdc3c7;
      font-size: 11px;
      line-height: 1.6;
    }
    #info-panel h4 {
      color: #ecf0f1;
      font-size: 12px;
      margin-bottom: 6px;
    }
    .moving-config {
      margin-top: 10px;
      padding: 10px;
      background: #1a252f;
      border-radius: 6px;
      font-size: 11px;
      color: #ecf0f1;
      display: none;
    }
    .moving-config.show {
      display: block;
    }
    .moving-config label {
      display: block;
      margin: 6px 0 3px;
      color: #bdc3c7;
    }
    .moving-config input {
      width: 100%;
      padding: 4px 6px;
      border: none;
      border-radius: 4px;
      background: #34495e;
      color: #ecf0f1;
      font-size: 11px;
    }
    .moving-config button {
      width: 100%;
      margin-top: 8px;
      padding: 6px;
      border: none;
      border-radius: 4px;
      background: #3498db;
      color: white;
      font-size: 11px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <h3>地形工具箱</h3>
      <button class="tool-btn active" data-type="ground">地面</button>
      <button class="tool-btn" data-type="slope">斜坡</button>
      <button class="tool-btn" data-type="step">台阶</button>
      <button class="tool-btn" data-type="moving">移动平台</button>
      <button class="tool-btn" data-type="oneway">单向平台</button>
      <div id="info-panel">
        <h4>操作说明</h4>
        <p>←→ 移动，↑/空格 跳跃</p>
        <p>点击放置地形块</p>
        <p>选中后Delete删除</p>
        <p>Ctrl+拖拽 移动地形块</p>
        <p>空格 切换角色控制</p>
      </div>
      <div class="moving-config" id="moving-config">
        <label>运动方向</label>
        <select id="move-axis" style="width:100%;padding:4px;border-radius:4px;background:#34495e;color:#ecf0f1;border:none;">
          <option value="horizontal">水平</option>
          <option value="vertical">垂直</option>
        </select>
        <label>移动距离 (像素)</label>
        <input type="number" id="move-distance" value="100" min="20" max="300" />
        <label>移动速度 (像素/秒)</label>
        <input type="number" id="move-speed" value="100" min="50" max="200" />
      </div>
    </div>
    <div id="canvas-wrap">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <button id="reset-btn">重置</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
