<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光影迷宫</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1F2833 0%, #0B0C10 100%);
      font-family: 'Fira Code', monospace;
    }
    #app {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    h1 {
      color: #FFD700;
      font-size: 28px;
      letter-spacing: 8px;
      margin-bottom: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
      font-weight: 600;
    }
    #gameCanvas {
      border: 2px solid #2C2F33;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8), 0 0 80px rgba(255, 215, 0, 0.05);
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <h1>光影迷宫</h1>
    <canvas id="gameCanvas" width="800" height="800"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
