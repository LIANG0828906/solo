<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互式分子结构可视化器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 15, 30, 0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }
    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loader {
      position: relative;
      width: 80px;
      height: 80px;
    }
    .loader-ring {
      position: absolute;
      border: 3px solid transparent;
      border-top-color: #ffffff;
      border-radius: 50%;
      animation: spin linear infinite;
    }
    .loader-ring:nth-child(1) {
      width: 80px;
      height: 80px;
      animation-duration: 0.8s;
    }
    .loader-ring:nth-child(2) {
      width: 60px;
      height: 60px;
      top: 10px;
      left: 10px;
      animation-duration: 1.2s;
      animation-direction: reverse;
    }
    .loader-ring:nth-child(3) {
      width: 40px;
      height: 40px;
      top: 20px;
      left: 20px;
      animation-duration: 0.6s;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(30, 35, 50, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 20px;
      z-index: 100;
      min-width: 220px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      cursor: grab;
    }
    .control-panel:active {
      cursor: grabbing;
    }
    .panel-header {
      color: #ffffff;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      user-select: none;
    }
    .panel-btn {
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 10px;
      background: rgba(60, 65, 80, 0.8);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .panel-btn:hover {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    .panel-select {
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 10px;
      background: rgba(60, 65, 80, 0.8);
      color: #ffffff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      outline: none;
    }
    .panel-select option {
      background: #3c4150;
      color: #ffffff;
    }
    .upload-progress {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 8px;
      display: none;
    }
    .upload-progress.active {
      display: block;
    }
    .upload-progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #888888 0%, #4ade80 100%);
      transition: width 0.1s linear;
    }
    .info-card {
      position: fixed;
      background: #ffffff;
      color: #333333;
      border-radius: 12px;
      padding: 20px;
      min-width: 280px;
      max-width: 360px;
      z-index: 200;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      animation: cardIn 0.3s ease;
    }
    @keyframes cardIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
    .info-card.closing {
      animation: cardOut 0.3s ease forwards;
    }
    @keyframes cardOut {
      from {
        opacity: 1;
        transform: scale(1);
      }
      to {
        opacity: 0;
        transform: scale(0.8);
      }
    }
    .info-card-close {
      position: absolute;
      top: 10px;
      left: 10px;
      width: 24px;
      height: 24px;
      border: none;
      background: #f0f0f0;
      color: #666666;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .info-card-close:hover {
      background: #e0e0e0;
      color: #333333;
    }
    .info-card-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-left: 30px;
      color: #1a1a2e;
    }
    .info-card-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }
    .info-card-row:last-child {
      border-bottom: none;
    }
    .info-card-label {
      color: #888888;
    }
    .info-card-value {
      color: #333333;
      font-weight: 500;
      font-family: 'Courier New', monospace;
    }
    .info-card-connected {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
    .info-card-connected-title {
      font-size: 13px;
      color: #888888;
      margin-bottom: 8px;
    }
    .info-card-connected-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .atom-tag {
      padding: 4px 10px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #ffffff;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        bottom: 0;
        right: 0;
        left: 0;
        width: 100%;
        border-radius: 16px 16px 0 0;
        padding: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .panel-header {
        width: 100%;
        margin-bottom: 0;
      }
      .panel-btn, .panel-select {
        flex: 1;
        margin-bottom: 0;
        min-width: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="loading-overlay" id="loading">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
      </div>
    </div>
    <div class="control-panel" id="control-panel">
      <div class="panel-header">🧪 分子可视化器</div>
      <select class="panel-select" id="molecule-select">
        <option value="water">💧 水分子 (H₂O)</option>
        <option value="co2">🌫️ 二氧化碳 (CO₂)</option>
        <option value="benzene">🔮 苯环 (C₆H₆)</option>
        <option value="upload">📁 上传自定义...</option>
      </select>
      <button class="panel-btn" id="reset-btn">🔄 重置视角</button>
      <button class="panel-btn" id="theme-btn">🎨 切换主题</button>
      <input type="file" id="file-input" accept=".json" style="display: none;" />
      <div class="upload-progress" id="upload-progress">
        <div class="upload-progress-bar" id="progress-bar"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
