<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D星轨模拟器 - 天文科普教学</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Consolas', 'Monaco', 'Courier New', ui-monospace, monospace, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 100%);
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .tooltip {
      position: fixed;
      pointer-events: none;
      padding: 6px 10px;
      background: #ffffffcc;
      color: #000000;
      font-size: 12px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s ease;
      z-index: 100;
      white-space: nowrap;
      font-family: 'Consolas', 'Monaco', 'Courier New', ui-monospace, monospace, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .tooltip.visible {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="tooltip" class="tooltip"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
