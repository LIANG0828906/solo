<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SynthArena - Synthesizer Battle</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
    #gameCanvas { display: block; }
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 100;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      display: none;
    }
    #gameOver.show {
      display: block;
    }
    #gameOver h1 {
      font-family: 'Orbitron', monospace;
      font-size: 4rem;
      color: #fff;
      text-shadow: 0 0 20px #bf00ff, 0 0 40px #00ffff;
      animation: pulse 0.5s ease-in-out infinite;
    }
    #gameOver p {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      color: #00ffff;
      margin-top: 20px;
    }
    #timer {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Orbitron', monospace;
      font-size: 3rem;
      color: #fff;
      text-shadow: 0 0 10px #bf00ff, 0 0 20px #00ffff;
    }
    #startScreen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 15, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }
    #startScreen h1 {
      font-family: 'Orbitron', monospace;
      font-size: 5rem;
      color: #fff;
      text-shadow: 0 0 20px #bf00ff, 0 0 40px #00ffff;
      margin-bottom: 30px;
      animation: glow 2s ease-in-out infinite alternate;
    }
    #startScreen p {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem;
      color: #00ffff;
      margin-bottom: 10px;
    }
    #startBtn {
      margin-top: 40px;
      padding: 15px 60px;
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      color: #fff;
      background: linear-gradient(135deg, #bf00ff, #00ffff);
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 20px rgba(191, 0, 255, 0.5);
    }
    #startBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 40px rgba(191, 0, 255, 0.8), 0 0 60px rgba(0, 255, 255, 0.5);
    }
    .controls {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      gap: 40px;
    }
    .controls .player1, .controls .player2 {
      background: rgba(0, 0, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(191, 0, 255, 0.3);
    }
    .controls h3 {
      color: #bf00ff;
      margin-bottom: 10px;
      font-size: 1rem;
    }
    .controls .player2 h3 {
      color: #00ffff;
    }
    .controls .keys {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }
    .controls .key {
      background: rgba(191, 0, 255, 0.2);
      padding: 5px 10px;
      border-radius: 5px;
      border: 1px solid rgba(191, 0, 255, 0.5);
    }
    .player2 .key {
      background: rgba(0, 255, 255, 0.2);
      border-color: rgba(0, 255, 255, 0.5);
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes glow {
      from { text-shadow: 0 0 20px #bf00ff, 0 0 40px #00ffff; }
      to { text-shadow: 0 0 30px #bf00ff, 0 0 60px #00ffff; }
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="hud">
    <div id="timer">60</div>
    <div class="controls">
      <div class="player1">
        <h3>PLAYER 1</h3>
        <div class="keys">
          <span class="key">A</span><span class="key">S</span><span class="key">D</span><span class="key">F</span><span class="key">G</span><span class="key">H</span>
        </div>
        <div style="margin-top: 10px; font-size: 0.8rem;">Waves: 1-2-3</div>
      </div>
      <div class="player2">
        <h3>PLAYER 2</h3>
        <div class="keys">
          <span class="key">J</span><span class="key">K</span><span class="key">L</span><span class="key">;</span><span class="key">'</span><span class="key">Enter</span>
        </div>
        <div style="margin-top: 10px; font-size: 0.8rem;">Waves: 7-8-9</div>
      </div>
    </div>
  </div>
  <div id="startScreen">
    <h1>SYNTHARENA</h1>
    <p>Player 1: A S D F G H | Wave: 1 2 3</p>
    <p>Player 2: J K L ; ' Enter | Wave: 7 8 9</p>
    <p style="color: #ff6b6b;">Battle for 60 seconds - Survive!</p>
    <button id="startBtn">START BATTLE</button>
  </div>
  <div id="gameOver">
    <h1 id="winner"></h1>
    <p id="finalScore"></p>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
