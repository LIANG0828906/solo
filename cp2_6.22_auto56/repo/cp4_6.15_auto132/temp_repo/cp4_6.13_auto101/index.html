<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>室内空间光线模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      color: #e8edf5;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    canvas {
      display: block;
    }

    .sidebar-toggle {
      display: none;
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 1001;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(20, 40, 75, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 140, 60, 0.3);
      color: #ff8c3c;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
    }

    .sidebar-toggle:hover {
      transform: scale(1.1);
      background: rgba(30, 55, 100, 0.85);
      box-shadow: 0 4px 20px rgba(255, 140, 60, 0.25);
    }

    .sidebar-toggle:active {
      transform: scale(0.95);
    }

    #control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 320px;
      max-height: calc(100% - 40px);
      overflow-y: auto;
      z-index: 1000;
      padding: 24px;
      border-radius: 20px;
      background: rgba(15, 30, 55, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: transform 0.35s ease-in-out, opacity 0.35s ease-in-out;
    }

    #control-panel.collapsed {
      transform: translateX(calc(100% + 40px));
      opacity: 0;
      pointer-events: none;
    }

    #control-panel::-webkit-scrollbar {
      width: 6px;
    }

    #control-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #control-panel::-webkit-scrollbar-thumb {
      background: rgba(255, 140, 60, 0.4);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #ff8c3c;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, #ff8c3c, #ffb06a);
      border-radius: 2px;
    }

    .control-section {
      margin-bottom: 22px;
      padding-bottom: 18px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .control-section:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 500;
      color: #8fa5c8;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-group:last-child {
      margin-bottom: 0;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .slider-label {
      font-size: 13px;
      color: #b8c7de;
    }

    .slider-value {
      font-size: 12px;
      color: #ff8c3c;
      font-family: 'SF Mono', Consolas, monospace;
      background: rgba(255, 140, 60, 0.1);
      padding: 2px 8px;
      border-radius: 6px;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s;
    }

    input[type="range"]:hover {
      background: rgba(255, 255, 255, 0.12);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8c3c, #ffb06a);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255, 140, 60, 0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 4px 16px rgba(255, 140, 60, 0.7);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8c3c, #ffb06a);
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(255, 140, 60, 0.5);
      transition: transform 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
    }

    .preset-buttons {
      display: flex;
      gap: 10px;
    }

    .preset-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: #b8c7de;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
    }

    .preset-btn:hover {
      transform: scale(1.05);
      border-color: rgba(255, 140, 60, 0.5);
      background: rgba(255, 140, 60, 0.1);
      color: #ff8c3c;
    }

    .preset-btn:active {
      transform: scale(0.97);
    }

    .preset-btn.active {
      background: linear-gradient(135deg, rgba(255, 140, 60, 0.3), rgba(255, 176, 106, 0.2));
      border-color: #ff8c3c;
      color: #ff8c3c;
      box-shadow: 0 2px 12px rgba(255, 140, 60, 0.25);
    }

    .view-buttons {
      display: flex;
      gap: 10px;
    }

    .view-btn {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      color: #b8c7de;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.25s ease-in-out;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .view-btn:hover {
      transform: scale(1.05);
      border-color: rgba(255, 140, 60, 0.5);
      background: rgba(255, 140, 60, 0.1);
      color: #ff8c3c;
    }

    .view-btn:active {
      transform: scale(0.97);
    }

    .view-btn.active {
      background: linear-gradient(135deg, rgba(255, 140, 60, 0.3), rgba(255, 176, 106, 0.2));
      border-color: #ff8c3c;
      color: #ff8c3c;
      box-shadow: 0 2px 12px rgba(255, 140, 60, 0.25);
    }

    .color-picker-wrapper {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="color"] {
      width: 48px;
      height: 32px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      background: transparent;
      cursor: pointer;
      padding: 2px;
      transition: transform 0.2s ease;
    }

    input[type="color"]:hover {
      transform: scale(1.1);
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border-radius: 6px;
      border: none;
    }

    .color-hex {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 13px;
      color: #8fa5c8;
      letter-spacing: 1px;
    }

    .fps-counter {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(15, 30, 55, 0.6);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 12px;
      color: #8fa5c8;
      z-index: 100;
    }

    .fps-value {
      color: #ff8c3c;
      font-weight: 600;
    }

    .hint-text {
      font-size: 11px;
      color: #6b82a6;
      margin-top: 8px;
      line-height: 1.5;
    }

    @media (max-width: 768px) {
      .sidebar-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #control-panel {
        top: 0;
        right: 0;
        width: 280px;
        height: 100%;
        max-height: 100%;
        border-radius: 0;
      }

      #control-panel.collapsed {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <button class="sidebar-toggle" id="sidebar-toggle" title="控制面板">
      ☰
    </button>
    <aside id="control-panel"></aside>
    <div class="fps-counter">
      FPS: <span class="fps-value" id="fps-value">--</span>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
