<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>水则碑 · 古代水文观测</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+KuaiLe&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #D4E6F1;
      font-family: 'Noto Serif SC', '楷体', 'KaiTi', serif;
    }
    #app {
      width: 100%; height: 100%;
      position: relative;
    }
    canvas { display: block; }
    #loading {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: #D4E6F1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease-out;
    }
    #loading.fade-out { opacity: 0; pointer-events: none; }
    #loading h1 {
      font-family: 'ZCOOL KuaiLe', '行楷', '楷体', serif;
      font-size: 48px;
      color: #5C4033;
      letter-spacing: 12px;
      margin-bottom: 20px;
    }
    #loading p {
      font-size: 16px;
      color: #7B8D8E;
      letter-spacing: 4px;
    }
    .loading-bar {
      width: 200px; height: 3px;
      background: rgba(92, 64, 51, 0.2);
      border-radius: 2px;
      margin-top: 30px;
      overflow: hidden;
    }
    .loading-bar-inner {
      width: 0%; height: 100%;
      background: #5C4033;
      border-radius: 2px;
      transition: width 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div id="loading">
    <h1>水则碑</h1>
    <p>古代水文观测 · 3D可视化</p>
    <div class="loading-bar">
      <div class="loading-bar-inner" id="loadingBar"></div>
    </div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
