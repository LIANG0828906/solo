<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AsteroidFleet - 星际舰队对战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, #0a0a2e 0%, #1a1a4e 100%);
    }

    .ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .status-bar {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 40px;
      pointer-events: none;
    }

    .hp-bar-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 200px;
    }

    .hp-bar-label {
      color: #fff;
      font-size: 14px;
      font-weight: bold;
    }

    .hp-bar {
      height: 12px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.1);
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .hp-bar-fill {
      height: 100%;
      transition: width 300ms ease;
      border-radius: 6px;
    }

    .hp-bar-fill.blue {
      background: linear-gradient(90deg, #4a90d9, #6ab4ff);
      box-shadow: 0 0 10px rgba(106, 180, 255, 0.5);
    }

    .hp-bar-fill.red {
      background: linear-gradient(90deg, #d94a4a, #ff6a6a);
      box-shadow: 0 0 10px rgba(255, 106, 106, 0.5);
    }

    .turn-display {
      color: #fff;
      font-size: 48px;
      font-weight: bold;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      min-width: 120px;
      text-align: center;
    }

    .end-turn-btn {
      position: fixed;
      bottom: 30px;
      right: 30px;
      padding: 14px 32px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      background: rgba(30, 30, 80, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      cursor: pointer;
      pointer-events: auto;
      transition: all 0.2s ease;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }

    .end-turn-btn:hover {
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4),
                  inset 0 0 20px rgba(0, 255, 255, 0.1);
      animation: borderGlow 1s ease-in-out infinite;
    }

    .end-turn-btn:active {
      transform: translateY(2px);
      animation: btnShake 0.1s ease-in-out;
    }

    @keyframes borderGlow {
      0%, 100% {
        box-shadow: 0 0 15px rgba(0, 255, 255, 0.3),
                    inset 0 0 15px rgba(0, 255, 255, 0.05);
      }
      50% {
        box-shadow: 0 0 30px rgba(0, 255, 255, 0.6),
                    inset 0 0 25px rgba(0, 255, 255, 0.15);
      }
    }

    @keyframes btnShake {
      0%, 100% { transform: translateY(2px) translateX(0); }
      50% { transform: translateY(2px) translateX(1px); }
    }

    .turn-banner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 64px;
      font-weight: bold;
      pointer-events: none;
      opacity: 0;
      z-index: 100;
      text-shadow: 0 0 30px currentColor;
    }

    .turn-banner.show {
      animation: bannerFade 1.5s ease-in-out forwards;
    }

    .turn-banner.blue {
      color: #6ab4ff;
    }

    .turn-banner.red {
      color: #ff6a6a;
    }

    @keyframes bannerFade {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); }
    }

    .game-over-panel {
      position: fixed;
      top: 50%;
      right: -400px;
      transform: translateY(-50%);
      width: 380px;
      padding: 30px;
      background: rgba(20, 20, 60, 0.95);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      pointer-events: auto;
      z-index: 200;
      transition: right 300ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .game-over-panel.show {
      right: 30px;
    }

    .game-over-title {
      font-size: 28px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 20px;
      text-shadow: 0 0 15px currentColor;
    }

    .game-over-title.blue {
      color: #6ab4ff;
    }

    .game-over-title.red {
      color: #ff6a6a;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: #ccc;
      font-size: 16px;
    }

    .stat-row:last-child {
      border-bottom: none;
    }

    .stat-value {
      color: #fff;
      font-weight: bold;
    }

    .restart-btn {
      width: 100%;
      margin-top: 20px;
      padding: 12px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4a4ad9, #6a6aff);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(106, 106, 255, 0.4);
    }

    .ship-selection-panel {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      padding: 20px;
      background: rgba(20, 20, 60, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      pointer-events: auto;
    }

    .ship-card {
      width: 100px;
      height: 130px;
      padding: 10px;
      background: rgba(40, 40, 80, 0.8);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: grab;
      transition: all 0.2s ease;
      text-align: center;
      color: #fff;
      user-select: none;
    }

    .ship-card:hover {
      border-color: rgba(255, 255, 255, 0.5);
      transform: translateY(-3px);
    }

    .ship-card:active {
      cursor: grabbing;
    }

    .ship-card.deployed {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .ship-card-name {
      font-size: 12px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .ship-card-stats {
      font-size: 10px;
      color: #aaa;
      text-align: left;
      line-height: 1.6;
    }

    .phase-indicator {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: rgba(255, 255, 255, 0.7);
      pointer-events: none;
    }

    .instruction-text {
      position: fixed;
      bottom: 200px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: rgba(255, 255, 255, 0.6);
      text-align: center;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div class="ui-overlay">
    <div class="status-bar">
      <div class="hp-bar-container">
        <span class="hp-bar-label">蓝方舰队</span>
        <div class="hp-bar">
          <div class="hp-bar-fill blue" id="blueHpBar" style="width: 100%"></div>
        </div>
      </div>
      <div class="turn-display" id="turnDisplay">1</div>
      <div class="hp-bar-container">
        <span class="hp-bar-label" style="text-align: right;">红方舰队</span>
        <div class="hp-bar">
          <div class="hp-bar-fill red" id="redHpBar" style="width: 100%"></div>
        </div>
      </div>
    </div>

    <div class="phase-indicator" id="phaseIndicator">部署阶段 - 蓝方</div>
    <div class="instruction-text" id="instructionText">从下方选择飞船拖拽到阵位上</div>

    <div class="ship-selection-panel" id="shipSelectionPanel"></div>

    <button class="end-turn-btn" id="endTurnBtn" style="display: none;">结束回合</button>

    <div class="turn-banner" id="turnBanner"></div>

    <div class="game-over-panel" id="gameOverPanel">
      <div class="game-over-title" id="gameOverTitle">游戏结束</div>
      <div class="stat-row">
        <span>回合数</span>
        <span class="stat-value" id="statTurns">0</span>
      </div>
      <div class="stat-row">
        <span>蓝方总伤害输出</span>
        <span class="stat-value" id="statBlueDamage">0</span>
      </div>
      <div class="stat-row">
        <span>红方总伤害输出</span>
        <span class="stat-value" id="statRedDamage">0</span>
      </div>
      <div class="stat-row">
        <span>蓝方剩余HP</span>
        <span class="stat-value" id="statBlueHp">0</span>
      </div>
      <div class="stat-row">
        <span>红方剩余HP</span>
        <span class="stat-value" id="statRedHp">0</span>
      </div>
      <button class="restart-btn" id="restartBtn">重新开始</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
