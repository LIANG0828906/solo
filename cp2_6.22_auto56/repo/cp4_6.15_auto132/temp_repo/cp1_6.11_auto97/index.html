<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roguelike Survival - 地牢生存</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      min-height: 100vh;
      background: linear-gradient(180deg, #1A1A2E 0%, #16213E 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #eee;
      overflow-x: hidden;
    }
    .game-wrapper {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 20px 0;
    }
    .vignette-left, .vignette-right {
      position: fixed;
      top: 0;
      bottom: 0;
      width: 180px;
      pointer-events: none;
      z-index: 100;
    }
    .vignette-left {
      left: 0;
      background: linear-gradient(90deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0) 100%);
    }
    .vignette-right {
      right: 0;
      background: linear-gradient(270deg, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.6) 40%, rgba(0,0,0,0) 100%);
    }
    .top-hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 40px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      z-index: 50;
      padding: 0 220px;
    }
    .hud-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
    }
    .hud-label { color: #aaa; }
    .hud-value-wave { color: #7EC850; font-size: 18px; }
    .hud-value-count { color: #FFAA00; font-size: 18px; }
    .hud-value-coins { color: #FFD700; font-size: 18px; }
    .hud-value-hp { color: #FF5555; font-size: 16px; min-width: 60px; text-align: right; }
    .hp-bar {
      position: relative;
      width: 200px;
      height: 20px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
      border: 1px solid #555;
    }
    .hp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #E63946, #FF5555);
      transition: width 0.15s ease-out;
    }
    .canvas-container {
      position: relative;
      margin-top: 80px;
      margin-bottom: 100px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 0 2px rgba(255,255,255,0.05);
      border-radius: 4px;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
      background: #000;
    }
    .canvas-flash {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #44AAFF;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s ease-out;
      border-radius: 4px;
    }
    .canvas-flash.active {
      opacity: 0.35;
      transition: opacity 0.05s ease-in;
    }
    .skill-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 50;
    }
    .skill-slot {
      width: 60px;
      height: 60px;
      background: #2A2A3A;
      border: 2px solid #555;
      border-radius: 6px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .skill-slot.active {
      border-color: #FFD700;
      box-shadow: 0 0 12px rgba(255,215,0,0.5);
    }
    .skill-slot .skill-ico {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .skill-slot.entering .skill-ico {
      animation: spinIn 0.5s ease-out;
    }
    @keyframes spinIn {
      0%   { transform: rotate(0deg) scale(0.2); opacity: 0; }
      60%  { transform: rotate(270deg) scale(1.15); opacity: 1; }
      100% { transform: rotate(360deg) scale(1); opacity: 1; }
    }
    .skill-slot .skill-name {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #bbb;
      white-space: nowrap;
    }
    .instructions {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: #888;
      text-align: center;
      pointer-events: none;
      z-index: 50;
    }
    .game-over {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 200;
      gap: 20px;
    }
    .game-over h1 {
      font-size: 48px;
      color: #FF5555;
      letter-spacing: 4px;
    }
    .game-over p {
      font-size: 18px;
      color: #ccc;
    }
    .game-over button {
      margin-top: 20px;
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      background: #D4A017;
      color: #1A1A2E;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.2s;
    }
    .game-over button:hover {
      background: #FFD700;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div class="vignette-left"></div>
  <div class="vignette-right"></div>

  <div class="top-hud">
    <div class="hud-item">
      <span class="hud-label">波次</span>
      <span class="hud-value-wave" id="hudWave">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">怪物</span>
      <span class="hud-value-count" id="hudEnemyCount">0</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">生命</span>
      <div class="hp-bar">
        <div class="hp-bar-fill" id="hpBarFill" style="width:100%"></div>
      </div>
      <span class="hud-value-hp" id="hudHp">100 / 100</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">金币</span>
      <span class="hud-value-coins" id="hudCoins">0</span>
    </div>
  </div>

  <div class="game-wrapper">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="gameCanvas" width="1200" height="1200"></canvas>
      <div class="canvas-flash" id="canvasFlash"></div>
    </div>
  </div>

  <div class="instructions">
    鼠标左键点击 = 移动并自动朝最近怪物射击 &nbsp;|&nbsp; 鼠标右键 = 释放减速场（冷却8秒）
  </div>

  <div class="skill-bar" id="skillBar">
    <div class="skill-slot" data-slot="0"><div class="skill-ico"></div></div>
    <div class="skill-slot" data-slot="1"><div class="skill-ico"></div></div>
    <div class="skill-slot" data-slot="2"><div class="skill-ico"></div></div>
    <div class="skill-slot" data-slot="3"><div class="skill-ico"></div></div>
  </div>

  <div class="game-over" id="gameOverPanel">
    <h1>你阵亡了</h1>
    <p id="gameOverStats">存活了 0 波，击杀 0 只怪物，收集 0 金币</p>
    <button onclick="location.reload()">重新开始</button>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
