<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>梦幻泡泡爆破</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #0d1a3d 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }
    #game-container {
      position: relative;
      box-shadow: 0 0 60px rgba(138, 43, 226, 0.3);
      border-radius: 12px;
      overflow: hidden;
    }
    #game {
      display: block;
      cursor: default;
    }
    #game.clickable {
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
