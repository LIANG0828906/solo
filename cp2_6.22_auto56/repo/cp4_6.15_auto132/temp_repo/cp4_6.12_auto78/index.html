<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空矿工挖矿争霸赛</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a1a;
      font-family: 'Consolas', 'Courier New', monospace;
      overflow: hidden;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    #game-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    #game-canvas {
      border: 2px solid #2299ff;
      border-radius: 6px;
      box-shadow: 0 0 30px rgba(34, 153, 255, 0.3);
      background: #0a0a1a;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .hud-panel {
      position: absolute;
      background: rgba(10, 10, 26, 0.85);
      border: 2px solid #2299ff;
      border-radius: 6px;
      padding: 12px 16px;
      color: #ffffff;
      box-shadow: 0 0 15px rgba(34, 153, 255, 0.2);
    }

    #hud-left {
      top: 16px;
      left: 16px;
      min-width: 180px;
    }

    #hud-right {
      top: 16px;
      right: 16px;
      text-align: right;
      min-width: 200px;
    }

    #countdown {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 10px #2299ff;
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    #countdown.bounce {
      transform: scale(1.3);
    }

    .rank-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 8px;
      margin: 4px 0;
      border-radius: 4px;
      transition: background-color 0.2s;
      font-size: 14px;
    }

    .rank-row.rank-flash {
      animation: flash-green 0.5s ease-in-out 3;
    }

    @keyframes flash-green {
      0%, 100% { background-color: transparent; }
      50% { background-color: rgba(68, 255, 68, 0.3); }
    }

    .rank-1 { color: #ffd700; font-weight: bold; }
    .rank-2 { color: #c0c0c0; font-weight: bold; }
    .rank-3 { color: #cd7f32; font-weight: bold; }
    .rank-4 { color: #888888; }

    .ore-info {
      font-size: 14px;
      line-height: 1.8;
    }

    .ore-value {
      font-size: 20px;
      font-weight: bold;
      color: #ffd700;
      margin-top: 8px;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: #ffffff;
      padding: 6px 10px;
      border-radius: 4px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s, transform 0.2s;
      z-index: 100;
    }

    .tooltip.show {
      opacity: 1;
      transform: translateY(0);
    }

    #start-screen, #end-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 26, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      pointer-events: auto;
    }

    .screen-title {
      font-size: 48px;
      color: #2299ff;
      text-shadow: 0 0 20px #2299ff;
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    .screen-subtitle {
      font-size: 18px;
      color: #888888;
      margin-bottom: 40px;
    }

    .game-btn {
      background: linear-gradient(135deg, #2299ff, #1a77cc);
      border: 2px solid #2299ff;
      color: #ffffff;
      padding: 14px 40px;
      font-size: 18px;
      font-family: inherit;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 0 0 rgba(255, 170, 0, 0);
    }

    .game-btn:hover {
      box-shadow: 0 0 30px rgba(255, 170, 0, 0.4);
      transform: translateY(-2px);
      border-color: #ffaa00;
    }

    .controls-info {
      margin-top: 40px;
      color: #888888;
      font-size: 14px;
      text-align: center;
      line-height: 2;
    }

    .controls-info span {
      color: #ff6622;
      font-weight: bold;
    }

    #end-screen {
      display: none;
    }

    .final-rank {
      font-size: 24px;
      margin: 20px 0;
      text-align: center;
    }

    .final-rank-item {
      padding: 10px 30px;
      margin: 8px 0;
      border-radius: 6px;
      background: rgba(34, 153, 255, 0.1);
      border: 1px solid #2299ff;
    }

    #final-standings {
      margin: 20px 0 40px;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1024px) {
      #hud-left { min-width: 150px; padding: 10px 12px; }
      #hud-right { min-width: 170px; padding: 10px 12px; }
      #countdown { font-size: 28px; }
      .screen-title { font-size: 36px; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="game-wrapper">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      
      <div id="ui-layer">
        <div class="hud-panel" id="hud-left">
          <div class="ore-info">
            <div>普通矿石: <span id="ore-common">0</span></div>
            <div>稀有矿石: <span id="ore-rare">0</span></div>
            <div>传说矿石: <span id="ore-legendary">0</span></div>
            <div class="ore-value">总价值: <span id="total-value">0</span></div>
          </div>
        </div>

        <div class="hud-panel" id="hud-right">
          <div id="countdown">05:00</div>
          <div id="rankings" style="margin-top: 12px;"></div>
        </div>

        <div id="tooltip" class="tooltip"></div>
      </div>

      <div id="start-screen">
        <h1 class="screen-title">太空矿工挖矿争霸赛</h1>
        <p class="screen-subtitle">SPACE MINER BATTLE ROYALE</p>
        <button class="game-btn" id="start-btn">开始游戏</button>
        <div class="controls-info">
          <p><span>WASD</span> - 移动飞船</p>
          <p><span>空格</span> - 发射采矿激光</p>
          <p><span>E</span> - 发射防御导弹</p>
          <p>5分钟内采集最多矿石获胜！</p>
        </div>
      </div>

      <div id="end-screen">
        <h1 class="screen-title">游戏结束</h1>
        <p class="screen-subtitle">GAME OVER</p>
        <div id="final-standings"></div>
        <button class="game-btn" id="restart-btn">再来一局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
