<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>蚁群策略 - Ant Colony RTS</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a0f14;
      }
      #game-canvas {
        display: block;
        position: absolute;
        top: 0;
        left: 0;
      }
      #ui-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <canvas id="game-canvas"></canvas>
      <div id="ui-overlay"></div>
    </div>
    <script type="module" src="/src/ant_game.ts"></script>
  </body>
</html>
