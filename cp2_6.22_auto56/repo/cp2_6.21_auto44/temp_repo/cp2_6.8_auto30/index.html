<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 恒星系轨道模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .title-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 12px 24px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      z-index: 10;
      user-select: none;
    }

    .title-bar h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #FFD700, #FF4500);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .title-bar p {
      font-size: 12px;
      color: rgba(224, 224, 224, 0.6);
      margin-top: 4px;
    }

    .tooltip {
      position: absolute;
      padding: 10px 14px;
      background: rgba(10, 10, 30, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 20;
      font-size: 13px;
      min-width: 160px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .tooltip.visible {
      opacity: 1;
    }

    .tooltip .star-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
    }

    .tooltip .info-row {
      display: flex;
      justify-content: space-between;
      margin: 3px 0;
      gap: 16px;
    }

    .tooltip .info-label {
      color: rgba(224, 224, 224, 0.6);
    }

    .tooltip .info-value {
      font-weight: 500;
      color: #ffffff;
    }

    .hint {
      position: absolute;
      bottom: 20px;
      left: 20px;
      padding: 8px 14px;
      font-size: 11px;
      color: rgba(224, 224, 224, 0.4);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 6px;
      z-index: 5;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="title-bar">
      <h1>★ 恒星系轨道模拟器</h1>
      <p>双星系统引力交互可视化</p>
    </div>
    <div class="tooltip" id="tooltip"></div>
    <div class="hint">鼠标左键拖拽旋转 · 滚轮缩放 · 右键平移 · 悬停查看信息</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
