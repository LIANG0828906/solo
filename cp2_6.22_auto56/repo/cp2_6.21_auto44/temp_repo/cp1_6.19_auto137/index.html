<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市噪音热力图实时监测</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0D0D1A;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', 'PingFang SC', sans-serif;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas { display: block; }
    #canvas-container::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      box-shadow: inset 0 0 80px 20px rgba(80, 60, 180, 0.15),
                  inset 0 0 160px 40px rgba(60, 40, 160, 0.08);
      z-index: 999;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
