<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市交叉口交通流仿真</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    #canvas-container {
      width: 70%;
      height: 100%;
      position: relative;
      background: #0d1117;
    }

    #sim-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #control-panel {
      width: 30%;
      height: 100%;
      background: #0d1117;
      border-left: 1px solid #1f2937;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 700;
      color: #58a6ff;
      text-align: center;
      padding-bottom: 12px;
      border-bottom: 1px solid #1f2937;
      letter-spacing: 1px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .card-header .icon {
      font-size: 18px;
    }

    .signal-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .signal-label {
      font-size: 13px;
      color: #8b949e;
    }

    .signal-light-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .signal-dot {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      transition: box-shadow 0.3s ease, opacity 0.3s ease;
      opacity: 0.25;
    }

    .signal-dot.red {
      background: #ff3333;
    }

    .signal-dot.yellow {
      background: #ffcc00;
    }

    .signal-dot.green {
      background: #33cc33;
    }

    .signal-dot.active {
      opacity: 1;
    }

    .signal-dot.red.active {
      box-shadow: 0 0 10px 3px rgba(255, 51, 51, 0.6);
    }

    .signal-dot.yellow.active {
      box-shadow: 0 0 10px 3px rgba(255, 204, 0, 0.6);
    }

    .signal-dot.green.active {
      box-shadow: 0 0 10px 3px rgba(51, 204, 51, 0.6);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .slider-row label {
      font-size: 13px;
      color: #8b949e;
      min-width: 70px;
    }

    .slider-row input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #21262d;
      border-radius: 3px;
      outline: none;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #58a6ff;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .slider-value {
      font-size: 14px;
      font-weight: 600;
      color: #58a6ff;
      min-width: 36px;
      text-align: right;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .stat-item + .stat-item {
      border-top: 1px solid #21262d;
    }

    .stat-label {
      font-size: 13px;
      color: #8b949e;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      outline: none;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: #238636;
      color: #ffffff;
    }

    .btn-primary:hover {
      box-shadow: 0 0 12px rgba(35, 134, 54, 0.5);
    }

    .btn-danger {
      background: #da3633;
      color: #ffffff;
    }

    .btn-danger:hover {
      box-shadow: 0 0 12px rgba(218, 54, 51, 0.5);
    }

    .btn-group {
      display: flex;
      gap: 10px;
    }

    .btn-group .btn {
      flex: 1;
    }

    .direction-indicator {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 4px;
    }

    .dir-label {
      font-size: 12px;
      color: #58a6ff;
      padding: 2px 10px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #0d1117;
    }

    @media (max-width: 900px) {
      #app {
        flex-direction: column;
      }
      #canvas-container {
        width: 100%;
        height: 55%;
      }
      #control-panel {
        width: 100%;
        height: 45%;
        border-left: none;
        border-top: 1px solid #1f2937;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="sim-canvas"></canvas>
    </div>
    <div id="control-panel">
      <div class="panel-title">🚦 交通流仿真控制台</div>

      <div class="card">
        <div class="card-header"><span class="icon">🚥</span> 信号灯状态</div>
        <div class="signal-row">
          <span class="signal-label">南北方向</span>
          <div class="signal-light-group" id="ns-lights">
            <div class="signal-dot red" id="ns-red"></div>
            <div class="signal-dot yellow" id="ns-yellow"></div>
            <div class="signal-dot green" id="ns-green"></div>
          </div>
        </div>
        <div class="signal-row">
          <span class="signal-label">东西方向</span>
          <div class="signal-light-group" id="ew-lights">
            <div class="signal-dot red" id="ew-red"></div>
            <div class="signal-dot yellow" id="ew-yellow"></div>
            <div class="signal-dot green" id="ew-green"></div>
          </div>
        </div>
        <div class="direction-indicator">
          <span class="dir-label">N</span>
          <span class="dir-label">S</span>
          <span class="dir-label">E</span>
          <span class="dir-label">W</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="icon">⏱️</span> 信号配时</div>
        <div class="slider-group">
          <div class="slider-row">
            <label>绿灯时长</label>
            <input type="range" id="green-duration" min="10" max="60" value="30" />
            <span class="slider-value" id="green-value">30s</span>
          </div>
          <div class="slider-row">
            <label>红灯时长</label>
            <input type="range" id="red-duration" min="10" max="60" value="30" />
            <span class="slider-value" id="red-value">30s</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="icon">📊</span> 实时统计</div>
        <div class="stat-item">
          <span class="stat-label">路口车辆数</span>
          <span class="stat-value" id="stat-vehicles">0</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">平均等待时间</span>
          <span class="stat-value" id="stat-wait">0.0s</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">通过车辆总数</span>
          <span class="stat-value" id="stat-passed">0</span>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="icon">🎮</span> 操作</div>
        <div class="btn-group">
          <button class="btn btn-primary" id="btn-add">🚗 添加车辆</button>
          <button class="btn btn-danger" id="btn-reset">🔄 重置</button>
        </div>
        <div style="font-size:11px;color:#484f58;text-align:center;margin-top:4px;">按 A 键快速添加车辆</div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
