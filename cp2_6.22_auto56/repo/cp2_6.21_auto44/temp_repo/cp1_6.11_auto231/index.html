<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>货郎行商记 - 古代市井经营模拟</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Noto Serif SC', 'SimSun', '宋体', serif;
      background: linear-gradient(135deg, #2c1810 0%, #4a2c1a 100%);
      overflow: hidden;
      user-select: none;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 800px;
      max-width: 1200px;
      margin: 0 auto;
      overflow: hidden;
    }

    #status-bar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      min-width: 800px;
      height: 60px;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      z-index: 100;
      backdrop-filter: blur(4px);
    }

    .status-item {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #money-display {
      font-size: 22px;
      font-weight: 700;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .money-icon {
      font-size: 24px;
      filter: drop-shadow(0 0 5px rgba(255, 215, 0, 0.6));
    }

    #reputation-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .reputation-label {
      color: #2E8B57;
      font-size: 16px;
      font-weight: 600;
    }

    #reputation-bar {
      width: 200px;
      height: 20px;
      background: rgba(46, 139, 87, 0.2);
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid rgba(46, 139, 87, 0.5);
    }

    #reputation-fill {
      height: 100%;
      width: 50%;
      background: linear-gradient(90deg, #2E8B57, #3CB371);
      border-radius: 10px;
      transition: width 0.3s ease;
      box-shadow: 0 0 10px rgba(46, 139, 87, 0.5);
    }

    #reputation-value {
      color: #90EE90;
      font-size: 14px;
      min-width: 40px;
      text-align: right;
    }

    #stamina-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .heart-icon {
      color: #FF4500;
      font-size: 24px;
      filter: drop-shadow(0 0 5px rgba(255, 69, 0, 0.5));
    }

    #stamina-value {
      color: #FF6347;
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(255, 69, 0, 0.4);
    }

    .pulse-animation {
      animation: pulse 0.3s ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1.0); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1.0); }
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    #trade-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 360px;
      padding: 20px;
      background: #C4A882;
      border-radius: 4px;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.5),
        inset 0 0 30px rgba(139, 94, 60, 0.3);
      z-index: 200;
      display: none;
      clip-path: polygon(
        0% 2%, 3% 0%, 7% 1%, 12% 0%, 18% 2%, 25% 0%, 32% 1%, 40% 0%,
        48% 2%, 55% 0%, 62% 1%, 70% 0%, 78% 2%, 85% 0%, 92% 1%, 98% 0%, 100% 3%,
        99% 10%, 100% 18%, 98% 25%, 100% 32%, 99% 40%, 100% 48%,
        98% 55%, 100% 62%, 99% 70%, 100% 78%, 98% 85%, 100% 92%, 99% 98%,
        97% 100%, 90% 99%, 82% 100%, 75% 99%, 68% 100%, 60% 99%,
        52% 100%, 45% 99%, 38% 100%, 30% 99%, 22% 100%, 15% 99%, 8% 100%, 2% 99%,
        0% 97%, 1% 90%, 0% 82%, 2% 75%, 0% 68%, 1% 60%, 0% 52%,
        2% 45%, 0% 38%, 1% 30%, 0% 22%, 2% 15%, 0% 8%, 1% 2%
      );
    }

    #trade-panel.active {
      display: block;
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    .trade-title {
      text-align: center;
      color: #4a2c1a;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 15px;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.2);
    }

    .customer-info {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      background: rgba(255, 248, 220, 0.7);
      border-radius: 8px;
      margin-bottom: 15px;
    }

    .customer-icon {
      font-size: 28px;
    }

    .customer-details {
      flex: 1;
    }

    .customer-name {
      color: #4a2c1a;
      font-weight: 600;
      font-size: 16px;
    }

    .customer-dialog {
      color: #5c4033;
      font-size: 13px;
      margin-top: 3px;
      font-style: italic;
    }

    .goods-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 15px;
    }

    .goods-item {
      width: 56px;
      height: 56px;
      background: rgba(255, 248, 220, 0.8);
      border: 2px solid #8B5E3C;
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }

    .goods-item:hover {
      transform: translateY(-3px);
      box-shadow: 3px 5px 10px rgba(0,0,0,0.3);
    }

    .goods-item.selected {
      border-color: #DC143C;
      background: rgba(255, 215, 0, 0.4);
      transform: scale(1.05);
    }

    .goods-icon {
      font-size: 28px;
      filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.2));
    }

    .goods-price {
      font-size: 11px;
      color: #8B4513;
      font-weight: 600;
      margin-top: 2px;
    }

    .goods-name {
      font-size: 9px;
      color: #5c4033;
      margin-top: 1px;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .action-btn {
      flex: 1;
      padding: 12px 8px;
      border: none;
      border-radius: 6px;
      color: white;
      font-family: inherit;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease;
      box-shadow: 0 3px 8px rgba(0,0,0,0.3);
      text-shadow: 1px 1px 2px rgba(0,0,0,0.4);
    }

    .action-btn:hover {
      transform: translateY(-2px);
    }

    .action-btn:active {
      animation: btnBounce 0.2s ease-in-out;
    }

    @keyframes btnBounce {
      0% { transform: scale(0.95); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1.0); }
    }

    .btn-raise {
      background: #DC143C;
    }

    .btn-normal {
      background: #4B0082;
    }

    .btn-gift {
      background: #00CC66;
    }

    .btn-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: rgba(139, 69, 19, 0.7);
      color: white;
      border: none;
      border-radius: 50%;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trade-result {
      margin-top: 12px;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
      font-weight: 600;
      display: none;
    }

    .trade-result.success {
      display: block;
      background: rgba(0, 204, 102, 0.2);
      color: #006400;
      border: 1px solid #00CC66;
    }

    .trade-result.fail {
      display: block;
      background: rgba(220, 20, 60, 0.2);
      color: #8B0000;
      border: 1px solid #DC143C;
    }

    #settlement-panel {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 420px;
      padding: 30px;
      background: linear-gradient(135deg, #FFF8DC 0%, #F5DEB3 100%);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      z-index: 300;
      display: none;
      border: 4px solid #8B5E3C;
    }

    #settlement-panel.active {
      display: block;
      animation: fadeIn 0.5s ease-out;
    }

    .settlement-title {
      text-align: center;
      color: #4a2c1a;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    .settlement-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px dashed #8B5E3C;
      font-size: 16px;
      color: #5c4033;
    }

    .settlement-row:last-of-type {
      border-bottom: none;
    }

    .settlement-label {
      font-weight: 600;
    }

    .settlement-value {
      color: #8B4513;
      font-weight: 700;
    }

    .settlement-value.positive {
      color: #2E8B57;
    }

    .evaluation {
      margin-top: 20px;
      padding: 15px;
      background: rgba(255, 248, 220, 0.8);
      border-radius: 8px;
      border: 2px solid #D2B48C;
    }

    .evaluation-title {
      color: #8B5E3C;
      font-weight: 700;
      font-size: 18px;
      margin-bottom: 10px;
      text-align: center;
    }

    .evaluation-text {
      color: #5c4033;
      font-size: 14px;
      line-height: 1.8;
      text-align: center;
    }

    .restart-btn {
      margin-top: 20px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #8B5E3C 0%, #A0522D 100%);
      color: #FFF8DC;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(139, 94, 60, 0.5);
      transition: all 0.3s ease;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 94, 60, 0.6);
    }

    #round-indicator {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 20px;
      color: #FFF8DC;
      font-size: 14px;
      z-index: 50;
      backdrop-filter: blur(4px);
    }

    #mobile-controls {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(0, 0, 0, 0.7);
      padding: 15px;
      z-index: 60;
    }

    @media (max-width: 900px) {
      #mobile-controls {
        display: flex;
        justify-content: space-around;
      }
    }

    .mobile-btn {
      padding: 15px 25px;
      background: #8B5E3C;
      color: #FFF8DC;
      border: 2px solid #D2B48C;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 600;
    }

    .mobile-btn:active {
      transform: scale(0.95);
      background: #A0522D;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="status-bar">
      <div class="status-item">
        <span class="money-icon">🪙</span>
        <span id="money-display">0</span>
        <span style="color:#FFD700; font-size:14px;">文</span>
      </div>
      <div id="reputation-container">
        <span class="reputation-label">声望</span>
        <div id="reputation-bar">
          <div id="reputation-fill"></div>
        </div>
        <span id="reputation-value">50</span>
      </div>
      <div id="stamina-container">
        <span class="heart-icon">❤️</span>
        <span id="stamina-value">100</span>
      </div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="trade-panel">
      <button class="btn-close" onclick="window.closeTradePanel()">✕</button>
      <div class="trade-title">💰 货布交易 💰</div>
      <div class="customer-info" id="customer-info">
        <span class="customer-icon" id="customer-icon">🪙</span>
        <div class="customer-details">
          <div class="customer-name" id="customer-name">豪爽客</div>
          <div class="customer-dialog" id="customer-dialog">这小玩意儿不错，来一个！</div>
        </div>
      </div>
      <div class="goods-grid" id="goods-grid"></div>
      <div class="action-buttons">
        <button class="action-btn btn-raise" onclick="window.handleTradeAction('raise')">抬高价</button>
        <button class="action-btn btn-normal" onclick="window.handleTradeAction('normal')">正常价</button>
        <button class="action-btn btn-gift" onclick="window.handleTradeAction('gift')">送小礼</button>
      </div>
      <div class="trade-result" id="trade-result"></div>
    </div>

    <div id="settlement-panel">
      <div class="settlement-title">📜 今日经营账册 📜</div>
      <div class="settlement-row">
        <span class="settlement-label">交易轮次</span>
        <span class="settlement-value" id="settlement-rounds">0</span>
      </div>
      <div class="settlement-row">
        <span class="settlement-label">成功交易</span>
        <span class="settlement-value positive" id="settlement-success">0</span>
      </div>
      <div class="settlement-row">
        <span class="settlement-label">失败交易</span>
        <span class="settlement-value" id="settlement-fail">0</span>
      </div>
      <div class="settlement-row">
        <span class="settlement-label">当日银钱</span>
        <span class="settlement-value positive" id="settlement-money">0 文</span>
      </div>
      <div class="settlement-row">
        <span class="settlement-label">最终声望</span>
        <span class="settlement-value positive" id="settlement-reputation">0</span>
      </div>
      <div class="evaluation">
        <div class="evaluation-title">🌟 经营评价 🌟</div>
        <div class="evaluation-text" id="evaluation-text"></div>
      </div>
      <button class="restart-btn" onclick="window.restartGame()">明日再开市</button>
    </div>

    <div id="round-indicator">第 <span id="round-count">0</span> 轮交易</div>

    <div id="mobile-controls">
      <button class="mobile-btn" onclick="window.movePeddler('left')">← 左行</button>
      <button class="mobile-btn" onclick="window.movePeddler('right')">右行 →</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
