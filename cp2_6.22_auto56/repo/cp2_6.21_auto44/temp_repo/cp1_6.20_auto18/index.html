<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地壳板块运动与地震分布 - 三维交互可视化</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0B0C10; font-family: 'Source Sans 3', sans-serif; color: #C5C6C7; }
    #canvas-container { position: fixed; inset: 0; z-index: 0; }
    #canvas-container canvas { display: block; width: 100%; height: 100%; }
    #ui-layer { position: fixed; inset: 0; z-index: 10; pointer-events: none; }
    #ui-layer > * { pointer-events: auto; }

    .glass-panel {
      background: rgba(11, 12, 16, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid #45A29E;
      border-radius: 12px;
      padding: 16px;
    }

    #left-panel {
      position: absolute; top: 50%; left: 16px; transform: translateY(-50%);
      width: 220px; display: flex; flex-direction: column; gap: 16px;
    }

    #right-panel {
      position: absolute; top: 50%; right: 16px; transform: translateY(-50%);
      width: 280px; display: flex; flex-direction: column; gap: 16px;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 13px; font-weight: 700;
      color: #45A29E; text-transform: uppercase;
      letter-spacing: 1.5px; margin-bottom: 8px;
    }

    .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
    .stat-label { font-size: 13px; color: #C5C6C7; opacity: 0.8; }
    .stat-value { font-family: 'Orbitron', sans-serif; font-size: 15px; font-weight: 700; color: #45A29E; }

    .btn {
      background: #2C3E50; border: none; border-radius: 8px;
      color: #C5C6C7; font-family: 'Source Sans 3', sans-serif;
      font-size: 14px; font-weight: 600; padding: 10px 16px;
      cursor: pointer; transition: background 0.3s ease, transform 0.15s ease;
      width: 100%; text-align: center;
    }
    .btn:hover { background: #45A29E; color: #0B0C10; }
    .btn:active { transform: scale(0.97); }
    .btn.active { background: #45A29E; color: #0B0C10; }

    .slider-group { display: flex; flex-direction: column; gap: 6px; }
    .slider-group label { font-size: 12px; color: #C5C6C7; opacity: 0.7; }
    .slider-group .slider-val {
      font-family: 'Orbitron', sans-serif; font-size: 13px;
      color: #45A29E; float: right;
    }

    input[type="range"] {
      -webkit-appearance: none; width: 100%; height: 6px;
      background: #2C3E50; border-radius: 3px; outline: none;
      transition: background 0.3s ease;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      background: #45A29E; border-radius: 50%; cursor: pointer;
      transition: transform 0.2s ease;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.2); }
    input[type="range"]::-moz-range-thumb {
      width: 16px; height: 16px; background: #45A29E;
      border-radius: 50%; cursor: pointer; border: none;
    }

    #quake-card {
      position: absolute; left: 50%; bottom: 80px;
      transform: translateX(-50%) scale(0.9); opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none; min-width: 280px;
    }
    #quake-card.visible {
      opacity: 1; transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }
    .card-close {
      position: absolute; top: 8px; right: 10px;
      background: none; border: none; color: #C5C6C7;
      font-size: 18px; cursor: pointer; opacity: 0.6;
      transition: opacity 0.2s;
    }
    .card-close:hover { opacity: 1; }
    .card-title { font-family: 'Orbitron', sans-serif; font-size: 14px; color: #45A29E; margin-bottom: 10px; }
    .card-row { display: flex; justify-content: space-between; padding: 3px 0; font-size: 13px; }
    .card-row .label { color: #C5C6C7; opacity: 0.7; }
    .card-row .value { color: #C5C6C7; font-weight: 600; }

    #tip-container {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      text-align: center; pointer-events: none;
    }
    .tip-text {
      font-size: 14px; color: #45A29E; background: rgba(11,12,16,0.8);
      padding: 8px 20px; border-radius: 20px; border: 1px solid rgba(69,162,158,0.3);
      animation: tipFade 2s ease forwards;
    }
    @keyframes tipFade {
      0% { opacity: 0; transform: translateY(-8px); }
      15% { opacity: 1; transform: translateY(0); }
      75% { opacity: 1; }
      100% { opacity: 0; }
    }

    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 80px; margin-top: 8px; }
    .bar-col {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 4px; height: 100%;
    }
    .bar-fill-container {
      flex: 1; width: 100%; display: flex; align-items: flex-end;
    }
    .bar-fill {
      width: 100%; border-radius: 3px 3px 0 0;
      transition: height 0.5s ease; min-height: 2px;
    }
    .bar-label { font-size: 10px; color: #C5C6C7; opacity: 0.6; }
    .bar-count {
      font-family: 'Orbitron', sans-serif; font-size: 10px; color: #45A29E;
    }

    #latest-quake { font-size: 12px; line-height: 1.6; }
    #latest-quake .lq-label { color: #C5C6C7; opacity: 0.6; }
    #latest-quake .lq-value { color: #C5C6C7; }

    @media (max-width: 768px) {
      #left-panel { top: auto; bottom: 16px; left: 16px; right: 16px; transform: none; width: auto; flex-direction: row; }
      #right-panel {
        top: auto; bottom: 100px; right: 0; left: 0; transform: none;
        width: auto; margin: 0 16px; border-radius: 16px 16px 0 0;
        max-height: 50vh; overflow-y: auto;
      }
      #quake-card {
        left: 0; right: 0; bottom: 0; transform: none; border-radius: 16px 16px 0 0;
        min-width: auto;
      }
      #quake-card.visible { transform: none; }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-layer">
    <div id="left-panel" class="glass-panel">
      <div>
        <div class="panel-title">板块漂移</div>
        <button id="btn-animation" class="btn">开启动画</button>
      </div>
      <div class="slider-group">
        <label>动画速度 <span id="speed-val" class="slider-val">1.0x</span></label>
        <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1" />
      </div>
      <div class="slider-group">
        <label>时间（亿年前）<span id="time-val" class="slider-val">0</span></label>
        <input type="range" id="time-slider" min="0" max="200" step="1" value="0" />
      </div>
    </div>

    <div id="right-panel" class="glass-panel">
      <div>
        <div class="panel-title">地震统计</div>
        <div class="stat-row">
          <span class="stat-label">可见地震数</span>
          <span id="stat-total" class="stat-value">0</span>
        </div>
      </div>
      <div>
        <div class="panel-title">震级分布</div>
        <div class="bar-chart" id="mag-chart">
          <div class="bar-col">
            <div class="bar-count" id="bar-c0">0</div>
            <div class="bar-fill-container"><div class="bar-fill" id="bar-f0" style="height:2px;background:#45A29E;"></div></div>
            <div class="bar-label">0-3</div>
          </div>
          <div class="bar-col">
            <div class="bar-count" id="bar-c1">0</div>
            <div class="bar-fill-container"><div class="bar-fill" id="bar-f1" style="height:2px;background:#66FCF1;"></div></div>
            <div class="bar-label">3-5</div>
          </div>
          <div class="bar-col">
            <div class="bar-count" id="bar-c2">0</div>
            <div class="bar-fill-container"><div class="bar-fill" id="bar-f2" style="height:2px;background:#FF6666;"></div></div>
            <div class="bar-label">5-7</div>
          </div>
          <div class="bar-col">
            <div class="bar-count" id="bar-c3">0</div>
            <div class="bar-fill-container"><div class="bar-fill" id="bar-f3" style="height:2px;background:#FF4444;"></div></div>
            <div class="bar-label">7+</div>
          </div>
        </div>
      </div>
      <div>
        <div class="panel-title">最近地震</div>
        <div id="latest-quake">
          <span class="lq-label">暂无数据</span>
        </div>
      </div>
    </div>

    <div id="quake-card" class="glass-panel">
      <button class="card-close" id="card-close">&times;</button>
      <div class="card-title" id="card-title">地震详情</div>
      <div class="card-row"><span class="label">震级</span><span class="value" id="card-mag">-</span></div>
      <div class="card-row"><span class="label">深度</span><span class="value" id="card-depth">-</span></div>
      <div class="card-row"><span class="label">时间</span><span class="value" id="card-time">-</span></div>
      <div class="card-row"><span class="label">位置</span><span class="value" id="card-loc">-</span></div>
    </div>

    <div id="tip-container"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
