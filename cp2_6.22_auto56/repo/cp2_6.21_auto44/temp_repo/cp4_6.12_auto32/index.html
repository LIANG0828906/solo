<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>塔防游戏 - Tower Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Georgia', 'Times New Roman', serif;
      background: #1a1a1a;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #2d2d2d;
    }

    canvas {
      background: #F5E6C8;
      display: block;
      cursor: pointer;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    #ui-layer > * {
      pointer-events: auto;
    }

    .top-info {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-family: 'Georgia', serif;
    }

    .info-left {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .score-display {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 
        -2px -2px 0 #1a1a1a,
        2px -2px 0 #1a1a1a,
        -2px 2px 0 #1a1a1a,
        2px 2px 0 #1a1a1a,
        0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .gold-display {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 24px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 
        -2px -2px 0 #1a1a1a,
        2px -2px 0 #1a1a1a,
        -2px 2px 0 #1a1a1a,
        2px 2px 0 #1a1a1a;
    }

    .gold-icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFD700 0%, #FFA500 50%, #B8860B 100%);
      border: 2px solid #8B6914;
      box-shadow: 
        inset 0 2px 4px rgba(255, 255, 255, 0.4),
        inset 0 -2px 4px rgba(0, 0, 0, 0.2),
        0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .wave-display {
      font-size: 20px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 
        -2px -2px 0 #1a1a1a,
        2px -2px 0 #1a1a1a,
        -2px 2px 0 #1a1a1a,
        2px 2px 0 #1a1a1a;
      padding: 8px 16px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      border: 2px solid #C8B896;
    }

    .bottom-controls {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 16px;
    }

    .game-btn {
      padding: 12px 28px;
      font-family: 'Georgia', serif;
      font-size: 16px;
      font-weight: bold;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.3),
        0 6px 12px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .game-btn::before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      right: 2px;
      height: 6px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
      border-radius: 6px 6px 0 0;
    }

    .game-btn:hover {
      transform: scale(1.05);
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.3),
        0 8px 16px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }

    .game-btn:active {
      transform: scale(0.98) translateY(2px);
      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.3),
        0 3px 6px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .btn-start {
      background: linear-gradient(to bottom, #2D5A27 0%, #1E3D1A 100%);
    }

    .btn-speed {
      background: linear-gradient(to bottom, #1E40AF 0%, #1E3A8A 100%);
      display: flex;
      align-items: center;
      gap: 4px;
      min-width: 60px;
      justify-content: center;
    }

    .btn-reset {
      background: linear-gradient(to bottom, #DC2626 0%, #991B1B 100%);
    }

    .speed-icon {
      font-size: 18px;
      font-weight: bold;
    }

    .tower-selector {
      position: absolute;
      pointer-events: auto;
      z-index: 100;
    }

    .tower-btn {
      position: absolute;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid #2d2d2d;
      cursor: pointer;
      transition: transform 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow:
        0 4px 8px rgba(0, 0, 0, 0.3),
        inset 0 2px 4px rgba(255, 255, 255, 0.2),
        inset 0 -2px 4px rgba(0, 0, 0, 0.2);
    }

    .tower-btn:hover {
      transform: scale(1.15);
    }

    .tower-btn.arrow {
      background: linear-gradient(to bottom, #5D4037 0%, #3E2723 100%);
    }

    .tower-btn.magic {
      background: linear-gradient(to bottom, #7C3AED 0%, #5B21B6 100%);
    }

    .tower-btn.cannon {
      background: linear-gradient(to bottom, #EA580C 0%, #C2410C 100%);
    }

    .tower-cost {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
      white-space: nowrap;
    }

    .game-over-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .game-over-panel {
      background: linear-gradient(to bottom, #4a4a4a 0%, #2d2d2d 100%);
      padding: 40px 60px;
      border-radius: 16px;
      text-align: center;
      box-shadow:
        0 10px 40px rgba(0, 0, 0, 0.5),
        0 0 0 4px #C8B896,
        0 0 0 8px #2d2d2d;
      font-family: 'Georgia', serif;
    }

    .game-over-title {
      font-size: 36px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 24px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }

    .game-over-stats {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 40px;
      font-size: 20px;
      color: #e0e0e0;
    }

    .stat-label {
      color: #b0b0b0;
    }

    .stat-value {
      font-weight: bold;
      color: #FFD700;
    }

    .victory .game-over-title {
      color: #22C55E;
    }

    .defeat .game-over-title {
      color: #EF4444;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div id="ui-layer"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
