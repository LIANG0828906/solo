<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星云粒子可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'Courier New', monospace;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: fixed;
      top: 0;
      left: 0;
    }

    #control-panel {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 300px;
      padding: 20px;
      background: rgba(30, 30, 35, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      z-index: 100;
      user-select: none;
    }

    #control-panel h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      letter-spacing: 1px;
      color: #fff;
      text-transform: uppercase;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      margin-bottom: 8px;
      color: #b0b0b0;
    }

    .control-value {
      color: #4fc3f7;
      font-weight: 600;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 15px rgba(79, 195, 247, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4fc3f7;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(79, 195, 247, 0.5);
    }

    .theme-buttons {
      display: flex;
      gap: 8px;
    }

    .theme-btn {
      flex: 1;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .theme-btn:hover {
      border-color: #4fc3f7;
      box-shadow: 0 0 12px rgba(79, 195, 247, 0.4);
    }

    .theme-btn.active {
      background: rgba(79, 195, 247, 0.15);
      border-color: #4fc3f7;
      color: #4fc3f7;
      box-shadow: 0 0 8px rgba(79, 195, 247, 0.3);
    }

    @media (max-width: 768px) {
      #control-panel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="control-panel">
    <h2>星云控制面板</h2>
    <div class="control-group">
      <div class="control-label">
        <span>粒子数量</span>
        <span class="control-value" id="particle-count-value">8000</span>
      </div>
      <input type="range" id="particle-count" min="3000" max="15000" step="500" value="8000">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>旋转速度</span>
        <span class="control-value" id="rotation-speed-value">1.0x</span>
      </div>
      <input type="range" id="rotation-speed" min="0.1" max="2.0" step="0.1" value="1.0">
    </div>
    <div class="control-group">
      <div class="control-label">
        <span>颜色主题</span>
      </div>
      <div class="theme-buttons">
        <button class="theme-btn active" data-theme="default">默认</button>
        <button class="theme-btn" data-theme="neon">霓虹</button>
        <button class="theme-btn" data-theme="sunset">暖阳</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
