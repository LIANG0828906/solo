<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>纸牌对战 - Card Battle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0d2818;
      font-family: 'Georgia', 'Times New Roman', serif;
    }
    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .ui-panel {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }
    .score-panel {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 12px;
      gap: 40px;
    }
    .score-item {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #f0e6d2;
      font-size: 18px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    }
    .score-value {
      font-size: 28px;
      min-width: 60px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .score-cubes {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      max-width: 100px;
    }
    .score-cube {
      width: 8px;
      height: 8px;
      border-radius: 1px;
    }
    .score-cube.red { background: #e53935; box-shadow: 0 0 4px rgba(229,57,53,0.6); }
    .score-cube.blue { background: #1e88e5; box-shadow: 0 0 4px rgba(30,136,229,0.6); }
    .turn-indicator {
      text-align: center;
      color: #f0e6d2;
      font-size: 16px;
      margin-top: -8px;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div class="ui-panel">
    <div class="score-panel">
      <div class="score-item">
        <div class="score-cubes" id="red-cubes"></div>
        <span>红方</span>
        <span class="score-value" id="red-score">0</span>
      </div>
      <div class="turn-indicator" id="turn-text">红方回合</div>
      <div class="score-item">
        <span class="score-value" id="blue-score">0</span>
        <span>蓝方</span>
        <div class="score-cubes" id="blue-cubes"></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
