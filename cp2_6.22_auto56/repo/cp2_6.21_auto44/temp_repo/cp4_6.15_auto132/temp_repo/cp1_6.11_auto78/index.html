<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>记忆卡片 - 团队知识闪记</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/marked/marked.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.5/dist/purify.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1A0033 0%, #2D0054 50%, #1A0033 100%);
      background-attachment: fixed;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      min-height: 100vh;
      position: relative;
    }

    .loader {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1A0033 0%, #2D0054 100%);
      z-index: 9999;
      transition: opacity 0.5s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(124, 77, 255, 0.2);
      border-top-color: #7C4DFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .loader-text {
      margin-top: 20px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      letter-spacing: 2px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .glass {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 20px;
    }

    .nav-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 16px;
      border-radius: 16px;
    }

    .nav-logo {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #7C4DFF, #E040FB);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-user {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-user input {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      outline: none;
      width: 140px;
      transition: all 0.3s;
    }

    .nav-user input:focus {
      border-color: #7C4DFF;
      width: 180px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      user-select: none;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-primary {
      background: #7C4DFF;
    }

    .btn-primary:hover {
      background: #651FFF;
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(124, 77, 255, 0.4);
    }

    .btn-green {
      background: #4CAF50;
    }
    .btn-green:hover {
      background: #43A047;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
    }

    .btn-orange {
      background: #FF9800;
    }
    .btn-orange:hover {
      background: #FB8C00;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 152, 0, 0.4);
    }

    .btn-red {
      background: #F44336;
    }
    .btn-red:hover {
      background: #E53935;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 67, 54, 0.4);
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      padding: 0 20px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .create-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 0 24px 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 16px;
      padding: 0 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::before {
      content: '';
      width: 4px;
      height: 20px;
      background: linear-gradient(180deg, #7C4DFF, #E040FB);
      border-radius: 2px;
    }

    .form-card {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255,255,255,0.7);
      margin-bottom: 8px;
    }

    .form-input,
    .form-textarea {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      outline: none;
      transition: all 0.3s;
      font-family: inherit;
    }

    .form-input:focus,
    .form-textarea:focus {
      border-color: #7C4DFF;
      background: rgba(255,255,255,0.08);
      box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.15);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    .hint {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
    }

    .card-list-preview {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 300px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .card-list-preview::-webkit-scrollbar {
      width: 6px;
    }
    .card-list-preview::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 3px;
    }
    .card-list-preview::-webkit-scrollbar-thumb {
      background: rgba(124, 77, 255, 0.5);
      border-radius: 3px;
    }

    .mini-card {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.2s;
    }

    .mini-card:hover {
      background: rgba(255,255,255,0.08);
    }

    .mini-card-content {
      flex: 1;
      min-width: 0;
    }

    .mini-card-front {
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-card-back {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-card-del {
      background: rgba(244, 67, 54, 0.15);
      color: #F44336;
      border: none;
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-left: 10px;
      transition: all 0.2s;
    }

    .mini-card-del:hover {
      background: rgba(244, 67, 54, 0.3);
      transform: scale(1.1);
    }

    .action-row {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .action-row .btn {
      flex: 1;
    }

    .preview-panel {
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 500px;
    }

    .card-3d-wrap {
      perspective: 1200px;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 3 / 2;
      margin: 0 auto 20px;
    }

    .card-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    .card-3d.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 12px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      padding: 28px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card-face-front {
      background: #E3F2FD;
      color: #0D47A1;
    }

    .card-face-back {
      background: #FFF3E0;
      color: #BF360C;
      transform: rotateY(180deg);
    }

    .card-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.6;
      margin-bottom: 12px;
    }

    .card-content {
      flex: 1;
      font-size: 16px;
      line-height: 1.7;
      overflow-y: auto;
      padding-right: 4px;
    }

    .card-content::-webkit-scrollbar {
      width: 4px;
    }
    .card-content::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.05);
    }
    .card-content::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 2px;
    }

    .card-content h1, .card-content h2, .card-content h3 {
      margin: 12px 0 8px;
      font-weight: 700;
    }
    .card-content p { margin: 8px 0; }
    .card-content ul, .card-content ol {
      margin: 8px 0;
      padding-left: 24px;
    }
    .card-content code {
      background: rgba(0,0,0,0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    .card-content pre {
      background: rgba(0,0,0,0.08);
      padding: 12px;
      border-radius: 8px;
      overflow-x: auto;
      margin: 10px 0;
    }
    .card-content pre code {
      background: transparent;
      padding: 0;
    }
    .card-content blockquote {
      border-left: 3px solid rgba(0,0,0,0.2);
      padding-left: 12px;
      margin: 10px 0;
      opacity: 0.85;
    }

    .preview-hint {
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .groups-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      padding: 20px;
    }

    .group-card {
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .group-card:hover {
      transform: translateY(-6px);
      border-color: rgba(124, 77, 255, 0.5);
      box-shadow: 0 16px 40px rgba(124, 77, 255, 0.2);
    }

    .group-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .group-card-name {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }

    .group-card-count {
      background: rgba(124, 77, 255, 0.2);
      color: #B388FF;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .group-card-owner {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 12px;
    }

    .group-card-stats {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .stat-chip {
      flex: 1;
      padding: 8px;
      border-radius: 8px;
      text-align: center;
      font-size: 11px;
      font-weight: 600;
    }

    .stat-chip.high {
      background: rgba(46, 125, 50, 0.2);
      color: #66BB6A;
    }
    .stat-chip.mid {
      background: rgba(230, 81, 0, 0.2);
      color: #FFB74D;
    }
    .stat-chip.low {
      background: rgba(183, 28, 28, 0.2);
      color: #EF5350;
    }

    .group-card-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(124, 77, 255, 0.2);
      color: #B388FF;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .group-card-btn:hover {
      background: rgba(124, 77, 255, 0.35);
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: rgba(255,255,255,0.4);
    }

    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state p {
      margin-bottom: 20px;
    }

    .review-view {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 50;
    }

    .review-header {
      position: absolute;
      top: 20px;
      left: 20px;
      right: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 800px;
      margin: 0 auto;
      width: calc(100% - 40px);
    }

    .review-back {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.3s;
    }

    .review-back:hover {
      background: rgba(255,255,255,0.15);
    }

    .review-progress {
      background: rgba(255,255,255,0.1);
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }

    .review-card-wrap {
      perspective: 1500px;
      width: 100%;
      max-width: 560px;
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
    }

    .review-card-slide {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0; left: 0;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .review-card-slide.slide-out {
      transform: translateX(-120%);
    }

    .review-card-slide.slide-in {
      animation: slideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes slideIn {
      from { transform: translateX(120%); }
      to { transform: translateX(0); }
    }

    .review-card-3d {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .review-card-3d.flipped {
      transform: rotateY(180deg);
    }

    .review-actions {
      margin-top: 28px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 56px;
    }

    .flip-btn {
      width: 120px;
      height: 44px;
      background: #7C4DFF;
      color: #fff;
      border: none;
      border-radius: 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .flip-btn:hover {
      background: #651FFF;
      transform: translateY(-4px);
      box-shadow: 0 10px 30px rgba(124, 77, 255, 0.5);
    }

    .flip-btn:active {
      transform: scale(0.95);
    }

    .feedback-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feedback-btn {
      padding: 12px 22px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .feedback-btn:active {
      transform: scale(0.95);
    }

    .side-panel {
      padding: 20px;
      position: sticky;
      top: 96px;
      height: fit-content;
    }

    .panel-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #fff;
    }

    .chart-container {
      position: relative;
      width: 200px;
      height: 240px;
      margin: 0 auto 16px;
    }

    #pieChart {
      display: block;
      margin: 0 auto;
    }

    .chart-legend {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
    }

    .legend-color {
      width: 12px;
      height: 12px;
      border-radius: 3px;
      flex-shrink: 0;
    }

    .legend-label {
      flex: 1;
      color: rgba(255,255,255,0.75);
    }

    .legend-value {
      font-weight: 700;
      color: #fff;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(26, 0, 51, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.6;
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.2s;
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .review-stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .review-stat {
      padding: 10px 18px;
      border-radius: 12px;
      text-align: center;
      min-width: 100px;
    }

    .review-stat-value {
      font-size: 22px;
      font-weight: 700;
    }

    .review-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-top: 2px;
    }

    .empty-review {
      text-align: center;
      padding: 60px 20px;
      max-width: 400px;
    }

    .empty-review h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    .empty-review p {
      color: rgba(255,255,255,0.6);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 24px;
      max-width: 1400px;
      margin: 0 auto 20px;
    }

    .tab {
      padding: 10px 20px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      color: rgba(255,255,255,0.6);
      transition: all 0.3s;
      border: none;
      background: transparent;
    }

    .tab:hover {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }

    .tab.active {
      color: #fff;
      background: rgba(124, 77, 255, 0.25);
      border: 1px solid rgba(124, 77, 255, 0.4);
    }

    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .create-layout {
        grid-template-columns: 1fr;
      }

      .nav-bar {
        margin: 10px;
        padding: 12px 16px;
      }

      .nav-logo {
        font-size: 16px;
      }

      .nav-user input {
        width: 100px;
      }

      .nav-user input:focus {
        width: 120px;
      }

      .side-panel {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        top: auto;
        width: 100%;
        max-height: 50vh;
        z-index: 90;
        border-radius: 20px 20px 0 0;
        transform: translateY(calc(100% - 60px));
        transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        touch-action: pan-y;
      }

      .side-panel.expanded {
        transform: translateY(0);
      }

      .side-panel-handle {
        width: 40px;
        height: 4px;
        background: rgba(255,255,255,0.3);
        border-radius: 2px;
        margin: 0 auto 12px;
        cursor: grab;
      }

      .review-view {
        padding: 12px;
      }

      .review-header {
        top: 12px;
        left: 12px;
        right: 12px;
        width: calc(100% - 24px);
      }

      .review-card-wrap {
        aspect-ratio: 3 / 4;
      }

      .feedback-buttons {
        flex-direction: column;
        width: 100%;
        max-width: 360px;
      }

      .feedback-btn {
        width: 100%;
        justify-content: center;
      }

      .groups-list {
        grid-template-columns: 1fr;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">加载中 LOADING</div>
  </div>

  <div id="app">
    <div class="nav-bar glass">
      <div class="nav-logo">✦ MemoryCards</div>
      <div class="nav-user">
        <input type="text" id="nicknameInput" placeholder="输入昵称..." maxlength="16" />
      </div>
    </div>

    <div id="createView" class="view">
      <div class="tabs">
        <button class="tab active" data-view="create">✚ 创建卡片组</button>
        <button class="tab" data-view="groups">📚 我的卡片组</button>
      </div>
      <div class="main-layout">
        <div>
          <div class="create-layout">
            <div class="glass form-card">
              <div class="section-title">卡片信息</div>
              <div class="form-group">
                <label class="form-label">卡片组名称</label>
                <input type="text" class="form-input" id="groupNameInput" placeholder="例如：六级词汇、数据库原理" maxlength="50" />
              </div>
              <div class="form-group">
                <label class="form-label">正面（问题）</label>
                <textarea class="form-textarea" id="frontInput" placeholder="支持 Markdown 格式：**加粗**、`代码`、```代码块```、列表、公式..."></textarea>
                <div class="hint">支持 Markdown：代码块、列表、数学公式等</div>
              </div>
              <div class="form-group">
                <label class="form-label">背面（答案）</label>
                <textarea class="form-textarea" id="backInput" placeholder="卡片背面的答案内容..."></textarea>
              </div>
              <div class="action-row">
                <button class="btn btn-primary" id="addCardBtn">＋ 添加到卡片组</button>
                <button class="btn" id="clearCardBtn" style="background: rgba(255,255,255,0.1);">清空当前</button>
              </div>

              <div class="section-title" style="margin-top: 32px;">
                已添加卡片 <span id="cardCount" style="color: #B388FF; font-size: 14px;">(0)</span>
              </div>
              <div class="card-list-preview" id="cardsList"></div>

              <div class="action-row" style="margin-top: 24px;">
                <button class="btn btn-primary" id="createGroupBtn" style="flex: 2;">🚀 创建卡片组</button>
              </div>
            </div>

            <div class="glass preview-panel">
              <div class="section-title" style="width: 100%; margin-top: -8px;">实时预览</div>
              <div class="card-3d-wrap" id="previewCardWrap">
                <div class="card-3d" id="previewCard">
                  <div class="card-face card-face-front">
                    <div class="card-label">正面 · FRONT</div>
                    <div class="card-content" id="previewFront">在此输入问题开始预览...</div>
                  </div>
                  <div class="card-face card-face-back">
                    <div class="card-label">背面 · BACK</div>
                    <div class="card-content" id="previewBack">在此输入答案开始预览...</div>
                  </div>
                </div>
              </div>
              <div class="preview-hint">👆 点击卡片可翻转查看正反面</div>
            </div>
          </div>
        </div>

        <aside class="glass side-panel" id="sidePanel">
          <div class="side-panel-handle" id="panelHandle"></div>
          <div class="panel-title">📊 记忆状态</div>
          <div class="chart-container" id="chartContainer">
            <canvas id="pieChart" width="200" height="200"></canvas>
            <div class="tooltip" id="chartTooltip"></div>
          </div>
          <div class="chart-legend" id="chartLegend"></div>
        </aside>
      </div>
    </div>

    <div id="groupsView" class="view">
      <div class="tabs">
        <button class="tab" data-view="create">✚ 创建卡片组</button>
        <button class="tab active" data-view="groups">📚 我的卡片组</button>
      </div>
      <div class="groups-list" id="groupsList">
        <div class="empty-state">
          <div class="empty-state-icon">📭</div>
          <p>暂无卡片组，点击"创建卡片组"开始吧！</p>
          <button class="btn btn-primary" data-goto-create">＋ 创建第一个卡片组</button>
        </div>
      </div>
    </div>

    <div id="reviewView" class="view">
      <div class="review-view" id="reviewContainer"></div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
