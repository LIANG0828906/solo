<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraFlow - 粒子情感可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; color: #fff; }

    #app { display: flex; width: 100%; height: 100%; }

    #panel {
      width: 280px;
      min-width: 280px;
      height: 100%;
      background: rgba(20, 20, 40, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      display: flex;
      flex-direction: column;
      padding: 24px 20px;
      gap: 20px;
      z-index: 10;
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
    }

    .panel-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #4a9eff, #6c5ce7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .panel-subtitle {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
    }

    .input-group { display: flex; flex-direction: column; gap: 8px; }
    .input-group label { font-size: 13px; color: rgba(255,255,255,0.6); }

    #textInput {
      width: 100%;
      min-height: 80px;
      max-height: 120px;
      resize: vertical;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 10px 12px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    #textInput:focus {
      border-color: #4a9eff;
      box-shadow: 0 0 12px rgba(74, 158, 255, 0.35);
    }
    #textInput::placeholder { color: rgba(255,255,255,0.25); }

    .char-count {
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      text-align: right;
    }

    #visualizeBtn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #4a9eff, #6c5ce7);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s, transform 0.15s;
      letter-spacing: 1px;
    }
    #visualizeBtn:hover { filter: brightness(1.1); }
    #visualizeBtn:active { transform: scale(0.95); }

    .error-msg {
      color: #ff4d4d;
      font-size: 12px;
      min-height: 18px;
      transition: opacity 0.2s;
    }
    .error-msg.shake {
      animation: shake 0.3s ease;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-4px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(-3px); }
      80% { transform: translateX(3px); }
    }

    .result-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 4px;
    }

    .result-label {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-display {
      font-size: 36px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      transition: color 0.4s;
    }
    .score-positive { color: #ff9f43; }
    .score-neutral { color: #00d2d3; }
    .score-negative { color: #a29bfe; }

    .keyword-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .keyword-tag {
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.7);
    }

    .shape-legend {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
    }
    .shape-legend span::before {
      content: '● ';
      font-size: 8px;
    }

    #canvasContainer {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    #canvasContainer canvas { display: block; width: 100%; height: 100%; }

    .fps-counter {
      position: absolute;
      top: 12px;
      right: 12px;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      font-variant-numeric: tabular-nums;
    }

    #mobileToggle {
      display: none;
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 20;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: rgba(20,20,40,0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      #app { flex-direction: column; }
      #panel {
        width: 100%;
        min-width: 100%;
        height: auto;
        max-height: 50vh;
        border-right: none;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding: 16px;
        display: none;
      }
      #panel.open { display: flex; }
      #mobileToggle { display: flex; }
      #canvasContainer { flex: 1; min-height: 50vh; }
    }
  </style>
</head>
<body>
  <button id="mobileToggle">☰</button>
  <div id="app">
    <div id="panel">
      <div>
        <div class="panel-title">AuraFlow</div>
        <div class="panel-subtitle">粒子情感可视化</div>
      </div>
      <div class="input-group">
        <label for="textInput">输入文本</label>
        <textarea id="textInput" placeholder="输入一段文字，感受情感的流动…" maxlength="200"></textarea>
        <div class="char-count"><span id="charCount">0</span>/200</div>
        <div class="error-msg" id="errorMsg"></div>
      </div>
      <button id="visualizeBtn">可视化</button>
      <div class="result-section">
        <div>
          <div class="result-label">情感得分</div>
          <div class="score-display" id="scoreDisplay">0.00</div>
        </div>
        <div>
          <div class="result-label">关键词</div>
          <div class="keyword-list" id="keywordList"></div>
        </div>
        <div>
          <div class="result-label">粒子形态</div>
          <div class="shape-legend" id="shapeLegend"></div>
        </div>
      </div>
    </div>
    <div id="canvasContainer">
      <div class="fps-counter" id="fpsCounter">-- fps</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
