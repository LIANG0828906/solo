<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GestureSculpt 手势雕塑</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #0a0a0a;
      font-family: system-ui, sans-serif;
    }
    #canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #video {
      display: none;
    }
    #camera-preview {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 200px;
      height: 150px;
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    #camera-preview video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
    }
    #camera-preview #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 16px;
      text-align: center;
    }
    #control-panel {
      position: fixed;
      bottom: 20px;
      left: 20px;
    }
    #bottom-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 16px;
      color: rgba(255, 255, 255, 0.3);
      opacity: 0;
      animation: fadeIn 0.5s forwards 1s;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <video id="video"></video>
  <div id="camera-preview">
    <video></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="hint"></div>
  <div id="control-panel"></div>
  <div id="bottom-hint">Hey! 张开手掌或握拳试试</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
