<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 天气可视化看板</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <div class="scene-container">
      <canvas id="scene-canvas"></canvas>
    </div>
    <div id="ui-overlay">
      <div class="search-container">
        <input type="text" id="city-search" placeholder="搜索城市..." autocomplete="off">
        <div id="city-suggestions" class="suggestions hidden"></div>
      </div>
      <div class="data-panel">
        <div class="data-card">
          <div class="card-label">温度</div>
          <div class="card-value" id="temp-value">--°C</div>
        </div>
        <div class="data-card">
          <div class="card-label">降水概率</div>
          <div class="card-value">
            <div class="rain-progress">
              <div class="rain-progress-bar" id="rain-progress"></div>
              <span id="rain-value">--%</span>
            </div>
          </div>
          <div class="card-label">风速风向</div>
          <div class="card-value wind-value">
            <span id="wind-value">-- m/s</span>
            <div class="wind-arrow" id="wind-arrow"></div>
          </div>
        </div>
        <div class="timeline-container">
          <div class="timeline-controls">
            <button id="play-pause" class="control-btn">▶</button>
            <div class="speed-selector">
              <button class="speed-btn active" data-speed="1">1x</button>
              <button class="speed-btn" data-speed="2">2x</button>
              <button class="speed-btn" data-speed="4">4x</button>
            </div>
            <div class="current-time" id="current-time">00:00</div>
          </div>
          <div class="timeline-track" id="timeline-track">
            <div class="timeline-progress" id="timeline-progress"></div>
            <div class="timeline-pointer" id="timeline-pointer"></div>
          </div>
        </div>
        <button id="reset-view" class="reset-btn" title="重置视角">⟳</button>
      </div>
      <div class="chart-container">
        <canvas id="temp-chart"></canvas>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
