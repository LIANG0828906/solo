<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="节奏地牢 - 音乐节奏与地牢探索的完美结合" />
  <title>节奏地牢 | Rhythm Dungeon</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0414;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0414 70%, #050208 100%);
    }

    #game-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 215, 0, 0.02) 2px,
          rgba(255, 215, 0, 0.02) 4px
        );
      pointer-events: none;
      z-index: 10;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 60px rgba(255, 215, 0, 0.15), 0 0 120px rgba(74, 44, 122, 0.3);
      border-radius: 8px;
    }

    #loading {
      position: absolute;
      color: #ffd700;
      font-size: 20px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      letter-spacing: 4px;
      z-index: 100;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="loading">加载中...</div>
  </div>
  <script type="module" src="/src/GameScene.ts"></script>
</body>
</html>
