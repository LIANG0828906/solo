<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CityLight Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0c29 0%, #302b63 100%);
      min-width: 1024px;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #scene-container {
      width: calc(100% - 280px);
      height: 100%;
      position: relative;
    }

    #canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #panel-container {
      width: 280px;
      height: 100%;
      padding: 20px;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .panel {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .panel-title {
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      letter-spacing: 0.5px;
    }

    .slider-group {
      margin-bottom: 12px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .slider-value {
      color: #64b5f6;
      font-weight: 500;
    }

    input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
      -webkit-appearance: none;
      cursor: pointer;
      transition: all 200ms ease;
    }

    input[type="range"]:hover {
      transform: scale(1.05);
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #64b5f6 0%, #1976d2 100%);
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(100, 181, 246, 0.5);
      transition: all 200ms ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .btn-group {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: rgba(100, 181, 246, 0.2);
      color: #64b5f6;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 200ms ease;
    }

    .btn:hover {
      background: rgba(100, 181, 246, 0.3);
      transform: scale(1.05);
    }

    .btn:active {
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(100, 181, 246, 0.7);
      }
      70% {
        box-shadow: 0 0 0 10px rgba(100, 181, 246, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(100, 181, 246, 0);
      }
    }

    .toggle-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
    }

    .toggle-label {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      cursor: pointer;
      transition: background 300ms ease;
    }

    .toggle.active {
      background: linear-gradient(135deg, #64b5f6 0%, #1976d2 100%);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 300ms ease;
    }

    .toggle.active::after {
      transform: translateX(20px);
    }

    .param-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .param-item:last-child {
      border-bottom: none;
    }

    .param-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 11px;
    }

    .param-value {
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      font-family: 'Monaco', 'Consolas', monospace;
    }

    .time-display {
      text-align: center;
      padding: 16px 0;
    }

    .time-value {
      font-size: 32px;
      font-weight: 300;
      color: #fff;
      letter-spacing: 2px;
      font-family: 'Monaco', 'Consolas', monospace;
    }

    .time-period {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .scene-overlay {
      position: absolute;
      bottom: 20px;
      left: 20px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 11px;
      pointer-events: none;
    }

    .fade-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f0c29;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .fade-overlay.active {
      opacity: 1;
    }

    .sun-indicator {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 60px;
      height: 60px;
      pointer-events: none;
    }

    .sun-indicator svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container">
      <canvas id="canvas"></canvas>
      <div class="fade-overlay" id="fade-overlay"></div>
      <div class="scene-overlay">
        鼠标拖拽旋转 · 滚轮缩放 · 拖动太阳图标调整光源
      </div>
    </div>
    <div id="panel-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
