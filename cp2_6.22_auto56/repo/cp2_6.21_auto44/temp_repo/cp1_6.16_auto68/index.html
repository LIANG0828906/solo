<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>化学分子结构与键能可视化</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    
    <div class="top-control-bar">
      <div class="control-group">
        <label class="control-label">振动幅度</label>
        <input type="range" id="amplitude-slider" min="0" max="0.5" step="0.01" value="0.2" />
        <span id="amplitude-value" class="value-display">0.20</span>
        <span class="unit">埃</span>
      </div>
      <div class="control-group">
        <label class="control-label">振动动画</label>
        <button id="vibration-toggle" class="toggle-btn active">
          <span class="toggle-indicator"></span>
          <span class="toggle-text">开启</span>
        </button>
      </div>
    </div>
    
    <div class="left-toolbar">
      <div class="toolbar-title">分子</div>
      <select id="molecule-select" class="molecule-select">
        <option value="h2o">H₂O 水</option>
        <option value="co2">CO₂ 二氧化碳</option>
        <option value="ch4">CH₄ 甲烷</option>
      </select>
      <div class="toolbar-divider"></div>
      <button id="reset-view-btn" class="toolbar-btn" title="重置视角">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
    </div>
    
    <div id="info-panel" class="info-panel">
      <div class="panel-header">
        <h3>化学键信息</h3>
        <button id="close-panel" class="close-btn">&times;</button>
      </div>
      <div class="panel-content">
        <div id="empty-state" class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <p>点击化学键查看详细信息</p>
        </div>
        <div id="bond-info" class="bond-info hidden">
          <div class="info-row">
            <span class="info-label">键类型</span>
            <span id="bond-type" class="info-value">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">键长</span>
            <span id="bond-length" class="info-value">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">键能</span>
            <span id="bond-energy" class="info-value">-</span>
          </div>
          <div class="info-row">
            <span class="info-label">振动频率</span>
            <span id="bond-frequency" class="info-value">-</span>
          </div>
          <div class="waveform-container">
            <label class="waveform-label">伸缩振动波形</label>
            <canvas id="waveform-canvas" width="200" height="80"></canvas>
          </div>
        </div>
      </div>
    </div>
    
    <div id="atom-tooltip" class="atom-tooltip hidden">
      <div id="tooltip-content"></div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
