<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PipeVue - 地下管线3D可视化与碰撞检测</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0F1E;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .legend {
      position: absolute;
      top: 20px;
      left: 20px;
      display: flex;
      gap: 20px;
      background: #1E293B80;
      backdrop-filter: blur(4px);
      padding: 12px 20px;
      border-radius: 8px;
      z-index: 10;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
    .legend-water { background: #2196F3; }
    .legend-power { background: #FFEB3B; }
    .legend-gas { background: #FF9800; }

    .collision-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: #00000080;
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 16px;
      min-width: 220px;
      z-index: 10;
    }
    .collision-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #FF1744;
    }
    .collision-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .collision-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #00000040;
      border-radius: 6px;
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
    }
    .collision-pair {
      color: #ffffff;
    }
    .collision-distance {
      color: #FF1744;
      font-weight: 600;
    }

    .property-panel {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%) translateX(120%);
      width: 240px;
      background: #1E293B80;
      backdrop-filter: blur(4px);
      border-radius: 8px;
      padding: 20px;
      z-index: 20;
      transition: transform 0.3s ease;
    }
    .property-panel.active {
      transform: translateY(-50%) translateX(0);
    }
    .property-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid #ffffff20;
    }
    .property-row {
      margin-bottom: 10px;
      font-size: 13px;
    }
    .property-label {
      color: #ffffff80;
      margin-bottom: 4px;
    }
    .property-value {
      color: #ffffff;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .property-conflicts {
      margin-top: 16px;
      padding-top: 12px;
      border-top: 1px solid #ffffff20;
    }
    .property-conflicts-title {
      font-size: 13px;
      color: #FF1744;
      margin-bottom: 8px;
    }
    .conflict-pipe {
      padding: 6px 10px;
      background: #FF174420;
      border-radius: 4px;
      font-size: 12px;
      margin-bottom: 4px;
    }
    .panel-buttons {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .panel-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-clear {
      background: #FF1744;
      color: white;
    }
    .btn-clear:hover {
      background: #ff4569;
    }
    .btn-reset {
      background: #2196F3;
      color: white;
    }
    .btn-reset:hover {
      background: #4dabf5;
    }

    .tooltip {
      position: absolute;
      background: #1E293Bcc;
      backdrop-filter: blur(4px);
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .tooltip.visible {
      opacity: 1;
    }
    .tooltip-type {
      font-weight: 600;
      margin-bottom: 4px;
    }
    .tooltip-diameter {
      color: #ffffffaa;
    }

    @media (max-width: 1280px) {
      .property-panel {
        width: 60px;
        height: 60px;
        padding: 0;
        transform: translateY(-50%) translateX(0);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .property-panel .panel-content {
        display: none;
      }
      .property-panel.active .panel-content {
        display: block;
      }
      .property-panel.active {
        width: 240px;
        height: auto;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="legend">
      <div class="legend-item">
        <div class="legend-dot legend-water"></div>
        <span>供水管线</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot legend-power"></div>
        <span>电力管线</span>
      </div>
      <div class="legend-item">
        <div class="legend-dot legend-gas"></div>
        <span>燃气管线</span>
      </div>
    </div>

    <div class="collision-panel">
      <div class="collision-title">冲突检测</div>
      <div class="collision-list" id="collisionList">
      </div>
    </div>

    <div class="property-panel" id="propertyPanel">
      <div class="panel-content">
        <div class="property-title" id="propertyTitle">管线属性</div>
        <div class="property-row">
          <div class="property-label">类型</div>
          <div class="property-value" id="propertyType">-</div>
        </div>
        <div class="property-row">
          <div class="property-label">起点坐标</div>
          <div class="property-value" id="propertyStart">-</div>
        </div>
        <div class="property-row">
          <div class="property-label">终点坐标</div>
          <div class="property-value" id="propertyEnd">-</div>
        </div>
        <div class="property-row">
          <div class="property-label">管径</div>
          <div class="property-value" id="propertyDiameter">-</div>
        </div>
        <div class="property-row">
          <div class="property-label">埋深</div>
          <div class="property-value" id="propertyDepth">-</div>
        </div>
        <div class="property-conflicts" id="propertyConflicts">
        </div>
        <div class="panel-buttons">
          <button class="panel-btn btn-clear" id="clearMarkersBtn">清除所有冲突标记</button>
          <button class="panel-btn btn-reset" id="resetCameraBtn">重置视角</button>
        </div>
      </div>
    </div>

    <div class="tooltip" id="tooltip">
      <div class="tooltip-type" id="tooltipType"></div>
      <div class="tooltip-diameter" id="tooltipDiameter"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
