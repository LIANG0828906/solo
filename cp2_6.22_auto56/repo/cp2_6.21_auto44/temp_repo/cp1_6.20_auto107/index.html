<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tactical Battle Simulator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Exo 2', sans-serif;
      color: #c8d6e5;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #battlefield {
      width: 70%;
      height: 100%;
      position: relative;
      cursor: default;
    }

    #battlefield canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #side-panel {
      width: 30%;
      height: 100%;
      background: rgba(16, 16, 36, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(0, 212, 255, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-section {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }

    .panel-title {
      font-size: 13px;
      font-weight: 600;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px;
    }

    #stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .stat-item {
      background: rgba(0, 212, 255, 0.06);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 8px;
      padding: 8px 10px;
      text-align: center;
    }

    .stat-label {
      font-size: 10px;
      font-weight: 300;
      color: #7f8c9b;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
    }

    #action-log {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      min-height: 0;
    }

    #action-log .panel-title {
      position: sticky;
      top: 0;
      background: rgba(16, 16, 36, 0.95);
      padding: 4px 0 8px;
      z-index: 1;
    }

    .log-entry {
      font-size: 12px;
      padding: 5px 8px;
      margin-bottom: 3px;
      border-radius: 4px;
      background: rgba(255,255,255,0.03);
      line-height: 1.4;
      transition: background 0.2s;
    }

    .log-entry:hover {
      background: rgba(255,255,255,0.06);
    }

    .log-time {
      font-size: 10px;
      color: #556677;
      margin-right: 6px;
    }

    .log-player {
      color: #4488ff;
    }

    .log-enemy {
      color: #ff4444;
    }

    .log-system {
      color: #00d4ff;
    }

    #unit-info {
      padding: 12px 16px;
      border-top: 1px solid rgba(0, 212, 255, 0.1);
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
      min-height: 140px;
    }

    .unit-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .unit-name.player { color: #4488ff; }
    .unit-name.enemy { color: #ff4444; }

    .attr-bar {
      margin-bottom: 5px;
    }

    .attr-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      margin-bottom: 2px;
    }

    .attr-bar-track {
      height: 6px;
      background: rgba(255,255,255,0.08);
      border-radius: 3px;
      overflow: hidden;
    }

    .attr-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .attr-bar-fill.hp { background: linear-gradient(90deg, #ff4444, #ff6666); }
    .attr-bar-fill.shield { background: linear-gradient(90deg, #ffd700, #ffec80); }

    .unit-attrs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 4px;
      margin-top: 6px;
    }

    .unit-attr {
      text-align: center;
      background: rgba(0,212,255,0.05);
      border-radius: 4px;
      padding: 3px 2px;
    }

    .unit-attr .label {
      font-size: 9px;
      color: #556677;
    }

    .unit-attr .value {
      font-size: 14px;
      font-weight: 600;
      color: #c8d6e5;
    }

    #skill-buttons {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .skill-btn {
      position: relative;
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.25);
      color: #c8d6e5;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .skill-btn:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
      color: #fff;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }

    .skill-btn.active {
      background: rgba(0, 212, 255, 0.3);
      border-color: #00d4ff;
      color: #fff;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
    }

    .skill-tooltip {
      display: none;
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.95);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 400;
      color: #c8d6e5;
      white-space: nowrap;
      z-index: 100;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    .skill-btn:hover .skill-tooltip {
      display: block;
    }

    #action-buttons {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }

    .action-btn {
      flex: 1;
      padding: 10px 16px;
      border-radius: 20px;
      font-family: 'Exo 2', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      border: 1px solid;
    }

    #btn-restart {
      background: rgba(255, 68, 68, 0.1);
      border-color: rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }

    #btn-restart:hover {
      background: rgba(255, 68, 68, 0.2);
      border-color: #ff4444;
      box-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
    }

    #btn-export {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.3);
      color: #00d4ff;
    }

    #btn-export:hover {
      background: rgba(0, 212, 255, 0.2);
      border-color: #00d4ff;
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.3);
    }

    #phase-banner {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.9);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 24px;
      padding: 8px 28px;
      font-size: 14px;
      font-weight: 600;
      color: #00d4ff;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.3s;
      backdrop-filter: blur(8px);
    }

    #turn-indicator {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(10, 10, 30, 0.8);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 16px;
      padding: 6px 20px;
      font-size: 12px;
      font-weight: 400;
      color: #8899aa;
      z-index: 10;
      pointer-events: none;
    }

    #deploy-palette {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      background: rgba(10, 10, 30, 0.9);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 16px;
      padding: 12px 20px;
      backdrop-filter: blur(8px);
    }

    .deploy-unit {
      width: 56px;
      height: 64px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: grab;
      transition: all 0.2s ease;
      border: 2px solid transparent;
      font-size: 10px;
      font-weight: 600;
      user-select: none;
    }

    .deploy-unit.player {
      background: rgba(68, 136, 255, 0.15);
      border-color: rgba(68, 136, 255, 0.3);
      color: #4488ff;
    }

    .deploy-unit.player:hover {
      background: rgba(68, 136, 255, 0.25);
      border-color: #4488ff;
      box-shadow: 0 0 12px rgba(68, 136, 255, 0.3);
    }

    .deploy-unit.enemy {
      background: rgba(255, 68, 68, 0.15);
      border-color: rgba(255, 68, 68, 0.3);
      color: #ff4444;
    }

    .deploy-unit.enemy:hover {
      background: rgba(255, 68, 68, 0.25);
      border-color: #ff4444;
      box-shadow: 0 0 12px rgba(255, 68, 68, 0.3);
    }

    .deploy-unit-icon {
      font-size: 22px;
      margin-bottom: 2px;
    }

    #btn-start-battle {
      background: rgba(0, 212, 255, 0.15);
      border: 1px solid rgba(0, 212, 255, 0.4);
      color: #00d4ff;
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 10px 24px;
      border-radius: 16px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    #btn-start-battle:hover {
      background: rgba(0, 212, 255, 0.3);
      border-color: #00d4ff;
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.4);
    }

    #action-log::-webkit-scrollbar {
      width: 4px;
    }

    #action-log::-webkit-scrollbar-track {
      background: transparent;
    }

    #action-log::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 2px;
    }

    .game-over-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 10, 30, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      backdrop-filter: blur(6px);
    }

    .game-over-title {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .game-over-title.victory { color: #4488ff; }
    .game-over-title.defeat { color: #ff4444; }

    .game-over-sub {
      font-size: 14px;
      color: #7f8c9b;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="battlefield">
      <canvas id="canvas"></canvas>
      <div id="phase-banner">DEPLOY PHASE</div>
      <div id="turn-indicator">Drag units onto the grid to deploy</div>
      <div id="deploy-palette">
        <div class="deploy-unit player" draggable="true" data-team="player" data-template="warrior">
          <div class="deploy-unit-icon">⚔</div>
          <div>战士</div>
        </div>
        <div class="deploy-unit player" draggable="true" data-team="player" data-template="mage">
          <div class="deploy-unit-icon">🔥</div>
          <div>法师</div>
        </div>
        <div class="deploy-unit player" draggable="true" data-team="player" data-template="healer">
          <div class="deploy-unit-icon">💚</div>
          <div>治疗</div>
        </div>
        <div class="deploy-unit enemy" draggable="true" data-team="enemy" data-template="warrior">
          <div class="deploy-unit-icon">⚔</div>
          <div>战士</div>
        </div>
        <div class="deploy-unit enemy" draggable="true" data-team="enemy" data-template="mage">
          <div class="deploy-unit-icon">🔥</div>
          <div>法师</div>
        </div>
        <div class="deploy-unit enemy" draggable="true" data-team="enemy" data-template="healer">
          <div class="deploy-unit-icon">💚</div>
          <div>治疗</div>
        </div>
        <button id="btn-start-battle">START BATTLE</button>
      </div>
    </div>
    <div id="side-panel">
      <div class="panel-section">
        <div class="panel-title">Battle Stats</div>
        <div id="stats-grid">
          <div class="stat-item">
            <div class="stat-label">ROUND</div>
            <div class="stat-value" id="stat-round">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">ALLY LEFT</div>
            <div class="stat-value" id="stat-ally">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">ENEMY LEFT</div>
            <div class="stat-value" id="stat-enemy">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">TOTAL DMG</div>
            <div class="stat-value" id="stat-dmg">0</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">HIT RATE</div>
            <div class="stat-value" id="stat-hit">0%</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">SKILLS USED</div>
            <div class="stat-value" id="stat-skills">0</div>
          </div>
        </div>
      </div>
      <div id="action-log">
        <div class="panel-title">Action Log</div>
      </div>
      <div id="unit-info">
        <div style="color:#556677;font-size:12px;text-align:center;padding:20px 0;">Select a unit to view details</div>
      </div>
      <div id="action-buttons">
        <button class="action-btn" id="btn-restart">RESTART</button>
        <button class="action-btn" id="btn-export">EXPORT LOG</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
