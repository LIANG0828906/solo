<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>符文音符锻造 · Rune Note Forge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      background: radial-gradient(ellipse at center, #1A1530 0%, #0D0A16 100%);
      color: #E8E0FF;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #stageCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
    }

    .top-panel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 120px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      z-index: 10;
      pointer-events: none;
    }

    .top-panel-inner {
      display: flex;
      align-items: center;
      gap: 20px;
      pointer-events: auto;
    }

    .sequence-track {
      display: flex;
      align-items: center;
      gap: 0;
      min-height: 20px;
      padding: 8px 14px;
      background: rgba(26, 21, 48, 0.55);
      border: 1px solid rgba(168, 85, 247, 0.25);
      border-radius: 12px;
      backdrop-filter: blur(6px);
    }

    .seq-dot-wrap {
      position: relative;
      width: 20px;
      height: 20px;
      margin: 0 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: width 0.15s ease-out, margin 0.15s ease-out, opacity 0.15s ease-out;
    }

    .seq-dot-wrap.removing {
      width: 0;
      margin: 0;
      opacity: 0;
    }

    .seq-dot {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor, inset 0 0 4px rgba(255,255,255,0.3);
      transition: transform 0.15s ease-out;
    }

    .seq-dot-wrap.removing .seq-dot {
      transform: scale(0);
    }

    .seq-line {
      width: 8px;
      height: 1px;
      background: rgba(255, 255, 255, 0.3);
      flex-shrink: 0;
      transition: width 0.1s ease-out, opacity 0.1s ease-out;
    }

    .seq-line.hidden {
      width: 0;
      opacity: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn-play {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #A855F7 0%, #7C3AED 100%);
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: filter 0.2s ease-out, transform 0.1s ease-out;
      box-shadow: 0 4px 20px rgba(168, 85, 247, 0.4);
    }

    .btn-play:hover:not(:disabled) {
      filter: brightness(1.15);
    }

    .btn-play:active:not(:disabled) {
      transform: scale(0.95);
    }

    .btn-play:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.4);
    }

    .btn-clear {
      width: 30px;
      height: 30px;
      border: none;
      border-radius: 50%;
      background: #FF4466;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease-out, transform 0.1s ease-out;
      box-shadow: 0 4px 16px rgba(255, 68, 102, 0.4);
      position: relative;
    }

    .btn-clear:hover {
      background: #FF6688;
    }

    .btn-clear:active {
      transform: scale(0.9);
    }

    .btn-clear::before,
    .btn-clear::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
    }

    .btn-clear::before {
      transform: rotate(45deg);
    }

    .btn-clear::after {
      transform: rotate(-45deg);
    }

    .btn-clear:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .title-hint {
      position: absolute;
      bottom: 28px;
      left: 0;
      right: 0;
      text-align: center;
      pointer-events: none;
      z-index: 5;
    }

    .title-hint h1 {
      font-family: 'Cinzel', serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 6px;
      color: rgba(232, 224, 255, 0.7);
      text-shadow: 0 0 14px rgba(168, 85, 247, 0.4);
    }

    .title-hint p {
      margin-top: 8px;
      font-size: 12px;
      letter-spacing: 2px;
      color: rgba(232, 224, 255, 0.35);
    }

    @media (max-width: 600px) {
      .top-panel {
        height: 100px;
        padding: 0 12px;
      }
      .top-panel-inner {
        gap: 12px;
      }
      .actions {
        gap: 8px;
      }
      .btn-play {
        padding: 8px 14px;
        font-size: 12px;
        letter-spacing: 0.5px;
      }
      .title-hint h1 {
        font-size: 16px;
        letter-spacing: 3px;
      }
      .title-hint p {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="stageCanvas"></canvas>

    <div class="top-panel">
      <div class="top-panel-inner">
        <div class="sequence-track" id="sequenceTrack"></div>
        <div class="actions">
          <button class="btn-play" id="btnPlay" disabled>播放序列</button>
          <button class="btn-clear" id="btnClear" disabled title="清除序列"></button>
        </div>
      </div>
    </div>

    <div class="title-hint">
      <h1>RUNE&nbsp;·&nbsp;NOTE&nbsp;·&nbsp;FORGE</h1>
      <p>点选符文 · 组合音节 · 聆听魔法</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
