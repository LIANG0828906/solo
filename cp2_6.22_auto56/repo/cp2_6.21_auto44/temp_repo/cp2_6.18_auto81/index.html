<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>MolViewer3D · 三维分子结构查看器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0f0f23;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
        color: #e0e0f0;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }
      #canvas-container {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, #1a1a2e 0%, #0f0f23 50%, #0a0a18 100%);
      }
      #canvas-container::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          radial-gradient(ellipse at 20% 30%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
          radial-gradient(ellipse at 80% 70%, rgba(100, 50, 200, 0.04) 0%, transparent 50%);
        pointer-events: none;
        z-index: 1;
      }
      canvas {
        display: block;
        position: absolute;
        inset: 0;
        z-index: 2;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="canvas-container"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
