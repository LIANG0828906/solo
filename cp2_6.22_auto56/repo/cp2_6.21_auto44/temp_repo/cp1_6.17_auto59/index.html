<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星际分子云可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0B10;
      color: #E0E8F0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #title {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #B0C4DE;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }

    #loading-bar-container {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 8px;
      background: #1A1D2E;
      border-radius: 4px;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 20;
      box-shadow: 0 2px 8px #00000060;
    }

    #loading-bar-container.visible {
      opacity: 1;
    }

    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00AAFF, #00FF88);
      border-radius: 4px;
      transition: width 0.1s ease;
    }

    #mobile-toggle {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: #1A1D2E;
      color: #E0E8F0;
      border: none;
      cursor: pointer;
      z-index: 25;
      box-shadow: 0 2px 8px #00000060;
      font-size: 20px;
      align-items: center;
      justify-content: center;
    }

    #mobile-toggle:hover {
      background: #2A3B4C;
    }

    .dg.ac {
      z-index: 15 !important;
    }

    .dg.main {
      width: 320px !important;
    }

    .dg.main .close-button {
      background-color: #1A1D2E !important;
      color: #E0E8F0 !important;
      border-radius: 0 12px 0 0 !important;
    }

    .dg.ac > .dg.main {
      margin: 20px 20px 0 0 !important;
      border-radius: 12px !important;
      overflow: hidden !important;
      box-shadow: 0 4px 16px #00000060 !important;
      background: #1A1D2E !important;
    }

    .dg .c {
      margin: 12px !important;
    }

    .dg .property-name {
      color: #E0E8F0 !important;
      padding: 4px 0 !important;
      font-size: 13px !important;
      width: 40% !important;
    }

    .dg .c input[type="text"],
    .dg .c select {
      background: #2A3B4C !important;
      color: #E0E8F0 !important;
      border: none !important;
      border-radius: 6px !important;
      padding: 6px 8px !important;
      height: 32px !important;
      font-size: 13px !important;
      width: 200px !important;
      outline: none !important;
    }

    .dg .c select option {
      background: #1A2B3C !important;
      color: #E0E8F0 !important;
    }

    .dg .slider {
      background: #2A3B4C !important;
      border-radius: 3px !important;
      height: 6px !important;
      width: 200px !important;
      margin-top: 6px !important;
    }

    .dg .slider-fg {
      background: linear-gradient(90deg, #6A8BAF, #8AAFCF) !important;
      border-radius: 3px !important;
      height: 100% !important;
    }

    .dg .c .slider:hover .slider-fg {
      background: linear-gradient(90deg, #7A9BBF, #9ABFDF) !important;
    }

    .dg li:not(.folder) {
      background: transparent !important;
      border-bottom: none !important;
      padding: 0 !important;
      min-height: 32px !important;
    }

    .dg .c input[type="checkbox"] {
      accent-color: #6A8BAF;
    }

    .dg .button {
      background: #2A3B4C !important;
      color: #E0E8F0 !important;
      border: none !important;
      border-radius: 6px !important;
      padding: 0 16px !important;
      height: 32px !important;
      width: 100px !important;
      cursor: pointer !important;
      font-size: 13px !important;
      transition: background 0.15s ease !important;
      text-align: center !important;
      line-height: 32px !important;
      margin: 0 !important;
    }

    .dg .button:hover {
      background: #3A4B5C !important;
    }

    .dg .button:active {
      background: #1A2B3C !important;
    }

    .dg li.title {
      background: #1A1D2E !important;
      color: #B0C4DE !important;
      font-weight: bold !important;
      font-size: 13px !important;
      padding: 10px 12px !important;
      border-left: 3px solid #6A8BAF !important;
    }

    .dg .cr.function {
      padding: 6px 0 !important;
    }

    .dg.ac {
      top: 0 !important;
      right: 0 !important;
      left: auto !important;
      bottom: auto !important;
    }

    @media (max-width: 768px) {
      #mobile-toggle {
        display: flex;
      }

      .dg.ac > .dg.main {
        position: fixed !important;
        top: 0 !important;
        right: -340px !important;
        margin: 0 !important;
        width: 320px !important;
        height: 100vh !important;
        border-radius: 0 !important;
        transition: right 0.3s ease !important;
        overflow-y: auto !important;
      }

      .dg.ac.panel-open > .dg.main {
        right: 0 !important;
      }

      .dg.main {
        width: 100% !important;
      }

      #title {
        font-size: 16px;
        top: 16px;
        left: 16px;
      }

      #loading-bar-container {
        width: 60%;
        top: 70px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="title">星际分子云可视化</div>
    <button id="mobile-toggle" aria-label="打开控制面板">☰</button>
    <div id="loading-bar-container">
      <div id="loading-bar"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
