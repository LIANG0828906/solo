<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书院学规·考勤录</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'KaiTi', 'STKaiti', 'Noto Serif SC', serif;
      background: #E8D5B7;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    
    .scroll-header {
      height: 60px;
      background: linear-gradient(180deg, #C4A882 0%, #B8956A 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 3px solid #8B7355;
      box-shadow: 0 4px 8px rgba(0,0,0,0.15);
      position: relative;
    }
    
    .scroll-header::before,
    .scroll-header::after {
      content: '';
      position: absolute;
      width: 30px;
      height: 100%;
      background: linear-gradient(180deg, #A08060 0%, #8B6914 100%);
    }
    
    .scroll-header::before {
      left: 0;
      border-radius: 0 5px 5px 0;
    }
    
    .scroll-header::after {
      right: 0;
      border-radius: 5px 0 0 5px;
    }
    
    .header-title {
      font-family: 'STZhongsong', 'SimSun', serif;
      font-size: 28px;
      color: #3E2723;
      letter-spacing: 8px;
      font-weight: bold;
      text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
    }
    
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    
    .seat-area {
      width: 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: #E8D5B7;
      position: relative;
    }
    
    #seatCanvas {
      background: #F5EDD6;
      border: 2px solid #8B7355;
      border-radius: 8px;
      box-shadow: inset 0 0 20px rgba(139, 115, 85, 0.2);
    }
    
    .right-panel {
      width: 30%;
      background: #F5EDD6;
      border-left: 2px solid #8B7355;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .rank-section {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      border-bottom: 2px solid #8B7355;
    }
    
    .section-title {
      font-size: 20px;
      color: #3E2723;
      font-weight: bold;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #8B7355;
      text-align: center;
    }
    
    #rankCanvas {
      width: 100%;
    }
    
    .alert-section {
      height: 200px;
      padding: 15px;
      overflow-y: auto;
    }
    
    #alertList {
      list-style: none;
    }
    
    #alertList li {
      border: 2px solid #D32F2F;
      background: #FFEBEE;
      color: #B71C1C;
      padding: 10px 15px;
      margin-bottom: 8px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }
    
    #alertList li:hover {
      background: #FFCDD2;
      transform: translateX(2px);
    }
    
    .alert-badge {
      background: #D32F2F;
      color: white;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
    }
    
    .footer {
      height: 40px;
      background: #C4A882;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: #3E2723;
      border-top: 2px solid #8B7355;
    }
    
    .fab {
      position: fixed;
      bottom: 60px;
      right: 30px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #FF5722;
      border: none;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(255, 87, 34, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      z-index: 100;
    }
    
    .fab:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 16px rgba(255, 87, 34, 0.5);
    }
    
    .fab::before {
      content: '+';
      color: white;
      font-size: 32px;
      font-weight: bold;
      line-height: 1;
    }
    
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    
    .modal-overlay.active {
      display: flex;
    }
    
    .modal {
      background: #F5EDD6;
      border-radius: 10px;
      padding: 15px;
      border: 2px solid #8B7355;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      min-width: 280px;
    }
    
    .modal-title {
      font-size: 18px;
      color: #3E2723;
      margin-bottom: 15px;
      text-align: center;
      font-weight: bold;
    }
    
    .status-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .status-btn {
      padding: 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-family: inherit;
      color: white;
      font-weight: bold;
      transition: all 0.2s ease;
    }
    
    .status-btn.present { background: #4CAF50; }
    .status-btn.late { background: #FFC107; color: #3E2723; }
    .status-btn.leave { background: #2196F3; }
    .status-btn.absent { background: #F44336; }
    
    .status-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    
    .status-btn.selected {
      outline: 3px solid #3E2723;
      transform: scale(1.05);
    }
    
    .modal-actions {
      display: flex;
      gap: 10px;
    }
    
    .modal-actions button {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-family: inherit;
      font-weight: bold;
    }
    
    .btn-confirm {
      background: #8B7355;
      color: white;
    }
    
    .btn-cancel {
      background: #ccc;
      color: #3E2723;
    }
    
    .score-panel input {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #8B7355;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #FFFBF0;
    }
    
    .score-panel textarea {
      width: 100%;
      height: 80px;
      padding: 10px;
      margin-bottom: 10px;
      border: 2px solid #8B7355;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
      background: #FFFBF0;
      resize: none;
    }
    
    .score-hint {
      font-size: 12px;
      color: #6D4C41;
      margin-bottom: 10px;
    }
    
    .rank-flash {
      animation: flashRow 0.6s ease;
    }
    
    @keyframes flashRow {
      0%, 100% { background: transparent; }
      50% { background: #FFF9C4; }
    }
    
    .empty-alert {
      text-align: center;
      color: #8B7355;
      font-size: 14px;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="scroll-header">
      <div class="header-title">書院學規·考勤錄</div>
    </div>
    
    <div class="main-container">
      <div class="seat-area">
        <canvas id="seatCanvas" width="700" height="420"></canvas>
      </div>
      
      <div class="right-panel">
        <div class="rank-section">
          <div class="section-title">學 業 排 行 榜</div>
          <canvas id="rankCanvas" width="350" height="300"></canvas>
        </div>
        
        <div class="alert-section">
          <div class="section-title">學 規 警 示</div>
          <ul id="alertList"></ul>
        </div>
      </div>
    </div>
    
    <div class="footer" id="dateDisplay"></div>
    
    <button class="fab" id="scoreFab" title="录入分数"></button>
  </div>
  
  <div class="modal-overlay" id="attendanceModal">
    <div class="modal">
      <div class="modal-title" id="modalStudentName">选择考勤状态</div>
      <div class="status-buttons">
        <button class="status-btn present" data-status="present">到</button>
        <button class="status-btn late" data-status="late">迟到</button>
        <button class="status-btn leave" data-status="leave">请假</button>
        <button class="status-btn absent" data-status="absent">缺</button>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelAttendance">取消</button>
        <button class="btn-confirm" id="confirmAttendance">确认</button>
      </div>
    </div>
  </div>
  
  <div class="modal-overlay" id="scoreModal">
    <div class="modal score-panel">
      <div class="modal-title">录入课业分数</div>
      <input type="text" id="singleScoreId" placeholder="学号 (如: 001)">
      <input type="number" id="singleScoreValue" placeholder="分数 (0-100)" min="0" max="100">
      <div class="score-hint">或批量录入 (格式: 001:85,002:92,003:78)</div>
      <textarea id="batchScores" placeholder="批量粘贴分数..."></textarea>
      <div class="modal-actions">
        <button class="btn-cancel" id="cancelScore">取消</button>
        <button class="btn-confirm" id="confirmScore">提交</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/app.ts"></script>
</body>
</html>
