<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>虫巢意志</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Microsoft YaHei', sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #1B3B1B 0%, #000000 100%);
      color: #FFFFFF;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 50px;
      right: 0;
      width: 80%;
      height: calc(100% - 50px);
    }

    #top-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #00000088;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      z-index: 100;
    }

    #game-title {
      font-family: Georgia, serif;
      font-size: 28px;
      color: #FFD700;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    #mode-status {
      font-size: 18px;
      padding: 6px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      transition: all 0.3s ease;
    }

    #mode-status.normal {
      color: #FFFFFF;
      background: rgba(0, 255, 0, 0.2);
    }

    #mode-status.enhanced {
      color: #00FFFF;
      background: rgba(0, 255, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
    }

    #side-panel {
      position: fixed;
      left: 0;
      top: 50px;
      width: 200px;
      height: calc(100% - 110px);
      background: #000000CC;
      border-radius: 8px;
      padding: 16px;
      z-index: 90;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.3s ease;
    }

    .stat-item {
      font-size: 16px;
      color: #FFFFFF;
    }

    .stat-value {
      color: #00FF00;
      font-weight: bold;
    }

    #enhance-timer {
      position: fixed;
      top: 60px;
      right: 20px;
      font-size: 24px;
      color: #FFFFFF;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 110;
      display: none;
    }

    #timeline {
      position: fixed;
      bottom: 0;
      left: 200px;
      right: 0;
      height: 60px;
      background: #00000088;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 90;
      overflow: hidden;
    }

    #timeline-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-right: 20px;
      white-space: nowrap;
    }

    #timeline-track {
      position: relative;
      flex: 1;
      height: 30px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
    }

    .predator-event {
      position: absolute;
      width: 2px;
      height: 100%;
      background: #FF3333;
      box-shadow: 0 0 8px rgba(255, 51, 51, 0.8);
    }

    .predator-event::after {
      content: attr(data-time);
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      color: #FF6666;
      white-space: nowrap;
    }

    #alert-border {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 200;
      box-shadow: inset 0 0 0 0 rgba(255, 0, 0, 0);
      transition: box-shadow 0.1s ease;
    }

    #alert-border.active {
      animation: alertFlash 0.2s ease-in-out 2;
    }

    @keyframes alertFlash {
      0% { box-shadow: inset 0 0 100px 10px rgba(255, 0, 0, 0); }
      50% { box-shadow: inset 0 0 100px 10px rgba(255, 0, 0, 0.4); }
      100% { box-shadow: inset 0 0 100px 10px rgba(255, 0, 0, 0); }
    }

    #hamburger {
      display: none;
      position: fixed;
      top: 55px;
      left: 10px;
      width: 40px;
      height: 40px;
      background: #000000CC;
      border-radius: 8px;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      z-index: 95;
    }

    #hamburger span {
      width: 24px;
      height: 3px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    @media (max-width: 768px) {
      #top-bar {
        height: 40px;
        padding: 0 12px;
      }

      #game-title {
        font-size: 20px;
      }

      #canvas-container {
        top: 40px;
        width: 100%;
        height: calc(100% - 100px);
      }

      #hamburger {
        display: flex;
        top: 45px;
      }

      #side-panel {
        top: 40px;
        width: 200px;
        height: calc(100% - 100px);
        transform: translateX(-100%);
      }

      #side-panel.open {
        transform: translateX(0);
      }

      #timeline {
        left: 0;
        height: 60px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="top-bar">
      <div id="game-title">虫巢意志</div>
      <div id="mode-status" class="normal">普通模式</div>
    </div>

    <div id="hamburger" id="hamburger-btn">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div id="side-panel">
      <div class="stat-item">工蜂总数：<span class="stat-value" id="total-workers">0</span></div>
      <div class="stat-item">携带食物：<span class="stat-value" id="carrying-food">0</span></div>
      <div class="stat-item">已采集食物：<span class="stat-value" id="food-collected">0</span></div>
      <div class="stat-item">活跃信息素：<span class="stat-value" id="pheromone-count">0.0</span></div>
      <div class="stat-item">天敌数量：<span class="stat-value" id="predator-count">0</span></div>
    </div>

    <div id="enhance-timer">增强模式：<span id="enhance-countdown">0</span>s</div>

    <div id="canvas-container"></div>

    <div id="timeline">
      <div id="timeline-label">天敌事件时间线：</div>
      <div id="timeline-track"></div>
    </div>

    <div id="alert-border"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
