<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 参数化雕塑生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="canvas-container"></canvas>
    
    <button id="sidebar-toggle" class="sidebar-toggle" aria-label="切换控制面板">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>
    
    <aside id="control-panel" class="control-panel">
      <header class="panel-header">
        <h1 class="panel-title">雕塑参数</h1>
        <p class="panel-subtitle">实时调整 · 创意无限</p>
      </header>
      
      <div class="panel-content">
        <section class="control-card">
          <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.8 16.2v-4.3c0-.7-.6-1.2-1.2-1.2H13V3.4c0-.7-.6-1.2-1.2-1.2H7.5c-.7 0-1.2.6-1.2 1.2v8.5H3.4c-.7 0-1.2.6-1.2 1.2v4.3c0 .7.6 1.2 1.2 1.2h8.5v8.5c0 .7.6 1.2 1.2 1.2h4.3c.7 0 1.2-.6 1.2-1.2v-8.5h8.5c.7 0 1.2-.6 1.2-1.2z"></path></svg>
            形态控制
          </h2>
          <div class="slider-group" id="morphology-sliders"></div>
        </section>
        
        <section class="control-card">
          <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.555C21.965 6.012 17.461 2 12 2z"></path></svg>
            材质与色彩
          </h2>
          
          <div class="color-mode-toggle">
            <button class="mode-btn active" data-mode="solid">单色</button>
            <button class="mode-btn" data-mode="gradient">渐变</button>
          </div>
          
          <div class="color-picker-group">
            <div class="color-picker-wrapper" id="color-picker-wrapper">
              <label class="picker-label">基础颜色</label>
              <div class="color-wheel-container">
                <div class="color-wheel" id="color-wheel"></div>
                <input type="color" id="base-color" class="hidden-color-input" value="#6366f1" />
              </div>
            </div>
            
            <div class="color-picker-wrapper hidden" id="gradient-color-wrapper">
              <label class="picker-label">渐变颜色</label>
              <div class="gradient-inputs">
                <div class="gradient-item">
                  <span>起始色</span>
                  <input type="color" id="gradient-start" class="gradient-color-input" value="#6366f1" />
                </div>
                <div class="gradient-item">
                  <span>结束色</span>
                  <input type="color" id="gradient-end" class="gradient-color-input" value="#ec4899" />
                </div>
              </div>
            </div>
          </div>
          
          <div class="slider-group" id="material-sliders"></div>
          
          <div class="emissive-section">
            <label class="picker-label">自发光</label>
            <div class="emissive-controls">
              <div class="emissive-color-row">
                <span>颜色</span>
                <input type="color" id="emissive-color" class="gradient-color-input" value="#000000" />
              </div>
              <div class="emissive-slider-wrapper">
                <div class="slider-with-value">
                  <span class="slider-label">强度</span>
                  <span class="slider-value" id="emissive-intensity-value">0.00</span>
                </div>
                <input type="range" id="emissive-intensity" class="custom-slider" min="0" max="1" step="0.01" value="0" />
              </div>
            </div>
          </div>
        </section>
        
        <section class="control-card">
          <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"></path><path d="M9 18h6"></path><path d="M10 22h4"></path></svg>
            光照控制
          </h2>
          <div class="light-toggles">
            <label class="toggle-label">
              <input type="checkbox" id="ambient-toggle" checked />
              <span class="toggle-switch"></span>
              <span>环境光</span>
            </label>
            <label class="toggle-label">
              <input type="checkbox" id="point-toggle" checked />
              <span class="toggle-switch"></span>
              <span>点光源</span>
            </label>
          </div>
        </section>
        
        <section class="control-card">
          <h2 class="card-title">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
            预设形态
          </h2>
          <div class="preset-buttons" id="preset-buttons"></div>
        </section>
        
        <section class="control-card action-card">
          <button id="random-btn" class="action-btn random-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"></polyline><line x1="4" y1="20" x2="21" y2="3"></line><polyline points="21 16 21 21 16 21"></polyline><line x1="15" y1="15" x2="21" y2="21"></line><line x1="4" y1="4" x2="9" y2="9"></line></svg>
            随机生成
          </button>
          <button id="export-btn" class="action-btn export-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            导出快照
          </button>
        </section>
      </div>
    </aside>
    
    <div id="info-panel" class="info-panel hidden">
      <div class="info-panel-content">
        <button class="close-btn" id="close-info">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
        <h3>当前参数</h3>
        <div class="params-display" id="params-display"></div>
        <button id="copy-params-btn" class="copy-btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
          复制参数
        </button>
      </div>
    </div>
    
    <div id="fps-counter" class="fps-counter">60 FPS</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
