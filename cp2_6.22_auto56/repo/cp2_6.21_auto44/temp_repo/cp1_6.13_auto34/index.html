<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>森林生态系统模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    body { background: #1a2f18; }
    #app { display: flex; width: 100vw; height: 100vh; min-width: 1024px; min-height: 768px; }
    #map-container {
      flex: 0 0 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a2f18 0%, #2d5a27 100%);
      position: relative;
      padding: 24px;
    }
    #map-canvas {
      background: #8b5e3c;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
    }
    #panel {
      flex: 1;
      background: #f5efe6;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-left: 3px solid #8b5e3c;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="map-container">
      <canvas id="map-canvas"></canvas>
    </div>
    <div id="panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
