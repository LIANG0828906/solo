<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>虚拟博物馆 | Virtual Museum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: radial-gradient(ellipse at 50% 40%, #1e2030 0%, #141520 50%, #0e0e14 100%);
      }
      #loading-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 50% 40%, #1e2030 0%, #141520 50%, #0e0e14 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 1s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        width: 80px;
        height: 80px;
        border: 3px solid transparent;
        border-top-color: #c9a962;
        border-right-color: #e08a3c;
        border-radius: 50%;
        animation: spin 1.2s linear infinite;
        margin-bottom: 32px;
        box-shadow: 0 0 30px rgba(201, 169, 98, 0.3);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-title {
        font-family: 'Cinzel', serif;
        font-size: 28px;
        font-weight: 600;
        color: #c9a962;
        letter-spacing: 6px;
        margin-bottom: 16px;
        animation: textPulse 2s ease-in-out infinite;
      }
      @keyframes textPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      .loading-subtitle {
        font-family: 'Noto Sans SC', sans-serif;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.5);
        letter-spacing: 4px;
        margin-bottom: 48px;
      }
      .loading-progress {
        width: 240px;
        height: 3px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 3px;
        overflow: hidden;
        position: relative;
      }
      .loading-progress-bar {
        height: 100%;
        background: linear-gradient(90deg, #c9a962, #e08a3c);
        width: 0%;
        border-radius: 3px;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: width;
      }
      .loading-percent {
        font-family: 'Cinzel', serif;
        font-size: 11px;
        color: rgba(201, 169, 98, 0.6);
        letter-spacing: 2px;
        margin-top: 16px;
        font-variant-numeric: tabular-nums;
      }
      #scene-transition-overlay {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 50% 40%, #1e2030 0%, #141520 50%, #0e0e14 100%);
        z-index: 9998;
        pointer-events: none;
        opacity: 0;
        transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity;
      }
      #scene-transition-overlay.active {
        opacity: 1;
      }
      #scene-transition-overlay.fade-in {
        opacity: 0;
      }
      #app {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-logo"></div>
      <div class="loading-title">VIRTUAL MUSEUM</div>
      <div class="loading-subtitle">正在为您开启艺术之门...</div>
      <div class="loading-progress">
        <div class="loading-progress-bar" id="loading-progress-bar"></div>
      </div>
      <div class="loading-percent" id="loading-percent">0%</div>
    </div>
    <div id="scene-transition-overlay" class="active"></div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
