<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟星座生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      font-weight: 300;
      background: radial-gradient(ellipse at center, #1a0a3e 0%, #0a0a2e 70%, #05051a 100%);
      color: #ffffff;
      user-select: none;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    #label-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .hint {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 24px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: 0.5px;
      z-index: 100;
      pointer-events: none;
    }
    .constellation-label {
      padding: 12px 18px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      color: #ffffff;
      min-width: 200px;
      opacity: 0;
      animation: fadeInUp 0.6s ease-out forwards;
      pointer-events: auto;
      cursor: pointer;
      transition: transform 0.3s ease, background 0.3s ease;
    }
    .constellation-label:hover {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(1.03);
    }
    .constellation-label .name-cn {
      font-size: 18px;
      font-weight: 400;
      margin-bottom: 4px;
      letter-spacing: 2px;
    }
    .constellation-label .name-en {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .constellation-label .meta {
      font-size: 11px;
      opacity: 0.6;
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .constellation-label .mythology {
      font-size: 12px;
      opacity: 0.85;
      line-height: 1.7;
    }
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .list-toggle-btn {
      position: fixed;
      left: 24px;
      bottom: 24px;
      padding: 12px 20px;
      background: rgba(10, 10, 60, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      color: #ffffff;
      font-size: 14px;
      cursor: pointer;
      z-index: 200;
      transition: all 0.3s ease;
      letter-spacing: 1px;
    }
    .list-toggle-btn:hover {
      background: rgba(30, 30, 90, 0.7);
      border-color: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
    .constellation-list {
      position: fixed;
      left: 24px;
      bottom: 80px;
      width: 240px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 16px;
      background: rgba(10, 10, 60, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      z-index: 199;
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: all 0.35s ease;
    }
    .constellation-list.active {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    .constellation-list .list-title {
      font-size: 13px;
      opacity: 0.6;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      letter-spacing: 2px;
    }
    .constellation-list .list-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .constellation-list .list-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    .constellation-list .color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .constellation-list .item-name {
      font-size: 13px;
    }
    .detail-panel {
      position: fixed;
      top: 0;
      right: -420px;
      width: 400px;
      height: 100%;
      background: rgba(10, 10, 60, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding: 32px;
      z-index: 300;
      transition: right 0.45s cubic-bezier(0.16, 1, 0.3, 1);
      overflow-y: auto;
    }
    .detail-panel.active {
      right: 0;
    }
    .detail-panel .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 50%;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
    }
    .detail-panel .close-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: rotate(90deg);
    }
    .detail-panel h2 {
      font-size: 28px;
      font-weight: 300;
      margin-bottom: 4px;
      letter-spacing: 3px;
    }
    .detail-panel .subtitle {
      font-size: 13px;
      opacity: 0.5;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 24px;
    }
    .detail-panel .info-section {
      margin-bottom: 24px;
    }
    .detail-panel .section-title {
      font-size: 11px;
      opacity: 0.5;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }
    .detail-panel .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 13px;
    }
    .detail-panel .info-row .label {
      opacity: 0.6;
    }
    .detail-panel .mythology-text {
      font-size: 14px;
      line-height: 1.9;
      opacity: 0.9;
    }
    .detail-panel .star-table {
      width: 100%;
    }
    .detail-panel .star-table th,
    .detail-panel .star-table td {
      text-align: left;
      padding: 10px 8px;
      font-size: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }
    .detail-panel .star-table th {
      opacity: 0.5;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="label-container"></div>
    <div class="hint" id="hint">鼠标左键点击创建主星 · 双击完成绘制</div>
    <button class="list-toggle-btn" id="listToggle">☰ 星座列表</button>
    <div class="constellation-list" id="constellationList">
      <div class="list-title">可识别星座</div>
    </div>
    <div class="detail-panel" id="detailPanel">
      <button class="close-btn" id="closePanel">×</button>
      <div id="detailContent"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
