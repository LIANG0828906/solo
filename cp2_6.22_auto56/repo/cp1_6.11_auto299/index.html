<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>围棋征子推演模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #3d2817;
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .game-container {
      display: flex;
      flex-direction: row;
      gap: 24px;
      align-items: flex-start;
    }

    .board-wrapper {
      position: relative;
      background: #C18A44;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #gameCanvas {
      display: block;
      cursor: pointer;
    }

    .control-panel {
      background: #5D3A1A;
      color: #F5F5F5;
      padding: 24px;
      border-radius: 8px;
      min-width: 180px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      text-align: center;
      border-bottom: 1px solid #8B4513;
      padding-bottom: 12px;
    }

    .btn {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 12px;
      background: #8B4513;
      color: #F5F5F5;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .btn:hover {
      background: #A0522D;
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .info-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #8B4513;
    }

    .info-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      font-size: 14px;
    }

    .stone-icon {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 8px;
      vertical-align: middle;
    }

    .stone-black {
      background: #1A1A1A;
      box-shadow: inset -2px -2px 4px rgba(255, 255, 255, 0.1);
    }

    .stone-white {
      background: #F5F5F5;
      box-shadow: inset -2px -2px 4px rgba(0, 0, 0, 0.1);
    }

    .capture-count {
      font-weight: bold;
      font-size: 16px;
    }

    .move-count {
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #FFD700;
    }

    .current-turn {
      text-align: center;
      font-size: 13px;
      color: #ccc;
      margin-bottom: 16px;
    }

    @media (max-width: 768px) {
      .game-container {
        flex-direction: column;
        align-items: center;
      }

      .control-panel {
        min-width: auto;
        width: 100%;
        max-width: 360px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="game-container">
      <div class="board-wrapper">
        <canvas id="gameCanvas"></canvas>
      </div>
      <div class="control-panel">
        <div class="panel-title">围棋征子推演</div>
        
        <div class="move-count" id="moveCount">第 0 手</div>
        <div class="current-turn" id="currentTurn">黑方落子</div>
        
        <button class="btn" id="autoPlayBtn">自动推演</button>
        <button class="btn" id="undoBtn">回退一步</button>
        
        <div class="info-section">
          <div class="info-item">
            <span><span class="stone-icon stone-black"></span>黑方提子</span>
            <span class="capture-count" id="blackCaptures">0</span>
          </div>
          <div class="info-item">
            <span><span class="stone-icon stone-white"></span>白方提子</span>
            <span class="capture-count" id="whiteCaptures">0</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
