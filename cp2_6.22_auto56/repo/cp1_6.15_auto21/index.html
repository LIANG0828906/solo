<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市天际线生长模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    
    .ui-panel {
      position: absolute;
      padding: 12px 20px;
      background: rgba(10, 10, 31, 0.85);
      border: 2px solid #00ffff;
      border-radius: 8px;
      color: #00ffff;
      font-size: 14px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.3),
                  inset 0 0 20px rgba(0, 255, 255, 0.1);
      transition: all 0.3s ease;
    }
    
    .ui-panel:hover {
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5),
                  inset 0 0 30px rgba(0, 255, 255, 0.2);
      transform: scale(1.02);
    }
    
    #status-bar {
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 30px;
      align-items: center;
    }
    
    .status-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    
    .status-label {
      font-size: 11px;
      color: #8888cc;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .status-value {
      font-size: 18px;
      font-weight: bold;
      text-shadow: 0 0 10px #00ffff;
    }
    
    .mode-indicator {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .mode-day {
      background: linear-gradient(135deg, #ffaa00, #ff6600);
      color: #fff;
      box-shadow: 0 0 15px rgba(255, 170, 0, 0.5);
    }
    
    .mode-night {
      background: linear-gradient(135deg, #6600ff, #cc00ff);
      color: #fff;
      box-shadow: 0 0 15px rgba(204, 0, 255, 0.5);
    }
    
    #instructions {
      bottom: 20px;
      right: 20px;
      max-width: 280px;
      line-height: 1.6;
    }
    
    #instructions h3 {
      margin-bottom: 8px;
      font-size: 16px;
      text-shadow: 0 0 10px #00ffff;
    }
    
    #instructions p {
      color: #aaaadd;
      font-size: 12px;
      margin-bottom: 4px;
    }
    
    #instructions .key {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(0, 255, 255, 0.2);
      border: 1px solid #00ffff;
      border-radius: 4px;
      font-family: monospace;
      font-size: 11px;
      margin: 0 2px;
    }
    
    #build-btn {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 40px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.1), rgba(204, 0, 255, 0.1));
      border: 2px solid #00ffff;
      color: #00ffff;
      border-radius: 30px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    
    #build-btn:hover {
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.3), rgba(204, 0, 255, 0.3));
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.6),
                  0 0 80px rgba(204, 0, 255, 0.4);
      transform: translateX(-50%) scale(1.05);
    }
    
    #build-btn:active {
      transform: translateX(-50%) scale(0.98);
    }
    
    .title {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff, #cc00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
      letter-spacing: 3px;
    }
    
    .title::after {
      content: '';
      display: block;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, #00ffff, transparent);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="title">CITY SKYLINE</div>
    
    <div id="status-bar" class="ui-panel">
      <div class="status-item">
        <span class="status-label">Buildings</span>
        <span class="status-value" id="building-count">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">FPS</span>
        <span class="status-value" id="fps-counter">60</span>
      </div>
      <div class="status-item">
        <span class="status-label">Mode</span>
        <span class="mode-indicator mode-day" id="mode-indicator">DAY</span>
      </div>
    </div>
    
    <div id="instructions" class="ui-panel">
      <h3>操作指南</h3>
      <p><span class="key">点击</span> 网格放置建筑</p>
      <p><span class="key">鼠标滚轮</span> 缩放视角</p>
      <p><span class="key">右键拖动</span> 旋转视角</p>
      <p>放置超过 <span class="key">10栋</span> 建筑后自动进入夜景模式</p>
      <p>建筑超过 <span class="key">50栋</span> 自动优化性能</p>
    </div>
    
    <button id="build-btn" class="ui-panel">点击网格放置建筑</button>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
