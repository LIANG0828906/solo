<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>植物演化模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #e0e0e0;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #app {
      display: flex;
      width: 100%;
      max-width: 1200px;
      height: 100vh;
      padding: 12px;
      gap: 12px;
    }

    #canvas-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    #simCanvas {
      background: #0d0d1a;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: block;
      width: 100%;
    }

    #chartCanvas {
      background: #0d0d1a;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: block;
      width: 100%;
      height: 130px;
      margin-top: 8px;
    }

    #control-panel {
      width: 260px;
      min-width: 260px;
      background: rgba(26, 26, 46, 0.92);
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #e0e0e0;
      text-align: center;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 12px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: #b0b0b0;
    }

    .control-value {
      color: #2ecc71;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.15);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #2ecc71;
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .stats-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-size: 13px;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 14px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
    }

    .stat-label {
      color: #888;
    }

    .stat-value {
      color: #e0e0e0;
      font-weight: 600;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }

    .btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.2s;
      color: #fff;
    }

    .btn-start {
      background: #2ecc71;
    }

    .btn-start:hover {
      filter: brightness(1.2);
    }

    .btn-reset {
      background: #e74c3c;
    }

    .btn-reset:hover {
      filter: brightness(1.2);
    }

    #canvas-wrapper {
      position: relative;
    }

    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(15, 15, 30, 0.9);
      background: rgba(15, 15, 30, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 181, 246, 0.4);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 12px;
      line-height: 1.6;
      color: #e0e0e0;
      min-width: 160px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
      z-index: 10;
      display: none;
      white-space: nowrap;
    }

    #tooltip .tooltip-title {
      color: #64b5f6;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 6px;
      border-bottom: 1px solid rgba(100, 181, 246, 0.25);
      padding-bottom: 4px;
    }

    #tooltip .tooltip-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }

    #tooltip .tooltip-label {
      color: #9a9ac4;
    }

    #tooltip .tooltip-value {
      color: #e0e0e0;
      font-weight: 600;
    }

    .selected-group {
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      padding-top: 14px;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .selected-title {
      color: #64b5f6;
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 2px;
    }

    .selected-empty {
      color: #666;
      font-size: 12px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper">
      <canvas id="simCanvas" width="800" height="600"></canvas>
      <canvas id="chartCanvas" width="800" height="130"></canvas>
      <div id="tooltip"></div>
    </div>
    <div id="control-panel">
      <div class="panel-title">🌿 演化模拟控制</div>

      <div class="control-group">
        <div class="control-label">
          <span>光照密度</span>
          <span class="control-value" id="lightVal">50</span>
        </div>
        <input type="range" id="lightDensity" min="10" max="100" value="50" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>水分密度</span>
          <span class="control-value" id="waterVal">50</span>
        </div>
        <input type="range" id="waterDensity" min="10" max="100" value="50" />
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>资源再生速率</span>
          <span class="control-value" id="regenVal">0.5</span>
        </div>
        <input type="range" id="regenRate" min="10" max="100" value="50" step="1" />
      </div>

      <div class="stats-group">
        <div class="stat-row">
          <span class="stat-label">植物总数</span>
          <span class="stat-value" id="statCount">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">帧数</span>
          <span class="stat-value" id="statFrame">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">平均生长速度</span>
          <span class="stat-value" id="statGrowth">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">平均采集半径</span>
          <span class="stat-value" id="statRadius">0</span>
        </div>
      </div>

      <div class="selected-group" id="selectedGroup">
        <div class="selected-title">🎯 当前选中植物</div>
        <div class="selected-empty" id="selectedEmpty">未选中，请将鼠标悬停到画布上的植物</div>
        <div id="selectedContent" style="display: none; flex-direction: column; gap: 6px;">
          <div class="stat-row">
            <span class="stat-label">当前资源</span>
            <span class="stat-value" id="selResources">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">生长速度</span>
            <span class="stat-value" id="selGrowth">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">采集半径</span>
            <span class="stat-value" id="selRadius">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">光照/水分偏好</span>
            <span class="stat-value" id="selPref">0 / 0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">繁殖间隔</span>
            <span class="stat-value" id="selRepInt">0</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">存活帧数</span>
            <span class="stat-value" id="selFrames">0</span>
          </div>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-start" id="btnToggle">开始</button>
        <button class="btn btn-reset" id="btnReset">重置</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
