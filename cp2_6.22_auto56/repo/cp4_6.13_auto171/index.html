<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rhythm Space Shooter - 节奏太空射击</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;700;900&family=Spectral:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0f0c29;
      font-family: 'Exo 2', sans-serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #game-canvas {
      display: block;
      background: #0f0c29;
    }
    #settings-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
      padding: 10px 20px;
      background: rgba(58, 123, 213, 0.3);
      border: 1px solid #3a7bd5;
      border-radius: 8px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    #settings-btn:hover {
      background: rgba(58, 123, 213, 0.6);
      transform: scale(1.05);
    }
    .settings-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(5px);
    }
    .settings-modal.active {
      display: flex;
    }
    .settings-card {
      width: 400px;
      height: 300px;
      background: rgba(15, 12, 41, 0.95);
      border: 1px solid #3a7bd5;
      border-radius: 12px;
      padding: 30px;
      color: #fff;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }
    .settings-card h2 {
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .setting-item {
      margin-bottom: 20px;
    }
    .setting-item label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }
    .slider-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .slider-value {
      min-width: 40px;
      text-align: right;
      font-size: 14px;
      color: #00d2ff;
    }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: #333;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #3a7bd5;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(58, 123, 213, 0.5);
      transition: transform 0.2s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .toggle-switch {
      position: relative;
      width: 50px;
      height: 24px;
      background: #333;
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-switch.active {
      background: #3a7bd5;
    }
    .toggle-switch::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
    }
    .toggle-switch.active::after {
      transform: translateX(26px);
    }
    .modal-close {
      display: block;
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      background: linear-gradient(90deg, #00d2ff, #3a7bd5);
      border: none;
      border-radius: 6px;
      color: #fff;
      font-family: 'Exo 2', sans-serif;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .modal-close:hover {
      transform: scale(1.02);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <button id="settings-btn">设置</button>
    
    <div class="settings-modal" id="settings-modal">
      <div class="settings-card">
        <h2>游戏设置</h2>
        <div class="setting-item">
          <label>音乐音量</label>
          <div class="slider-container">
            <input type="range" id="music-volume" min="0" max="100" value="70">
            <span class="slider-value" id="music-volume-value">70%</span>
          </div>
        </div>
        <div class="setting-item">
          <label>音效音量</label>
          <div class="slider-container">
            <input type="range" id="sfx-volume" min="0" max="100" value="80">
            <span class="slider-value" id="sfx-volume-value">80%</span>
          </div>
        </div>
        <div class="setting-item">
          <div class="toggle-container">
            <label>节拍提示光效</label>
            <div class="toggle-switch active" id="beat-indicator-toggle"></div>
          </div>
        </div>
        <button class="modal-close" id="close-settings">关闭</button>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
