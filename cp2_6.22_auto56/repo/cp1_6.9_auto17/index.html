<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 城市天际线生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: linear-gradient(180deg, #0b0a2e 0%, #1a1040 100%);
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .info-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 16px 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 14px;
      min-width: 200px;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .info-panel h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
      color: rgba(255, 255, 255, 0.9);
    }

    .info-panel .info-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      gap: 16px;
    }

    .info-panel .info-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .info-panel .info-value {
      color: rgba(255, 255, 255, 0.95);
      font-weight: 500;
    }

    .info-panel .color-preview {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 3px;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 8px currentColor;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="info-panel" id="infoPanel">
      <h3>建筑信息</h3>
      <div class="info-row">
        <span class="info-label">高度</span>
        <span class="info-value" id="infoHeight">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">颜色</span>
        <span class="info-value" id="infoColor">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">坐标</span>
        <span class="info-value" id="infoCoords">-</span>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
