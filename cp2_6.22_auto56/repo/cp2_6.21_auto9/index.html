<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态像素艺术生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #ffffff;
      user-select: none;
    }

    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      gap: 32px;
      padding: 40px 24px;
      flex-wrap: wrap;
      align-content: center;
    }

    #fps-monitor {
      position: fixed;
      top: 16px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #ffffff;
      z-index: 100;
      min-width: 70px;
      text-align: center;
    }

    #zoom-indicator {
      position: fixed;
      top: 56px;
      left: 16px;
      background: rgba(0, 0, 0, 0.6);
      padding: 8px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      color: #64c8ff;
      z-index: 100;
      min-width: 70px;
      text-align: center;
    }

    #canvas-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    #pixel-canvas {
      border-radius: 8px;
      box-shadow:
        0 0 0 2px rgba(100, 200, 255, 0.3),
        0 0 20px rgba(100, 200, 255, 0.3),
        0 0 40px rgba(100, 200, 255, 0.15);
      cursor: crosshair;
    }

    #palette-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #palette {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 720px;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .color-swatch:hover {
      transform: scale(1.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .color-swatch.selected {
      transform: scale(1.3);
      box-shadow: 0 0 12px currentColor;
      border-color: #ffffff;
      animation: pulse 0.2s ease;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1.3); }
    }

    #custom-color-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #custom-color-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    #custom-color {
      width: 44px;
      height: 32px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: transparent;
      padding: 0;
    }

    #custom-color::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    #custom-color::-webkit-color-swatch {
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 6px;
    }

    #effects-panel {
      width: 280px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #panel-title {
      font-size: 18px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 4px;
      text-align: center;
      letter-spacing: 1px;
    }

    .effect-card {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .effect-card:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .effect-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .effect-name {
      font-size: 16px;
      font-weight: 500;
      color: #ffffff;
    }

    .toggle-btn {
      width: 44px;
      height: 24px;
      border-radius: 12px;
      background: #666666;
      position: relative;
      cursor: pointer;
      transition: background 0.3s ease, box-shadow 0.3s ease;
      border: none;
      padding: 0;
    }

    .toggle-btn::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #ffffff;
      top: 2px;
      left: 2px;
      transition: left 0.3s ease;
    }

    .toggle-btn.active {
      background: #00ff88;
      box-shadow: 0 0 12px rgba(0, 255, 136, 0.5);
    }

    .toggle-btn.active::after {
      left: 22px;
    }

    .slider-wrapper {
      display: flex;
      flex-direction: column;
      gap: 8px;
      opacity: 0.5;
      transition: opacity 0.3s ease;
    }

    .effect-card.active .slider-wrapper {
      opacity: 1;
    }

    .slider-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      display: flex;
      justify-content: space-between;
    }

    .slider-value {
      color: rgba(255, 255, 255, 0.9);
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, #333 0%, #555 100%);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #64c8ff 0%, #a855f7 100%);
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #64c8ff 0%, #a855f7 100%);
      cursor: pointer;
      border: 2px solid #ffffff;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="fps-monitor">-- FPS</div>
    <div id="zoom-indicator">100%</div>

    <div id="canvas-wrapper">
      <canvas id="pixel-canvas"></canvas>
      <div id="palette-container">
        <div id="palette"></div>
        <div id="custom-color-wrapper">
          <span id="custom-color-label">自定义颜色:</span>
          <input type="color" id="custom-color" value="#ff6b6b" />
        </div>
      </div>
    </div>

    <div id="effects-panel">
      <div id="panel-title">动态特效</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
