<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>城市风道可视化分析系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-weight: 300;
      background: linear-gradient(180deg, #1a2a4a 0%, #3a5a7a 50%, #8aa8c8 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .ui-overlay {
      position: absolute;
      pointer-events: none;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 10;
    }

    .header {
      position: absolute;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
    }

    .title {
      color: #ffffff;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 4px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      margin-bottom: 6px;
    }

    .subtitle {
      color: rgba(255, 255, 255, 0.7);
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 2px;
    }

    .glass-panel {
      background: rgba(42, 59, 76, 0.65);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      color: #ffffff;
      pointer-events: auto;
    }

    .layer-select {
      position: absolute;
      top: 24px;
      left: 24px;
      padding: 12px 16px;
      min-width: 180px;
    }

    .layer-select label {
      display: block;
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .layer-select select {
      width: 100%;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      color: #ffffff;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
    }

    .layer-select select:hover {
      border-color: rgba(100, 180, 255, 0.5);
    }

    .layer-select select:focus {
      border-color: #64b4ff;
      box-shadow: 0 0 0 2px rgba(100, 180, 255, 0.2);
    }

    .layer-select select option {
      background: #2a3b4c;
      color: #ffffff;
    }

    .legend {
      position: absolute;
      bottom: 24px;
      left: 24px;
      padding: 14px 18px;
      min-width: 280px;
    }

    .legend-title {
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .legend-bar {
      width: 100%;
      height: 12px;
      border-radius: 6px;
      margin-bottom: 8px;
      position: relative;
      overflow: hidden;
    }

    .legend-gradient-block {
      height: 100%;
      width: 100%;
      border-radius: 6px;
    }

    .gradient-barrier {
      background: linear-gradient(90deg, #4aa0ff 0%, #a0c8e8 50%, #ff6060 100%);
    }

    .gradient-ventilation {
      background: linear-gradient(90deg, #ff6060 0%, #e8c870 50%, #60e8a0 100%);
    }

    .legend-section {
      margin-bottom: 12px;
    }

    .legend-section:last-child {
      margin-bottom: 0;
    }

    .legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      opacity: 0.75;
    }

    .legend-range {
      font-size: 10px;
      opacity: 0.55;
      margin-top: 6px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .controls {
      position: absolute;
      bottom: 24px;
      right: 24px;
      padding: 16px 20px;
      min-width: 260px;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      opacity: 0.7;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .control-value {
      font-variant-numeric: tabular-nums;
      opacity: 1;
      font-weight: 400;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(0, 0, 0, 0.3);
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #5a6a7a;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      background: #64b4ff;
      transform: scale(1.1);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      background: #64b4ff;
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #5a6a7a;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      background: #64b4ff;
    }

    .btn {
      width: 100%;
      background: rgba(100, 180, 255, 0.2);
      border: 1px solid rgba(100, 180, 255, 0.4);
      border-radius: 6px;
      color: #ffffff;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 300;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }

    .btn:hover {
      background: rgba(100, 180, 255, 0.35);
      border-color: rgba(100, 180, 255, 0.6);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .info-panel {
      position: absolute;
      top: 100px;
      right: 24px;
      width: 280px;
      padding: 18px 22px;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .info-panel.visible {
      transform: translateX(0);
    }

    .info-panel-header {
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      letter-spacing: 1px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .info-row-label {
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    .info-row-value {
      font-weight: 400;
    }

    .level-badge {
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 1px;
    }

    .level-low {
      background: rgba(74, 160, 255, 0.3);
      color: #a0d0ff;
    }

    .level-mid {
      background: rgba(232, 200, 112, 0.3);
      color: #ffe8a0;
    }

    .level-high {
      background: rgba(255, 96, 96, 0.3);
      color: #ffa0a0;
    }

    .vent-bar {
      height: 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.25);
      overflow: hidden;
      margin-top: 6px;
    }

    .vent-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.6s ease-out;
    }

    .close-panel {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.6);
      font-size: 20px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s ease;
      pointer-events: auto;
      padding: 4px;
    }

    .close-panel:hover {
      color: #ffffff;
    }

    .data-label {
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -100%) translateY(18px);
      opacity: 0;
      transition: opacity 0.25s ease-out, transform 0.3s cubic-bezier(0.22, 2.2, 0.55, 1);
      z-index: 5;
    }

    .data-label.visible {
      opacity: 1;
      transform: translate(-50%, -100%) translateY(0);
    }

    .data-label-inner {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 10px 14px;
      color: #2a3b4c;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      min-width: 140px;
    }

    .data-label-name {
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #1a2a3a;
    }

    .data-label-row {
      font-size: 11px;
      margin: 2px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: #4a5a6a;
    }

    .data-label-row span:last-child {
      font-weight: 500;
      color: #2a3b4c;
    }

    @media (max-width: 768px) {
      .title {
        font-size: 20px;
        letter-spacing: 2px;
      }

      .subtitle {
        font-size: 11px;
      }

      .layer-select,
      .legend,
      .controls {
        transform: scale(0.8);
        transform-origin: bottom left;
      }

      .controls {
        transform-origin: bottom right;
      }

      .layer-select {
        transform-origin: top left;
        top: 70px;
      }

      .legend {
        bottom: 160px;
      }

      .controls {
        right: 12px;
      }

      .info-panel {
        top: auto;
        bottom: 340px;
        right: 12px;
        transform-origin: bottom right;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="ui-overlay">
      <div class="header">
        <div class="title">城市风道可视化分析系统</div>
        <div class="subtitle">拖动场景旋转，悬停查看数据</div>
      </div>

      <div class="layer-select glass-panel">
        <label>图层显示</label>
        <select id="layer-select">
          <option value="both">风道粒子 + 通风色块</option>
          <option value="particles">仅风道粒子</option>
          <option value="colors">仅通风色块</option>
        </select>
      </div>

      <div class="legend glass-panel">
        <div class="legend-section">
          <div class="legend-title">阻挡等级</div>
          <div class="legend-bar">
            <div class="legend-gradient-block gradient-blocker"></div>
          </div>
          <div class="legend-labels">
            <span>低</span>
            <span>中</span>
            <span>高</span>
          </div>
          <div class="legend-range">数值范围：0 - 100%</div>
        </div>
        <div class="legend-section">
          <div class="legend-title">通风潜力</div>
          <div class="legend-bar">
            <div class="legend-gradient-block gradient-ventilation"></div>
          </div>
          <div class="legend-labels">
            <span>0%</span>
            <span>50%</span>
            <span>100%</span>
          </div>
          <div class="legend-range">数值范围：0 - 100%</div>
        </div>
      </div>

      <div class="controls glass-panel">
        <div class="control-group">
          <div class="control-label">
            <span>建筑透明度</span>
            <span class="control-value" id="opacity-value">1.00</span>
          </div>
          <input type="range" id="opacity-slider" min="0.1" max="1" step="0.05" value="1">
        </div>
        <div class="control-group">
          <button class="btn" id="reset-btn">重置视角</button>
        </div>
      </div>

      <div class="info-panel glass-panel" id="info-panel">
        <button class="close-panel" id="close-panel">&times;</button>
        <div class="info-panel-header" id="panel-title">建筑信息</div>
        <div class="info-row">
          <span class="info-row-label">建筑高度</span>
          <span class="info-row-value" id="panel-height">--</span>
        </div>
        <div class="info-row">
          <span class="info-row-label">占地面积</span>
          <span class="info-row-value" id="panel-area">--</span>
        </div>
        <div class="info-row">
          <span class="info-row-label">阻挡等级</span>
          <span class="info-row-value" id="panel-barrier">--</span>
        </div>
        <div class="info-row">
          <span class="info-row-label">通风潜力</span>
          <span class="info-row-value" id="panel-vent-value">--</span>
        </div>
        <div class="vent-bar">
          <div class="vent-bar-fill" id="panel-vent-bar"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
