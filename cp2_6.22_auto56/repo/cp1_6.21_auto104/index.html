<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>智能家居 3D 热力图</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    .time-label {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(0, 0, 0, 0.5);
      color: #FFFFFF;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 8px;
      z-index: 10;
      font-family: monospace;
      letter-spacing: 1px;
      backdrop-filter: blur(4px);
    }

    .status-label {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.5);
      color: #FFFFFF;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(4px);
    }

    .status-dot {
      width: 10px;
      height: 10px;
      background: #4CAF50;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
      }
      50% {
        opacity: 0.6;
        box-shadow: 0 0 0 8px rgba(76, 175, 80, 0);
      }
    }

    .help-label {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.4);
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      padding: 8px 14px;
      border-radius: 8px;
      z-index: 10;
      backdrop-filter: blur(4px);
    }

    .info-panel {
      position: fixed;
      top: 70px;
      right: 20px;
      width: 280px;
      height: 200px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 16px;
      padding: 18px 20px;
      z-index: 20;
      color: #FFFFFF;
      opacity: 0;
      transform: translateY(-10px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: none;
    }

    .info-panel.visible {
      opacity: 1;
      transform: translateY(0);
      display: block;
    }

    .info-panel .room-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 14px;
      color: #FFFFFF;
      border-bottom: 1px solid rgba(255, 255, 255, 0.15);
      padding-bottom: 10px;
    }

    .info-panel .sensor-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      font-family: monospace;
      font-size: 14px;
    }

    .info-panel .sensor-label {
      color: rgba(255, 255, 255, 0.7);
    }

    .info-panel .sensor-value.temperature { color: #FF5252; font-weight: 600; }
    .info-panel .sensor-value.humidity { color: #448AFF; font-weight: 600; }
    .info-panel .sensor-value.light { color: #FFD740; font-weight: 600; }
    .info-panel .sensor-value.air { color: #69F0AE; font-weight: 600; }

    .info-panel .close-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 20px;
      cursor: pointer;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s;
    }

    .info-panel .close-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      color: #FFFFFF;
    }

    @media (max-width: 768px) {
      .info-panel {
        width: 90%;
        left: 5%;
        right: 5%;
        top: 60px;
      }

      .help-label {
        display: none;
      }

      .status-label {
        left: auto;
        right: 20px;
        transform: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="time-label" id="time-label">--:--:--</div>

    <div class="status-label">
      <span class="status-dot"></span>
      <span>实时数据流接收中</span>
    </div>

    <div class="help-label">鼠标拖拽旋转 | 滚轮缩放</div>

    <div class="info-panel" id="info-panel">
      <button class="close-btn" id="close-panel">&times;</button>
      <div class="room-name" id="room-name">客厅</div>
      <div class="sensor-row">
        <span class="sensor-label">🌡️ 温度</span>
        <span class="sensor-value temperature" id="temp-value">-- ℃</span>
      </div>
      <div class="sensor-row">
        <span class="sensor-label">💧 湿度</span>
        <span class="sensor-value humidity" id="hum-value">-- %</span>
      </div>
      <div class="sensor-row">
        <span class="sensor-label">💡 光照</span>
        <span class="sensor-value light" id="light-value">-- lux</span>
      </div>
      <div class="sensor-row">
        <span class="sensor-label">🍃 空气质量</span>
        <span class="sensor-value air" id="air-value">-- AQI</span>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
