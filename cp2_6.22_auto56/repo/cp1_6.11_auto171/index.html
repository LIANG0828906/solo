<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星图修复与导航</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #D4C5A9;
      font-family: "SimSun", "Noto Serif SC", serif;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .app-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }
    .title {
      font-family: "SimSun", "Noto Serif SC", serif;
      font-size: 28px;
      color: #4A3728;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.2);
      margin-bottom: 12px;
      letter-spacing: 4px;
    }
    .divider {
      position: relative;
      width: 300px;
      height: 1px;
      background-color: #8B7355;
      margin-bottom: 20px;
    }
    .divider::before,
    .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background-color: #8B7355;
      transform: translateY(-50%);
    }
    .divider::before {
      left: 0;
    }
    .divider::after {
      right: 0;
    }
    .canvas-wrapper {
      position: relative;
      width: 800px;
      height: 650px;
    }
    #mainCanvas {
      display: block;
      border-radius: 8px;
      cursor: default;
    }
    .reset-btn {
      position: absolute;
      top: 0;
      right: 0;
      width: 80px;
      height: 32px;
      background-color: #4A3728;
      color: #D4A017;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: "SimSun", "Noto Serif SC", serif;
      transition: all 0.2s ease;
      opacity: 0.9;
    }
    .reset-btn:hover {
      background-color: #6B5B4A;
    }
    .reset-btn:active {
      transform: translateY(2px);
    }
    .time-slider-container {
      position: absolute;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: rgba(59, 47, 42, 0.8);
      padding: 15px 10px;
      border-radius: 8px;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s ease;
    }
    .time-slider-container.visible {
      opacity: 1;
      visibility: visible;
    }
    .time-slider-label {
      color: #D4A017;
      font-size: 12px;
      writing-mode: vertical-rl;
      margin-bottom: 15px;
      letter-spacing: 2px;
    }
    .time-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 120px;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to top, #0B0D1A, #3A6A8A);
      outline: none;
      transform: rotate(-90deg);
      transform-origin: center center;
      cursor: pointer;
    }
    .time-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #D4A017;
      cursor: pointer;
      clip-path: polygon(
        50% 0%, 71% 7%, 100% 29%, 100% 71%, 71% 93%,
        50% 100%, 29% 93%, 0% 71%, 0% 29%, 29% 7%
      );
    }
    .time-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #D4A017;
      cursor: pointer;
      border: none;
    }
    .time-value {
      color: #8B7355;
      font-size: 12px;
      margin-top: 15px;
    }
    .record-container {
      width: 400px;
      height: 120px;
      background-color: rgba(59, 47, 42, 0.8);
      border-radius: 8px;
      margin-top: 16px;
      padding: 12px 16px;
      position: relative;
      overflow: hidden;
    }
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .record-title {
      color: #D4A017;
      font-size: 14px;
      letter-spacing: 2px;
    }
    .clear-btn {
      color: #D4A017;
      font-size: 12px;
      background: none;
      border: none;
      cursor: pointer;
      font-family: "SimSun", "Noto Serif SC", serif;
      padding: 2px 4px;
      transition: all 0.2s ease;
    }
    .clear-btn:hover {
      text-decoration: underline;
    }
    .record-list {
      list-style: none;
      height: calc(100% - 30px);
      overflow-y: auto;
      padding-right: 4px;
    }
    .record-list::-webkit-scrollbar {
      width: 6px;
    }
    .record-list::-webkit-scrollbar-track {
      background: rgba(139, 115, 85, 0.2);
      border-radius: 3px;
    }
    .record-list::-webkit-scrollbar-thumb {
      background: rgba(139, 115, 85, 0.6);
      border-radius: 3px;
    }
    .record-item {
      color: #D4C5A9;
      font-size: 12px;
      padding: 6px 0;
      border-bottom: 1px solid #5C4A3A;
      line-height: 1.6;
    }
    .record-item:last-child {
      border-bottom: none;
    }
    .record-list.erasing {
      animation: eraseUp 0.5s ease forwards;
    }
    @keyframes eraseUp {
      0% {
        clip-path: inset(0 0 0 0);
        opacity: 1;
      }
      100% {
        clip-path: inset(100% 0 0 0);
        opacity: 0;
      }
    }
    .copyright {
      margin-top: 16px;
      font-size: 10px;
      color: #8B7355;
      opacity: 0.6;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <h1 class="title">星图修复与导航</h1>
    <div class="divider"></div>
    <div class="canvas-wrapper">
      <canvas id="mainCanvas" width="800" height="650"></canvas>
      <button class="reset-btn" id="resetBtn">重置</button>
      <div class="time-slider-container" id="timeSliderContainer">
        <span class="time-slider-label">航行时间</span>
        <input type="range" class="time-slider" id="timeSlider" min="0" max="24" step="0.5" value="0" />
        <span class="time-value" id="timeValue">0:00</span>
      </div>
    </div>
    <div class="record-container">
      <div class="record-header">
        <span class="record-title">导航记录</span>
        <button class="clear-btn" id="clearBtn">清空记录</button>
      </div>
      <ul class="record-list" id="recordList"></ul>
    </div>
    <div class="copyright">Ancient Star Chart Simulator v1.0</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
