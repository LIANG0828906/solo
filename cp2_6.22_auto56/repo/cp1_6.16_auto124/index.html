<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>量子纠缠态可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1F2833 0%, #0B0C10 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    #meter-container {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 10;
    }
    
    #control-panel {
      position: absolute;
      display: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 10px;
      padding: 12px;
      z-index: 20;
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 0;
      transform: scale(0.9);
    }
    
    #control-panel.visible {
      display: flex;
      opacity: 1;
      transform: scale(1);
    }
    
    .spin-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 8px;
      margin: 0 6px;
      cursor: pointer;
      font-size: 24px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
    
    .spin-btn:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.2);
    }
    
    .spin-btn.spin-up {
      color: #FF6B6B;
      box-shadow: 0 0 15px rgba(255, 107, 107, 0.5);
    }
    
    .spin-btn.spin-down {
      color: #4ECDC4;
      box-shadow: 0 0 15px rgba(78, 205, 196, 0.5);
    }
    
    .spin-btn.superposition {
      color: #FFE66D;
      box-shadow: 0 0 15px rgba(255, 230, 109, 0.5);
      animation: pulse-glow 1.5s ease-in-out infinite;
    }
    
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 15px rgba(255, 230, 109, 0.5); }
      50% { box-shadow: 0 0 25px rgba(255, 230, 109, 0.8); }
    }
    
    .panel-title {
      color: rgba(255, 255, 255, 0.8);
      font-size: 12px;
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .btn-row {
      display: flex;
      justify-content: center;
    }
    
    #meter-canvas {
      display: block;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="meter-container">
      <canvas id="meter-canvas" width="200" height="120"></canvas>
    </div>
    <div id="control-panel">
      <div>
        <div class="panel-title">自旋控制</div>
        <div class="btn-row">
          <button class="spin-btn spin-up" data-spin="up" title="自旋向上">↑</button>
          <button class="spin-btn spin-down" data-spin="down" title="自旋向下">↓</button>
          <button class="spin-btn superposition" data-spin="superposition" title="叠加态">⟳</button>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
