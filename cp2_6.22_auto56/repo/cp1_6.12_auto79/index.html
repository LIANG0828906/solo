<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D海洋生态系统模拟器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            height: 48px;
            background: #333333;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FFFFFF;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .main-wrapper {
            width: 70%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 0;
        }

        .scene-container {
            position: relative;
            width: 800px;
            height: 600px;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #sceneCanvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .stats-panel {
            width: 800px;
            height: 120px;
            margin-top: 0;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            display: flex;
            background: #2A2A2A;
        }

        #statsCanvas {
            display: block;
            width: 60%;
            height: 100%;
        }

        #controlsContainer {
            width: 40%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div class="header">2D 海洋生态系统演化模拟器</div>
    <div class="main-wrapper">
        <div class="scene-container">
            <canvas id="sceneCanvas" width="800" height="600"></canvas>
        </div>
        <div class="stats-panel">
            <canvas id="statsCanvas" width="480" height="120"></canvas>
            <div id="controlsContainer"></div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
