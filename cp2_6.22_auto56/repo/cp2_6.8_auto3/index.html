<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>节奏塔防 - Rhythm Tower Defense</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Rajdhani', sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #gameCanvas {
      display: block;
      background: #1a1a2e;
      cursor: crosshair;
    }

    .glass-panel {
      background: rgba(26, 26, 46, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(123, 47, 247, 0.3);
      border-radius: 8px;
    }

    #startOverlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(26, 26, 46, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #startOverlay h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 56px;
      font-weight: 900;
      color: #7b2ff7;
      text-shadow: 0 0 30px rgba(123, 47, 247, 0.6);
      margin-bottom: 20px;
      letter-spacing: 4px;
    }

    #startOverlay p {
      font-size: 20px;
      color: #a0a0c0;
      margin-bottom: 40px;
      text-align: center;
      max-width: 600px;
      line-height: 1.6;
    }

    #startBtn {
      font-family: 'Orbitron', sans-serif;
      font-size: 24px;
      font-weight: 700;
      padding: 16px 48px;
      background: linear-gradient(135deg, #7b2ff7 0%, #5a1fd0 100%);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 2px;
      transition: all 0.3s ease;
      box-shadow: 0 0 20px rgba(123, 47, 247, 0.5);
    }

    #startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(123, 47, 247, 0.8);
    }
  </style>
</head>
<body>
  <div id="startOverlay">
    <h1>RHYTHM TD</h1>
    <p>点击开始游戏<br>防御塔将跟随音乐节拍自动攻击<br>在左侧面板选择塔类型，然后点击地图放置</p>
    <button id="startBtn">START</button>
  </div>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/game.ts"></script>
</body>
</html>
