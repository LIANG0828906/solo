<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>古代投壶雅戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #EDE4D4;
      font-family: "KaiTi", "STKaiti", "楷体", serif;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #F5F0E1 0%, #EDE4D4 100%);
    }
    #game-canvas {
      display: block;
      background: #A9C6D9;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      cursor: crosshair;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1200" height="700"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
