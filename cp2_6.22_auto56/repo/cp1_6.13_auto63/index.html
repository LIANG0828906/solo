<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LavaField - Interactive Lava Terrain</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      font-family: 'Segoe UI', Arial, sans-serif;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    #ui-overlay {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 18px 22px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      color: #fff;
      backdrop-filter: blur(4px);
      transition: opacity 0.5s ease;
      z-index: 10;
      max-width: 280px;
    }
    #ui-overlay h3 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #ff8844;
      letter-spacing: 1px;
    }
    #ui-overlay .tip {
      font-size: 13px;
      line-height: 1.7;
      color: #ddd;
      margin-bottom: 4px;
    }
    #ui-overlay .tip span {
      color: #ffaa44;
      font-weight: bold;
    }
    .speed-bar-container {
      margin-top: 14px;
    }
    .speed-bar-label {
      font-size: 12px;
      color: #aaa;
      margin-bottom: 5px;
      display: flex;
      justify-content: space-between;
    }
    .speed-bar {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .speed-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff4400, #ffaa00, #ffff44);
      border-radius: 4px;
      transition: width 0.08s linear;
    }
    #fps-counter {
      position: fixed;
      bottom: 16px;
      right: 20px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
      font-family: 'Consolas', 'Courier New', monospace;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="ui-overlay">
    <h3>LAVA FIELD</h3>
    <div class="tip"><span>拖拽</span> 鼠标左键 - 造熔岩山</div>
    <div class="tip"><span>双击</span> 地形 - 造熔岩池</div>
    <div class="tip"><span>滚轮</span> - 缩放视角</div>
    <div class="tip"><span>右键</span> - 旋转视角</div>
    <div class="speed-bar-container">
      <div class="speed-bar-label">
        <span>熔岩速度</span>
        <span id="speed-value">0.00</span>
      </div>
      <div class="speed-bar">
        <div class="speed-bar-fill" id="speed-fill"></div>
      </div>
    </div>
  </div>
  <div id="fps-counter">FPS: 60</div>
  <script type="module" src="/src/Renderer.ts"></script>
</body>
</html>
