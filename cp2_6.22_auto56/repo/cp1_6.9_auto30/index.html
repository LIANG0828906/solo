<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>像素塔防 - Pixel Tower Defense</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a0f05;
      font-family: monospace;
    }
    
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    
    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }
    
    .damage-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      box-shadow: inset 0 0 80px rgba(255, 0, 0, 0);
      transition: box-shadow 0.2s ease-out;
    }
    
    .damage-flash.active {
      box-shadow: inset 0 0 80px rgba(255, 0, 0, 0.6);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
    <div class="damage-flash" id="damage-flash"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
