<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>城市交通流量3D热力图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A1A; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: #E0E0F0; }

    #app { position: fixed; inset: 0; }
    #canvas-container { position: absolute; inset: 0; }

    .control-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 260px;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 12px;
      padding: 20px;
      z-index: 10;
      border: 1px solid rgba(255, 107, 107, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #FF6B6B;
      margin-bottom: 20px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: #FF6B6B;
      border-radius: 2px;
    }

    .control-group { margin-bottom: 22px; }
    .control-label {
      font-size: 12px;
      color: #8A8AB0;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .control-value { color: #FF6B6B; font-weight: 600; font-variant-numeric: tabular-nums; }

    .slider-wrapper { position: relative; padding: 6px 0; }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #4A4A6E;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #FF6B6B;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255, 107, 107, 0.6);
      transition: all 0.2s ease;
      border: 2px solid #fff;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
    }
    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #FF6B6B;
      cursor: pointer;
      border: 2px solid #fff;
    }
    .slider-ticks {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      font-size: 10px;
      color: #6A6A90;
    }

    .mode-buttons {
      display: flex;
      gap: 6px;
    }
    .mode-btn {
      flex: 1;
      padding: 8px 0;
      background: #2D2D5E;
      border: none;
      border-radius: 8px;
      color: #B0B0D0;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-weight: 500;
    }
    .mode-btn:hover { filter: brightness(1.2); }
    .mode-btn:active { transform: scale(0.95); }
    .mode-btn.active {
      background: #FF6B6B;
      color: #fff;
      box-shadow: 0 0 16px rgba(255, 107, 107, 0.4);
    }

    .detail-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      background: rgba(15, 15, 35, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 8px;
      border: 1px solid #FF6B6B;
      padding: 20px;
      z-index: 10;
      box-shadow: 0 8px 32px rgba(255, 107, 107, 0.15);
      transform: translateX(360px);
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .detail-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }
    .detail-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 24px;
      height: 24px;
      background: transparent;
      border: none;
      color: #8A8AB0;
      font-size: 18px;
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .detail-close:hover { background: rgba(255, 107, 107, 0.2); color: #FF6B6B; }
    .detail-title {
      font-size: 15px;
      font-weight: 600;
      color: #FF6B6B;
      margin-bottom: 16px;
      padding-right: 28px;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { color: #8A8AB0; }
    .detail-val { color: #E0E0F0; font-weight: 500; }
    .level-low { color: #00FF88 !important; }
    .level-mid { color: #FFDD00 !important; }
    .level-high { color: #FF5555 !important; }

    .mini-chart {
      margin: 14px 0;
      padding: 12px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 6px;
    }
    .chart-title { font-size: 11px; color: #8A8AB0; margin-bottom: 10px; }
    .chart-bars {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      height: 60px;
    }
    .chart-bar-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }
    .chart-bar {
      width: 100%;
      border-radius: 3px 3px 0 0;
      background: linear-gradient(180deg, #FF6B6B 0%, #FF8844 100%);
      min-height: 4px;
      transition: height 0.3s ease;
    }
    .chart-bar-label { font-size: 9px; color: #6A6A90; }

    .suggestion {
      margin-top: 12px;
      padding: 12px;
      background: rgba(255, 107, 107, 0.1);
      border-left: 3px solid #FF6B6B;
      border-radius: 0 6px 6px 0;
      font-size: 11px;
      color: #C0C0E0;
      line-height: 1.6;
    }
    .suggestion-title {
      color: #FF6B6B;
      font-weight: 600;
      font-size: 11px;
      margin-bottom: 6px;
    }

    .mobile-toggle {
      display: none;
      position: fixed;
      top: 16px;
      left: 16px;
      width: 44px;
      height: 44px;
      background: rgba(26, 26, 46, 0.9);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 10px;
      color: #FF6B6B;
      font-size: 22px;
      cursor: pointer;
      z-index: 11;
      align-items: center;
      justify-content: center;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: 0;
        left: 0;
        width: 240px;
        height: 100vh;
        border-radius: 0;
        transform: translateX(-100%);
        padding-top: 70px;
      }
      .control-panel.mobile-open { transform: translateX(0); }
      .mobile-toggle { display: flex; }
      .detail-panel {
        width: calc(100% - 32px);
        right: 16px;
        left: 16px;
        top: auto;
        bottom: 16px;
        transform: translateY(120%);
      }
      .detail-panel.visible { transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <button class="mobile-toggle" id="mobileToggle">☰</button>

    <div class="control-panel" id="controlPanel">
      <div class="panel-title">交通流量控制</div>

      <div class="control-group">
        <div class="control-label">
          <span>时段</span>
          <span class="control-value" id="timeValue">08:00</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="timeSlider" min="0" max="8" step="1" value="0" />
          <div class="slider-ticks">
            <span>8</span><span>10</span><span>12</span><span>14</span><span>16</span><span>18</span><span>20</span>
          </div>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label"><span>显示模式</span></div>
        <div class="mode-buttons" id="modeButtons">
          <button class="mode-btn active" data-mode="heatmap">热力</button>
          <button class="mode-btn" data-mode="road">道路</button>
          <button class="mode-btn" data-mode="hybrid">混合</button>
        </div>
      </div>

      <div class="control-group">
        <div class="control-label">
          <span>热力增益</span>
          <span class="control-value" id="gainValue">1.0</span>
        </div>
        <div class="slider-wrapper">
          <input type="range" id="gainSlider" min="0.1" max="5.0" step="0.1" value="1.0" />
          <div class="slider-ticks">
            <span>0.1</span><span>1.0</span><span>2.5</span><span>5.0</span>
          </div>
        </div>
      </div>
    </div>

    <div class="detail-panel" id="detailPanel">
      <button class="detail-close" id="detailClose">×</button>
      <div class="detail-title" id="detailRoadName">路段名称</div>
      <div class="detail-row">
        <span class="detail-label">当前流量</span>
        <span class="detail-val" id="detailLevel">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">流量密度</span>
        <span class="detail-val" id="detailDensity">-</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">网格坐标</span>
        <span class="detail-val" id="detailCoord">-</span>
      </div>
      <div class="mini-chart">
        <div class="chart-title">前3时段流量对比</div>
        <div class="chart-bars" id="chartBars"></div>
      </div>
      <div class="suggestion">
        <div class="suggestion-title">绕行建议</div>
        <div id="detailSuggestion">-</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
