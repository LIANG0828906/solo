<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球能源转型 3D 可视化看板</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0B0C10;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 220px;
      height: 80px;
      background: rgba(31, 40, 51, 0.85);
      border-radius: 12px;
      padding: 16px 20px;
      color: #ffffff;
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .info-panel .year {
      font-size: 24px;
      font-weight: 600;
      color: #66FCF1;
      letter-spacing: 1px;
    }
    .info-panel .update-time {
      font-size: 12px;
      color: #C5C6C7;
      margin-top: 6px;
    }
    .detail-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 400px;
      background: rgba(31, 40, 51, 0.95);
      border-radius: 16px;
      border-left: 5px solid #45A29E;
      padding: 24px;
      color: #ffffff;
      opacity: 0;
      transform: translateX(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .detail-panel.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: auto;
    }
    .detail-panel .country-name {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 20px;
    }
    .detail-panel .energy-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .detail-panel .energy-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .detail-panel .energy-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }
    .detail-panel .energy-value {
      font-weight: 600;
      font-size: 16px;
    }
    .detail-panel .renewable { color: #45A29E; }
    .detail-panel .fossil { color: #C5C6C7; }
    .detail-panel .nuclear { color: #66FCF1; }
    .detail-panel .mini-chart {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 80px;
      margin-top: 20px;
      padding: 16px;
      background: rgba(11, 12, 16, 0.6);
      border-radius: 10px;
    }
    .detail-panel .mini-bar {
      width: 80px;
      border-radius: 4px 4px 0 0;
      transition: height 0.5s ease;
      position: relative;
    }
    .detail-panel .mini-bar.renewable { background: #45A29E; }
    .detail-panel .mini-bar.fossil { background: #C5C6C7; }
    .detail-panel .mini-bar.nuclear { background: #66FCF1; }
    .detail-panel .close-btn {
      position: absolute;
      top: 12px;
      right: 16px;
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #C5C6C7;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s ease;
    }
    .detail-panel .close-btn:hover {
      color: #ffffff;
    }
    .timeline-container {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 900px;
      height: 60px;
      background: #0B0C10;
      border-radius: 12px;
      padding: 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      box-shadow: 0 -2px 20px rgba(0, 0, 0, 0.3);
    }
    .timeline-container .slider-wrapper {
      position: relative;
      flex: 1;
      height: 100%;
      display: flex;
      align-items: center;
    }
    .timeline-container .track {
      position: absolute;
      width: 100%;
      height: 4px;
      background: #1F2833;
      border-radius: 2px;
    }
    .timeline-container .track-fill {
      position: absolute;
      height: 100%;
      background: linear-gradient(90deg, #45A29E, #66FCF1);
      border-radius: 2px;
      transition: width 0.1s linear;
    }
    .timeline-container input[type="range"] {
      position: absolute;
      width: 100%;
      height: 100%;
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
      z-index: 2;
    }
    .timeline-container input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #45A29E;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(69, 162, 158, 0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .timeline-container input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(69, 162, 158, 0.9);
    }
    .timeline-container input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #45A29E;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(69, 162, 158, 0.6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .timeline-container .year-label {
      position: absolute;
      top: -8px;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
      pointer-events: none;
      transition: left 0.1s linear;
      text-shadow: 0 0 10px rgba(102, 252, 241, 0.5);
    }
    .timeline-container .year-marks {
      position: absolute;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 8px;
    }
    .timeline-container .year-marks span {
      font-size: 10px;
      color: #C5C6C7;
    }
    .axis-label {
      color: #ffffff;
      font-size: 14px;
      padding: 4px 10px;
      background: rgba(31, 40, 51, 0.8);
      border-radius: 4px;
      white-space: nowrap;
      font-weight: 500;
    }
    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #66FCF1;
      font-size: 18px;
      z-index: 200;
    }
    .loading.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="loading" id="loading">正在加载能源数据...</div>
    <div class="info-panel">
      <div class="year" id="info-year">2020</div>
      <div class="update-time" id="info-update">数据更新: 2026-06-17</div>
    </div>
    <div class="detail-panel" id="detail-panel">
      <button class="close-btn" id="close-detail">×</button>
      <div class="country-name" id="detail-country">国家名称</div>
      <div class="energy-row">
        <div class="energy-label renewable">
          <div class="energy-dot" style="background:#45A29E"></div>
          <span>可再生能源占比</span>
        </div>
        <div class="energy-value renewable" id="detail-renewable">0%</div>
      </div>
      <div class="energy-row">
        <div class="energy-label fossil">
          <div class="energy-dot" style="background:#C5C6C7"></div>
          <span>化石燃料占比</span>
        </div>
        <div class="energy-value fossil" id="detail-fossil">0%</div>
      </div>
      <div class="energy-row">
        <div class="energy-label nuclear">
          <div class="energy-dot" style="background:#66FCF1"></div>
          <span>核能占比</span>
        </div>
        <div class="energy-value nuclear" id="detail-nuclear">0%</div>
      </div>
      <div class="mini-chart" id="mini-chart">
        <div class="mini-bar renewable" id="bar-renewable" style="height: 20%"></div>
        <div class="mini-bar fossil" id="bar-fossil" style="height: 60%"></div>
        <div class="mini-bar nuclear" id="bar-nuclear" style="height: 20%"></div>
      </div>
      <div class="energy-row" style="margin-top: 16px;">
        <div class="energy-label" style="color: #C5C6C7;">
          <span>数据年份</span>
        </div>
        <div class="energy-value" id="detail-year" style="color:#66FCF1">2020</div>
      </div>
    </div>
    <div class="timeline-container">
      <div class="slider-wrapper">
        <div class="track">
          <div class="track-fill" id="track-fill"></div>
        </div>
        <div class="year-label" id="year-label">2020</div>
        <div class="year-marks">
          <span>2000</span>
          <span>2005</span>
          <span>2010</span>
          <span>2015</span>
          <span>2020</span>
        </div>
        <input type="range" id="year-slider" min="2000" max="2020" step="1" value="2020">
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
