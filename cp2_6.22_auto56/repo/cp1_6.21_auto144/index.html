<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维粒子电场运动模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0A0B1E 0%, #1A1B3A 100%);
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 280px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px;
      color: #E2E8F0;
      z-index: 10;
    }

    .control-panel h2 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #00D4FF;
      text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      color: #94A3B8;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .control-group select,
    .control-group input[type="range"] {
      width: 100%;
    }

    .control-group select {
      background: #1E293B;
      border: 1px solid #334155;
      border-radius: 6px;
      color: #E2E8F0;
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .control-group select:focus {
      border-color: #00D4FF;
      box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
    }

    .control-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      background: #1E293B;
      border-radius: 3px;
      outline: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #0088CC 100%);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
      transition: transform 0.15s;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .control-group input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #00D4FF 0%, #0088CC 100%);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 212, 255, 0.6);
    }

    .slider-value {
      float: right;
      color: #00D4FF;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      font-weight: 600;
    }

    .button-group {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #0A0B1E;
      background: linear-gradient(135deg, #00D4FF 0%, #0088CC 100%);
      transition: all 0.2s ease;
      box-shadow: 0 2px 10px rgba(0, 212, 255, 0.3);
    }

    .btn:hover {
      transform: translateX(2px);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.5);
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background: linear-gradient(135deg, #475569 0%, #334155 100%);
      color: #E2E8F0;
      box-shadow: 0 2px 10px rgba(51, 65, 85, 0.3);
    }

    .btn-secondary:hover {
      box-shadow: 0 4px 20px rgba(71, 85, 105, 0.5);
    }

    .btn-paused {
      background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%);
      color: #0A0B1E;
    }

    .stats-panel {
      position: absolute;
      bottom: 20px;
      right: 20px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      color: #94A3B8;
      z-index: 10;
    }

    .stats-panel .stat-item {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }

    .stats-panel .stat-value {
      color: #00D4FF;
      font-weight: 600;
    }

    .info-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(15, 23, 42, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 16px;
      color: #E2E8F0;
      z-index: 10;
      font-size: 12px;
    }

    .info-panel .info-row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 4px;
    }

    .info-panel .info-row:last-child {
      margin-bottom: 0;
    }

    .info-panel .info-label {
      color: #94A3B8;
    }

    .info-panel .info-value {
      color: #00D4FF;
      font-family: 'Courier New', monospace;
      font-weight: 600;
    }

    @media (max-width: 768px) {
      .control-panel {
        top: auto;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 60px;
        border-radius: 12px 12px 0 0;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
        white-space: nowrap;
        gap: 16px;
      }

      .control-panel h2 {
        display: none;
      }

      .control-group {
        margin-bottom: 0;
        display: inline-flex;
        flex-direction: column;
        min-width: 140px;
      }

      .control-group label {
        margin-bottom: 2px;
      }

      .button-group {
        margin-top: 0;
        display: inline-flex;
      }

      .btn {
        padding: 8px 12px;
        font-size: 12px;
      }

      .info-panel {
        top: 10px;
        right: 10px;
        font-size: 11px;
        padding: 8px 12px;
      }

      .stats-panel {
        bottom: 70px;
        right: 10px;
        font-size: 12px;
        padding: 8px 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="ui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
