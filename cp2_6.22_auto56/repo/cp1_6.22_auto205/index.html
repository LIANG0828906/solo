<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>手写签名生成器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #F5F3FF 0%, #EDE9FE 50%, #FAFAFA 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #app {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    .card {
      width: 700px;
      background: #FFFFFF;
      border: 2px solid #E5E7EB;
      border-radius: 16px;
      padding: 32px 40px;
      box-shadow: 0 4px 6px -1px rgba(124, 58, 237, 0.05),
                  0 10px 15px -3px rgba(124, 58, 237, 0.05);
      transition: box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 10px 25px -5px rgba(124, 58, 237, 0.1),
                  0 20px 40px -10px rgba(124, 58, 237, 0.08);
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      color: #7C3AED;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .svg-wrapper {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .svg-container {
      width: 600px;
      height: 220px;
      background: #FAFAFA;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .svg-container svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .signature-stroke {
      transition: stroke-dashoffset 0.05s linear;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-label {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }

    .text-input {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      border: 2px solid #E5E7EB;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
      font-family: inherit;
      background: #FFFFFF;
    }

    .text-input:focus {
      border-color: #7C3AED;
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .text-input::placeholder {
      color: #9CA3AF;
    }

    .input-hint {
      font-size: 12px;
      color: #6B7280;
    }

    .slider-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
    }

    .slider-label {
      font-size: 14px;
      font-weight: 500;
      color: #374151;
    }

    .value-label {
      position: absolute;
      top: -4px;
      background: #FFFFFF;
      color: #7C3AED;
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 12px;
      border: 1px solid #E9D5FF;
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.1);
      pointer-events: none;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.2s ease;
      z-index: 10;
      white-space: nowrap;
    }

    .value-label.is-dragging {
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(124, 58, 237, 0.2);
      border-color: #7C3AED;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: linear-gradient(to right, #7C3AED 0%, #7C3AED var(--progress, 50%), #E5E7EB var(--progress, 50%), #E5E7EB 100%);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: #FFFFFF;
      border: 3px solid #7C3AED;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(124, 58, 237, 0.25);
      transition: transform 0.15s ease,
                  box-shadow 0.15s ease;
    }

    .custom-slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 3px 10px rgba(124, 58, 237, 0.35);
    }

    .custom-slider::-webkit-slider-thumb:active {
      transform: scale(1.15);
    }

    .custom-slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: #FFFFFF;
      border: 3px solid #7C3AED;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(124, 58, 237, 0.25);
      transition: transform 0.15s ease,
                  box-shadow 0.15s ease;
    }

    .custom-slider::-moz-range-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 3px 10px rgba(124, 58, 237, 0.35);
    }

    .custom-slider::-moz-range-track {
      height: 6px;
      background: #E5E7EB;
      border-radius: 3px;
    }

    .custom-slider::-moz-range-progress {
      height: 6px;
      background: #7C3AED;
      border-radius: 3px;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 8px;
    }

    .btn {
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: -0.01em;
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED 0%, #6D28D9 100%);
      color: #FFFFFF;
      box-shadow: 0 4px 14px rgba(124, 58, 237, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #6D28D9 0%, #5B21B6 100%);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.4);
      transform: translateY(-1px);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(124, 58, 237, 0.3);
    }

    .btn-secondary {
      background: #F5F3FF;
      color: #7C3AED;
      border: 2px solid #E9D5FF;
    }

    .btn-secondary:hover:not(:disabled) {
      background: #EDE9FE;
      border-color: #DDD6FE;
    }

    .btn-secondary:active:not(:disabled) {
      background: #E9D5FF;
    }

    .btn-secondary.is-active {
      background: #7C3AED;
      color: #FFFFFF;
      border-color: #7C3AED;
    }

    @media (max-width: 768px) {
      .card {
        width: 100%;
        max-width: 500px;
        padding: 24px;
      }

      .svg-container {
        width: 100%;
        max-width: 460px;
        height: 180px;
      }

      .slider-row {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
