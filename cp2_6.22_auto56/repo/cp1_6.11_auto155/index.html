<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>蒸汽飞艇空战</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #3B2F2A;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #game-container {
      position: relative;
    }
    canvas {
      display: block;
      border: 8px solid #B87333;
      box-shadow:
        0 0 0 2px #5C4033,
        0 0 0 10px #3B2F2A,
        0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="1200" height="800"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
