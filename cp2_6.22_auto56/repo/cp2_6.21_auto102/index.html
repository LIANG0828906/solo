<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>思维导图编辑器</title>
    <style>
      :root {
        --bg-primary: #1e1e2e;
        --bg-toolbar: #252538;
        --bg-node: #2d2d44;
        --bg-hover: #3b3b5c;
        --text-primary: #e0e0e0;
        --border-node: #4a5b8a;
        --border-selected: #ff7f50;
        --accent-blue: #3b82f6;
        --accent-orange: #f97316;
        --glow-orange: rgba(255, 127, 80, 0.4);
        --edge-gray: #9ca3af;
        --level-0: #ff6b6b;
        --level-1: #4fc3f7;
        --level-2: #81c784;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body, #root {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg-primary);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
