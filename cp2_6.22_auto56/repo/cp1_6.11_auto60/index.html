<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>魔法生物战队 - 3D战斗模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
    }

    body {
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0d0015 50%, #000000 100%);
      position: relative;
    }

    .stars, .stars::after {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .stars {
      background-image: 
        radial-gradient(2px 2px at 20px 30px, #ffffff, transparent),
        radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 90px 40px, #ffffff, transparent),
        radial-gradient(2px 2px at 160px 120px, rgba(255,255,255,0.9), transparent),
        radial-gradient(1px 1px at 230px 80px, #ffffff, transparent),
        radial-gradient(2px 2px at 300px 150px, rgba(255,255,255,0.7), transparent),
        radial-gradient(1px 1px at 350px 200px, #ffffff, transparent),
        radial-gradient(2px 2px at 420px 50px, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 500px 180px, #ffffff, transparent),
        radial-gradient(2px 2px at 580px 90px, rgba(255,255,255,0.9), transparent);
      background-repeat: repeat;
      background-size: 600px 250px;
      animation: twinkle 4s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .app-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
    }

    .main-content {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    .creature-panel {
      width: 300px;
      flex-shrink: 0;
      background: rgba(30, 15, 50, 0.6);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-right: 1px solid rgba(150, 100, 255, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 20px;
      border-bottom: 1px solid rgba(150, 100, 255, 0.3);
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #b886ff 0%, #6ea8ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .creature-list {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      scrollbar-width: thin;
      scrollbar-color: rgba(150, 100, 255, 0.5) transparent;
    }

    .creature-list::-webkit-scrollbar {
      width: 6px;
    }

    .creature-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .creature-list::-webkit-scrollbar-thumb {
      background: rgba(150, 100, 255, 0.5);
      border-radius: 3px;
    }

    .element-group {
      margin-bottom: 20px;
    }

    .group-title {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #b886ff;
      margin-bottom: 10px;
      padding-left: 8px;
      border-left: 3px solid currentColor;
    }

    .group-title.fire { color: #ff6b6b; border-left-color: #ff6b6b; }
    .group-title.water { color: #4ecdc4; border-left-color: #4ecdc4; }
    .group-title.grass { color: #95e1a3; border-left-color: #95e1a3; }

    .creature-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: grab;
      transition: all 0.2s ease;
      user-select: none;
    }

    .creature-card:hover {
      background: rgba(255, 255, 255, 0.12);
      border-color: rgba(150, 100, 255, 0.5);
      transform: translateX(4px);
    }

    .creature-card:active {
      cursor: grabbing;
    }

    .creature-card.dragging {
      opacity: 0.5;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    .creature-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }

    .element-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 8px currentColor;
    }

    .element-dot.fire { background: #ff6b6b; color: #ff6b6b; }
    .element-dot.water { background: #4ecdc4; color: #4ecdc4; }
    .element-dot.grass { background: #95e1a3; color: #95e1a3; }

    .creature-name {
      font-weight: 600;
      font-size: 0.85rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-stats {
      display: flex;
      gap: 12px;
      margin-bottom: 8px;
    }

    .stat {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.75rem;
    }

    .stat-label {
      color: rgba(255, 255, 255, 0.6);
    }

    .stat-value {
      font-weight: 600;
      color: #ffd700;
    }

    .stat-speed .stat-value {
      color: #87ceeb;
    }

    .hp-bar-container {
      height: 6px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 3px;
      overflow: hidden;
    }

    .hp-bar {
      height: 100%;
      background: linear-gradient(90deg, #4ade80 0%, #22c55e 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .hp-bar.low {
      background: linear-gradient(90deg, #fbbf24 0%, #f59e0b 100%);
    }

    .hp-bar.critical {
      background: linear-gradient(90deg, #f87171 0%, #ef4444 100%);
    }

    .scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #three-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    #ui-label-renderer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .combat-info {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(30, 15, 50, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(150, 100, 255, 0.3);
      border-radius: 12px;
      padding: 16px 20px;
      min-width: 160px;
      pointer-events: none;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .info-label {
      color: rgba(255, 255, 255, 0.7);
      font-size: 0.8rem;
    }

    .info-value {
      font-weight: 600;
      font-family: 'Cinzel', serif;
    }

    .info-value.round {
      color: #ffd700;
      font-size: 1.1rem;
    }

    .info-value.ally {
      color: #4ecdc4;
    }

    .info-value.enemy {
      color: #ff6b6b;
    }

    .toolbar {
      height: 60px;
      flex-shrink: 0;
      background: rgba(20, 10, 35, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid rgba(150, 100, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 0 40px;
    }

    .btn {
      padding: 10px 28px;
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #ffffff;
      background: linear-gradient(135deg, #7c3aed 0%, #2563eb 100%);
      border: none;
      border-radius: 25px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 25px rgba(124, 58, 237, 0.6), 0 0 20px rgba(124, 58, 237, 0.3);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn.secondary {
      background: linear-gradient(135deg, #64748b 0%, #475569 100%);
      box-shadow: 0 4px 15px rgba(100, 116, 139, 0.4);
    }

    .btn.secondary:hover:not(:disabled) {
      box-shadow: 0 6px 25px rgba(100, 116, 139, 0.6), 0 0 20px rgba(100, 116, 139, 0.3);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(5px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: linear-gradient(135deg, rgba(30, 15, 50, 0.95) 0%, rgba(15, 8, 30, 0.95) 100%);
      border: 1px solid rgba(150, 100, 255, 0.5);
      border-radius: 20px;
      padding: 40px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(124, 58, 237, 0.4);
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(135deg, #ffd700 0%, #ff6b6b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-title.victory {
      background: linear-gradient(135deg, #ffd700 0%, #4ade80 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-title.defeat {
      background: linear-gradient(135deg, #ff6b6b 0%, #7c3aed 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .modal-title.draw {
      background: linear-gradient(135deg, #94a3b8 0%, #64748b 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }

    .stat-card.ally {
      border: 1px solid rgba(78, 205, 196, 0.3);
    }

    .stat-card.enemy {
      border: 1px solid rgba(255, 107, 107, 0.3);
    }

    .stat-card-label {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
    }

    .stat-card-value {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-card.ally .stat-card-value {
      color: #4ecdc4;
    }

    .stat-card.enemy .stat-card-value {
      color: #ff6b6b;
    }

    .damage-chart {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 40px;
      height: 150px;
      padding: 20px 0;
      margin-bottom: 30px;
    }

    .chart-bar-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .chart-bar {
      width: 60px;
      min-height: 20px;
      border-radius: 8px 8px 0 0;
      transition: height 0.8s ease-out;
      position: relative;
    }

    .chart-bar.ally {
      background: linear-gradient(180deg, #4ecdc4 0%, #26a69a 100%);
      box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
    }

    .chart-bar.enemy {
      background: linear-gradient(180deg, #ff6b6b 0%, #e53935 100%);
      box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }

    .chart-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
    }

    .chart-value {
      position: absolute;
      top: -25px;
      left: 50%;
      transform: translateX(-50%);
      font-weight: 600;
      font-size: 0.9rem;
    }

    .modal-actions {
      display: flex;
      justify-content: center;
    }

    .drag-ghost {
      position: fixed;
      pointer-events: none;
      opacity: 0.7;
      z-index: 1000;
      transform: translate(-50%, -50%);
    }

    .drop-highlight {
      position: absolute;
      border: 2px dashed #ffd700;
      border-radius: 8px;
      pointer-events: none;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.6);
      pointer-events: none;
      animation: ripple-expand 0.6s ease-out forwards;
    }

    @keyframes ripple-expand {
      0% {
        width: 0;
        height: 0;
        opacity: 1;
      }
      100% {
        width: 100px;
        height: 100px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  
  <div class="app-container">
    <div class="main-content">
      <aside class="creature-panel">
        <div class="panel-header">
          <h1 class="panel-title">⚔ 魔法生物战队</h1>
        </div>
        <div class="creature-list" id="creature-list">
        </div>
      </aside>

      <main class="scene-container">
        <canvas id="three-canvas"></canvas>
        <div id="ui-label-renderer"></div>
        
        <div class="combat-info">
          <div class="info-row">
            <span class="info-label">回合</span>
            <span class="info-value round" id="round-display">0 / 10</span>
          </div>
          <div class="info-row">
            <span class="info-label">我方存活</span>
            <span class="info-value ally" id="ally-count">5</span>
          </div>
          <div class="info-row">
            <span class="info-label">敌方存活</span>
            <span class="info-value enemy" id="enemy-count">5</span>
          </div>
        </div>
      </main>
    </div>

    <footer class="toolbar">
      <button class="btn" id="btn-formation">自动布阵</button>
      <button class="btn" id="btn-battle" disabled>开始战斗</button>
      <button class="btn secondary" id="btn-reset">重新布局</button>
    </footer>
  </div>

  <div class="modal-overlay" id="result-modal">
    <div class="modal">
      <h2 class="modal-title" id="result-title">战斗结束</h2>
      <div class="stats-grid">
        <div class="stat-card ally">
          <div class="stat-card-label">我方存活</div>
          <div class="stat-card-value" id="result-ally">0</div>
        </div>
        <div class="stat-card enemy">
          <div class="stat-card-label">敌方存活</div>
          <div class="stat-card-value" id="result-enemy">0</div>
        </div>
      </div>
      <div class="damage-chart">
        <div class="chart-bar-container">
          <div class="chart-bar ally" id="chart-ally">
            <span class="chart-value" id="chart-ally-value">0</span>
          </div>
          <div class="chart-label">我方伤害</div>
        </div>
        <div class="chart-bar-container">
          <div class="chart-bar enemy" id="chart-enemy">
            <span class="chart-value" id="chart-enemy-value">0</span>
          </div>
          <div class="chart-label">敌方伤害</div>
        </div>
      </div>
      <div class="modal-actions">
        <button class="btn" id="btn-modal-reset">重新布局</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
