<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>地质断层构造可视化演示</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <canvas id="main-canvas"></canvas>
  
  <div id="left-panel" class="panel glass-panel">
    <div class="panel-header">
      <h2>断层类型</h2>
      <div class="header-line"></div>
    </div>
    <div id="stress-diagram" class="stress-diagram">
      <svg viewBox="0 0 200 120" width="100%" height="100%">
        <defs>
          <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffaa55;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#ff6633;stop-opacity:1" />
          </linearGradient>
        </defs>
        <text x="100" y="20" text-anchor="middle" fill="#c9a87a" font-size="11" font-family="Georgia">选择断层模式查看应力图解</text>
      </svg>
    </div>
    <div class="fault-buttons">
      <button class="fault-btn" data-type="normal">
        <span class="btn-icon">↓↑</span>
        <span class="btn-label">正断层</span>
        <span class="btn-desc">Normal Fault</span>
      </button>
      <button class="fault-btn" data-type="reverse">
        <span class="btn-icon">↑↓</span>
        <span class="btn-label">逆断层</span>
        <span class="btn-desc">Reverse Fault</span>
      </button>
      <button class="fault-btn" data-type="strike-slip">
        <span class="btn-icon">⇄</span>
        <span class="btn-label">平移断层</span>
        <span class="btn-desc">Strike-Slip Fault</span>
      </button>
    </div>
    <div id="fault-description" class="fault-description">
      <p class="desc-placeholder">点击上方按钮选择断层类型，查看详细构造说明</p>
    </div>
  </div>
  
  <div id="right-panel" class="panel glass-panel">
    <div class="panel-header">
      <h2>参数调节</h2>
      <div class="header-line"></div>
    </div>
    <div class="param-group">
      <label>
        <span class="param-label">断层倾角</span>
        <span class="param-value" id="dip-value">60°</span>
      </label>
      <input type="range" id="dip-slider" class="rock-slider" min="10" max="90" value="60" step="1" />
    </div>
    <div class="param-group">
      <label>
        <span class="param-label">位移量</span>
        <span class="param-value" id="displacement-value">0.50</span>
      </label>
      <input type="range" id="displacement-slider" class="rock-slider" min="0" max="100" value="50" step="1" />
    </div>
    <div class="param-group">
      <label>
        <span class="param-label">滑动速度</span>
        <span class="param-value" id="slipspeed-value">1.00x</span>
      </label>
      <input type="range" id="slipspeed-slider" class="rock-slider" min="10" max="200" value="100" step="1" />
    </div>
    <div class="panel-header slice-header">
      <h2>3D剖面</h2>
      <div class="header-line"></div>
    </div>
    <div class="slice-container">
      <canvas id="slice-canvas"></canvas>
    </div>
  </div>
  
  <div id="top-bar">
    <h1>地质断层构造可视化演示系统</h1>
    <span class="fps-counter" id="fps-counter">FPS: --</span>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
