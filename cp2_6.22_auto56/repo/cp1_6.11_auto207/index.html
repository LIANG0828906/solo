<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟乐器合奏协作</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #E0E0E0;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    #bgCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .main-container {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 260px 1fr 420px;
      gap: 16px;
      padding: 16px;
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1024px) {
      .main-container {
        grid-template-columns: 240px 1fr;
        grid-template-rows: 1fr auto;
      }
      .visual-panel {
        grid-column: 1 / -1;
        display: flex;
        gap: 16px;
        justify-content: center;
      }
    }

    @media (max-width: 768px) {
      .main-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto auto;
        overflow-y: auto;
      }
      .instrument-panel {
        overflow-x: auto;
      }
    }

    .left-panel {
      background: rgba(22, 33, 62, 0.7);
      border-radius: 12px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.2);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: #00BFFF;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .room-input-group {
      display: flex;
      gap: 8px;
    }

    .room-input {
      flex: 1;
      padding: 10px 12px;
      background: rgba(10, 10, 21, 0.8);
      border: 1px solid rgba(0, 191, 255, 0.3);
      border-radius: 8px;
      color: #E0E0E0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .room-input:focus {
      border-color: #00BFFF;
    }

    .btn {
      padding: 10px 16px;
      background: #0F3460;
      color: #E0E0E0;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    .btn:hover {
      filter: brightness(1.2);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: #00BFFF;
      color: #0A0A15;
      font-weight: 600;
    }

    .room-info {
      background: rgba(10, 10, 21, 0.6);
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
    }

    .room-info-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .room-info-label {
      color: #888;
    }

    .room-info-value {
      color: #00FF88;
      font-weight: 600;
    }

    .user-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 0;
    }

    .user-list::-webkit-scrollbar {
      width: 6px;
    }

    .user-list::-webkit-scrollbar-track {
      background: rgba(10, 10, 21, 0.4);
      border-radius: 3px;
    }

    .user-list::-webkit-scrollbar-thumb {
      background: rgba(0, 191, 255, 0.4);
      border-radius: 3px;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: rgba(22, 33, 62, 0.8);
      border-radius: 8px;
      border-left: 3px solid var(--user-color);
    }

    .user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--user-color);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .user-self {
      border-color: #00FF88;
      box-shadow: 0 0 8px rgba(0, 255, 136, 0.3);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
    }

    .slider-label span:last-child {
      color: #00FF88;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #00BFFF, #FFF000);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 191, 255, 0.6);
    }

    .center-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .instrument-panel {
      flex: 1;
      background: rgba(22, 33, 62, 0.5);
      border-radius: 12px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(0, 191, 255, 0.15);
      backdrop-filter: blur(10px);
      min-height: 0;
    }

    #instrumentCanvas {
      width: 100%;
      height: 100%;
      max-height: 100%;
    }

    .toolbar {
      margin-top: 16px;
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 12px;
      background: rgba(22, 33, 62, 0.7);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.2);
      position: relative;
    }

    .toolbar-slider {
      position: absolute;
      bottom: 4px;
      height: 3px;
      background: #00BFFF;
      border-radius: 2px;
      transition: all 0.2s ease;
      box-shadow: 0 0 10px rgba(0, 191, 255, 0.6);
    }

    .tool-btn {
      padding: 10px 20px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      transition: all 0.2s ease;
      position: relative;
      z-index: 1;
    }

    .tool-btn:hover {
      color: #E0E0E0;
      border-color: rgba(0, 191, 255, 0.4);
    }

    .tool-btn.active {
      color: #00BFFF;
      border-color: #00BFFF;
      background: rgba(0, 191, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.2);
    }

    .tool-icon {
      font-size: 18px;
    }

    @media (max-width: 768px) {
      .tool-btn span.tool-text {
        display: none;
      }
    }

    .visual-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .visual-card {
      background: rgba(22, 33, 62, 0.7);
      border-radius: 12px;
      padding: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 191, 255, 0.2);
    }

    .visual-title {
      font-size: 11px;
      color: #888;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    #waveCanvas {
      width: 100%;
      max-width: 400px;
      height: 100px;
      background: #0A0A15;
      border-radius: 8px;
      display: block;
    }

    #spectrumCanvas {
      width: 100%;
      max-width: 400px;
      height: 80px;
      background: #0A0A15;
      border-radius: 8px;
      display: block;
    }

    @media (max-width: 1024px) {
      .visual-card {
        flex: 1;
        max-width: 400px;
      }
    }

    .cursor-indicator {
      position: absolute;
      pointer-events: none;
      z-index: 100;
      border-radius: 50%;
      background: #FFFFFF;
      opacity: 0.7;
      transform: translate(-50%, -50%);
      animation: ripple 0.5s ease-out forwards;
    }

    @keyframes ripple {
      0% {
        width: 6px;
        height: 6px;
        opacity: 0.7;
      }
      100% {
        width: 12px;
        height: 12px;
        opacity: 0;
      }
    }

    .glow-effect {
      position: absolute;
      pointer-events: none;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0, 191, 255, 0.3) 0%, transparent 70%);
      animation: glowPulse 0.6s ease-out forwards;
    }

    @keyframes glowPulse {
      0% {
        width: 20px;
        height: 20px;
        opacity: 1;
      }
      100% {
        width: 80px;
        height: 80px;
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="bgCanvas"></canvas>
    <div class="main-container">
      <div class="left-panel">
        <div>
          <div class="panel-title">合奏房间</div>
          <div class="room-input-group">
            <input type="text" class="room-input" id="roomIdInput" placeholder="输入房间ID" maxlength="16" />
          </div>
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn" id="createRoomBtn">创建</button>
            <button class="btn btn-primary" id="joinRoomBtn">加入</button>
          </div>
        </div>

        <div class="room-info" id="roomInfo" style="display:none;">
          <div class="room-info-row">
            <span class="room-info-label">房间ID</span>
            <span class="room-info-value" id="currentRoomId">-</span>
          </div>
          <div class="room-info-row">
            <span class="room-info-label">在线人数</span>
            <span class="room-info-value" id="onlineCount">0</span>
          </div>
        </div>

        <div style="flex:1; display:flex; flex-direction:column; min-height:0;">
          <div class="panel-title">在线用户</div>
          <div class="user-list" id="userList">
            <div style="color:#666; font-size:12px; text-align:center; padding:20px;">加入房间后显示</div>
          </div>
        </div>

        <div>
          <div class="panel-title">节拍控制</div>
          <div class="slider-group">
            <div class="slider-label">
              <span>BPM</span>
              <span id="bpmValue">120</span>
            </div>
            <input type="range" id="bpmSlider" min="60" max="200" value="120" />
          </div>
          <div class="slider-group" style="margin-top:12px;">
            <div class="slider-label">
              <span>音量</span>
              <span id="volumeValue">80%</span>
            </div>
            <input type="range" id="volumeSlider" min="0" max="100" value="80" />
          </div>
        </div>
      </div>

      <div class="center-panel">
        <div class="instrument-panel" id="instrumentPanel">
          <canvas id="instrumentCanvas"></canvas>
        </div>
        <div class="toolbar" id="toolbar">
          <div class="toolbar-slider" id="toolbarSlider"></div>
          <button class="tool-btn active" data-instrument="piano">
            <span class="tool-icon">🎹</span>
            <span class="tool-text">钢琴</span>
          </button>
          <button class="tool-btn" data-instrument="guitar">
            <span class="tool-icon">🎸</span>
            <span class="tool-text">吉他</span>
          </button>
          <button class="tool-btn" data-instrument="drums">
            <span class="tool-icon">🥁</span>
            <span class="tool-text">架子鼓</span>
          </button>
        </div>
      </div>

      <div class="visual-panel">
        <div class="visual-card">
          <div class="visual-title">波形预览</div>
          <canvas id="waveCanvas" width="400" height="100"></canvas>
        </div>
        <div class="visual-card">
          <div class="visual-title">频谱分析</div>
          <canvas id="spectrumCanvas" width="400" height="80"></canvas>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
