<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>书香阁 - 个人电子书库</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --walnut: #8B5E3C;
      --walnut-light: #A67C52;
      --walnut-dark: #6B4423;
      --cream: #F5F0E8;
      --cream-dark: #E8E0D0;
      --parchment: #F4E4BC;
      --forest: #2D4A3E;
      --ink: #2C1810;
      --shadow-soft: 0 2px 8px rgba(44, 24, 16, 0.1);
      --shadow-medium: 0 4px 16px rgba(44, 24, 16, 0.15);
      --shadow-deep: 0 8px 32px rgba(44, 24, 16, 0.2);
    }

    html, body {
      height: 100%;
      font-family: 'Noto Sans SC', sans-serif;
      color: var(--ink);
      background: linear-gradient(135deg, var(--cream) 0%, var(--cream-dark) 50%, var(--cream) 100%);
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(139, 94, 60, 0.03) 2px,
          rgba(139, 94, 60, 0.03) 4px
        ),
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(139, 94, 60, 0.02) 2px,
          rgba(139, 94, 60, 0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
    }

    h1, h2, h3, h4 {
      font-family: 'Playfair Display', serif;
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      outline: none;
    }

    input, select {
      font-family: inherit;
      outline: none;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--cream);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--walnut-light);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--walnut);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
