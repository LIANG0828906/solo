<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>星系碰撞模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0a0a1f 0%, #1a0a2e 50%, #0d0221 100%);
      color: #e0e0ff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    #control-panel {
      position: absolute;
      top: 16px;
      left: 16px;
      width: 280px;
      max-height: calc(100% - 120px);
      overflow-y: auto;
      padding: 20px;
      background: rgba(20, 15, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 100, 200, 0.25);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), 0 0 40px rgba(100, 80, 200, 0.1) inset;
      z-index: 10;
    }

    #control-panel::-webkit-scrollbar {
      width: 6px;
    }

    #control-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #control-panel::-webkit-scrollbar-thumb {
      background: rgba(120, 100, 200, 0.4);
      border-radius: 3px;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 20px;
      color: #a8c0ff;
      text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6fa8ff;
      box-shadow: 0 0 12px #6fa8ff;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.3); }
    }

    .section-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: #8888cc;
      margin: 16px 0 10px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid rgba(120, 100, 200, 0.2);
      text-transform: uppercase;
    }

    .section-title:first-child {
      margin-top: 0;
    }

    .slider-group {
      margin-bottom: 14px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #b0b0dd;
      margin-bottom: 6px;
    }

    .slider-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: #8fcfff;
      background: rgba(100, 150, 255, 0.1);
      padding: 2px 8px;
      border-radius: 4px;
      border: 1px solid rgba(100, 150, 255, 0.2);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, rgba(100, 80, 200, 0.3), rgba(100, 150, 255, 0.3));
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #6fa8ff;
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 0 10px #6fa8ff, 0 0 20px rgba(100, 150, 255, 0.5);
      transition: all 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 16px #6fa8ff, 0 0 32px rgba(100, 150, 255, 0.8);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #6fa8ff;
      border: 2px solid #fff;
      cursor: pointer;
      box-shadow: 0 0 10px #6fa8ff;
    }

    .energy-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 10px;
    }

    .energy-card {
      background: rgba(30, 20, 60, 0.6);
      border: 1px solid rgba(120, 100, 200, 0.2);
      border-radius: 10px;
      padding: 10px 12px;
      text-align: center;
    }

    .energy-card-label {
      font-size: 10px;
      color: #8888bb;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .energy-card-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 600;
    }

    .energy-card.kinetic .energy-card-value {
      color: #ff8f8f;
      text-shadow: 0 0 10px rgba(255, 100, 100, 0.4);
    }

    .energy-card.potential .energy-card-value {
      color: #8fffcf;
      text-shadow: 0 0 10px rgba(100, 255, 200, 0.4);
    }

    #timeline-panel {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 360px);
      max-width: 800px;
      min-width: 400px;
      padding: 14px 20px;
      background: rgba(20, 15, 40, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(120, 100, 200, 0.25);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .timeline-btn {
      flex-shrink: 0;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(120, 100, 200, 0.4);
      background: rgba(40, 30, 80, 0.6);
      color: #c0c0ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .timeline-btn:hover {
      background: rgba(80, 60, 160, 0.6);
      border-color: #6fa8ff;
      color: #fff;
      box-shadow: 0 0 16px rgba(100, 150, 255, 0.5);
    }

    .timeline-btn.play {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #4a5fff, #7a3fff);
      border-color: transparent;
      color: #fff;
      box-shadow: 0 0 20px rgba(100, 100, 255, 0.4);
    }

    .timeline-btn.play:hover {
      transform: scale(1.08);
      box-shadow: 0 0 28px rgba(100, 100, 255, 0.7);
    }

    .timeline-track {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .timeline-time {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      color: #8fcfff;
      flex-shrink: 0;
      min-width: 60px;
      text-align: center;
    }

    .speed-selector {
      flex-shrink: 0;
      display: flex;
      gap: 4px;
      background: rgba(30, 20, 60, 0.5);
      border-radius: 8px;
      padding: 3px;
      border: 1px solid rgba(120, 100, 200, 0.2);
    }

    .speed-btn {
      padding: 4px 10px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      border: none;
      background: transparent;
      color: #8888bb;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .speed-btn:hover {
      color: #c0c0ff;
    }

    .speed-btn.active {
      background: rgba(100, 100, 255, 0.3);
      color: #fff;
      box-shadow: 0 0 10px rgba(100, 100, 255, 0.3);
    }

    .dg.main {
      display: none !important;
    }

    @media (max-width: 768px) {
      #control-panel {
        top: 8px;
        left: 8px;
        right: 8px;
        width: auto;
        max-height: 40vh;
      }

      #timeline-panel {
        left: 8px;
        right: 8px;
        transform: none;
        width: auto;
        min-width: unset;
        padding: 10px 12px;
        gap: 8px;
      }

      .timeline-btn {
        width: 34px;
        height: 34px;
        font-size: 13px;
      }

      .timeline-btn.play {
        width: 40px;
        height: 40px;
      }

      .speed-btn {
        padding: 3px 6px;
        font-size: 9px;
      }

      .timeline-time {
        font-size: 10px;
        min-width: 50px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <aside id="control-panel">
      <div class="panel-title">星系碰撞模拟器</div>

      <div class="section-title">星系参数</div>

      <div class="slider-group">
        <div class="slider-label">
          <span>星系 A 质量</span>
          <span class="slider-value" id="massA-value">1.0</span>
        </div>
        <input type="range" id="massA" min="0.2" max="3.0" step="0.1" value="1.0" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>星系 B 质量</span>
          <span class="slider-value" id="massB-value">1.0</span>
        </div>
        <input type="range" id="massB" min="0.2" max="3.0" step="0.1" value="1.0" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>初始距离</span>
          <span class="slider-value" id="distance-value">120</span>
        </div>
        <input type="range" id="distance" min="60" max="200" step="5" value="120" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>碰撞角度 (°)</span>
          <span class="slider-value" id="angle-value">30</span>
        </div>
        <input type="range" id="angle" min="0" max="90" step="1" value="30" />
      </div>

      <div class="slider-group">
        <div class="slider-label">
          <span>速度倍数</span>
          <span class="slider-value" id="speedMul-value">1.0</span>
        </div>
        <input type="range" id="speedMul" min="0.2" max="3.0" step="0.1" value="1.0" />
      </div>

      <div class="section-title">能量监控</div>
      <div class="energy-cards">
        <div class="energy-card kinetic">
          <div class="energy-card-label">动能</div>
          <div class="energy-card-value" id="kinetic-value">0.00</div>
        </div>
        <div class="energy-card potential">
          <div class="energy-card-label">势能</div>
          <div class="energy-card-value" id="potential-value">0.00</div>
        </div>
      </div>
    </aside>

    <div id="timeline-panel">
      <button class="timeline-btn" id="reset-btn" title="重置">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
          <path d="M3 3v5h5"/>
        </svg>
      </button>
      <button class="timeline-btn play" id="play-btn" title="播放/暂停">
        <svg id="play-icon" width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <polygon points="5,3 19,12 5,21"/>
        </svg>
      </button>
      <div class="timeline-track">
        <span class="timeline-time" id="time-current">0.00s</span>
        <input type="range" id="timeline" min="0" max="100" step="0.1" value="0" style="flex:1" />
        <span class="timeline-time" id="time-total">100.0s</span>
      </div>
      <div class="speed-selector">
        <button class="speed-btn" data-speed="0.5">0.5x</button>
        <button class="speed-btn active" data-speed="1">1x</button>
        <button class="speed-btn" data-speed="2">2x</button>
        <button class="speed-btn" data-speed="4">4x</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
