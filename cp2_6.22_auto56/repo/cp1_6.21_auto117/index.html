<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐星系</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #0A0A1A;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #title {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 20px;
      color: #FFFFFF;
      opacity: 0.3;
      transition: opacity 0.5s ease;
      z-index: 10;
      pointer-events: none;
      letter-spacing: 4px;
      user-select: none;
    }

    #title:hover {
      opacity: 0.8;
    }

    #spectrum-container {
      position: fixed;
      top: 24px;
      left: 24px;
      background-color: #000000CC;
      border-radius: 8px;
      padding: 12px;
      z-index: 10;
      display: flex;
      align-items: flex-end;
      gap: 4px;
      height: 124px;
    }

    .spectrum-bar {
      width: 20px;
      background: linear-gradient(to top, #2196F3, #9C27B0, #F44336);
      border-radius: 4px 4px 0 0;
      transition: height 0.08s ease-out;
      height: 0;
      min-height: 2px;
    }

    #upload-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
      background-color: #333333;
      color: #FFFFFF;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 14px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      user-select: none;
    }

    #upload-btn:hover {
      background-color: #555555;
    }

    #upload-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    #file-input {
      display: none;
    }

    @media (max-width: 768px) {
      #spectrum-container {
        padding: 8px;
        gap: 3px;
        height: 100px;
      }

      .spectrum-bar {
        width: 14px;
      }

      #title {
        font-size: 16px;
        letter-spacing: 2px;
      }

      #upload-btn {
        padding: 10px 16px;
        font-size: 12px;
        bottom: 16px;
        left: 16px;
      }
    }

    @media (max-width: 480px) {
      #spectrum-container {
        padding: 6px;
        gap: 2px;
        height: 80px;
      }

      .spectrum-bar {
        width: 10px;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="title">音乐星系</div>

  <div id="spectrum-container">
    <div class="spectrum-bar" data-index="0"></div>
    <div class="spectrum-bar" data-index="1"></div>
    <div class="spectrum-bar" data-index="2"></div>
    <div class="spectrum-bar" data-index="3"></div>
    <div class="spectrum-bar" data-index="4"></div>
    <div class="spectrum-bar" data-index="5"></div>
    <div class="spectrum-bar" data-index="6"></div>
    <div class="spectrum-bar" data-index="7"></div>
    <div class="spectrum-bar" data-index="8"></div>
    <div class="spectrum-bar" data-index="9"></div>
    <div class="spectrum-bar" data-index="10"></div>
    <div class="spectrum-bar" data-index="11"></div>
    <div class="spectrum-bar" data-index="12"></div>
    <div class="spectrum-bar" data-index="13"></div>
    <div class="spectrum-bar" data-index="14"></div>
    <div class="spectrum-bar" data-index="15"></div>
  </div>

  <button id="upload-btn">
    <svg id="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
      <polyline points="17 8 12 3 7 8"></polyline>
      <line x1="12" y1="3" x2="12" y2="15"></line>
    </svg>
    <span id="btn-text">上传音乐</span>
  </button>

  <input type="file" id="file-input" accept="audio/mp3,audio/wav,audio/mpeg,audio/*" />

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
