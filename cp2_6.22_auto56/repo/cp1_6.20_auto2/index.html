<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Roguelike 地下城探险</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #222222;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    }

    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 10px;
    }

    #game-canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #touch-controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 10px;
      z-index: 100;
    }

    .touch-btn {
      width: 60px;
      height: 60px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #444;
      border-radius: 8px;
      color: #fff;
      font-size: 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: manipulation;
      user-select: none;
    }

    .touch-btn:active {
      background: rgba(255, 215, 0, 0.3);
      border-color: #FFD700;
    }

    .d-pad {
      display: grid;
      grid-template-columns: repeat(3, 60px);
      grid-template-rows: repeat(3, 60px);
      gap: 5px;
    }

    .d-pad .touch-btn:nth-child(1) { grid-column: 2; grid-row: 1; }
    .d-pad .touch-btn:nth-child(2) { grid-column: 1; grid-row: 2; }
    .d-pad .touch-btn:nth-child(3) { grid-column: 3; grid-row: 2; }
    .d-pad .touch-btn:nth-child(4) { grid-column: 2; grid-row: 3; }

    .action-btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: center;
    }

    @media (hover: none) and (pointer: coarse) {
      #touch-controls {
        display: flex;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="touch-controls">
    <div class="d-pad">
      <button class="touch-btn" data-dir="up">↑</button>
      <button class="touch-btn" data-dir="left">←</button>
      <button class="touch-btn" data-dir="right">→</button>
      <button class="touch-btn" data-dir="down">↓</button>
    </div>
    <div class="action-btns">
      <button class="touch-btn" data-action="interact">E</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
