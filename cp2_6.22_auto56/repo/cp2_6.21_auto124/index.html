<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天气模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1e1e1e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app-container {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .toolbar-left {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.35);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .weather-btn {
      width: 64px;
      height: 64px;
      border: none;
      border-radius: 8px;
      background: #37474f;
      color: #fff;
      cursor: pointer;
      font-size: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .weather-btn:hover {
      opacity: 0.8;
      background: #455a64;
    }

    .weather-btn.click-animation {
      animation: btn-click-bounce 0.1s ease-out;
    }

    @keyframes btn-click-bounce {
      0% { transform: scale(1); }
      50% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    .weather-btn.active {
      background: #64b5f6;
      color: #fff;
      box-shadow: 0 0 12px rgba(100, 181, 246, 0.5);
    }

    .canvas-wrapper {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #scene-canvas {
      display: block;
      width: 800px;
      height: 600px;
    }

    .lightning-text {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.8),
                   0 0 20px rgba(255, 200, 100, 0.5),
                   0 0 30px rgba(255, 150, 50, 0.3);
      opacity: 0;
      pointer-events: none;
      z-index: 999;
      transition: opacity 0.015s linear;
      white-space: nowrap;
    }

    .lightning-text.show {
      opacity: 1;
    }

    .control-panel {
      width: 250px;
      background: rgba(0, 0, 0, 0.35);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      border-radius: 8px;
      padding: 20px;
      color: #fff;
      font-size: 12px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .panel-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #64b5f6;
    }

    .param-group {
      margin-bottom: 14px;
    }

    .param-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
      color: #b0bec5;
    }

    .param-value {
      color: #64b5f6;
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #37474f;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #64b5f6;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 8px rgba(100, 181, 246, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #64b5f6;
      cursor: pointer;
      border: none;
    }

    input[type="color"] {
      width: 100%;
      height: 32px;
      border: none;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
    }

    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    input[type="color"]::-webkit-color-swatch {
      border: 2px solid #37474f;
      border-radius: 4px;
    }

    .time-section {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #37474f;
    }

    .time-display {
      text-align: center;
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #64b5f6;
    }

    @media (max-width: 1280px) {
      .control-panel {
        width: 200px;
      }
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="toolbar-left">
      <button class="weather-btn active" data-weather="sunny" title="晴天">☀️</button>
      <button class="weather-btn" data-weather="cloudy" title="多云">☁️</button>
      <button class="weather-btn" data-weather="rain" title="降雨">🌧️</button>
      <button class="weather-btn" data-weather="thunderstorm" title="雷暴">⛈️</button>
      <button class="weather-btn" data-weather="snow" title="下雪">❄️</button>
      <button class="weather-btn" data-weather="fog" title="雾">🌫️</button>
    </div>

    <div class="canvas-wrapper">
      <canvas id="scene-canvas" width="800" height="600"></canvas>
      <div class="lightning-text" id="lightning-text">轰隆</div>
    </div>

    <div class="control-panel">
      <div class="panel-title" id="panel-title">天气参数</div>

      <div class="param-group" data-param="sunIntensity">
        <div class="param-label">
          <span>太阳光强度</span>
          <span class="param-value" id="sunIntensity-value">1.0</span>
        </div>
        <input type="range" id="sunIntensity" min="0.5" max="1.5" step="0.1" value="1.0">
      </div>

      <div class="param-group" data-param="grassHue">
        <div class="param-label">
          <span>草地色相偏移</span>
          <span class="param-value" id="grassHue-value">0°</span>
        </div>
        <input type="range" id="grassHue" min="0" max="360" step="1" value="0">
      </div>

      <div class="param-group hidden" data-param="cloudSpeed">
        <div class="param-label">
          <span>云层速度</span>
          <span class="param-value" id="cloudSpeed-value">1.0x</span>
        </div>
        <input type="range" id="cloudSpeed" min="0.5" max="3.0" step="0.1" value="1.0">
      </div>

      <div class="param-group hidden" data-param="cloudLayers">
        <div class="param-label">
          <span>云层覆盖率</span>
          <span class="param-value" id="cloudLayers-value">5</span>
        </div>
        <input type="range" id="cloudLayers" min="3" max="10" step="1" value="5">
      </div>

      <div class="param-group hidden" data-param="rainCount">
        <div class="param-label">
          <span>雨量</span>
          <span class="param-value" id="rainCount-value">200</span>
        </div>
        <input type="range" id="rainCount" min="100" max="500" step="10" value="200">
      </div>

      <div class="param-group hidden" data-param="rainWind">
        <div class="param-label">
          <span>风速</span>
          <span class="param-value" id="rainWind-value">2级</span>
        </div>
        <input type="range" id="rainWind" min="0" max="5" step="1" value="2">
      </div>

      <div class="param-group hidden" data-param="lightningFreq">
        <div class="param-label">
          <span>闪电频率</span>
          <span class="param-value" id="lightningFreq-value">5s</span>
        </div>
        <input type="range" id="lightningFreq" min="2" max="10" step="1" value="5">
      </div>

      <div class="param-group hidden" data-param="lightningBright">
        <div class="param-label">
          <span>闪电亮度</span>
          <span class="param-value" id="lightningBright-value">0.8</span>
        </div>
        <input type="range" id="lightningBright" min="0.5" max="1.0" step="0.1" value="0.8">
      </div>

      <div class="param-group hidden" data-param="snowCount">
        <div class="param-label">
          <span>雪量</span>
          <span class="param-value" id="snowCount-value">150</span>
        </div>
        <input type="range" id="snowCount" min="50" max="300" step="10" value="150">
      </div>

      <div class="param-group hidden" data-param="snowWind">
        <div class="param-label">
          <span>风速</span>
          <span class="param-value" id="snowWind-value">2级</span>
        </div>
        <input type="range" id="snowWind" min="0" max="5" step="1" value="2">
      </div>

      <div class="param-group hidden" data-param="fogDensity">
        <div class="param-label">
          <span>雾浓度</span>
          <span class="param-value" id="fogDensity-value">0.5</span>
        </div>
        <input type="range" id="fogDensity" min="0.2" max="0.8" step="0.1" value="0.5">
      </div>

      <div class="param-group hidden" data-param="fogColor">
        <div class="param-label">
          <span>雾颜色</span>
        </div>
        <input type="color" id="fogColor" value="#b0bec5">
      </div>

      <div class="time-section">
        <div class="time-display" id="time-display">12:00</div>
        <input type="range" id="time-slider" min="0" max="1439" step="1" value="720">
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
