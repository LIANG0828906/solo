<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>灵符工坊</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1A202C;
      color: #E2E8F0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #status-bar {
      height: 50px;
      background: #2D3748;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 0 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
    }
    .health-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .health-label {
      font-size: 13px;
      white-space: nowrap;
    }
    .health-bar-outer {
      width: 140px;
      height: 16px;
      background: #1A202C;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    .health-bar-inner {
      height: 100%;
      border-radius: 8px;
      transition: width 0.3s ease;
    }
    .health-bar-inner.pulse {
      animation: healthPulse 0.5s infinite;
    }
    @keyframes healthPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #player-health .health-bar-inner { background: #48BB78; }
    #enemy-health .health-bar-inner { background: #F56565; }
    .cooldown-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .cooldown-bar-outer {
      width: 80px;
      height: 16px;
      background: #1A202C;
      border-radius: 8px;
      border: 1px solid #ED8936;
      overflow: hidden;
    }
    .cooldown-bar-inner {
      height: 100%;
      background: #ED8936;
      border-radius: 8px;
      transition: width 0.1s linear;
    }
    .cooldown-label {
      font-size: 12px;
      color: #ED8936;
    }

    #game-wrapper {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 16px;
      padding-top: 66px;
      padding-bottom: 20px;
    }

    #canvas-area {
      position: relative;
      flex-shrink: 0;
    }
    #game-canvas {
      display: block;
      border-radius: 8px;
      cursor: crosshair;
      max-width: 100%;
      height: auto;
    }

    #spell-selector {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }
    .spell-btn {
      padding: 6px 16px;
      border: 2px solid transparent;
      border-radius: 8px;
      background: #2D3748;
      color: #E2E8F0;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease-out;
    }
    .spell-btn:hover {
      transform: scale(1.05);
    }
    .spell-btn.active-fire { border-color: #FF4500; background: rgba(255,69,0,0.15); }
    .spell-btn.active-ice { border-color: #00BFFF; background: rgba(0,191,255,0.15); }
    .spell-btn.active-lightning { border-color: #FFD700; background: rgba(255,215,0,0.15); }

    #undo-btn, #redo-btn {
      position: absolute;
      bottom: 12px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: #3B82F6;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease-out;
      z-index: 10;
    }
    #undo-btn:hover, #redo-btn:hover { background: #2563EB; transform: scale(1.05); }
    #undo-btn { left: 12px; }
    #redo-btn { left: 60px; }

    #activate-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 60px;
      height: 30px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      color: #fff;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      z-index: 10;
    }
    #activate-btn:hover { transform: scale(1.05); }
    #activate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    #mode-switch {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      justify-content: center;
    }
    .mode-btn {
      padding: 6px 20px;
      border: 2px solid #4A5568;
      border-radius: 8px;
      background: #2D3748;
      color: #E2E8F0;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease-out;
    }
    .mode-btn:hover { transform: scale(1.05); }
    .mode-btn.active { border-color: #3B82F6; background: rgba(59,130,246,0.2); }

    #template-gallery {
      background: #2D3748;
      border-radius: 8px;
      padding: 12px;
      width: 200px;
      flex-shrink: 0;
    }
    #template-gallery h3 {
      font-size: 14px;
      margin-bottom: 10px;
      color: #A0AEC0;
      text-align: center;
    }
    #template-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }
    .template-item {
      width: 40px;
      height: 40px;
      border: 1px solid #CBD5E1;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease-out;
      background: #F5E6CA;
    }
    .template-item:hover { transform: scale(1.05); }
    .template-item.selected {
      border-color: #F6AD55;
      border-width: 2px;
      width: 45px;
      height: 45px;
    }
    .template-item canvas {
      width: 100%;
      height: 100%;
    }

    #save-rune-btn {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      border: 1px solid #4A5568;
      border-radius: 8px;
      background: #2D3748;
      color: #E2E8F0;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s ease-out;
    }
    #save-rune-btn:hover { background: #4A5568; transform: scale(1.05); }

    #result-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    #result-modal.show { display: flex; }
    .modal-content {
      background: #FFFFFF;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 4px 4px 20px rgba(0,0,0,0.3);
      min-width: 320px;
      text-align: center;
      color: #1A202C;
    }
    .modal-content h2 { margin-bottom: 16px; font-size: 22px; }
    .modal-stats { margin-bottom: 20px; }
    .modal-stats p { margin: 6px 0; font-size: 15px; }
    .modal-stats .grade { font-size: 48px; font-weight: bold; margin: 10px 0; }
    .modal-buttons { display: flex; gap: 12px; justify-content: center; }
    .modal-btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s ease-out;
    }
    .modal-btn:hover { transform: scale(1.05); }
    .modal-btn.replay { background: #48BB78; }
    .modal-btn.share { background: #4299E1; }

    #match-feedback {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      color: #E2E8F0;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 18px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 50;
    }
    #match-feedback.show { opacity: 1; }

    @media (max-width: 900px) {
      #game-wrapper {
        flex-direction: column;
        align-items: center;
      }
      #template-gallery {
        width: 100%;
        max-width: 800px;
      }
      #template-grid {
        grid-template-columns: repeat(10, 1fr);
      }
      #status-bar {
        flex-wrap: wrap;
        height: auto;
        padding: 8px 12px;
        gap: 12px;
      }
      #game-canvas {
        max-width: calc(100vw - 20px);
      }
    }
  </style>
</head>
<body>
  <div id="status-bar">
    <div class="health-container">
      <span class="health-label">玩家</span>
      <div class="health-bar-outer">
        <div id="player-health" class="health-bar-inner" style="width:100%"></div>
      </div>
    </div>
    <div class="health-container">
      <span class="health-label">敌人</span>
      <div class="health-bar-outer">
        <div id="enemy-health" class="health-bar-inner" style="width:100%"></div>
      </div>
    </div>
    <div class="cooldown-container">
      <span class="cooldown-label">冷却</span>
      <div class="cooldown-bar-outer">
        <div id="cooldown-bar" class="cooldown-bar-inner" style="width:0%"></div>
      </div>
    </div>
  </div>

  <div id="game-wrapper">
    <div id="canvas-area">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <button id="undo-btn" title="撤销">&#x21A9;</button>
      <button id="redo-btn" title="重做">&#x21AA;</button>
      <button id="activate-btn">激活</button>
      <div id="match-feedback"></div>
    </div>
    <div id="template-gallery">
      <h3>符文模板库</h3>
      <div id="template-grid"></div>
      <button id="save-rune-btn">保存当前符文</button>
    </div>
  </div>

  <div id="spell-selector">
    <button class="spell-btn active-fire" data-spell="fire">🔥 火焰</button>
    <button class="spell-btn" data-spell="ice">❄️ 冰霜</button>
    <button class="spell-btn" data-spell="lightning">⚡ 闪电</button>
  </div>

  <div id="mode-switch">
    <button class="mode-btn active" data-mode="draw">绘制模式</button>
    <button class="mode-btn" data-mode="combat">战斗模式</button>
  </div>

  <div id="result-modal">
    <div class="modal-content">
      <h2>战斗结束</h2>
      <div class="modal-stats">
        <p>对战时长: <span id="result-duration">0</span>秒</p>
        <p>释放法术: <span id="result-spells">0</span>次</p>
        <div class="grade" id="result-grade">B</div>
      </div>
      <div class="modal-buttons">
        <button class="modal-btn replay" id="replay-btn">重新开始</button>
        <button class="modal-btn share" id="share-btn">分享结果</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
