<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCADE SCORE TOWER - 街机高分竞速塔</title>
    <style>
      :root {
        --neon-pink: #ff2d95;
        --neon-purple: #b967ff;
        --neon-blue: #01cdfe;
        --neon-green: #05ffa1;
        --neon-yellow: #fffb96;
        --neon-orange: #ff71ce;
        --neon-gold: #ffd700;
        --deep-space: #0a0a2e;
        --dark-purple: #1a0a2e;
        --glass-bg: rgba(20, 10, 50, 0.6);
        --glass-border: rgba(185, 103, 255, 0.4);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        width: 100%;
        height: 100%;
        min-height: 100vh;
      }

      body {
        font-family: 'Courier New', 'Press Start 2P', monospace;
        background: linear-gradient(180deg, var(--deep-space) 0%, var(--dark-purple) 100%);
        color: #fff;
        overflow-x: hidden;
      }

      @keyframes neonPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      @keyframes starTwinkle {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
