<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>粒子鱼群</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #0B1B2A 0%, #2A1B3A 100%);
    }
    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0B1B2A;
      z-index: 1000;
      transition: opacity 1s ease-out;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      color: #CCDDEE;
      font-family: sans-serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      margin-bottom: 40px;
    }
    .progress-ring {
      width: 60px;
      height: 60px;
      animation: rotateRing 2s linear infinite;
    }
    .progress-ring circle {
      fill: none;
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 150;
      stroke-dashoffset: 150;
    }
    .progress-ring .track {
      stroke: #1a2a3a;
      stroke-dashoffset: 0;
    }
    .progress-ring .fill {
      stroke: url(#progressGradient);
      animation: fillRing 1.5s ease-in-out infinite;
    }
    @keyframes rotateRing {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fillRing {
      0% { stroke-dashoffset: 150; }
      50% { stroke-dashoffset: 50; }
      100% { stroke-dashoffset: 150; }
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 1s ease-in;
    }
    #canvas-container.visible {
      opacity: 1;
    }
    #canvas-container canvas {
      display: block;
    }
    #hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #CCDDEE;
      font-family: sans-serif;
      font-size: 14px;
      opacity: 0.4;
      transition: opacity 0.8s ease-out;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
    #hint.dim {
      opacity: 0.1;
    }
  </style>
</head>
<body>
  <div id="loading-screen">
    <div class="loading-title">粒子鱼群</div>
    <svg class="progress-ring" viewBox="0 0 60 60">
      <defs>
        <linearGradient id="progressGradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" style="stop-color:#00BCD4" />
          <stop offset="100%" style="stop-color:#FF7043" />
        </linearGradient>
      </defs>
      <circle class="track" cx="30" cy="30" r="24" />
      <circle class="fill" cx="30" cy="30" r="24" />
    </svg>
  </div>
  <div id="canvas-container"></div>
  <div id="hint">鼠标移动引导鱼群，滚轮缩放聚散</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
