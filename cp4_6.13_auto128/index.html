<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>数字生物进化模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #1a0a2e 0%, #0a0e27 50%, #050520 100%);
    }
    canvas#canvas {
      display: block;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(100, 60, 180, 0.4);
      box-shadow: 0 0 30px rgba(80, 40, 160, 0.3), 0 0 60px rgba(40, 20, 100, 0.15), inset 0 0 30px rgba(60, 30, 140, 0.1);
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="600" height="600"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
