<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>书签管理器 - Bookmark Manager</title>
    <style>
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #16213e;
        --accent-blue: #4a90d9;
        --accent-gold: #f0a500;
        --text-primary: #eaeaea;
        --text-secondary: #a0a0a0;
        --card-bg: rgba(255, 255, 255, 0.05);
        --card-hover: rgba(255, 255, 255, 0.08);
        --border-color: rgba(255, 255, 255, 0.1);
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.2);
        --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.3);
        --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.4);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: var(--bg-primary);
        color: var(--text-primary);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow: hidden;
      }

      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: transparent;
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-blue);
      }

      .app-container {
        display: flex;
        height: 100vh;
        width: 100vw;
        overflow: hidden;
      }

      .sidebar {
        width: 25%;
        min-width: 280px;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
        z-index: 100;
      }

      .sidebar-header {
        padding: 20px;
        border-bottom: 1px solid var(--border-color);
      }

      .sidebar-title {
        font-size: 18px;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .sidebar-content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-secondary);
        margin-bottom: 12px;
        letter-spacing: 0.5px;
      }

      .tree-node {
        cursor: pointer;
        user-select: none;
        padding: 8px 10px;
        border-radius: 8px;
        transition: background-color 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .tree-node:hover {
        background: var(--card-hover);
      }

      .tree-node.active {
        background: rgba(74, 144, 217, 0.2);
      }

      .tree-icon {
        transition: transform 0.3s ease;
        font-size: 10px;
        color: var(--text-secondary);
        width: 12px;
      }

      .tree-icon.expanded {
        transform: rotate(90deg);
      }

      .tree-children {
        margin-left: 20px;
        overflow: hidden;
        transition: max-height 0.3s ease;
      }

      .tag-item {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s ease;
        margin: 4px;
      }

      .tag-item:hover {
        transform: translateY(-1px);
      }

      .tag-item.active {
        box-shadow: 0 0 0 2px var(--text-primary);
      }

      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .top-bar {
        padding: 16px 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .search-container {
        flex: 1;
        position: relative;
        max-width: 600px;
        margin: 0 auto;
      }

      .search-input {
        width: 100%;
        padding: 12px 20px;
        padding-left: 44px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        outline: none;
        transition: all 0.2s ease;
      }

      .search-input:focus {
        border-color: var(--accent-blue);
        box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.2);
      }

      .search-icon {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-secondary);
        font-size: 16px;
      }

      .search-suggestions {
        position: absolute;
        top: calc(100% + 8px);
        left: 0;
        right: 0;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        box-shadow: var(--shadow-lg);
        z-index: 1000;
        overflow: hidden;
        animation: fadeIn 0.2s ease;
      }

      .suggestion-item {
        padding: 12px 16px;
        cursor: pointer;
        transition: background 0.15s ease;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .suggestion-item:hover {
        background: var(--card-hover);
      }

      .highlight {
        color: var(--accent-gold);
        font-weight: 600;
      }

      .action-buttons {
        display: flex;
        gap: 12px;
      }

      .btn {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .btn-primary {
        background: var(--accent-blue);
        color: white;
      }

      .btn-primary:hover {
        background: #3a7bc8;
        transform: translateY(-1px);
      }

      .btn-secondary {
        background: var(--card-bg);
        color: var(--text-primary);
        border: 1px solid var(--border-color);
      }

      .btn-secondary:hover {
        background: var(--card-hover);
      }

      .view-toggle {
        display: flex;
        background: var(--card-bg);
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid var(--border-color);
      }

      .view-btn {
        padding: 8px 16px;
        background: transparent;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .view-btn.active {
        background: var(--accent-blue);
        color: white;
      }

      .content-area {
        flex: 1;
        overflow-y: auto;
        padding: 24px;
      }

      .filter-info {
        margin-bottom: 20px;
        padding: 12px 16px;
        background: rgba(74, 144, 217, 0.1);
        border-radius: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .bookmark-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        animation: slideIn 0.3s ease;
      }

      .bookmark-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        animation: slideIn 0.3s ease;
      }

      .bookmark-card {
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 16px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: var(--shadow-sm);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bookmark-card:hover {
        background: var(--card-hover);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      .bookmark-card.dragging {
        opacity: 0.5;
        transform: scale(0.98);
      }

      .bookmark-card.drag-over {
        border-color: var(--accent-blue);
        background: rgba(74, 144, 217, 0.1);
      }

      .bookmark-list .bookmark-card {
        flex-direction: row;
        align-items: center;
        padding: 12px 16px;
        border-radius: 8px;
        border-bottom: 1px solid var(--border-color);
      }

      .card-header {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .favicon {
        width: 36px;
        height: 36px;
        border-radius: 6px;
        background: rgba(74, 144, 217, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        flex-shrink: 0;
        color: var(--accent-blue);
      }

      .favicon img {
        width: 100%;
        height: 100%;
        border-radius: 6px;
        object-fit: contain;
      }

      .favicon .default-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .card-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      .card-title {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.4;
        max-height: 39.2px;
      }

      .card-url {
        font-size: 12px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card-tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .card-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 4px;
        padding-top: 8px;
        border-top: 1px solid var(--border-color);
        min-height: 20px;
      }

      .card-path {
        font-size: 10px;
        color: rgba(160, 160, 160, 0.6);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 70%;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .card-path-icon {
        font-size: 10px;
        opacity: 0.7;
      }

      .card-date-full {
        font-size: 10px;
        color: var(--text-secondary);
        flex-shrink: 0;
        margin-left: 8px;
      }

      .bookmark-list .card-footer {
        display: none;
      }

      .bookmark-list .card-path,
      .bookmark-list .card-date-full {
        display: none;
      }

      .tag-chip {
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: 500;
        color: white;
      }

      .progress-bar {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--bg-secondary);
        z-index: 1000;
        overflow: hidden;
      }

      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, #2a5a9a, #4a90d9, #6ab0f9);
        background-size: 200% 100%;
        animation: shimmer 2s ease-in-out infinite;
        transition: width 0.3s ease;
      }

      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 11px;
        font-weight: 600;
        color: var(--text-primary);
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.2s ease;
      }

      .modal-content {
        background: rgba(22, 33, 62, 0.95);
        backdrop-filter: blur(20px);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 32px;
        max-width: 480px;
        width: 90%;
        box-shadow: var(--shadow-lg);
        animation: scaleIn 0.3s ease;
      }

      .modal-content.closing {
        animation: scaleOut 0.3s ease forwards;
      }

      .modal-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
        color: var(--text-primary);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 20px;
        text-align: center;
      }

      .stat-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--accent-blue);
        margin-bottom: 4px;
      }

      .stat-value.error {
        color: #e74c3c;
      }

      .stat-label {
        font-size: 12px;
        color: var(--text-secondary);
      }

      .paste-area {
        width: 100%;
        min-height: 120px;
        padding: 16px;
        background: var(--card-bg);
        border: 2px dashed var(--border-color);
        border-radius: 12px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        outline: none;
        transition: all 0.2s ease;
        margin-bottom: 16px;
      }

      .paste-area:focus {
        border-color: var(--accent-blue);
        background: rgba(74, 144, 217, 0.05);
      }

      .file-input {
        display: none;
      }

      .hamburger {
        display: none;
        background: transparent;
        border: none;
        color: var(--text-primary);
        font-size: 24px;
        cursor: pointer;
        padding: 8px;
      }

      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 90;
        animation: fadeIn 0.2s ease;
      }

      .overlay.active {
        display: block;
      }

      .add-tag-input {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid var(--border-color);
      }

      .add-tag-input input {
        flex: 1;
        padding: 8px 12px;
        background: var(--card-bg);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 12px;
        outline: none;
      }

      .add-tag-input input:focus {
        border-color: var(--accent-blue);
      }

      .add-tag-btn {
        padding: 8px 16px;
        background: var(--accent-blue);
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 12px;
        cursor: pointer;
      }

      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-secondary);
        text-align: center;
        gap: 16px;
      }

      .empty-state-icon {
        font-size: 64px;
        opacity: 0.5;
      }

      .empty-state-text {
        font-size: 16px;
      }

      .empty-state-hint {
        font-size: 14px;
        color: var(--accent-blue);
      }

      .folder-count {
        font-size: 11px;
        color: var(--text-secondary);
        background: var(--card-bg);
        padding: 2px 8px;
        border-radius: 10px;
        margin-left: auto;
      }

      @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes scaleIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes scaleOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.9); }
      }

      @keyframes slideIn {
        from { opacity: 0; transform: translateX(20px); }
        to { opacity: 1; transform: translateX(0); }
      }

      @media (max-width: 768px) {
        .sidebar {
          position: fixed;
          left: 0;
          top: 0;
          bottom: 0;
          width: 85%;
          max-width: 320px;
          transform: translateX(-100%);
        }

        .sidebar.open {
          transform: translateX(0);
        }

        .hamburger {
          display: block;
        }

        .bookmark-grid {
          grid-template-columns: repeat(2, 1fr);
          gap: 12px;
        }

        .top-bar {
          padding: 12px 16px;
          gap: 12px;
        }

        .content-area {
          padding: 16px;
        }

        .action-buttons .btn span {
          display: none;
        }

        .action-buttons .btn {
          padding: 10px 14px;
        }
      }

      @media (max-width: 480px) {
        .bookmark-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
