<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 爆炸视图查看器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a12;
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #viewport {
      width: 100%;
      height: 100%;
      display: block;
    }

    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 18, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #loading.active {
      display: flex;
    }

    .loader {
      position: relative;
      width: 80px;
      height: 80px;
    }

    .loader-ring {
      position: absolute;
      width: 100%;
      height: 100%;
      border: 3px solid transparent;
      border-radius: 50%;
    }

    .loader-ring:nth-child(1) {
      border-top-color: #00A3FF;
      animation: spinX 1.2s linear infinite;
    }

    .loader-ring:nth-child(2) {
      border-right-color: #00CFFF;
      animation: spinY 1.5s linear infinite;
    }

    .loader-ring:nth-child(3) {
      border-bottom-color: #0077FF;
      animation: spinZ 1.8s linear infinite;
    }

    @keyframes spinX {
      from { transform: rotateX(0deg); }
      to { transform: rotateX(360deg); }
    }

    @keyframes spinY {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    @keyframes spinZ {
      from { transform: rotateZ(0deg); }
      to { transform: rotateZ(360deg); }
    }

    #panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 320px;
      max-height: calc(100vh - 40px);
      background: rgba(20, 20, 30, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 12px;
      border: 1px solid rgba(0, 163, 255, 0.2);
      padding: 20px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    #panel::-webkit-scrollbar {
      width: 6px;
    }

    #panel::-webkit-scrollbar-track {
      background: transparent;
    }

    #panel::-webkit-scrollbar-thumb {
      background: rgba(0, 163, 255, 0.3);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .panel-title-icon {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #0077FF, #00CFFF);
      border-radius: 6px;
    }

    .section-label {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      margin-top: 6px;
    }

    .upload-zone {
      width: 100%;
      border: 2px dashed rgba(0, 163, 255, 0.4);
      border-radius: 8px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 16px;
    }

    .upload-zone:hover,
    .upload-zone.drag-over {
      border-color: #00A3FF;
      background: rgba(0, 163, 255, 0.08);
    }

    .upload-zone-icon {
      width: 40px;
      height: 40px;
      margin: 0 auto 10px;
      opacity: 0.6;
    }

    .upload-zone-text {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
    }

    .upload-zone-hint {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 6px;
    }

    .slider-container {
      margin-bottom: 16px;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .slider-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .slider-value {
      font-size: 13px;
      font-weight: 600;
      color: #00A3FF;
      background: rgba(0, 163, 255, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0077FF, #00CFFF);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 163, 255, 0.5);
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #0077FF, #00CFFF);
      color: white;
    }

    .btn-primary:hover {
      filter: brightness(1.2);
      box-shadow: 0 4px 16px rgba(0, 163, 255, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: none;
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    .group-list {
      max-height: 220px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      margin-bottom: 16px;
    }

    .group-list::-webkit-scrollbar {
      width: 5px;
    }

    .group-list::-webkit-scrollbar-thumb {
      background: rgba(0, 163, 255, 0.3);
      border-radius: 3px;
    }

    .group-item {
      display: flex;
      align-items: center;
      padding: 10px 12px;
      cursor: pointer;
      transition: background 0.2s ease;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .group-item:last-child {
      border-bottom: none;
    }

    .group-item:hover {
      background: rgba(0, 163, 255, 0.08);
    }

    .group-color {
      width: 14px;
      height: 14px;
      border-radius: 4px;
      margin-right: 10px;
      flex-shrink: 0;
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    .group-checkbox {
      margin-right: 10px;
      width: 16px;
      height: 16px;
      accent-color: #00A3FF;
      cursor: pointer;
      flex-shrink: 0;
    }

    .group-name {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .group-list-empty {
      padding: 24px 16px;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    .screenshots-section {
      margin-top: 4px;
    }

    .screenshots-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .screenshot-item {
      aspect-ratio: 16 / 9;
      border-radius: 6px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .screenshot-item:hover {
      border-color: #00A3FF;
      transform: scale(1.02);
    }

    .screenshot-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .screenshot-empty {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: rgba(255, 255, 255, 0.2);
    }

    .info-popup {
      position: fixed;
      background: rgba(20, 20, 30, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 163, 255, 0.3);
      border-radius: 8px;
      padding: 12px 16px;
      z-index: 200;
      pointer-events: none;
      min-width: 180px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    .info-popup-title {
      font-size: 14px;
      font-weight: 600;
      color: #00A3FF;
      margin-bottom: 8px;
    }

    .info-popup-row {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: space-between;
      padding: 3px 0;
    }

    .info-popup-value {
      color: #ffffff;
      font-weight: 500;
    }

    #drag-handle {
      display: none;
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      margin: 0 auto 12px;
      cursor: grab;
    }

    #drag-handle:active {
      cursor: grabbing;
    }

    @media (max-width: 768px) {
      #panel {
        top: auto;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 250px;
        border-radius: 16px 16px 0 0;
        transition: max-height 0.3s ease;
      }

      #panel.expanded {
        max-height: 80vh;
      }

      #drag-handle {
        display: block;
      }

      .group-list {
        max-height: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="viewport"></canvas>

    <div id="loading">
      <div class="loader">
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
        <div class="loader-ring"></div>
      </div>
    </div>

    <aside id="panel">
      <div id="drag-handle"></div>
      <div class="panel-title">
        <div class="panel-title-icon"></div>
        <span>3D 爆炸视图</span>
      </div>

      <div class="section-label">上传模型</div>
      <div class="upload-zone" id="uploadZone">
        <svg class="upload-zone-icon" viewBox="0 0 24 24" fill="none" stroke="#00A3FF" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <div class="upload-zone-text">拖拽文件到此处或点击上传</div>
        <div class="upload-zone-hint">支持 GLTF / OBJ 格式 · 最大 10MB</div>
      </div>
      <input type="file" id="fileInput" accept=".gltf,.glb,.obj" style="display: none" />

      <div class="section-label">模型分组</div>
      <div class="group-list" id="groupList">
        <div class="group-list-empty">请先加载模型文件</div>
      </div>

      <div class="slider-container">
        <div class="slider-header">
          <span class="slider-label">爆炸距离</span>
          <span class="slider-value" id="distanceValue">2.0</span>
        </div>
        <input type="range" id="distanceSlider" min="0" max="5" step="0.1" value="2" />
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" id="explodeBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          生成爆炸视图
        </button>
        <button class="btn btn-secondary" id="resetBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="1 4 1 10 7 10"/>
            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
          </svg>
          重置模型
        </button>
        <button class="btn btn-secondary" id="screenshotBtn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          截图导出
        </button>
      </div>

      <div class="screenshots-section">
        <div class="section-label">最近截图</div>
        <div class="screenshots-grid" id="screenshotsGrid">
          <div class="screenshot-item"><div class="screenshot-empty">+</div></div>
          <div class="screenshot-item"><div class="screenshot-empty">+</div></div>
          <div class="screenshot-item"><div class="screenshot-empty">+</div></div>
        </div>
      </div>
    </aside>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
