<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维太阳系交互式科普</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 280px;
      padding: 20px;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      color: #ffffff;
      border: 1px solid rgba(100, 150, 255, 0.2);
      z-index: 100;
      opacity: 0;
      transition: opacity 0.5s ease-in;
    }

    #info-panel.visible {
      opacity: 1;
    }

    #info-panel h2 {
      font-size: 22px;
      margin-bottom: 16px;
      color: #8ab4ff;
      border-bottom: 1px solid rgba(100, 150, 255, 0.3);
      padding-bottom: 10px;
    }

    .info-item {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .info-item:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #8899bb;
    }

    .info-value {
      color: #ffffff;
      font-weight: 500;
    }

    #toolbar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(100, 150, 255, 0.2);
      z-index: 100;
    }

    .toolbar-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: rgba(40, 60, 120, 0.8);
      color: #ffffff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s ease;
    }

    .toolbar-btn:hover {
      background: rgba(80, 130, 220, 0.9);
    }

    .slider-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 160px;
      height: 4px;
      background: rgba(60, 80, 140, 0.6);
      border-radius: 2px;
      outline: none;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      background: #8ab4ff;
      border-radius: 50%;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    #speed-slider::-webkit-slider-thumb:hover {
      background: #a8c8ff;
    }

    #speed-slider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      background: #8ab4ff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    #speed-value {
      color: #8ab4ff;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="info-panel">
    <h2 id="planet-name">太阳</h2>
    <div class="info-item">
      <span class="info-label">距太阳距离</span>
      <span class="info-value" id="planet-distance">0 AU</span>
    </div>
    <div class="info-item">
      <span class="info-label">公转周期</span>
      <span class="info-value" id="planet-period">0 天</span>
    </div>
    <div class="info-item">
      <span class="info-label">直径</span>
      <span class="info-value" id="planet-diameter">1,392,700 km</span>
    </div>
    <div class="info-item">
      <span class="info-label">表面温度</span>
      <span class="info-value" id="planet-temperature">5,500 °C</span>
    </div>
  </div>

  <div id="toolbar">
    <button class="toolbar-btn" id="play-pause-btn" title="播放/暂停">⏸</button>
    <button class="toolbar-btn" id="reset-view-btn" title="重置视角">⟲</button>
    <div class="slider-container">
      <input type="range" id="speed-slider" min="0.1" max="10" step="0.1" value="1" />
      <span id="speed-value">1.0x</span>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
