<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>诗谜雅集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #F5E6C8;
      overflow: hidden;
      font-family: serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #app-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      display: block;
      cursor: default;
    }

    #lobby-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(245, 230, 200, 0.95);
      z-index: 10;
    }

    #lobby-overlay.hidden {
      display: none;
    }

    .lobby-title {
      font-size: 48px;
      color: #D4A017;
      background: #5C3A21;
      padding: 16px 60px;
      border-radius: 4px;
      letter-spacing: 12px;
      margin-bottom: 40px;
      font-family: 'LiSu', 'STLiti', serif;
    }

    .lobby-input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    .lobby-input-group label {
      font-size: 18px;
      color: #5C3A21;
      letter-spacing: 4px;
    }

    .lobby-input-group input {
      width: 240px;
      padding: 10px 16px;
      border: 2px solid #8B4513;
      border-radius: 4px;
      background: #F5E6C8;
      color: #3A2E1E;
      font-size: 18px;
      text-align: center;
      outline: none;
      font-family: serif;
    }

    .lobby-input-group input:focus {
      border-color: #D4A017;
      box-shadow: 0 0 8px rgba(212, 160, 23, 0.4);
    }

    .lobby-btn {
      padding: 12px 40px;
      background: #5C3A21;
      color: #D4A017;
      border: none;
      border-radius: 4px;
      font-size: 20px;
      cursor: pointer;
      letter-spacing: 6px;
      font-family: 'LiSu', 'STLiti', serif;
      transition: all 0.2s ease;
    }

    .lobby-btn:hover {
      background: #8B4513;
      transform: scale(1.05);
    }

    .lobby-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    #lobby-status {
      margin-top: 16px;
      font-size: 14px;
      color: #A08060;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div id="app-container">
    <canvas id="game-canvas"></canvas>
    <div id="lobby-overlay">
      <div class="lobby-title">诗谜雅集</div>
      <div class="lobby-input-group">
        <label>雅号</label>
        <input type="text" id="input-nickname" placeholder="请输入您的雅号" maxlength="8" />
      </div>
      <div class="lobby-input-group">
        <label>曲水编号</label>
        <input type="text" id="input-room" placeholder="请输入房间号" maxlength="6" />
      </div>
      <button class="lobby-btn" id="btn-join">入席</button>
      <div id="lobby-status"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
