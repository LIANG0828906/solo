<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D平台关卡风洞测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #EEEEEE;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .toolbar {
      height: 56px;
      background: #16213E;
      border-bottom: 2px solid #E94560;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      flex-shrink: 0;
    }

    .toolbar-title {
      font-size: 18px;
      font-weight: bold;
      color: #E94560;
      margin-right: 20px;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      background: #16213E;
      border: 2px solid #E94560;
      color: #EEEEEE;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s ease;
    }

    .btn:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.active {
      background: #E94560;
      color: #fff;
    }

    .btn-icon {
      width: 36px;
      height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    .element-buttons {
      display: flex;
      gap: 8px;
    }

    .element-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      border: 2px solid #E94560;
      background: #16213E;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      position: relative;
    }

    .element-btn:hover {
      filter: brightness(1.2);
    }

    .element-btn.active {
      box-shadow: 0 0 12px #E94560;
      transform: scale(1.1);
    }

    .element-btn .preview {
      width: 24px;
      height: 24px;
      border-radius: 2px;
    }

    .element-btn .brick-preview {
      background: #7CB342;
    }

    .element-btn .spike-preview {
      width: 0;
      height: 0;
      border-left: 12px solid transparent;
      border-right: 12px solid transparent;
      border-bottom: 20px solid #E53935;
      background: transparent;
      border-radius: 0;
    }

    .element-btn .platform-preview {
      background: #FB8C00;
      height: 8px;
    }

    .element-btn .goal-preview {
      background: #FFD700;
      border-radius: 50%;
      width: 20px;
      height: 20px;
    }

    .spacer {
      flex: 1;
    }

    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    .editor-area {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas {
      display: block;
      cursor: crosshair;
    }

    .stats-panel {
      width: 240px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      padding: 16px;
      flex-shrink: 0;
      overflow-y: auto;
      transition: all 0.3s ease;
    }

    .stats-panel h3 {
      font-size: 16px;
      margin-bottom: 16px;
      color: #E94560;
      border-bottom: 1px solid rgba(233, 69, 96, 0.3);
      padding-bottom: 8px;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-label {
      color: #AAAAAA;
    }

    .stat-value {
      font-weight: bold;
      color: #EEEEEE;
    }

    .stat-value.time {
      color: #FFD700;
    }

    .drafts-section {
      margin-top: 24px;
    }

    .drafts-section h4 {
      font-size: 14px;
      margin-bottom: 12px;
      color: #E94560;
    }

    .draft-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .draft-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: rgba(22, 33, 62, 0.8);
      border-radius: 8px;
      border: 1px solid rgba(233, 69, 96, 0.3);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .draft-item:hover {
      border-color: #E94560;
      filter: brightness(1.1);
    }

    .draft-item.active {
      border-color: #E94560;
      background: rgba(233, 69, 96, 0.2);
    }

    .draft-name {
      flex: 1;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .draft-delete {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: #E53935;
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .draft-delete:hover {
      background: rgba(229, 57, 53, 0.2);
    }

    .draft-input-group {
      display: flex;
      gap: 6px;
    }

    .draft-input {
      flex: 1;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #E94560;
      background: #16213E;
      color: #EEEEEE;
      font-size: 12px;
    }

    .draft-input:focus {
      outline: none;
      border-color: #FF6B8A;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
    }

    .clear-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(229, 57, 53, 0.2);
      border: 1px solid #E53935;
      color: #E53935;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s ease;
    }

    .clear-btn:hover {
      background: rgba(229, 57, 53, 0.4);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      background: #16213E;
      border: 2px solid #E94560;
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      min-width: 320px;
      transform: scale(0.9);
      transition: transform 0.2s ease;
    }

    .modal-overlay.visible .modal {
      transform: scale(1);
    }

    .modal h2 {
      color: #FFD700;
      margin-bottom: 16px;
      font-size: 24px;
    }

    .modal p {
      font-size: 18px;
      margin-bottom: 24px;
    }

    .modal .time-display {
      font-size: 36px;
      font-weight: bold;
      color: #FFD700;
      margin: 16px 0;
    }

    .top-stats-bar {
      display: none;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 13px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .top-stat-item {
      display: flex;
      gap: 6px;
    }

    .top-stat-item .label {
      color: #AAAAAA;
    }

    .top-stat-item .value {
      font-weight: bold;
    }

    .floating-actions {
      position: absolute;
      bottom: 20px;
      left: 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    .play-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #E94560;
      border: none;
      color: white;
      font-size: 24px;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(233, 69, 96, 0.4);
      transition: all 0.15s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(233, 69, 96, 0.6);
    }

    .play-btn.playing {
      background: #7CB342;
      box-shadow: 0 4px 16px rgba(124, 179, 66, 0.4);
    }

    .hint-text {
      position: absolute;
      bottom: 20px;
      right: 260px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      .stats-panel {
        display: none;
      }

      .top-stats-bar {
        display: flex;
      }

      .hint-text {
        right: 20px;
      }

      .toolbar {
        flex-wrap: wrap;
        height: auto;
        padding: 8px;
        gap: 8px;
      }

      .toolbar-title {
        width: 100%;
        margin: 0;
        margin-bottom: 4px;
        font-size: 16px;
      }
    }

    .fade-transition {
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-title">🎮 2D平台关卡风洞</div>
      
      <div class="element-buttons">
        <button class="element-btn active" data-element="brick" title="砖块">
          <div class="preview brick-preview"></div>
        </button>
        <button class="element-btn" data-element="spike" title="尖刺">
          <div class="preview spike-preview"></div>
        </button>
        <button class="element-btn" data-element="platform" title="移动平台">
          <div class="preview platform-preview"></div>
        </button>
        <button class="element-btn" data-element="goal" title="终点旗帜">
          <div class="preview goal-preview"></div>
        </button>
      </div>

      <div class="spacer"></div>

      <button class="btn" id="reset-btn" title="清空关卡">🗑 清空</button>
    </div>

    <div class="top-stats-bar" id="top-stats">
      <div class="top-stat-item">
        <span class="label">尺寸:</span>
        <span class="value" id="top-size">-</span>
      </div>
      <div class="top-stat-item">
        <span class="label">砖块:</span>
        <span class="value" id="top-bricks">0</span>
      </div>
      <div class="top-stat-item">
        <span class="label">尖刺:</span>
        <span class="value" id="top-spikes">0</span>
      </div>
      <div class="top-stat-item">
        <span class="label">平台:</span>
        <span class="value" id="top-platforms">0</span>
      </div>
      <div class="top-stat-item">
        <span class="label">预计时间:</span>
        <span class="value" id="top-time">0s</span>
      </div>
    </div>

    <div class="main-container">
      <div class="editor-area">
        <canvas id="canvas"></canvas>
        <div class="floating-actions">
          <button class="play-btn" id="play-btn" title="试玩/编辑切换">▶</button>
        </div>
        <div class="hint-text">
          左键放置/移除 · 滚轮缩放 · 中键拖拽平移 · 空格跳跃
        </div>
      </div>

      <div class="stats-panel" id="stats-panel">
        <h3>📊 关卡统计</h3>
        
        <div class="stat-row">
          <span class="stat-label">关卡尺寸</span>
          <span class="stat-value" id="stat-size">-</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">砖块数量</span>
          <span class="stat-value" id="stat-bricks">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">尖刺数量</span>
          <span class="stat-value" id="stat-spikes">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">移动平台</span>
          <span class="stat-value" id="stat-platforms">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">终点旗帜</span>
          <span class="stat-value" id="stat-goals">0</span>
        </div>
        <div class="stat-row">
          <span class="stat-label">预计通关时间</span>
          <span class="stat-value time" id="stat-time">0.0s</span>
        </div>

        <div class="drafts-section">
          <h4>💾 关卡草稿</h4>
          <div class="draft-list" id="draft-list"></div>
          <div class="draft-input-group">
            <input type="text" class="draft-input" id="draft-name-input" placeholder="关卡名称..." maxlength="20" />
            <button class="btn btn-small" id="save-draft-btn">保存</button>
          </div>
          <button class="clear-btn" id="clear-btn">清空当前关卡</button>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <h2>🎉 恭喜通关！</h2>
      <p>你的通关时间：</p>
      <div class="time-display" id="final-time">0.00s</div>
      <button class="btn" id="modal-close-btn">返回编辑</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
