<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='26'>🍳</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>风味图谱 · Flavor Topology</title>
    <style>
      html, body { margin: 0; padding: 0; min-height: 100%; }
      body {
        background: linear-gradient(135deg, #FF8C00 0%, #FFA500 100%);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
      }
      #boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 140, 0, 0.15);
        z-index: 9999;
      }
      #boot-loader .hourglass {
        font-size: 72px;
        animation: spin 1.1s linear infinite;
        opacity: 0.85;
        filter: drop-shadow(0 2px 8px rgba(139, 69, 19, 0.3));
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      #boot-loader .fade-out {
        opacity: 0;
        transition: opacity 300ms ease;
      }
    </style>
  </head>
  <body>
    <div id="boot-loader"><div class="hourglass" role="img" aria-label="loading">⌛</div></div>
    <div id="root"></div>
    <script type="module" src="/src/client/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        const loader = document.getElementById('boot-loader');
        if (!loader) return;
        const fade = () => {
          loader.classList.add('fade-out');
          setTimeout(() => loader.remove(), 350);
        };
        setTimeout(fade, 500);
      });
    </script>
  </body>
</html>
