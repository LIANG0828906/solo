<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>BREAKOUT - 霓虹街机</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    #game-wrapper {
      position: relative;
      background: #000;
      border: 4px solid #222;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.15), inset 0 0 60px rgba(0, 0, 0, 0.8);
      border-radius: 8px;
      padding: 8px;
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    .btn-overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .btn-overlay.active {
      pointer-events: auto;
    }

    .arcade-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      padding: 14px 32px;
      border: 2px solid #0ff;
      background: rgba(0, 255, 255, 0.1);
      color: #0ff;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: transform 0.15s ease, background-color 0.2s ease, box-shadow 0.2s ease;
      border-radius: 4px;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }

    .arcade-btn:hover {
      transform: scale(1.1);
      background: rgba(0, 255, 255, 0.25);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
    }

    .arcade-btn:active {
      transform: scale(0.95);
      background: rgba(0, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div id="game-wrapper">
    <canvas id="gameCanvas"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
