<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UrbanHeatViz - 城市热岛效应3D热力图</title>
  <link rel="stylesheet" href="/src/styles.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    <div id="label-container"></div>
    <div id="tooltip" class="tooltip"></div>

    <div id="legend-panel" class="legend-panel">
      <div class="legend-title">温度色阶</div>
      <div class="legend-gradient"></div>
      <div class="legend-labels">
        <span id="legend-min">15°C</span>
        <span id="legend-max">45°C</span>
      </div>
    </div>

    <button id="menu-toggle" class="menu-toggle">☰</button>

    <div id="control-panel" class="control-panel">
      <div class="panel-header">
        <h2>UrbanHeatViz</h2>
        <p class="panel-subtitle">城市热岛效应分析</p>
      </div>

      <div class="divider"></div>

      <div class="control-section">
        <div class="section-title">温度范围过滤</div>
        <div class="range-values">
          <span id="range-min-display">15°C</span>
          <span id="range-max-display">45°C</span>
        </div>
        <div class="range-slider-container">
          <div class="range-slider-track"></div>
          <div class="range-slider-fill" id="range-fill"></div>
          <input type="range" id="range-min" min="15" max="45" value="15" step="0.5" />
          <input type="range" id="range-max" min="15" max="45" value="45" step="0.5" />
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-section">
        <div class="section-title">时间轴动画</div>
        <div class="time-display">
          <span id="current-time">00:00</span>
        </div>
        <div class="timeline-container">
          <div class="timeline-track">
            <div class="timeline-progress" id="timeline-progress"></div>
            <div class="timeline-thumb" id="timeline-thumb"></div>
          </div>
        </div>
        <div class="timeline-controls">
          <button id="play-btn" class="play-btn">▶</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-section">
        <div class="section-title">预设视角</div>
        <div class="preset-buttons">
          <button class="preset-btn" data-view="top">俯视图</button>
          <button class="preset-btn" data-view="side">侧视图</button>
          <button class="preset-btn" data-view="default">默认视角</button>
        </div>
      </div>

      <div class="divider"></div>

      <div class="control-section">
        <div class="section-title">统计信息</div>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-label">平均温度</div>
            <div class="stat-value" id="avg-temp">--°C</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">最高温度</div>
            <div class="stat-value" id="max-temp">--°C</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">最低温度</div>
            <div class="stat-value" id="min-temp">--°C</div>
          </div>
          <div class="stat-item">
            <div class="stat-label">活跃柱体</div>
            <div class="stat-value" id="active-bars">--</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
