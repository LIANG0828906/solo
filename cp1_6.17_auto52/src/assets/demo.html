<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>响应式演示页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      min-height: 100vh;
      padding: 20px;
    }

    .demo-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .demo-header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .demo-header p {
      color: #86868b;
      font-size: 14px;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      margin-bottom: 30px;
    }

    .color-card {
      flex: 1 1 calc(25% - 12px);
      min-width: 180px;
      aspect-ratio: 4 / 3;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    .color-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
    }

    .color-card:active {
      transform: translateY(-2px);
    }

    .color-card.clicked {
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.95); }
    }

    .color-card-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .color-card-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
    .color-card-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
    .color-card-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }

    .color-card .color-name {
      font-size: 18px;
      margin-bottom: 4px;
    }

    .color-card .color-hex {
      font-size: 12px;
      opacity: 0.8;
      font-family: 'SF Mono', Monaco, monospace;
    }

    .action-section {
      text-align: center;
      margin-bottom: 30px;
    }

    .action-btn {
      padding: 12px 32px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 980px;
      background: #0071e3;
      color: white;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .action-btn:hover {
      background: #0077ed;
    }

    .action-btn:active {
      transform: scale(0.98);
    }

    .action-btn.clicked {
      background: #0060df;
      animation: pulse 0.3s ease;
    }

    .info-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
    }

    .info-card {
      flex: 1 1 calc(33.333% - 11px);
      min-width: 200px;
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }

    .info-card h3 {
      font-size: 16px;
      margin-bottom: 8px;
      color: #1d1d1f;
    }

    .info-card p {
      font-size: 13px;
      color: #86868b;
      line-height: 1.5;
    }

    @media (max-width: 1024px) {
      .color-card {
        flex: 1 1 calc(50% - 8px);
        min-width: 140px;
      }

      .info-card {
        flex: 1 1 calc(50% - 8px);
        min-width: 160px;
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .demo-header h1 {
        font-size: 20px;
      }

      .color-grid {
        flex-direction: column;
      }

      .color-card {
        flex: none;
        width: 100%;
        min-width: 0;
        aspect-ratio: 16 / 9;
      }

      .info-cards {
        flex-direction: column;
      }

      .info-card {
        flex: none;
        width: 100%;
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="demo-header">
    <h1>响应式布局演示</h1>
    <p>调整视口宽度观察布局变化</p>
  </div>

  <div class="color-grid">
    <div class="color-card color-card-1" data-selector="color-card-1">
      <span class="color-name">紫色渐变</span>
      <span class="color-hex">#667eea → #764ba2</span>
    </div>
    <div class="color-card color-card-2" data-selector="color-card-2">
      <span class="color-name">粉红渐变</span>
      <span class="color-hex">#f093fb → #f5576c</span>
    </div>
    <div class="color-card color-card-3" data-selector="color-card-3">
      <span class="color-name">蓝色渐变</span>
      <span class="color-hex">#4facfe → #00f2fe</span>
    </div>
    <div class="color-card color-card-4" data-selector="color-card-4">
      <span class="color-name">绿色渐变</span>
      <span class="color-hex">#43e97b → #38f9d7</span>
    </div>
  </div>

  <div class="action-section">
    <button class="action-btn" data-selector="action-btn">
      点击测试同步
    </button>
  </div>

  <div class="info-cards">
    <div class="info-card">
      <h3>灵活布局</h3>
      <p>使用 Flexbox 实现自适应卡片布局，自动适应不同屏幕尺寸。</p>
    </div>
    <div class="info-card">
      <h3>媒体查询</h3>
      <p>通过 CSS Media Queries 在 1024px 和 600px 断点处调整布局。</p>
    </div>
    <div class="info-card">
      <h3>交互同步</h3>
      <p>点击任意卡片或按钮，所有视口将同步触发相同的交互效果。</p>
    </div>
  </div>

  <script>
    (function() {
      function generateSelector(element) {
        return element.getAttribute('data-selector') || element.className || element.tagName.toLowerCase();
      }

      function triggerClickBySelector(selector) {
        const element = document.querySelector('[data-selector="' + selector + '"]');
        if (element) {
          element.classList.add('clicked');
          setTimeout(function() {
            element.classList.remove('clicked');
          }, 400);
        }
      }

      document.addEventListener('click', function(e) {
        var target = e.target.closest('[data-selector]');
        if (target) {
          var selector = generateSelector(target);
          window.parent.postMessage({
            type: 'click',
            selector: selector,
            timestamp: Date.now()
          }, '*');
        }
      });

      window.addEventListener('message', function(e) {
        if (e.data && e.data.type === 'trigger-click' && e.data.selector) {
          triggerClickBySelector(e.data.selector);
        }
      });
    })();
  </script>
</body>
</html>
