<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宝石迷宫消除</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: linear-gradient(180deg, #0a1628 0%, #1a2a4a 50%, #0d1b2a 100%);
      transition: background 2s ease;
    }

    #app.level-2 {
      background: linear-gradient(180deg, #1a0a28 0%, #3a1a4a 50%, #2a0d2a 100%);
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .ui-panel {
      position: absolute;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      color: #ffffff;
      opacity: 0;
      animation: fadeIn 0.8s ease forwards;
    }

    .score-panel {
      top: 24px;
      left: 24px;
      padding: 20px 24px;
      min-width: 180px;
      animation-delay: 0.2s;
    }

    .score-panel h2 {
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .score-panel .score-value {
      font-size: 32px;
      font-weight: 700;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(100, 200, 255, 0.5);
      margin-bottom: 12px;
    }

    .score-panel .high-score {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .score-panel .high-score span {
      color: #ffd700;
      font-weight: 600;
    }

    .progress-panel {
      top: 24px;
      right: 24px;
      padding: 16px 20px;
      min-width: 200px;
      animation-delay: 0.3s;
    }

    .progress-panel .level-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4a9eff 0%, #9b59b6 100%);
      border-radius: 3px;
      transition: width 0.5s ease;
      box-shadow: 0 0 10px rgba(100, 150, 255, 0.5);
    }

    .reset-panel {
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      animation-delay: 0.4s;
    }

    .reset-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .reset-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(100, 150, 255, 0.3);
    }

    .reset-btn:active {
      transform: scale(0.98);
    }

    .level-up-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 72px;
      font-weight: 900;
      color: #ffffff;
      text-shadow: 
        0 0 20px rgba(255, 215, 0, 0.8),
        0 0 40px rgba(255, 215, 0, 0.6),
        0 0 60px rgba(255, 100, 200, 0.4);
      opacity: 0;
      pointer-events: none;
      z-index: 100;
      letter-spacing: 4px;
    }

    .level-up-overlay.show {
      animation: levelUpAnim 2s ease forwards;
    }

    @keyframes levelUpAnim {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 0;
      }
      20% {
        transform: translate(-50%, -50%) scale(1.2);
        opacity: 1;
      }
      40% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      80% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hint-panel {
      position: absolute;
      bottom: 24px;
      right: 24px;
      padding: 12px 16px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      animation-delay: 0.5s;
    }

    .hint-panel p {
      margin: 4px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>
    
    <div class="ui-panel score-panel">
      <h2>分数</h2>
      <div class="score-value" id="score">0</div>
      <div class="high-score">最高分: <span id="high-score">0</span></div>
    </div>

    <div class="ui-panel progress-panel">
      <div class="level-label">关卡 <span id="level-num">1</span></div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
      </div>
    </div>

    <div class="ui-panel reset-panel">
      <button class="reset-btn" id="reset-btn">重新开始</button>
    </div>

    <div class="ui-panel hint-panel">
      <p>🖱️ 左键点击宝石消除</p>
      <p>🔄 右键拖拽旋转视角</p>
      <p>🔍 滚轮缩放视图</p>
    </div>

    <div class="level-up-overlay" id="level-up">Level Up!</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
