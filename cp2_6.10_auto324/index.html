<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星织·光之经纬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-purple: #b300ff;
      --ice-blue: #00e5ff;
      --deep-space: #0a0a1a;
      --glass-bg: rgba(20, 10, 40, 0.6);
      --glass-border: rgba(179, 0, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at center, #1a1a3a 0%, #0a0a1a 50%, #000000 100%);
      color: #ffffff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .panel {
      position: fixed;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.4),
        0 0 20px rgba(179, 0, 255, 0.15),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      padding: 20px;
      z-index: 100;
    }

    #control-panel {
      bottom: 24px;
      left: 24px;
      width: 320px;
    }

    #log-panel {
      bottom: 24px;
      right: 24px;
      width: 360px;
      max-height: 40vh;
      overflow-y: auto;
    }

    #log-panel::-webkit-scrollbar {
      width: 6px;
    }

    #log-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    #log-panel::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--neon-purple), var(--ice-blue));
      border-radius: 3px;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--neon-purple), var(--ice-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      width: 4px;
      height: 16px;
      background: linear-gradient(180deg, var(--neon-purple), var(--ice-blue));
      border-radius: 2px;
      box-shadow: 0 0 8px var(--neon-purple);
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 8px;
      display: block;
      font-weight: 500;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      border: 1px solid rgba(179, 0, 255, 0.5);
      border-radius: 12px;
      background: linear-gradient(135deg, rgba(179, 0, 255, 0.15), rgba(0, 229, 255, 0.1));
      color: #ffffff;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transition: left 0.5s ease;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn:hover {
      border-color: var(--ice-blue);
      box-shadow: 
        0 0 20px rgba(179, 0, 255, 0.4),
        0 0 40px rgba(0, 229, 255, 0.2);
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.active {
      background: linear-gradient(135deg, rgba(179, 0, 255, 0.4), rgba(0, 229, 255, 0.3));
      border-color: var(--ice-blue);
      box-shadow: 
        0 0 25px rgba(179, 0, 255, 0.5),
        inset 0 0 20px rgba(0, 229, 255, 0.1);
    }

    .slider-container {
      position: relative;
    }

    .slider {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: linear-gradient(90deg, rgba(179, 0, 255, 0.3), rgba(0, 229, 255, 0.3));
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-purple), var(--ice-blue));
      cursor: pointer;
      box-shadow: 
        0 0 10px var(--neon-purple),
        0 0 20px rgba(179, 0, 255, 0.5);
      transition: all 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 
        0 0 15px var(--ice-blue),
        0 0 30px rgba(0, 229, 255, 0.6);
    }

    .slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--neon-purple), var(--ice-blue));
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px var(--neon-purple);
    }

    .slider-value {
      position: absolute;
      right: 0;
      top: -20px;
      font-size: 11px;
      color: var(--ice-blue);
      font-family: 'Orbitron', monospace;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .toggle-switch {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toggle-label {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.8);
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .toggle.active {
      background: linear-gradient(90deg, var(--neon-purple), var(--ice-blue));
      box-shadow: 0 0 15px rgba(179, 0, 255, 0.5);
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: #ffffff;
      border-radius: 50%;
      transition: transform 0.3s ease;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
    }

    .toggle.active::after {
      transform: translateX(20px);
    }

    .log-entry {
      padding: 12px;
      margin-bottom: 10px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      border-left: 3px solid var(--neon-purple);
      opacity: 0;
      transform: translateX(20px);
      animation: slideIn 0.4s ease forwards;
    }

    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .log-entry:last-child {
      margin-bottom: 0;
    }

    .log-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .log-color-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      box-shadow: 0 0 8px currentColor;
    }

    .log-time {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      font-family: 'Orbitron', monospace;
    }

    .log-detail {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
    }

    .log-coord {
      font-family: 'Orbitron', monospace;
      font-size: 11px;
      color: var(--ice-blue);
    }

    .log-empty {
      text-align: center;
      padding: 30px 20px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 13px;
    }

    #title-overlay {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      z-index: 50;
      pointer-events: none;
    }

    #main-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--neon-purple), var(--ice-blue), var(--neon-purple));
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 8px;
      animation: shimmer 3s linear infinite;
      text-shadow: 0 0 40px rgba(179, 0, 255, 0.3);
    }

    @keyframes shimmer {
      to {
        background-position: 200% center;
      }
    }

    #subtitle {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 4px;
      margin-top: 6px;
      font-weight: 300;
    }

    #fps-counter {
      position: fixed;
      top: 24px;
      right: 24px;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      color: var(--ice-blue);
      z-index: 50;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(0, 229, 255, 0.3);
    }

    #hint {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 14px;
      pointer-events: none;
      z-index: 40;
      transition: opacity 0.5s ease;
    }

    #hint.hidden {
      opacity: 0;
    }

    .hint-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.1); }
    }

    @media (max-width: 768px) {
      #control-panel, #log-panel {
        width: calc(100vw - 32px);
        left: 16px;
        right: 16px;
      }
      
      #control-panel {
        bottom: 16px;
      }
      
      #log-panel {
        bottom: auto;
        top: 80px;
        max-height: 30vh;
      }
      
      #main-title {
        font-size: 18px;
        letter-spacing: 4px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div id="title-overlay">
      <div id="main-title">星织·光之经纬</div>
      <div id="subtitle">STAR WEAVE · LIGHT WEFT</div>
    </div>
    
    <div id="fps-counter">FPS: 60 | 节点: 0</div>
    
    <div id="hint">
      <div class="hint-icon">✦</div>
      <div>开启编织模式，点击三维空间创建光网节点</div>
    </div>
    
    <div id="control-panel" class="panel">
      <div class="panel-title">控制面板</div>
      
      <div class="control-group">
        <button id="btn-create" class="btn">✦ 开启编织模式</button>
      </div>
      
      <div class="control-group">
        <span class="control-label">编织速度</span>
        <div class="slider-container">
          <span class="slider-value" id="speed-value">1.0x</span>
          <input type="range" id="speed-slider" class="slider" min="0.1" max="3" step="0.1" value="1">
        </div>
      </div>
      
      <div class="control-group">
        <div class="btn-row">
          <button id="btn-reset-view" class="btn">⟲ 重置视角</button>
          <button id="btn-clear" class="btn">✕ 清除光网</button>
        </div>
      </div>
      
      <div class="control-group">
        <div class="toggle-switch">
          <span class="toggle-label">全屏模式</span>
          <div id="toggle-fullscreen" class="toggle"></div>
        </div>
      </div>
    </div>
    
    <div id="log-panel" class="panel">
      <div class="panel-title">编织日志</div>
      <div id="log-content">
        <div class="log-empty">暂无编织记录<br/>开启编织模式开始创作</div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
