<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DepViz - 代码依赖关系可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    #navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(26, 26, 46, 0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-bottom: 1px solid #2d2d44;
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      gap: 16px;
    }

    #logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    #logo svg {
      width: 28px;
      height: 28px;
    }

    #logo span {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #input-area {
      flex: 1;
      max-width: 50%;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #code-input {
      height: 40px;
      flex: 1;
      border-radius: 6px;
      border: 1px solid #2d2d44;
      background: rgba(15, 15, 35, 0.8);
      color: #e0e0e0;
      padding: 0 14px;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #code-input:focus {
      border-color: #6c5ce7;
      box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.25);
    }

    #code-input::placeholder {
      color: #555;
    }

    #upload-btn, #parse-btn {
      height: 40px;
      border-radius: 6px;
      border: 1px solid #2d2d44;
      background: rgba(108, 92, 231, 0.15);
      color: #a29bfe;
      padding: 0 14px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      white-space: nowrap;
    }

    #upload-btn:hover, #parse-btn:hover {
      background: rgba(108, 92, 231, 0.3);
      border-color: #6c5ce7;
    }

    #file-input {
      display: none;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: auto;
      flex-shrink: 0;
    }

    #export-btn {
      height: 38px;
      border-radius: 20px;
      border: none;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: #fff;
      padding: 0 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
    }

    #export-btn:hover {
      transform: translateX(2px);
      box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
    }

    #help-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1.5px solid #555;
      background: transparent;
      color: #888;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      position: relative;
    }

    #help-btn:hover {
      border-color: #a29bfe;
      color: #a29bfe;
    }

    .tooltip {
      position: absolute;
      top: 42px;
      right: 0;
      width: 260px;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid #2d2d44;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: #bbb;
      display: none;
      z-index: 200;
    }

    .tooltip.show {
      display: block;
    }

    #canvas-container {
      position: fixed;
      top: 60px;
      left: 0;
      right: 0;
      bottom: 0;
    }

    #graph-canvas {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #graph-canvas:active {
      cursor: grabbing;
    }

    #control-panel {
      position: fixed;
      top: 60px;
      right: 0;
      width: 240px;
      height: calc(100vh - 60px);
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid #2d2d44;
      z-index: 50;
      padding: 20px 16px;
      transform: translateX(0);
      transition: transform 0.3s ease;
      overflow-y: auto;
    }

    #control-panel.collapsed {
      transform: translateX(240px);
    }

    #panel-toggle {
      position: fixed;
      top: 72px;
      right: 240px;
      width: 28px;
      height: 28px;
      border-radius: 6px 0 0 6px;
      border: 1px solid #2d2d44;
      border-right: none;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(20px);
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      z-index: 51;
      transition: right 0.3s ease;
    }

    #panel-toggle.collapsed {
      right: 0;
    }

    .panel-section {
      margin-bottom: 20px;
    }

    .panel-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #6c5ce7;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .panel-select {
      width: 100%;
      height: 36px;
      border-radius: 6px;
      border: 1px solid #2d2d44;
      background: rgba(15, 15, 35, 0.8);
      color: #e0e0e0;
      padding: 0 10px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }

    .panel-select:focus {
      border-color: #6c5ce7;
    }

    .panel-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-toggle-label {
      font-size: 13px;
      color: #bbb;
    }

    .toggle-switch {
      width: 40px;
      height: 22px;
      border-radius: 11px;
      background: #2d2d44;
      position: relative;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle-switch.active {
      background: #6c5ce7;
    }

    .toggle-switch::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      top: 2px;
      left: 2px;
      transition: transform 0.2s;
    }

    .toggle-switch.active::after {
      transform: translateX(18px);
    }

    .slider-container {
      width: 100%;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .slider-value {
      font-size: 13px;
      font-family: monospace;
      color: #a29bfe;
      min-width: 32px;
      text-align: right;
    }

    .slider-value.shake {
      animation: shake 50ms ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-2px); }
      75% { transform: translateX(2px); }
    }

    input[type="range"] {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: #2d2d44;
      border-radius: 2px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #6c5ce7;
      cursor: pointer;
      border: 2px solid #a29bfe;
    }

    #info-card {
      position: fixed;
      display: none;
      min-width: 220px;
      max-width: 320px;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 16px;
      z-index: 80;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      color: #1a1a2e;
    }

    #info-card.show {
      display: block;
    }

    #info-card-close {
      position: absolute;
      top: 8px;
      right: 10px;
      width: 22px;
      height: 22px;
      border: none;
      background: transparent;
      color: #888;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
    }

    #info-card-close:hover {
      background: rgba(0, 0, 0, 0.1);
      color: #333;
    }

    .info-card-title {
      font-size: 14px;
      font-weight: 700;
      font-family: monospace;
      margin-bottom: 10px;
      padding-right: 20px;
      word-break: break-all;
    }

    .info-card-section {
      margin-bottom: 8px;
    }

    .info-card-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      margin-bottom: 4px;
    }

    .info-card-list {
      font-size: 12px;
      font-family: monospace;
      color: #333;
      line-height: 1.6;
    }

    .info-card-type {
      display: inline-block;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      margin-left: 6px;
    }

    .type-local { background: #3498db20; color: #3498db; }
    .type-third-party { background: #e74c3c20; color: #e74c3c; }
    .type-builtin { background: #2ecc7120; color: #2ecc71; }
  </style>
</head>
<body>
  <nav id="navbar">
    <div id="logo">
      <svg viewBox="0 0 28 28" fill="none">
        <circle cx="8" cy="14" r="4" stroke="#6c5ce7" stroke-width="2"/>
        <circle cx="20" cy="8" r="3" stroke="#a29bfe" stroke-width="2"/>
        <circle cx="20" cy="20" r="3" stroke="#a29bfe" stroke-width="2"/>
        <line x1="12" y1="12" x2="17" y2="9" stroke="#6c5ce7" stroke-width="1.5"/>
        <line x1="12" y1="16" x2="17" y2="19" stroke="#6c5ce7" stroke-width="1.5"/>
      </svg>
      <span>DepViz</span>
    </div>
    <div id="input-area">
      <input type="text" id="code-input" placeholder="粘贴代码或输入模块名..." />
      <button id="parse-btn">解析</button>
      <button id="upload-btn">上传文件</button>
      <input type="file" id="file-input" accept=".js,.jsx,.ts,.tsx,.mjs,.cjs" />
    </div>
    <div class="nav-right">
      <button id="export-btn">导出 JSON</button>
      <button id="help-btn">?<div class="tooltip" id="help-tooltip">
        <strong>使用方法：</strong><br/>
        1. 粘贴代码到输入框，点击"解析"<br/>
        2. 或点击"上传文件"选择代码文件<br/>
        3. 拖拽节点调整位置，滚轮缩放<br/>
        4. 点击节点查看依赖详情<br/>
        5. 右侧面板切换布局模式<br/>
        6. 点击"导出 JSON"保存依赖数据
      </div>
    </button>
    </div>
  </nav>

  <div id="canvas-container">
    <canvas id="graph-canvas"></canvas>
  </div>

  <button id="panel-toggle">◀</button>
  <div id="control-panel">
    <div class="panel-section">
      <div class="panel-label">布局模式</div>
      <select class="panel-select" id="layout-select">
        <option value="force">力导向布局</option>
        <option value="concentric">同心圆布局</option>
        <option value="tree">树状布局</option>
      </select>
    </div>
    <div class="panel-section">
      <div class="panel-label">显示选项</div>
      <div class="panel-toggle-row">
        <span class="panel-toggle-label">节点标签</span>
        <div class="toggle-switch active" id="label-toggle"></div>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-label">力导向参数</div>
      <div class="slider-container">
        <div class="slider-header">
          <span class="panel-toggle-label">力强度</span>
          <span class="slider-value" id="force-value">1.0</span>
        </div>
        <input type="range" id="force-slider" min="0.1" max="2.0" step="0.1" value="1.0" />
      </div>
    </div>
  </div>

  <div id="info-card">
    <button id="info-card-close">✕</button>
    <div id="info-card-content"></div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
