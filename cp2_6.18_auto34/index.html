<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DepthCanvas - 3D Point Cloud Terrain Editor</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0A0A0A;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
        background: #0A0A0A;
      }
      #gui-container {
        position: fixed;
        top: 16px;
        left: 16px;
        z-index: 10;
        background: rgba(26, 26, 46, 0.93);
        border-radius: 8px;
        padding: 12px;
        animation: slideDown 0.3s cubic-bezier(0.22, 1, 0.36, 1) both;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      }
      @keyframes slideDown {
        from { transform: translateY(-16px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }
      #gui-container .lil-gui {
        --title-background-color: transparent;
        --title-color: #CCCCCC;
        --title-font-size: 14px;
        --font-size: 12px;
        --widget-color: #2A2A3E;
        --hover-color: #3A3A4E;
        --focus-color: #4A4A5E;
        --background-color: transparent;
        --text-color: #AAAAAA;
        --name-width: 40%;
        --slider-knob-width: 8px;
        --slider-input-width: 38%;
        --color-input-width: 38%;
        --input-font-size: 12px;
        --padding: 6px;
        --spacing: 6px;
        --widget-height: 20px;
        width: 260px;
      }
      #gui-container .lil-gui .title {
        font-weight: 600;
        letter-spacing: 0.3px;
        margin-bottom: 4px;
        color: #CCCCCC !important;
        font-size: 14px !important;
      }
      #gui-container .lil-gui .name {
        color: #AAAAAA !important;
      }
      #height-label {
        position: fixed;
        top: 16px;
        right: 16px;
        padding: 8px 14px;
        background: rgba(0, 0, 0, 0.6);
        border-radius: 6px;
        color: #FFFFFF;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.2px;
        z-index: 10;
        display: none;
        backdrop-filter: blur(4px);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="gui-container"></div>
    <div id="height-label">Height: +0.00</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
