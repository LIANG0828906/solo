<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuraMap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #F8F9FA;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app-title {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 24px;
      color: #7C3AED;
      z-index: 100;
      pointer-events: none;
      font-weight: 600;
      letter-spacing: 1px;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container canvas {
      display: block;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #7C3AED;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #6D28D9;
    }
  </style>
</head>
<body>
  <div id="app-title">AuraMap</div>
  <div id="canvas-container"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
