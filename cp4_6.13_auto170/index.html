<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EasyDeco - 室内装饰风格搭配预览</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #1a1a2e;
      --bg-border: #16213e;
      --bg-panel: #0f3460;
      --accent-purple: #667eea;
      --accent-blue: #3498db;
      --text-white: #ffffff;
      --text-muted: #a0aec0;
      --drawer-height: 150px;
      --font-stack: 'Segoe UI', sans-serif;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-white);
      font-family: var(--font-stack);
      overflow: hidden;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .canvas-wrapper {
      width: 85%;
      min-width: 1000px;
      flex: 1;
      border: 20px solid var(--bg-border);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      margin-top: 16px;
    }

    #mainCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .toolbar-left {
      position: absolute;
      top: 40px;
      left: 40px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .floorplan-select {
      background: var(--bg-panel);
      color: var(--text-white);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.875rem;
      font-family: var(--font-stack);
      cursor: pointer;
      outline: none;
      min-width: 160px;
      transition: border-color 0.2s ease;
    }

    .floorplan-select:hover,
    .floorplan-select:focus {
      border-color: var(--accent-purple);
    }

    .floorplan-select option {
      background: var(--bg-panel);
      color: var(--text-white);
    }

    .floorplan-select option:hover {
      background: #1a4a8a;
    }

    .toolbar-right {
      position: absolute;
      top: 40px;
      right: 40px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .style-btn {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
      position: relative;
    }

    .style-btn:hover {
      transform: scale(1.1);
    }

    .style-btn.active {
      border-color: var(--text-white);
      box-shadow: 0 0 8px rgba(255,255,255,0.3);
    }

    .style-btn:active {
      transform: scale(0.95);
    }

    .style-tooltip {
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.85);
      color: #fff;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .style-btn:hover .style-tooltip {
      opacity: 1;
    }

    .room-info {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(15, 52, 96, 0.9);
      padding: 8px 20px;
      border-radius: 6px;
      font-size: 0.875rem;
      color: var(--text-white);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .room-info.visible {
      opacity: 1;
    }

    .drawer-toggle {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      background: var(--bg-panel);
      color: var(--text-white);
      border: 1px solid rgba(255,255,255,0.15);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      padding: 6px 24px;
      font-size: 0.8rem;
      font-family: var(--font-stack);
      cursor: pointer;
      transition: background 0.15s;
    }

    .drawer-toggle:hover {
      background: #1a4a8a;
    }

    .drawer-toggle:active {
      transform: translateX(-50%) scale(0.97);
    }

    .drawer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--drawer-height);
      background: rgba(15, 52, 96, 0.95);
      border-top: 1px solid rgba(255,255,255,0.1);
      transform: translateY(100%);
      transition: transform 0.3s ease-out;
      z-index: 15;
      display: flex;
      flex-direction: column;
      padding: 12px 20px;
    }

    .drawer.open {
      transform: translateY(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .drawer-title {
      font-size: 0.875rem;
      font-weight: 600;
    }

    .save-btn {
      background: var(--accent-purple);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 5px 14px;
      font-size: 0.75rem;
      font-family: var(--font-stack);
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
    }

    .save-btn:hover {
      background: #5a6fd6;
    }

    .save-btn:active {
      transform: scale(0.95);
    }

    .scheme-grid {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      flex: 1;
      align-items: flex-start;
      padding: 4px 0;
    }

    .scheme-card {
      width: 140px;
      height: 100px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, transform 0.1s;
      position: relative;
      flex-shrink: 0;
    }

    .scheme-card:hover {
      border-color: var(--accent-purple);
    }

    .scheme-card:active {
      transform: scale(0.95);
    }

    .scheme-card .scheme-name {
      font-size: 14px;
      text-align: center;
      margin-bottom: 4px;
    }

    .scheme-card .scheme-thumb {
      width: 100px;
      height: 56px;
      border-radius: 3px;
      background: var(--bg-border);
    }

    .scheme-card .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      background: rgba(255,60,60,0.7);
      border: none;
      border-radius: 50%;
      color: white;
      font-size: 10px;
      line-height: 18px;
      text-align: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .scheme-card:hover .delete-btn {
      opacity: 1;
    }

    .delete-btn:active {
      transform: scale(0.9);
    }

    .export-btn {
      position: absolute;
      bottom: 50px;
      right: 40px;
      z-index: 10;
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.875rem;
      font-family: var(--font-stack);
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      box-shadow: 0 2px 8px rgba(52,152,219,0.3);
    }

    .export-btn:hover {
      background: #2980b9;
    }

    .export-btn:active {
      transform: scale(0.95);
    }

    .save-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .save-modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .save-modal {
      background: var(--bg-panel);
      border-radius: 8px;
      padding: 24px;
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .save-modal input {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 8px 12px;
      color: white;
      font-size: 0.875rem;
      font-family: var(--font-stack);
      outline: none;
    }

    .save-modal input:focus {
      border-color: var(--accent-purple);
    }

    .save-modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .save-modal-actions button {
      padding: 6px 16px;
      border-radius: 4px;
      border: none;
      font-size: 0.8rem;
      font-family: var(--font-stack);
      cursor: pointer;
      transition: transform 0.1s;
    }

    .save-modal-actions button:active {
      transform: scale(0.95);
    }

    .btn-confirm {
      background: var(--accent-purple);
      color: white;
    }

    .btn-cancel {
      background: rgba(255,255,255,0.1);
      color: var(--text-white);
    }

    .preview-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .preview-modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .preview-modal {
      background: var(--bg-border);
      border-radius: 8px;
      padding: 16px;
      max-width: 80vw;
      max-height: 80vh;
    }

    .preview-modal img {
      max-width: 100%;
      max-height: calc(80vh - 60px);
      border-radius: 4px;
    }

    .preview-modal .close-preview {
      display: block;
      margin: 8px auto 0;
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 16px;
      font-family: var(--font-stack);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-wrapper">
      <canvas id="mainCanvas"></canvas>

      <div class="toolbar-left">
        <select id="floorplanSelect" class="floorplan-select">
          <option value="default">默认户型 - 五居室</option>
        </select>
      </div>

      <div class="toolbar-right" id="stylePanel"></div>

      <div class="room-info" id="roomInfo"></div>

      <button class="export-btn" id="exportBtn">导出为PNG</button>

      <button class="drawer-toggle" id="drawerToggle">▼ 方案管理</button>

      <div class="drawer" id="drawer">
        <div class="drawer-header">
          <span class="drawer-title">已保存方案</span>
          <button class="save-btn" id="saveSchemeBtn">保存当前方案</button>
        </div>
        <div class="scheme-grid" id="schemeGrid"></div>
      </div>
    </div>

    <div class="save-modal-overlay" id="saveModal">
      <div class="save-modal">
        <div>请输入方案名称：</div>
        <input type="text" id="schemeNameInput" placeholder="方案名称" maxlength="20" />
        <div class="save-modal-actions">
          <button class="btn-cancel" id="cancelSaveBtn">取消</button>
          <button class="btn-confirm" id="confirmSaveBtn">保存</button>
        </div>
      </div>
    </div>

    <div class="preview-modal-overlay" id="previewModal">
      <div class="preview-modal">
        <img id="previewImage" />
        <button class="close-preview" id="closePreviewBtn">关闭</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
