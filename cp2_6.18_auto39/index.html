<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>引力弹弓轨道模拟器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #E0E0E0;
      user-select: none;
    }
    #game-canvas {
      display: block;
      position: fixed;
      inset: 0;
      cursor: crosshair;
    }
    #ui-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    #ui-layer > * { pointer-events: auto; }

    /* ---------- Status Panel ---------- */
    #status-panel {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
      border-radius: 8px;
      padding: 14px 18px;
      min-width: 180px;
      font-family: 'Courier New', monospace;
      color: #AADDAA;
      font-size: 13px;
      line-height: 1.9;
      box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    }
    #status-panel .label { color: #88AABB; margin-right: 6px; }
    #status-panel h3 {
      font-family: inherit;
      font-size: 12px;
      color: #66CCFF;
      letter-spacing: 1px;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(102,204,255,0.15);
      padding-bottom: 6px;
    }

    /* ---------- Add Planet Button ---------- */
    #add-planet-btn {
      position: fixed;
      left: 20px;
      bottom: 20px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: #2A2A4A;
      border: 2px solid #5A5A8A;
      color: #C9C9E9;
      font-size: 26px;
      line-height: 44px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #add-planet-btn:hover:not(:disabled) {
      border-color: #8A8ABA;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(138,138,186,0.3);
    }
    #add-planet-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    #add-planet-hint {
      position: fixed;
      left: 80px;
      bottom: 32px;
      font-size: 12px;
      color: #8888AA;
      font-family: 'Courier New', monospace;
    }

    /* ---------- Planet Info Tooltip ---------- */
    #planet-tooltip {
      position: fixed;
      display: none;
      background: rgba(26,26,46,0.88);
      border-radius: 6px;
      padding: 8px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: #D0D0F0;
      pointer-events: none;
      z-index: 20;
      line-height: 1.7;
      min-width: 140px;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #planet-tooltip .t-name { color: #FFD180; font-weight: bold; font-size: 13px; }
    #planet-tooltip .t-label { color: #88AABB; }

    /* ---------- Maneuver Menu ---------- */
    #maneuver-menu {
      position: fixed;
      display: none;
      width: 120px;
      height: 120px;
      pointer-events: auto;
      z-index: 15;
      transform: translate(-50%, -50%);
    }
    .maneuver-sector {
      position: absolute;
      width: 60px;
      height: 60px;
      cursor: pointer;
      background: rgba(42,42,74,0.85);
      border: 1px solid rgba(138,138,186,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: #E0E0FF;
      transition: all 0.18s ease;
      backdrop-filter: blur(4px);
    }
    .maneuver-sector:hover {
      background: rgba(90,90,150,0.85);
      color: #FFD700;
      box-shadow: 0 0 12px rgba(255,215,0,0.35);
    }
    .sector-up    { top: 0;    left: 30px; border-radius: 60px 60px 4px 4px; }
    .sector-down  { bottom: 0; left: 30px; border-radius: 4px 4px 60px 60px; }
    .sector-left  { top: 30px; left: 0;    border-radius: 60px 4px 4px 60px; }
    .sector-right { top: 30px; right: 0;   border-radius: 4px 60px 60px 4px; }

    /* ---------- Result Panel ---------- */
    #result-panel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.92);
      background: rgba(26,26,46,0.88);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 28px 36px;
      min-width: 340px;
      text-align: center;
      opacity: 0;
      pointer-events: none;
      transition: all 0.35s cubic-bezier(.18,.92,.35,1);
      z-index: 30;
      border: 1px solid rgba(255,255,255,0.08);
    }
    #result-panel.show {
      opacity: 1;
      pointer-events: auto;
      transform: translate(-50%, -50%) scale(1);
    }
    #result-panel h2 {
      color: #FFD700;
      font-size: 22px;
      letter-spacing: 2px;
      margin-bottom: 18px;
      font-weight: 500;
    }
    #result-panel .stat-row {
      display: flex;
      justify-content: space-between;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      padding: 6px 0;
      color: #B0D0B0;
      border-bottom: 1px dashed rgba(255,255,255,0.06);
    }
    #result-panel .stat-row:last-of-type { border-bottom: none; }
    #result-panel .stat-row .k { color: #88AABB; }
    #result-panel .stat-row .v { color: #AADDAA; }
    #result-panel .final-score {
      margin: 20px 0 22px;
      font-size: 44px;
      font-family: 'Courier New', monospace;
      color: #FFD700;
      letter-spacing: 3px;
      text-shadow: 0 0 18px rgba(255,215,0,0.4);
      font-weight: bold;
    }
    #result-panel button {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: #D0D0F0;
      padding: 9px 28px;
      font-size: 14px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 1px;
    }
    #result-panel button:hover {
      background: rgba(255,255,255,0.18);
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(100,120,200,0.25);
    }

    /* ---------- Start Hint ---------- */
    #start-hint {
      position: fixed;
      bottom: 30%;
      left: 50%;
      transform: translateX(-50%);
      color: #88AABB;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      background: rgba(26,26,46,0.6);
      padding: 10px 22px;
      border-radius: 20px;
      border: 1px solid rgba(136,170,187,0.2);
      pointer-events: none;
      opacity: 0.9;
      animation: hintPulse 2s ease-in-out infinite;
    }
    @keyframes hintPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50% { opacity: 0.95; transform: translateX(-50%) translateY(-4px); }
    }
  </style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="ui-layer">
    <div id="status-panel">
      <h3>◆ 状态面板</h3>
      <div><span class="label">速度:</span><span id="stat-speed">0.00</span> px/s</div>
      <div><span class="label">燃料:</span><span id="stat-fuel">100</span>%</div>
      <div><span class="label">机动:</span><span id="stat-maneuver">0</span> 次</div>
      <div><span class="label">路径:</span><span id="stat-traillength">0</span> px</div>
    </div>

    <button id="add-planet-btn" title="添加行星">+</button>
    <div id="add-planet-hint">添加行星 (最大 3 颗)</div>

    <div id="planet-tooltip"></div>

    <div id="maneuver-menu">
      <div class="maneuver-sector sector-up"    data-action="accelerate" title="加速">↑</div>
      <div class="maneuver-sector sector-down"  data-action="decelerate" title="减速">↓</div>
      <div class="maneuver-sector sector-left"  data-action="turn-left"  title="左转">←</div>
      <div class="maneuver-sector sector-right" data-action="turn-right" title="右转">→</div>
    </div>

    <div id="result-panel">
      <h2>★ 任务达成 ★</h2>
      <div class="stat-row"><span class="k">总路径长度</span><span class="v" id="res-trail">0 px</span></div>
      <div class="stat-row"><span class="k">燃料剩余</span><span class="v" id="res-fuel">0%</span></div>
      <div class="stat-row"><span class="k">机动次数</span><span class="v" id="res-maneuver">0</span></div>
      <div class="final-score" id="res-score">100</div>
      <button id="restart-btn">重新开始</button>
    </div>

    <div id="start-hint">拖拽飞行器设定发射方向和速度</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
