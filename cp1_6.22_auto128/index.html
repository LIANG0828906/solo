<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空碎片回收模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background: #0B0C10;
      font-family: monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #game-container {
      position: relative;
      width: 1000px;
      height: 700px;
    }
    canvas {
      display: block;
      border-radius: 8px;
      box-shadow: 0 0 40px rgba(102, 252, 241, 0.1);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="1000" height="700"></canvas>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
