<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>生态系统能量流动模拟器</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', sans-serif;
      background: linear-gradient(135deg, #2d5016 0%, #7cb342 100%);
    }
    
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    
    .canvas-container {
      flex: 0 0 70%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 20px;
    }
    
    #gameCanvas {
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      background: linear-gradient(180deg, #4a7c23 0%, #2d5016 100%);
    }
    
    .sidebar {
      flex: 0 0 30%;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .control-panel {
      background: rgba(30, 58, 95, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .panel-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .param-group {
      margin-bottom: 20px;
    }
    
    .param-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 500;
    }
    
    .param-label-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .param-value {
      font-weight: 700;
      font-size: 16px;
      min-width: 60px;
      text-align: right;
    }
    
    .slider-container {
      position: relative;
      height: 8px;
      border-radius: 4px;
      overflow: hidden;
    }
    
    .slider-track {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 4px;
    }
    
    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: transparent;
      outline: none;
      position: relative;
      z-index: 2;
    }
    
    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s;
    }
    
    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.1);
    }
    
    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      border: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
    }
    
    .temp-track {
      background: linear-gradient(to right, #2196f3, #4caf50, #ff9800, #f44336);
    }
    
    .rain-track {
      background: linear-gradient(to right, #e0e0e0, #64b5f6, #1976d2, #0d47a1);
    }
    
    .light-track {
      background: linear-gradient(to right, #424242, #9e9e9e, #ffeb3b, #fff59d);
    }
    
    .pollution-track {
      background: linear-gradient(to right, #4caf50, #ffeb3b, #ff9800, #9c27b0);
    }
    
    .food-chain-panel {
      background: rgba(30, 58, 95, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .food-chain-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }
    
    .food-chain-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
    }
    
    .toggle-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.3s;
    }
    
    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .toggle-btn.expanded {
      transform: rotate(180deg);
    }
    
    .food-chain-content {
      overflow: hidden;
      transition: max-height 0.3s ease-out, opacity 0.3s ease-out;
      max-height: 0;
      opacity: 0;
    }
    
    .food-chain-content.expanded {
      max-height: 400px;
      opacity: 1;
    }
    
    .food-chain-svg {
      width: 100%;
      height: auto;
      margin-top: 12px;
    }
    
    .population-panel {
      background: rgba(30, 58, 95, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .population-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .chart-container {
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      height: 80px;
      gap: 4px;
    }
    
    .chart-bar {
      flex: 1;
      border-radius: 4px 4px 0 0;
      transition: height 0.5s ease-out;
      position: relative;
      min-height: 2px;
    }
    
    .chart-bar-label {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      white-space: nowrap;
    }
    
    .chart-bar-value {
      position: absolute;
      top: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      font-weight: 700;
    }
    
    .initial-config {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(30, 58, 95, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 16px;
      color: white;
      z-index: 100;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    
    .initial-config label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .initial-config input {
      width: 100%;
      padding: 8px 12px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
      margin-bottom: 12px;
    }
    
    .initial-config button {
      width: 100%;
      padding: 10px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .initial-config button:hover {
      background: #43a047;
    }
    
    @media (max-width: 1279px) and (min-width: 1024px) {
      .canvas-container {
        flex: 0 0 65%;
      }
      .sidebar {
        flex: 0 0 35%;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="canvas-container">
      <div class="initial-config" id="initialConfig">
        <label for="animalCount">初始动物数量 (50-200)</label>
        <input type="number" id="animalCount" min="50" max="200" value="100">
        <button id="startBtn">开始模拟</button>
      </div>
      <canvas id="gameCanvas" width="800" height="800"></canvas>
    </div>
    <div class="sidebar">
      <div class="control-panel">
        <div class="panel-title">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
            <path d="M12 1v6m0 6v6m4.22-13.22l4.24 4.24M1.54 1.54l4.24 4.24M20.46 20.46l-4.24-4.24M1.54 20.46l4.24-4.24"/>
          </svg>
          环境参数控制
        </div>
        
        <div class="param-group">
          <div class="param-label">
            <div class="param-label-left">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
              </svg>
              温度
            </div>
            <span class="param-value" id="tempValue">20°C</span>
          </div>
          <div class="slider-container">
            <div class="slider-track temp-track"></div>
            <input type="range" class="slider" id="tempSlider" min="-10" max="50" value="20">
          </div>
        </div>
        
        <div class="param-group">
          <div class="param-label">
            <div class="param-label-left">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M16 13v8M8 13v8M12 15V3M4 17h16"/>
              </svg>
              降水量
            </div>
            <span class="param-value" id="rainValue">250mm</span>
          </div>
          <div class="slider-container">
            <div class="slider-track rain-track"></div>
            <input type="range" class="slider" id="rainSlider" min="0" max="500" value="250">
          </div>
        </div>
        
        <div class="param-group">
          <div class="param-label">
            <div class="param-label-left">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="5"/>
                <line x1="12" y1="1" x2="12" y2="3"/>
                <line x1="12" y1="21" x2="12" y2="23"/>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                <line x1="1" y1="12" x2="3" y2="12"/>
                <line x1="21" y1="12" x2="23" y2="12"/>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
              </svg>
              光照强度
            </div>
            <span class="param-value" id="lightValue">50%</span>
          </div>
          <div class="slider-container">
            <div class="slider-track light-track"></div>
            <input type="range" class="slider" id="lightSlider" min="0" max="100" value="50">
          </div>
        </div>
        
        <div class="param-group">
          <div class="param-label">
            <div class="param-label-left">
              <svg class="icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                <path d="M21 4v6h-6"/>
              </svg>
              污染指数
            </div>
            <span class="param-value" id="pollutionValue">10%</span>
          </div>
          <div class="slider-container">
            <div class="slider-track pollution-track"></div>
            <input type="range" class="slider" id="pollutionSlider" min="0" max="100" value="10">
          </div>
        </div>
      </div>
      
      <div class="food-chain-panel" id="foodChainPanel">
        <div class="food-chain-header" id="foodChainHeader">
          <div class="food-chain-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            食物链关系
          </div>
          <button class="toggle-btn" id="toggleBtn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </button>
        </div>
        <div class="food-chain-content" id="foodChainContent">
          <svg class="food-chain-svg" viewBox="0 0 280 220" id="foodChainSvg">
            <defs>
              <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#4caf50"/>
              </marker>
            </defs>
          </svg>
        </div>
      </div>
      
      <div class="population-panel">
        <div class="population-title">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="20" x2="18" y2="10"/>
            <line x1="12" y1="20" x2="12" y2="4"/>
            <line x1="6" y1="20" x2="6" y2="14"/>
          </svg>
          实时种群数量
        </div>
        <div class="chart-container" id="chartContainer"></div>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
