<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EchoDrift - 3D Sound Wave Visualization</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      color: #fff;
    }

    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #permission-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      z-index: 1000;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 40px rgba(100, 150, 255, 0.15);
    }

    #permission-prompt h2 {
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #6699ff, #ff6699);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #permission-prompt p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    #permission-prompt.hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="permission-prompt">
      <h2>🎵 EchoDrift</h2>
      <p>请启用麦克风权限以开始音频可视化<br/>或稍后通过底部控制栏选择音频文件</p>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
