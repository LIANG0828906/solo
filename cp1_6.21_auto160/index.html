<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>溶洞回声 - 3D声学可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0F172A; }
    #loader {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0F172A, #1E293B); z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(59,130,246,0.2);
      border-top-color: #3B82F6; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      margin-top: 16px; color: #94A3B8; font-family: system-ui, sans-serif; font-size: 14px;
    }
    .loader-wrap { display: flex; flex-direction: column; align-items: center; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-wrap">
      <div class="spinner"></div>
      <div class="loader-text">加载溶洞场景...</div>
    </div>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
