<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>3D Particle Collision System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Orbitron:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'JetBrains Mono', monospace;
      background: #0a0a1f;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
      background: radial-gradient(ellipse at 30% 20%, #1a0a2e 0%, #0d1f3c 40%, #0a0a1f 100%);
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 16px 24px;
      background: rgba(10, 10, 31, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      z-index: 10;
      min-width: 180px;
    }

    #hud .hud-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    #hud .hud-item:last-child {
      margin-bottom: 0;
    }

    #hud .hud-label {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }

    #hud .hud-value {
      color: #00f0ff;
      font-weight: 600;
      font-size: 14px;
    }

    #hud .hud-value.fps-good {
      color: #aaff00;
    }

    #hud .hud-value.fps-warning {
      color: #ffaa00;
    }

    #hud .hud-value.fps-danger {
      color: #ff3366;
    }

    #trail-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    #trail-line svg {
      width: 100%;
      height: 100%;
    }

    #mobile-toggle {
      display: none;
      position: absolute;
      top: 20px;
      right: 20px;
      width: 48px;
      height: 48px;
      background: rgba(10, 10, 31, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0, 240, 255, 0.3);
      border-radius: 8px;
      color: #00f0ff;
      font-size: 24px;
      cursor: pointer;
      z-index: 100;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
    }

    #mobile-toggle:hover {
      background: rgba(0, 240, 255, 0.2);
      transform: translateY(-2px);
    }

    #mobile-toggle.active {
      background: rgba(0, 240, 255, 0.3);
    }

    .lil-gui {
      --background-color: rgba(10, 10, 31, 0.75) !important;
      --widget-color: rgba(0, 240, 255, 0.1) !important;
      --focus-color: rgba(0, 240, 255, 0.3) !important;
      --hover-color: rgba(0, 240, 255, 0.2) !important;
      --name-color: rgba(255, 255, 255, 0.8) !important;
      --value-color: #00f0ff !important;
      --title-background-color: rgba(0, 240, 255, 0.15) !important;
      --title-color: #fff !important;
      --font-family: 'JetBrains Mono', monospace !important;
      --font-size: 12px !important;
      --width: 320px !important;
      backdrop-filter: blur(12px) !important;
      -webkit-backdrop-filter: blur(12px) !important;
      border: 1px solid rgba(0, 240, 255, 0.2) !important;
      border-radius: 8px !important;
      overflow: hidden !important;
    }

    .lil-gui .title {
      font-family: 'Orbitron', sans-serif !important;
      font-weight: 600 !important;
      letter-spacing: 1px !important;
      padding: 14px 16px !important;
    }

    .lil-gui .controller {
      transition: all 0.2s ease !important;
      padding: 4px 8px !important;
    }

    .lil-gui .controller:hover {
      background: rgba(0, 240, 255, 0.1) !important;
      transform: translateX(4px) !important;
    }

    .lil-gui .slider {
      border-radius: 4px !important;
    }

    .lil-gui .slider:hover {
      filter: brightness(1.3) !important;
    }

    .lil-gui .slider .fill {
      background: linear-gradient(90deg, #00f0ff, #ff00ff) !important;
    }

    .lil-gui button {
      border-radius: 4px !important;
      transition: all 0.2s ease !important;
      border: 1px solid rgba(0, 240, 255, 0.3) !important;
    }

    .lil-gui button:hover {
      transform: translateY(-2px) !important;
      box-shadow: 0 4px 12px rgba(0, 240, 255, 0.3) !important;
      background: rgba(0, 240, 255, 0.2) !important;
    }

    .lil-gui .boolean .checkbox {
      border-radius: 4px !important;
      border: 1px solid rgba(0, 240, 255, 0.4) !important;
    }

    .lil-gui .boolean .checkbox.on {
      background: linear-gradient(135deg, #00f0ff, #ff00ff) !important;
      border-color: transparent !important;
    }

    @media (max-width: 1024px) {
      .lil-gui {
        --width: 280px !important;
        --font-size: 11px !important;
      }
    }

    @media (max-width: 768px) {
      #mobile-toggle {
        display: flex;
      }

      .lil-gui {
        --width: 100% !important;
        position: fixed !important;
        top: 0 !important;
        right: 0 !important;
        height: 100vh !important;
        transform: translateX(100%) !important;
        transition: transform 0.3s ease !important;
        border-radius: 0 !important;
        z-index: 99 !important;
      }

      .lil-gui.mobile-open {
        transform: translateX(0) !important;
      }

      #hud {
        top: 80px;
        left: 12px;
        padding: 12px 16px;
        font-size: 12px;
        min-width: 150px;
      }
    }

    @media (max-width: 480px) {
      #hud {
        font-size: 11px;
        padding: 10px 14px;
      }

      #hud .hud-value {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="hud">
      <div class="hud-item">
        <span class="hud-label">FPS</span>
        <span class="hud-value fps-good" id="fps-value">60</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">碰撞计数</span>
        <span class="hud-value" id="collision-value">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">粒子数量</span>
        <span class="hud-value" id="particle-value">500</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">渲染模式</span>
        <span class="hud-value" id="mode-value">球体</span>
      </div>
    </div>
    <div id="trail-line">
      <svg id="trail-svg">
        <path id="trail-path" fill="none" stroke="rgba(0, 240, 255, 0.5)" stroke-width="2" stroke-dasharray="8 6" stroke-linecap="round" />
      </svg>
    </div>
    <button id="mobile-toggle" aria-label="切换控制面板">
      <span>☰</span>
    </button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
