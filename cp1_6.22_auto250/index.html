<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="description" content="三维芯片封装热流模拟与可视化交互平台" />
    <title>ThermalSim 3D · 芯片封装热流模拟</title>
    <style>
      html, body, #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0A0A0F;
      }
      * { -webkit-tap-highlight-color: transparent; }
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      #loading-mask {
        position: fixed;
        inset: 0;
        background: #0A0A0F;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        z-index: 9999;
        animation: fadeIn 0.3s;
      }
      .loader-spinner {
        width: 42px;
        height: 42px;
        border: 3px solid #2A2A4E;
        border-top-color: #3B82F6;
        border-right-color: #1E90FF;
        border-radius: 50%;
        animation: spin 1.1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      .loader-title {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 14px;
        font-weight: 600;
        letter-spacing: 1.5px;
        color: #6B7280;
        text-transform: uppercase;
      }
      .loader-bar {
        width: 200px;
        height: 3px;
        background: #1A1A2E;
        border-radius: 2px;
        overflow: hidden;
      }
      .loader-fill {
        height: 100%;
        width: 40%;
        background: linear-gradient(90deg, #3B82F6, #1E90FF, #00FF88);
        border-radius: 2px;
        animation: slide 1.6s ease-in-out infinite;
      }
      @keyframes slide {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loading-mask">
        <div class="loader-spinner"></div>
        <div class="loader-title">ThermalSim 3D Initializing</div>
        <div class="loader-bar"><div class="loader-fill"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const mask = document.getElementById('loading-mask');
          if (mask) {
            mask.style.transition = 'opacity 0.5s';
            mask.style.opacity = '0';
            setTimeout(() => mask.remove(), 500);
          }
        }, 400);
      });
    </script>
  </body>
</html>
