<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地形编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #1A1A2E;
      color: #E0E0E0;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    #scene-container {
      flex: 1;
      min-width: 800px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #0A0A1A 0%, #1A1A3A 100%);
    }

    #scene-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #control-panel {
      width: 260px;
      min-width: 260px;
      background: #2C2C3A;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-radius: 12px 0 0 12px;
      font-size: 14px;
      color: #E0E0E0;
    }

    .panel-header {
      font-size: 12px;
      color: #888888;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid #3A3A4A;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      font-size: 13px;
      color: #AAAAAA;
    }

    .btn {
      width: 100%;
      height: 44px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.2s ease;
      background: #4CAF50;
      color: #FFFFFF;
    }

    .btn:hover {
      filter: brightness(1.2);
    }

    .btn:active {
      filter: brightness(0.9);
    }

    .btn-secondary {
      background: #6C63FF;
    }

    .btn-danger {
      background: #E57373;
    }

    select {
      width: 100%;
      height: 36px;
      background: #3A3A4A;
      color: #E0E0E0;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      padding: 0 12px;
      cursor: pointer;
      outline: none;
    }

    select:hover {
      background: #444466;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 32px;
      background: transparent;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-runnable-track {
      width: 100%;
      height: 6px;
      background: #444466;
      border-radius: 4px;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #6C63FF;
      border-radius: 50%;
      margin-top: -6px;
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    input[type="range"]::-moz-range-track {
      width: 100%;
      height: 6px;
      background: #444466;
      border-radius: 4px;
    }

    input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #6C63FF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .section-divider {
      height: 1px;
      background: #3A3A4A;
      margin: 8px 0;
    }

    .brush-indicator {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #888888;
    }

    .brush-indicator span {
      color: #6C63FF;
      font-weight: 600;
    }

    .spacer {
      flex: 1;
    }

    .info-text {
      font-size: 11px;
      color: #666666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>
    <div id="control-panel"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
