<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>分子结构可视化探索器</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #0B1021;
        color: #fff;
        user-select: none;
      }

      #app {
        position: relative;
        width: 100%;
        height: 100%;
      }

      #scene-container {
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, #0B1021 0%, #1A2A40 100%);
      }

      .top-bar {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        padding: 16px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        z-index: 10;
        pointer-events: none;
      }

      .top-bar > * {
        pointer-events: auto;
      }

      .molecule-select {
        width: 200px;
        padding: 10px 14px;
        background: rgba(30, 42, 60, 0.9);
        backdrop-filter: blur(10px);
        border: 1px solid #3A5A7A;
        border-radius: 8px;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        outline: none;
        transition: border-color 0.2s, box-shadow 0.2s;
      }

      .molecule-select:focus,
      .molecule-select:hover {
        border-color: #4A90D9;
        box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.2);
      }

      .molecule-select option {
        background: #1E2A3C;
        color: #fff;
      }

      .molecule-select option:checked {
        background: #4A90D9;
      }

      .tips {
        padding: 8px 14px;
        font-size: 14px;
        color: #8AAABB;
        opacity: 0.7;
        background: rgba(30, 42, 60, 0.6);
        backdrop-filter: blur(6px);
        border-radius: 8px;
      }

      .edit-panel {
        position: absolute;
        right: 16px;
        top: 80px;
        width: 280px;
        padding: 20px;
        background: rgba(30, 42, 60, 0.85);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(58, 90, 122, 0.5);
        border-radius: 12px;
        z-index: 10;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        transform: translateX(320px);
        opacity: 0;
        transition: transform 0.3s ease, opacity 0.3s ease;
      }

      .edit-panel.show {
        transform: translateX(0);
        opacity: 1;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(58, 90, 122, 0.4);
      }

      .panel-title h3 {
        font-size: 15px;
        font-weight: 600;
        color: #fff;
      }

      .panel-close {
        width: 24px;
        height: 24px;
        border: none;
        background: transparent;
        color: #8AAABB;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
        border-radius: 4px;
        transition: background 0.2s, color 0.2s;
      }

      .panel-close:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .form-group {
        margin-bottom: 16px;
      }

      .form-group label {
        display: block;
        font-size: 12px;
        color: #8AAABB;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .form-control {
        width: 100%;
        padding: 8px 12px;
        background: rgba(11, 16, 33, 0.8);
        border: 1px solid #3A5A7A;
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        outline: none;
        transition: border-color 0.2s;
      }

      .form-control:focus,
      .form-control:hover {
        border-color: #4A90D9;
      }

      .slider-row {
        margin-bottom: 10px;
      }

      .slider-row:last-child {
        margin-bottom: 0;
      }

      .slider-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
      }

      .slider-header span:first-child {
        font-size: 12px;
        color: #8AAABB;
        font-weight: 600;
        width: 20px;
      }

      .slider-header span:last-child {
        font-size: 12px;
        color: #4A90D9;
        font-family: "SF Mono", "Monaco", "Consolas", monospace;
        min-width: 42px;
        text-align: right;
      }

      .slider {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        border-radius: 2px;
        background: rgba(58, 90, 122, 0.5);
        outline: none;
      }

      .slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4A90D9;
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 0 6px rgba(74, 144, 217, 0.5);
      }

      .slider::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #4A90D9;
        cursor: pointer;
        border: 2px solid #fff;
        box-shadow: 0 0 6px rgba(74, 144, 217, 0.5);
      }

      .footer-bar {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
        z-index: 10;
        background: linear-gradient(transparent, rgba(11, 16, 33, 0.8) 60%);
      }

      .btn {
        padding: 8px 16px;
        background: rgba(74, 144, 217, 0.9);
        border: 1px solid #4A90D9;
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
      }

      .btn:hover {
        background: rgba(74, 144, 217, 1);
      }

      .btn:active {
        transform: scale(0.97);
      }

      .btn-secondary {
        background: rgba(30, 42, 60, 0.9);
        border-color: #3A5A7A;
      }

      .btn-secondary:hover {
        background: rgba(58, 90, 122, 0.8);
        border-color: #4A90D9;
      }

      .share-code-box {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        background: rgba(11, 16, 33, 0.9);
        border: 1px solid #3A5A7A;
        border-radius: 6px;
      }

      .share-code-label {
        font-size: 12px;
        color: #8AAABB;
      }

      .share-code-value {
        font-size: 13px;
        color: #FFD700;
        font-family: "SF Mono", "Monaco", "Consolas", monospace;
        font-weight: 600;
        letter-spacing: 1px;
        min-width: 100px;
      }

      .input-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .share-code-input {
        width: 140px;
        padding: 7px 12px;
        background: rgba(11, 16, 33, 0.9);
        border: 1px solid #3A5A7A;
        border-radius: 6px;
        color: #fff;
        font-size: 13px;
        font-family: "SF Mono", "Monaco", "Consolas", monospace;
        letter-spacing: 1px;
        text-transform: uppercase;
        outline: none;
        transition: border-color 0.2s;
      }

      .share-code-input:focus {
        border-color: #FFD700;
      }

      .toast {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        padding: 10px 20px;
        background: rgba(74, 144, 217, 0.95);
        color: #fff;
        border-radius: 8px;
        font-size: 13px;
        z-index: 100;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s, transform 0.3s;
      }

      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      .toast.error {
        background: rgba(255, 68, 68, 0.95);
      }

      .toast.success {
        background: rgba(82, 196, 26, 0.95);
      }

      .c2d-label {
        color: #ffffff;
        font-size: 13px;
        font-weight: 600;
        text-shadow: 0 0 4px rgba(0,0,0,0.8), 0 1px 2px rgba(0,0,0,0.6);
        white-space: nowrap;
        pointer-events: none;
        padding: 1px 4px;
      }

      .c2d-label.angle {
        color: #FFD700;
        font-size: 14px;
      }

      @media (max-width: 768px) {
        .top-bar {
          padding: 12px;
        }

        .molecule-select {
          width: 160px;
          font-size: 13px;
          padding: 8px 10px;
        }

        .tips {
          display: none;
        }

        .edit-panel {
          right: 0;
          left: 0;
          top: auto;
          bottom: 0;
          width: 100%;
          height: 350px;
          max-height: 50vh;
          border-radius: 16px 16px 0 0;
          transform: translateY(100%);
          overflow-y: auto;
        }

        .edit-panel.show {
          transform: translateY(0);
        }

        .footer-bar {
          padding: 10px 12px;
          padding-bottom: calc(10px + env(safe-area-inset-bottom));
          position: absolute;
          bottom: 0;
        }

        .share-code-value {
          min-width: auto;
        }

        .share-code-input {
          width: 100px;
        }

        .btn {
          padding: 7px 12px;
          font-size: 12px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="scene-container"></div>

      <div class="top-bar">
        <select id="molecule-select" class="molecule-select">
          <option value="h2o">H₂O 水分子</option>
          <option value="co2">CO₂ 二氧化碳</option>
          <option value="ch4">CH₄ 甲烷</option>
          <option value="nh3">NH₃ 氨</option>
          <option value="c2h6">C₂H₆ 乙烷</option>
          <option value="c6h6">C₆H₆ 苯</option>
        </select>
        <div class="tips">拖拽旋转 | 滚轮缩放 | Shift+拖拽平移</div>
      </div>

      <aside id="edit-panel" class="edit-panel">
        <div class="panel-title">
          <h3 id="panel-atom-name">原子编辑</h3>
          <button id="panel-close" class="panel-close">&times;</button>
        </div>

        <div class="form-group">
          <label>原子类型</label>
          <select id="atom-type" class="form-control">
            <option value="H">H - 氢</option>
            <option value="C">C - 碳</option>
            <option value="N">N - 氮</option>
            <option value="O">O - 氧</option>
            <option value="S">S - 硫</option>
            <option value="P">P - 磷</option>
          </select>
        </div>

        <div class="form-group">
          <label>位置坐标</label>
          <div class="slider-row">
            <div class="slider-header"><span>X</span><span id="pos-x-val">0.00</span></div>
            <input type="range" id="pos-x" class="slider" min="-5" max="5" step="0.1" value="0" />
          </div>
          <div class="slider-row">
            <div class="slider-header"><span>Y</span><span id="pos-y-val">0.00</span></div>
            <input type="range" id="pos-y" class="slider" min="-5" max="5" step="0.1" value="0" />
          </div>
          <div class="slider-row">
            <div class="slider-header"><span>Z</span><span id="pos-z-val">0.00</span></div>
            <input type="range" id="pos-z" class="slider" min="-5" max="5" step="0.1" value="0" />
          </div>
        </div>
      </aside>

      <footer class="footer-bar">
        <button id="btn-export" class="btn">导出场景</button>
        <div class="share-code-box">
          <span class="share-code-label">分享码:</span>
          <span id="share-code" class="share-code-value">--------</span>
        </div>
        <div class="input-group">
          <input id="load-input" type="text" class="share-code-input" maxlength="8" placeholder="输入分享码" />
          <button id="btn-load" class="btn btn-secondary">加载</button>
        </div>
      </footer>

      <div id="toast" class="toast"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
