<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VortexGallery - 3D 艺术画廊</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #start-hint {
      position: absolute;
      left: 50%;
      bottom: 15%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.75);
      font-size: 24px;
      letter-spacing: 2px;
      pointer-events: none;
      opacity: 1;
      transition: opacity 1.5s ease;
      z-index: 10;
      text-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    #start-hint.fade-out {
      opacity: 0;
    }
    #modal-overlay {
      position: absolute;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
      cursor: pointer;
    }
    #modal-overlay.active {
      display: flex;
    }
    #modal-content {
      position: relative;
      max-width: 80vw;
      max-height: 80vh;
      cursor: default;
    }
    #modal-image {
      max-width: 80vw;
      max-height: 70vh;
      object-fit: contain;
      display: block;
      box-shadow: 0 0 60px rgba(255, 255, 255, 0.1);
    }
    #modal-info {
      position: absolute;
      top: -48px;
      left: 0;
      color: rgba(255, 255, 255, 0.9);
    }
    #modal-title {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    #modal-desc {
      font-size: 14px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="start-hint">点击开始漫游</div>
    <div id="modal-overlay">
      <div id="modal-content">
        <div id="modal-info">
          <div id="modal-title"></div>
          <div id="modal-desc"></div>
        </div>
        <img id="modal-image" alt="artwork" />
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
