<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>古生物化石三维交互展示</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: linear-gradient(to bottom, #2a2a2a 0%, #0d0d0d 100%);
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 60px;
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .timeline-container {
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .timeline-connector {
      width: 60px;
      height: 2px;
      background: rgba(255, 255, 255, 0.2);
    }

    .timeline-node {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      position: relative;
      z-index: 2;
    }

    .timeline-dot {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #555;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      transition: all 0.3s ease;
      border: 2px solid transparent;
    }

    .timeline-node:hover .timeline-dot {
      transform: scale(1.1);
      background: #666;
    }

    .timeline-node.active .timeline-dot {
      background: #e8a820;
      box-shadow: 0 0 20px rgba(232, 168, 32, 0.5);
    }

    .timeline-label {
      margin-top: 4px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      white-space: nowrap;
      transition: color 0.2s;
    }

    .timeline-node.active .timeline-label {
      color: #e8a820;
      font-weight: 500;
    }

    .timeline-highlight {
      position: absolute;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e8a820;
      opacity: 0.3;
      z-index: 1;
      transition: left 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      pointer-events: none;
    }

    .toolbar {
      position: fixed;
      top: 60px;
      right: 0;
      width: 160px;
      height: calc(100% - 60px);
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-left: 1px solid rgba(255, 255, 255, 0.1);
      z-index: 90;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toolbar-title {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .tool-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(85, 85, 85, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .tool-btn:hover {
      background: rgba(100, 100, 100, 0.4);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .tool-btn:active {
      transform: translateY(2px);
    }

    .tool-btn.active {
      background: rgba(70, 150, 255, 0.3);
      border-color: rgba(70, 150, 255, 0.6);
      color: #fff;
    }

    .tool-btn-icon {
      font-size: 16px;
    }

    .cut-plane-slider {
      margin-top: 8px;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      display: none;
    }

    .cut-plane-slider.visible {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .slider-label {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 8px;
    }

    .cut-slider {
      width: 100%;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
    }

    .cut-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4a9eff;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .cut-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .info-panel {
      position: fixed;
      bottom: 20px;
      right: 180px;
      width: 280px;
      background: rgba(10, 10, 10, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 20px;
      z-index: 80;
      overflow: hidden;
    }

    .info-panel-content {
      animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .fossil-name {
      font-family: 'Noto Serif SC', serif;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }

    .fossil-scientific {
      font-style: italic;
      font-size: 13px;
      color: #e8a820;
      margin-bottom: 16px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
    }

    .info-value {
      font-size: 12px;
      color: #e0e0e0;
      font-weight: 500;
      text-align: right;
      max-width: 60%;
    }

    .loading-indicator {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 60px;
      height: 60px;
      z-index: 200;
      display: none;
    }

    .loading-indicator.visible {
      display: block;
    }

    .loading-ring {
      width: 100%;
      height: 100%;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #e8a820;
      border-radius: 50%;
      animation: spin 0.3s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .annotations-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50;
    }

    .annotation {
      position: absolute;
      pointer-events: auto;
      transform: translate(-50%, -50%);
      transition: opacity 0.3s ease;
    }

    .annotation.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .annotation-box {
      background: rgba(10, 10, 10, 0.85);
      border: 1px solid rgba(232, 168, 32, 0.5);
      border-radius: 6px;
      padding: 8px 12px;
      min-width: 120px;
      cursor: pointer;
      transition: all 0.15s ease;
      opacity: 0.7;
    }

    .annotation-box:hover {
      transform: scale(1.1);
      opacity: 1;
      border-color: #e8a820;
      box-shadow: 0 4px 20px rgba(232, 168, 32, 0.3);
    }

    .annotation-title {
      font-size: 12px;
      font-weight: 600;
      color: #e8a820;
      margin-bottom: 2px;
    }

    .annotation-desc {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.3;
    }

    .annotation-line-svg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 45;
    }

    .annotation-line {
      stroke: rgba(232, 168, 32, 0.6);
      stroke-width: 1.5;
      fill: none;
      stroke-dasharray: 4 2;
    }

    .bone-info-card {
      position: fixed;
      background: rgba(10, 10, 10, 0.95);
      border: 1px solid rgba(70, 150, 255, 0.5);
      border-radius: 10px;
      padding: 16px;
      width: 240px;
      z-index: 150;
      pointer-events: auto;
      animation: fadeInScale 0.3s ease;
    }

    @keyframes fadeInScale {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .bone-card-close {
      position: absolute;
      top: 8px;
      right: 12px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .bone-card-close:hover {
      color: #fff;
    }

    .bone-card-title {
      font-size: 16px;
      font-weight: 600;
      color: #4a9eff;
      margin-bottom: 4px;
      padding-right: 20px;
    }

    .bone-card-scientific {
      font-style: italic;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 12px;
    }

    .bone-card-section {
      margin-bottom: 10px;
    }

    .bone-card-section-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }

    .bone-card-section-value {
      font-size: 12px;
      color: #e0e0e0;
      line-height: 1.5;
    }

    .mobile-toolbar-toggle {
      display: none;
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(10, 10, 10, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      z-index: 200;
      align-items: center;
      justify-content: center;
    }

    .mobile-toolbar {
      display: none;
      position: fixed;
      bottom: 80px;
      right: 20px;
      left: 20px;
      background: rgba(10, 10, 10, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      z-index: 190;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .top-nav {
        height: 45px;
      }

      .timeline-dot {
        width: 22px;
        height: 22px;
        font-size: 11px;
      }

      .timeline-connector {
        width: 35px;
      }

      .timeline-label {
        font-size: 9px;
      }

      .timeline-highlight {
        width: 22px;
        height: 22px;
      }

      .toolbar {
        display: none;
      }

      .mobile-toolbar-toggle {
        display: flex;
      }

      .mobile-toolbar.visible {
        display: block;
      }

      .info-panel {
        right: 20px;
        left: 20px;
        width: auto;
        bottom: 90px;
      }

      .annotation-box {
        min-width: 90px;
        padding: 6px 8px;
      }

      .annotation-title {
        font-size: 10px;
      }

      .annotation-desc {
        font-size: 9px;
      }
    }

    .title-bar {
      position: fixed;
      top: 15px;
      left: 24px;
      z-index: 101;
      font-family: 'Noto Serif SC', serif;
    }

    .title-bar h1 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 2px;
    }

    .title-bar p {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 2px;
    }

    @media (max-width: 768px) {
      .title-bar {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div class="title-bar">
      <h1>古生物化石展馆</h1>
      <p>探索六亿年生命演化历程</p>
    </div>

    <nav class="top-nav">
      <div class="timeline-container" id="timeline-container">
        <div class="timeline-highlight" id="timeline-highlight"></div>
      </div>
    </nav>

    <aside class="toolbar" id="toolbar">
      <div class="toolbar-title">工具栏</div>
      <button class="tool-btn" id="btn-cut-plane">
        <span class="tool-btn-icon">✂️</span>
        <span>剖面切割</span>
      </button>
      <div class="cut-plane-slider" id="cut-plane-slider">
        <div class="slider-label">切割位置: <span id="cut-value">50</span>%</div>
        <input type="range" class="cut-slider" id="cut-slider" min="0" max="100" value="50">
      </div>
      <button class="tool-btn active" id="btn-annotations">
        <span class="tool-btn-icon">📍</span>
        <span>显示标注</span>
      </button>
      <button class="tool-btn" id="btn-reset-view">
        <span class="tool-btn-icon">🔄</span>
        <span>重置视角</span>
      </button>
    </aside>

    <div class="mobile-toolbar-toggle" id="mobile-toolbar-toggle">⚙️</div>
    <div class="mobile-toolbar" id="mobile-toolbar">
      <div class="toolbar-title">工具栏</div>
      <button class="tool-btn" id="mobile-btn-cut-plane">
        <span class="tool-btn-icon">✂️</span>
        <span>剖面切割</span>
      </button>
      <div class="cut-plane-slider" id="mobile-cut-plane-slider">
        <div class="slider-label">切割位置: <span id="mobile-cut-value">50</span>%</div>
        <input type="range" class="cut-slider" id="mobile-cut-slider" min="0" max="100" value="50">
      </div>
      <button class="tool-btn active" id="mobile-btn-annotations">
        <span class="tool-btn-icon">📍</span>
        <span>显示标注</span>
      </button>
      <button class="tool-btn" id="mobile-btn-reset-view">
        <span class="tool-btn-icon">🔄</span>
        <span>重置视角</span>
      </button>
    </div>

    <div class="info-panel" id="info-panel">
      <div class="info-panel-content" id="info-panel-content">
        <div class="fossil-name">-</div>
        <div class="fossil-scientific">-</div>
        <div class="info-row">
          <span class="info-label">生存年代</span>
          <span class="info-value">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">化石尺寸</span>
          <span class="info-value">-</span>
        </div>
        <div class="info-row">
          <span class="info-label">发现地点</span>
          <span class="info-value">-</span>
        </div>
      </div>
    </div>

    <div class="loading-indicator" id="loading-indicator">
      <div class="loading-ring"></div>
    </div>

    <div class="annotations-container" id="annotations-container">
      <svg class="annotation-line-svg" id="annotation-line-svg"></svg>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
