<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D地形生成与水位模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
    }

    body {
      background: linear-gradient(180deg, #0a0a2e 0%, #000000 100%);
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(100, 180, 255, 0.2);
      border-top: 3px solid #81d4fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(129, 212, 250, 0.5);
    }

    .loading-text {
      color: #81d4fa;
      font-size: 16px;
      text-shadow: 0 0 10px rgba(129, 212, 250, 0.8);
      letter-spacing: 2px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #loading.hidden {
      display: none;
    }

    #info-panel {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(10, 10, 46, 0.7);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 180, 255, 0.3);
      border-radius: 12px;
      padding: 15px 25px;
      color: #81d4fa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 13px;
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.15),
                  inset 0 0 20px rgba(100, 180, 255, 0.05);
      text-shadow: 0 0 8px rgba(129, 212, 250, 0.6);
      letter-spacing: 0.5px;
      min-width: 320px;
      text-align: center;
    }

    #info-panel .info-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 4px 0;
    }

    #info-panel .info-label {
      color: rgba(129, 212, 250, 0.7);
    }

    #info-panel .info-value {
      font-weight: bold;
    }

    #snapshot-toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 200;
      background: rgba(10, 10, 46, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 180, 255, 0.5);
      border-radius: 12px;
      padding: 20px 40px;
      color: #81d4fa;
      font-family: 'Courier New', Courier, monospace;
      font-size: 16px;
      text-shadow: 0 0 10px rgba(129, 212, 250, 0.8);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    #snapshot-toast.visible {
      opacity: 1;
    }

    #snapshot-toast.fade-out {
      opacity: 0;
      transition: opacity 1.5s ease;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="loading">
      <div class="spinner"></div>
      <div class="loading-text">LOADING...</div>
    </div>
    <div id="info-panel">
      <div class="info-row">
        <span class="info-label">地形幅度:</span>
        <span class="info-value" id="info-amplitude">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">地形频率:</span>
        <span class="info-value" id="info-frequency">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">随机种子:</span>
        <span class="info-value" id="info-seed">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">水位高度:</span>
        <span class="info-value" id="info-water">-</span>
      </div>
      <div class="info-row">
        <span class="info-label">帧率 FPS:</span>
        <span class="info-value" id="info-fps">-</span>
      </div>
    </div>
    <div id="snapshot-toast">快照已保存!</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
