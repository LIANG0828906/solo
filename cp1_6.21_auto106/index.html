<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>极光粒子沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #E0E0E0;
    }

    #root {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .control-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 220px;
      height: 100%;
      background: rgba(26, 26, 46, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-left: 1px solid rgba(0, 188, 212, 0.2);
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 100;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 600;
      color: #00BCD4;
      letter-spacing: 1px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0, 188, 212, 0.2);
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-label {
      font-size: 13px;
      color: #E0E0E0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .control-value {
      color: #00BCD4;
      font-weight: 500;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: #333;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00BCD4;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
      transition: transform 0.1s ease, box-shadow 0.1s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.1);
      box-shadow: 0 0 15px rgba(0, 188, 212, 0.7);
    }

    input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(0.95);
    }

    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #00BCD4;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 188, 212, 0.5);
    }

    select {
      width: 100%;
      padding: 10px 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(0, 188, 212, 0.3);
      border-radius: 8px;
      color: #E0E0E0;
      font-size: 13px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    select:hover {
      border-color: rgba(0, 188, 212, 0.6);
      box-shadow: 0 0 8px rgba(0, 188, 212, 0.2);
    }

    select:focus {
      border-color: #00BCD4;
      box-shadow: 0 0 12px rgba(0, 188, 212, 0.3);
    }

    select option {
      background: #1A1A2E;
      color: #E0E0E0;
    }

    .btn-reset {
      width: 100%;
      padding: 12px;
      background: #E91E63;
      color: #FFFFFF;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s ease, box-shadow 0.15s ease;
      margin-top: auto;
    }

    .btn-reset:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 20px rgba(233, 30, 99, 0.4);
    }

    .btn-reset:active {
      transform: scale(0.98);
    }

    .view-indicator {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.25);
      background: rgba(26, 26, 46, 0.4);
      backdrop-filter: blur(8px);
      z-index: 50;
      pointer-events: none;
    }

    .view-indicator-dot {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #FFFFFF;
      box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
