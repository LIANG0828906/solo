<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>星云粒子雕刻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #fff;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      position: fixed;
      left: 20px;
      top: 20px;
      width: 320px;
      max-height: calc(100vh - 160px);
      overflow-y: auto;
      padding: 24px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      z-index: 100;
      transform: none;
      transition: transform 0.3s ease;
    }

    .control-panel::-webkit-scrollbar {
      width: 6px;
    }

    .control-panel::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
    }

    .control-panel::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #ff6b35, #6b35ff);
      border-radius: 3px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
      background: linear-gradient(90deg, #ff6b35, #6b35ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slider-group {
      margin-bottom: 20px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      color: #ccc;
      font-size: 14px;
    }

    .slider-value {
      font-family: 'SF Mono', Monaco, Consolas, monospace;
      font-size: 13px;
      color: #ff6b35;
      font-weight: 500;
    }

    .custom-slider {
      position: relative;
      width: 100%;
      height: 24px;
      cursor: pointer;
    }

    .slider-track {
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .slider-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, #6b35ff);
      border-radius: 2px;
      transition: width 0.1s ease;
    }

    .slider-thumb {
      position: absolute;
      top: 50%;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      pointer-events: none;
    }

    .custom-slider:hover .slider-thumb {
      transform: translate(-50%, -50%) scale(1.2);
      box-shadow: 0 4px 12px rgba(255, 107, 53, 0.4);
    }

    .color-mode-selector {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .color-option {
      flex: 1;
      padding: 10px 8px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      color: #ccc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: center;
    }

    .color-option:hover {
      background: rgba(255, 107, 53, 0.1);
      border-color: rgba(255, 107, 53, 0.3);
    }

    .color-option.active {
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(107, 53, 255, 0.2));
      border-color: #ff6b35;
      color: #fff;
    }

    .preset-buttons {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 100;
    }

    .preset-btn {
      padding: 12px 24px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .preset-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.2), transparent);
      transition: left 0.5s ease;
    }

    .preset-btn:hover {
      transform: translateY(-2px);
      border-color: #ff6b35;
      color: #fff;
      box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
    }

    .preset-btn:hover::before {
      left: 100%;
    }

    .preset-btn.active {
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.3), rgba(107, 53, 255, 0.3));
      border-color: #ff6b35;
    }

    .particle-tooltip {
      position: fixed;
      width: 160px;
      padding: 12px;
      background: rgba(20, 20, 20, 0.9);
      border: 1px solid #555;
      border-radius: 8px;
      font-size: 12px;
      pointer-events: none;
      z-index: 200;
      transform-origin: center center;
      animation: tooltipIn 0.2s ease forwards;
    }

    .particle-tooltip.closing {
      animation: tooltipOut 0.2s ease forwards;
    }

    @keyframes tooltipIn {
      from {
        opacity: 0;
        transform: scale(0.5);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes tooltipOut {
      from {
        opacity: 1;
        transform: scale(1);
      }
      to {
        opacity: 0;
        transform: scale(0.5);
      }
    }

    .tooltip-title {
      color: #ff6b35;
      font-weight: 600;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .tooltip-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      color: #aaa;
    }

    .tooltip-value {
      color: #fff;
      font-family: 'SF Mono', Monaco, Consolas, monospace;
    }

    .hamburger-btn {
      display: none;
      position: fixed;
      top: 20px;
      left: 20px;
      width: 44px;
      height: 44px;
      background: rgba(30, 30, 30, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      cursor: pointer;
      z-index: 101;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 4px;
      transition: all 0.3s ease;
    }

    .hamburger-btn:hover {
      border-color: #ff6b35;
    }

    .hamburger-line {
      width: 20px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
      transition: all 0.3s ease;
    }

    .hamburger-btn.active .hamburger-line:nth-child(1) {
      transform: rotate(45deg) translate(4px, 4px);
    }

    .hamburger-btn.active .hamburger-line:nth-child(2) {
      opacity: 0;
    }

    .hamburger-btn.active .hamburger-line:nth-child(3) {
      transform: rotate(-45deg) translate(4px, -4px);
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 99;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .overlay.active {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .hamburger-btn {
        display: flex;
      }

      .control-panel {
        left: 0;
        top: 0;
        height: 100vh;
        max-height: 100vh;
        border-radius: 0 12px 12px 0;
        transform: translateX(-100%);
        z-index: 100;
      }

      .control-panel.active {
        transform: translateX(0);
      }

      .overlay.active {
        display: block;
      }

      .preset-buttons {
        bottom: 16px;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
        max-width: 90vw;
      }

      .preset-btn {
        padding: 10px 16px;
        font-size: 13px;
      }

      .particle-tooltip {
        width: 140px;
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>
    <button class="hamburger-btn" id="hamburgerBtn" aria-label="菜单">
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
      <span class="hamburger-line"></span>
    </button>
    <div class="overlay" id="overlay"></div>
    <div class="control-panel" id="controlPanel">
      <h2 class="panel-title">星云粒子雕刻</h2>
      <div id="sliderContainer"></div>
    </div>
    <div class="preset-buttons" id="presetButtons"></div>
    <div id="tooltipContainer"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
