<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音乐可视化播放器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #1a1a2e;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    h1 {
      font-size: 30px;
      font-weight: bold;
      color: #fff;
      text-align: center;
    }

    .upload-area {
      width: 400px;
      height: 100px;
      border: 2px dashed rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: rgba(255, 255, 255, 0.05);
    }

    .upload-area:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .upload-area.dragover {
      border-color: #667eea;
      background: rgba(102, 126, 234, 0.1);
    }

    .upload-area p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }

    .upload-area input {
      display: none;
    }

    canvas {
      width: 800px;
      height: 450px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.3);
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      width: 100%;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
    }

    .control-group label {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .control-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.2);
      outline: none;
      -webkit-appearance: none;
    }

    .control-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      cursor: pointer;
      transition: transform 0.2s ease;
    }

    .control-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .control-group select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .control-group select:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
    }

    .presets {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
    }

    .preset-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
    }

    .preset-japanese {
      background: #87ceeb;
      color: #333;
    }

    .preset-cyberpunk {
      background: #ff00ff;
      color: #fff;
    }

    .preset-darktech {
      background: #0a0a0a;
      color: #fff;
      border: 1px solid #333;
    }

    .progress-container {
      width: 100%;
      height: 30px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 8px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .action-buttons {
      display: flex;
      gap: 15px;
    }

    .action-btn {
      padding: 12px 30px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }

    .action-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
    }

    .value-display {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 768px) {
      canvas {
        width: 100%;
        height: auto;
        aspect-ratio: 16/9;
      }

      .upload-area {
        width: 100%;
      }

      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .control-group {
        width: 100%;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎵 音乐可视化播放器</h1>
    
    <div class="upload-area" id="uploadArea">
      <input type="file" id="fileInput" accept="audio/*">
      <p>拖拽音频文件到此处，或点击选择文件</p>
    </div>

    <canvas id="visualizer" width="800" height="450"></canvas>

    <div class="controls">
      <div class="control-group">
        <label>粒子密度</label>
        <input type="range" id="density" min="50" max="500" value="200">
        <span class="value-display" id="densityValue">200</span>
      </div>
      <div class="control-group">
        <label>频谱敏感度</label>
        <input type="range" id="sensitivity" min="0.5" max="3.0" step="0.1" value="1.5">
        <span class="value-display" id="sensitivityValue">1.5</span>
      </div>
      <div class="control-group">
        <label>混合模式</label>
        <select id="blendMode">
          <option value="lighter">叠加 (Lighter)</option>
          <option value="screen">滤色 (Screen)</option>
          <option value="overlay">叠加 (Overlay)</option>
          <option value="source-over">正常 (Normal)</option>
        </select>
      </div>
    </div>

    <div class="presets">
      <button class="preset-btn preset-japanese" data-theme="japanese">日系清新</button>
      <button class="preset-btn preset-cyberpunk" data-theme="cyberpunk">赛博朋克</button>
      <button class="preset-btn preset-darktech" data-theme="darktech">暗黑科技</button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="action-buttons">
      <button class="action-btn" id="playPauseBtn">⏸️ 暂停</button>
      <button class="action-btn" id="screenshotBtn">📸 截图保存</button>
    </div>
  </div>

  <script>
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const canvas = document.getElementById('visualizer');
    const ctx = canvas.getContext('2d');
    const densitySlider = document.getElementById('density');
    const densityValue = document.getElementById('densityValue');
    const sensitivitySlider = document.getElementById('sensitivity');
    const sensitivityValue = document.getElementById('sensitivityValue');
    const blendModeSelect = document.getElementById('blendMode');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const screenshotBtn = document.getElementById('screenshotBtn');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const presetBtns = document.querySelectorAll('.preset-btn');

    let audioContext;
    let analyser;
    let source;
    let audioElement;
    let isPlaying = false;
    let particles = [];
    let themeColors = {
      primary: '#667eea',
      secondary: '#764ba2',
      background: 'rgba(26, 26, 46, 0.1)'
    };

    const themes = {
      japanese: { primary: '#87ceeb', secondary: '#e0f7fa', background: 'rgba(135, 206, 235, 0.1)' },
      cyberpunk: { primary: '#ff00ff', secondary: '#00ffff', background: 'rgba(255, 0, 255, 0.1)' },
      darktech: { primary: '#00ff88', secondary: '#004422', background: 'rgba(10, 10, 10, 0.1)' }
    };

    class Particle {
      constructor() {
        this.reset();
      }
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speedX = (Math.random() - 0.5) * 2;
        this.speedY = (Math.random() - 0.5) * 2;
        this.opacity = Math.random() * 0.5 + 0.3;
      }
      update(frequencyValue) {
        const sensitivity = parseFloat(sensitivitySlider.value);
        this.x += this.speedX * (1 + frequencyValue * sensitivity * 0.01);
        this.y += this.speedY * (1 + frequencyValue * sensitivity * 0.01);
        this.size = Math.max(1, Math.min(8, this.size + (frequencyValue * sensitivity * 0.001 - 0.005)));
        
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
        gradient.addColorStop(0, themeColors.primary);
        gradient.addColorStop(1, themeColors.secondary);
        ctx.fillStyle = gradient;
        ctx.globalAlpha = this.opacity;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    function initParticles() {
      const count = parseInt(densitySlider.value);
      particles = [];
      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function handleFile(file) {
      if (!file.type.startsWith('audio/')) {
        alert('请选择音频文件');
        return;
      }

      if (audioElement) {
        audioElement.pause();
        audioElement.src = '';
      }

      audioElement = new Audio();
      audioElement.src = URL.createObjectURL(file);
      
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 256;
        source = audioContext.createMediaElementSource(audioElement);
        source.connect(analyser);
        analyser.connect(audioContext.destination);
      }

      audioElement.play().then(() => {
        isPlaying = true;
        playPauseBtn.textContent = '⏸️ 暂停';
        animate();
      }).catch(err => console.log('播放失败:', err));

      audioElement.addEventListener('timeupdate', updateProgress);
      audioElement.addEventListener('ended', () => {
        isPlaying = false;
        playPauseBtn.textContent = '▶️ 播放';
      });
    }

    function updateProgress() {
      if (audioElement && audioElement.duration) {
        const percent = (audioElement.currentTime / audioElement.duration) * 100;
        progressBar.style.width = percent + '%';
      }
    }

    function animate() {
      if (!isPlaying) return;
      requestAnimationFrame(animate);

      const bufferLength = analyser.frequencyBinCount;
      const dataArray = new Uint8Array(bufferLength);
      analyser.getByteFrequencyData(dataArray);

      ctx.fillStyle = themeColors.background;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = blendModeSelect.value;

      const avgFrequency = dataArray.reduce((a, b) => a + b, 0) / bufferLength;

      particles.forEach(particle => {
        particle.update(avgFrequency);
        particle.draw();
      });

      const barWidth = canvas.width / bufferLength;
      for (let i = 0; i < bufferLength; i++) {
        const barHeight = dataArray[i] * parseFloat(sensitivitySlider.value) * 0.5;
        const gradient = ctx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
        gradient.addColorStop(0, themeColors.primary);
        gradient.addColorStop(1, themeColors.secondary);
        ctx.fillStyle = gradient;
        ctx.globalAlpha = 0.6;
        ctx.fillRect(i * barWidth, canvas.height - barHeight, barWidth - 1, barHeight);
      }
      ctx.globalAlpha = 1;
      ctx.globalCompositeOperation = 'source-over';
    }

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      if (e.dataTransfer.files.length) {
        handleFile(e.dataTransfer.files[0]);
      }
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        handleFile(e.target.files[0]);
      }
    });

    densitySlider.addEventListener('input', () => {
      densityValue.textContent = densitySlider.value;
      initParticles();
    });
    sensitivitySlider.addEventListener('input', () => {
      sensitivityValue.textContent = sensitivitySlider.value;
    });

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        const theme = themes[btn.dataset.theme];
        themeColors = { ...theme };
      });
    });

    playPauseBtn.addEventListener('click', () => {
      if (!audioElement) return;
      if (isPlaying) {
        audioElement.pause();
        isPlaying = false;
        playPauseBtn.textContent = '▶️ 播放';
      } else {
        audioElement.play();
        isPlaying = true;
        playPauseBtn.textContent = '⏸️ 暂停';
        animate();
      }
    });

    screenshotBtn.addEventListener('click', () => {
      const link = document.createElement('a');
      link.download = `visualizer-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    });

    progressContainer.addEventListener('click', (e) => {
      if (!audioElement || !audioElement.duration) return;
      const rect = progressContainer.getBoundingClientRect();
      const percent = (e.clientX - rect.left) / rect.width;
      audioElement.currentTime = percent * audioElement.duration;
    });

    initParticles();

    function drawIdle() {
      ctx.fillStyle = 'rgba(26, 26, 46, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = blendModeSelect.value;
      
      particles.forEach(particle => {
        particle.update(50);
        particle.draw();
      });
      
      ctx.globalCompositeOperation = 'source-over';
      if (!isPlaying) requestAnimationFrame(drawIdle);
    }
    drawIdle();
  </script>
</body>
</html>
