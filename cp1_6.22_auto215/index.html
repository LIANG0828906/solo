<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>活动转化漏斗看板</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: #0F172A; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .loading-screen {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #0F172A; z-index: 9999; transition: opacity 0.5s;
      }
      .loading-screen.fade-out { opacity: 0; pointer-events: none; }
      .loading-spinner {
        width: 48px; height: 48px; border: 3px solid #334155;
        border-top-color: #3B82F6; border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-screen" id="loading-screen">
        <div class="loading-spinner"></div>
      </div>
    </div>
    <script type="module" src="/client/src/main.tsx"></script>
  </body>
</html>
