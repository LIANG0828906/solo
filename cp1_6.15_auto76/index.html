<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全球洋流与海洋温度可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: linear-gradient(180deg, #000814 0%, #001428 50%, #000814 100%); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #E0E0FF; }
    #app { width: 100vw; height: 100vh; position: relative; }
    #canvas-container { width: 100%; height: 100%; }
    .glass-panel {
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(100, 200, 255, 0.3);
      border-radius: 12px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
