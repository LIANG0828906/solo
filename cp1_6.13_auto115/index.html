<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EchoPhase - 回合制潜行对战</title>
  <style>
    /* ========== 全局重置与基础样式 ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      font-family: 'Courier New', monospace;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      min-width: 1280px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1a 50%, #0a0a0f 100%);
    }

    /* ========== Canvas画布区域：1920x1080响应式适配 ========== */
    #game-canvas {
      display: block;
      width: calc(100vh * 1);
      max-width: calc(100vw - 520px);
      min-width: 720px;
      height: auto;
      aspect-ratio: 1 / 1;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      box-shadow: 0 0 60px rgba(74, 144, 217, 0.15), 0 0 120px rgba(217, 74, 74, 0.1);
      border-radius: 8px;
    }

    .ui-overlay {
      position: absolute;
      pointer-events: none;
    }

    /* ========== UI面板：毛玻璃效果增强 ========== */
    .ui-panel {
      background: rgba(10, 10, 20, 0.72);
      backdrop-filter: blur(12px) saturate(180%);
      -webkit-backdrop-filter: blur(12px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      color: #ffffff;
      box-shadow:
        0 4px 30px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 255, 255, 0.06),
        inset 0 0 20px rgba(0, 0, 0, 0.3);
    }

    /* ========== 玩家面板：1920x1080响应式适配 ========== */
    #player1-panel {
      position: absolute;
      left: clamp(10px, 1.5vw, 30px);
      top: 50%;
      transform: translateY(-50%);
      width: clamp(180px, 14vw, 260px);
      padding: clamp(12px, 1vw, 20px);
      pointer-events: auto;
    }

    #player2-panel {
      position: absolute;
      right: clamp(10px, 1.5vw, 30px);
      top: 50%;
      transform: translateY(-50%);
      width: clamp(180px, 14vw, 260px);
      padding: clamp(12px, 1vw, 20px);
      pointer-events: auto;
    }

    #bottom-panel {
      position: absolute;
      bottom: clamp(10px, 1.5vw, 30px);
      left: 50%;
      transform: translateX(-50%);
      padding: clamp(10px, 0.8vw, 18px) clamp(24px, 2vw, 40px);
      text-align: center;
      pointer-events: auto;
    }

    /* ========== 面板标题：白色微光字体 + 发光效果 ========== */
    .panel-title {
      font-size: clamp(16px, 1.1vw, 22px);
      font-weight: bold;
      margin-bottom: 12px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.3),
        0 0 2px rgba(255, 255, 255, 0.5),
        0 0 15px currentColor,
        0 0 30px currentColor;
      letter-spacing: 2px;
    }

    .player1-color {
      color: #4A90D9;
    }

    .player2-color {
      color: #D94A4A;
    }

    /* ========== HP条：渐变填充 + 微光边框 + 低血量脉冲 ========== */
    .hp-bar {
      width: 100%;
      height: clamp(14px, 1vh, 20px);
      background: rgba(0, 0, 0, 0.6);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 8px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow:
        inset 0 0 8px rgba(0, 0, 0, 0.5),
        0 0 4px rgba(255, 255, 255, 0.05);
    }

    .hp-fill {
      height: 100%;
      transition: width 0.4s ease, background 0.4s ease;
      border-radius: 10px;
      position: relative;
      background: linear-gradient(90deg, currentColor 0%, rgba(255, 255, 255, 0.6) 100%);
      box-shadow: 0 0 10px currentColor, inset 0 0 8px rgba(255, 255, 255, 0.2);
    }

    /* HP条内部微光效果 */
    .hp-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.3) 0%, transparent 100%);
      border-radius: 10px 10px 0 0;
      pointer-events: none;
    }

    /* 低血量时(<30%)的红色脉冲效果 */
    .hp-fill.hp-low {
      animation: hpLowPulse 0.8s ease-in-out infinite alternate;
      background: linear-gradient(90deg, #ff1a1a 0%, #ff6b6b 100%) !important;
    }

    @keyframes hpLowPulse {
      0% {
        box-shadow: 0 0 10px rgba(255, 26, 26, 0.6), inset 0 0 8px rgba(255, 255, 255, 0.2);
      }
      100% {
        box-shadow: 0 0 25px rgba(255, 26, 26, 1), 0 0 40px rgba(255, 26, 26, 0.6), inset 0 0 8px rgba(255, 255, 255, 0.3);
      }
    }

    /* ========== HP文字：白色微光 ========== */
    .hp-text {
      font-size: clamp(12px, 0.8vw, 16px);
      margin-bottom: 12px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.3),
        0 0 2px rgba(255, 255, 255, 0.5);
    }

    .status-icon {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* ========== 状态行：白色微光 ========== */
    .status-row {
      display: flex;
      align-items: center;
      font-size: clamp(11px, 0.75vw, 14px);
      margin-bottom: 6px;
      opacity: 0.95;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.25),
        0 0 2px rgba(255, 255, 255, 0.45);
    }

    .inventory {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .inventory-title {
      font-size: clamp(11px, 0.7vw, 14px);
      opacity: 0.75;
      margin-bottom: 8px;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.2),
        0 0 1px rgba(255, 255, 255, 0.4);
    }

    .inventory-slots {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .inventory-slot {
      width: clamp(28px, 2vw, 36px);
      height: clamp(28px, 2vw, 36px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(14px, 1vw, 18px);
    }

    /* ========== 统计行：白色微光 ========== */
    .stats {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: clamp(11px, 0.7vw, 14px);
      opacity: 0.85;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 4px;
      text-shadow:
        0 0 6px rgba(255, 255, 255, 0.2),
        0 0 1px rgba(255, 255, 255, 0.4);
    }

    /* ========== 回合指示器：微光增强 ========== */
    .turn-indicator {
      font-size: clamp(18px, 1.3vw, 26px);
      font-weight: bold;
      margin-bottom: 8px;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.3),
        0 0 2px rgba(255, 255, 255, 0.5),
        0 0 20px currentColor,
        0 0 40px currentColor;
      letter-spacing: 3px;
    }

    /* ========== 控制提示：白色微光 ========== */
    .controls-hint {
      font-size: clamp(10px, 0.7vw, 13px);
      opacity: 0.7;
      margin-top: 8px;
      text-shadow:
        0 0 5px rgba(255, 255, 255, 0.2),
        0 0 1px rgba(255, 255, 255, 0.35);
    }

    /* ========== 通用按钮：白色微光文字 ========== */
    .btn {
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.35), rgba(217, 74, 74, 0.35));
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #fff;
      padding: clamp(
