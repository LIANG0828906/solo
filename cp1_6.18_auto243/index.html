<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>太空舰队对战</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(180deg, #111827, #1F2937);
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #E5E7EB;
    }
    #command-bar {
      width: 1200px;
      height: 48px;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 24px;
      user-select: none;
      z-index: 10;
    }
    #reset-btn {
      width: 80px;
      height: 32px;
      border: none;
      border-radius: 6px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    #reset-btn:hover {
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
    }
    .stat-label {
      font-size: 14px;
      color: #9CA3AF;
    }
    .stat-value {
      font-size: 18px;
      color: #fff;
      font-weight: 600;
    }
    #timer {
      margin-left: auto;
      font-size: 18px;
      color: #fff;
      font-variant-numeric: tabular-nums;
    }
    #canvas-container {
      position: relative;
      width: 1200px;
      height: 800px;
    }
    #gameCanvas {
      display: block;
      background: #0B0E14;
      cursor: crosshair;
    }
    #result-panel {
      display: none;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 40px 60px;
      text-align: center;
      z-index: 20;
    }
    #result-panel h2 {
      font-size: 28px;
      margin-bottom: 16px;
      color: #fff;
    }
    #result-panel .result-detail {
      font-size: 16px;
      color: #D1D5DB;
      margin-bottom: 8px;
    }
    #restart-btn {
      margin-top: 24px;
      width: 120px;
      height: 40px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #6366F1, #4F46E5);
      color: #fff;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: box-shadow 0.2s;
    }
    #restart-btn:hover {
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.6);
    }
  </style>
</head>
<body>
  <div id="command-bar">
    <button id="reset-btn">重置</button>
    <span class="stat-label">选中: <span id="sel-count" class="stat-value">0</span></span>
    <span class="stat-label">玩家血量: <span id="player-hp" class="stat-value">0</span></span>
    <span class="stat-label">AI血量: <span id="ai-hp" class="stat-value">0</span></span>
    <span id="timer">00:00</span>
  </div>
  <div id="canvas-container">
    <canvas id="gameCanvas" width="1200" height="800"></canvas>
    <div id="result-panel">
      <h2 id="result-title"></h2>
      <div class="result-detail" id="result-player"></div>
      <div class="result-detail" id="result-ai"></div>
      <button id="restart-btn">再来一局</button>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
