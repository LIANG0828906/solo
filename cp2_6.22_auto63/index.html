<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三维城市风环境与污染物扩散模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #vignette-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(ellipse at center, transparent 55%, rgba(5,8,20,0.7) 100%);
    }
    #info-hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 210, 240, 0.7);
      font-size: 13px;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>
  <div id="vignette-overlay"></div>
  <div id="info-hint">点击场景放置污染物释放点 | 鼠标拖拽旋转视角 | 滚轮缩放</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
