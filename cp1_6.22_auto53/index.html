<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>赛车物理模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .new-record-flash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: linear-gradient(45deg, 
        rgba(255, 215, 0, 0) 0%, 
        rgba(255, 215, 0, 0.3) 50%, 
        rgba(255, 215, 0, 0) 100%);
      background-size: 400% 400%;
      animation: goldFlash 0.5s ease-out;
      opacity: 0;
      z-index: 1000;
    }

    @keyframes goldFlash {
      0% {
        opacity: 0;
        background-position: 0% 50%;
      }
      50% {
        opacity: 1;
        background-position: 100% 50%;
      }
      100% {
        opacity: 0;
        background-position: 0% 50%;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>
  <div id="new-record-flash" class="new-record-flash"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
