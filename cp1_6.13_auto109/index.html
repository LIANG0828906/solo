<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1024" />
  <title>SoundWave - 音频可视化与节奏游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 1024px;
      overflow: hidden;
      background: #0a0a1a;
      color: #e0e0ff;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .ui-overlay {
      position: absolute;
      pointer-events: none;
      z-index: 10;
    }

    .ui-overlay > * {
      pointer-events: auto;
    }

    .top-left {
      top: 20px;
      left: 20px;
    }

    .top-right {
      top: 20px;
      right: 20px;
      text-align: right;
    }

    .bottom-center {
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
    }

    .song-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .song-name {
      font-size: 16px;
      color: #e0e0ff;
      opacity: 0.9;
      max-width: 500px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .progress-container {
      width: 500px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00ffff, #9933ff);
      border-radius: 2px;
      transition: width 0.1s linear;
    }

    .score-display {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }

    .score-value {
      font-size: 50px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
      letter-spacing: 2px;
    }

    .combo-display {
      font-size: 24px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .combo-display.visible {
      opacity: 1;
    }

    .combo-display.gold {
      color: #ffd700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
      animation: comboFadeIn 0.3s ease;
    }

    @keyframes comboFadeIn {
      from {
        opacity: 0;
        transform: scale(0.8);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(10, 10, 26, 0.8);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn {
      padding: 10px 20px;
      font-size: 14px;
      font-family: inherit;
      color: #e0e0ff;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      min-width: 80px;
    }

    .btn:hover {
      background: rgba(0, 255, 255, 0.1);
      border-color: #00ffff;
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .volume-label {
      font-size: 12px;
      opacity: 0.7;
      min-width: 40px;
    }

    .volume-slider {
      width: 100px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #00ffff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
      transition: box-shadow 0.2s ease;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.9);
    }

    .volume-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #00ffff;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.6);
    }

    .key-hints {
      position: absolute;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      opacity: 0.6;
      z-index: 5;
    }

    .key-hint {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      color: #e0e0ff;
    }

    .key-hint.active {
      background: rgba(0, 255, 255, 0.2);
      border-color: #00ffff;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
    }

    .health-bar {
      position: absolute;
      top: 100px;
      right: 20px;
      width: 10px;
      height: 200px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      overflow: hidden;
      z-index: 10;
    }

    .health-fill {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: linear-gradient(to top, #ff4444, #ff8844, #44ff44);
      transition: height 0.2s ease;
      border-radius: 5px;
    }

    .miss-flash {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
      box-shadow: inset 0 0 100px 20px rgba(255, 0, 0, 0);
      transition: box-shadow 0.1s ease;
    }

    .miss-flash.active {
      box-shadow: inset 0 0 100px 20px rgba(255, 0, 0, 0.8);
    }

    #file-input {
      display: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="canvas"></canvas>
    
    <div class="miss-flash" id="missFlash"></div>

    <div class="ui-overlay top-left">
      <div class="song-info">
        <div class="song-name" id="songName">请选择一首音乐文件开始</div>
        <div class="progress-container">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>
    </div>

    <div class="ui-overlay top-right">
      <div class="score-display">
        <div class="score-value" id="scoreValue">0</div>
        <div class="combo-display" id="comboDisplay">0 COMBO</div>
      </div>
    </div>

    <div class="health-bar">
      <div class="health-fill" id="healthFill" style="height: 100%;"></div>
    </div>

    <div class="key-hints" id="keyHints">
      <div class="key-hint" data-key="0">S</div>
      <div class="key-hint" data-key="1">D</div>
      <div class="key-hint" data-key="2">F</div>
      <div class="key-hint" data-key="3">J</div>
      <div class="key-hint" data-key="4">K</div>
      <div class="key-hint" data-key="5">L</div>
    </div>

    <div class="ui-overlay bottom-center">
      <div class="controls">
        <button class="btn" id="playBtn">播放</button>
        <button class="btn" id="pauseBtn" disabled>暂停</button>
        <button class="btn" id="stopBtn" disabled>停止</button>
        <div class="volume-control">
          <span class="volume-label" id="volumeLabel">70%</span>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="70">
        </div>
      </div>
    </div>

    <input type="file" id="file-input" accept=".mp3,.wav,.ogg,.m4a">
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
