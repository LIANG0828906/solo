<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>像素艺术编辑器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 20px;
      color: #e94560;
      letter-spacing: 1px;
    }

    .app-container {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      justify-content: center;
      gap: 24px;
      width: 100%;
      max-width: 1200px;
      flex-wrap: wrap;
    }

    .main-panel {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 240px;
    }

    .size-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      background-color: #16213e;
      padding: 12px 16px;
      border-radius: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .size-selector label {
      font-size: 14px;
      color: #b0b0c0;
    }

    .size-selector select {
      background-color: #0f3460;
      color: #ffffff;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
    }

    .size-selector select:focus {
      outline: 2px solid #e94560;
    }

    .action-buttons {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .action-buttons button {
      background-color: #e94560;
      color: #ffffff;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: all 0.2s ease;
    }

    .action-buttons button:hover:not(:disabled) {
      transform: translateY(-2px);
      background-color: #ff5773;
    }

    .action-buttons button:active:not(:disabled) {
      transform: translateY(0);
    }

    .action-buttons button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .history-buttons {
      display: flex;
      gap: 8px;
      justify-content: center;
    }

    .history-buttons button {
      background-color: #16213e;
      color: #e0e0e0;
      border: 1px solid #3a3a5c;
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
      min-width: 44px;
      transition: all 0.2s ease;
    }

    .history-buttons button:hover:not(:disabled) {
      transform: translateY(-2px);
      background-color: #0f3460;
      border-color: #0f3460;
    }

    .history-buttons button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
        align-items: center;
      }

      .side-panel {
        width: 100%;
        max-width: 500px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <h1>🎨 像素艺术编辑器</h1>
  
  <div class="app-container">
    <div class="main-panel">
      <div class="size-selector">
        <label for="sizeSelect">画布尺寸:</label>
        <select id="sizeSelect">
          <option value="8">8 × 8</option>
          <option value="16">16 × 16</option>
          <option value="32" selected>32 × 32</option>
          <option value="64">64 × 64</option>
        </select>
      </div>
      
      <pixel-canvas id="pixelCanvas"></pixel-canvas>
      
      <div class="history-buttons">
        <button id="undoBtn" disabled>↶ 撤销</button>
        <button id="redoBtn" disabled>↷ 重做</button>
      </div>
    </div>
    
    <div class="side-panel">
      <pixel-toolbar id="toolbar"></pixel-toolbar>
      <color-picker id="colorPicker"></color-picker>
      
      <div class="action-buttons">
        <button id="exportBtn">💾 导出为PNG</button>
      </div>
    </div>
  </div>
  
  <script type="module" src="/src/pixel-canvas.ts"></script>
  <script type="module" src="/src/color-picker.ts"></script>
  <script type="module" src="/src/toolbar.ts"></script>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
