<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>霓虹狂飙 - Neon Race</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    body {
      background: linear-gradient(180deg, #0A0015 0%, #1A0033 100%);
    }

    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    #loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #0A0015 0%, #1A0033 100%);
      z-index: 1000;
      transition: opacity 1s ease;
    }

    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-title {
      font-size: 48px;
      color: #00FFFF;
      text-shadow: 
        0 0 10px #00FFFF,
        0 0 20px #00FFFF,
        0 0 40px #00FFFF;
      margin-bottom: 40px;
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% {
        opacity: 0.7;
        text-shadow: 
          0 0 10px #00FFFF,
          0 0 20px #00FFFF,
          0 0 40px #00FFFF;
      }
      50% {
        opacity: 1;
        text-shadow: 
          0 0 20px #00FFFF,
          0 0 40px #00FFFF,
          0 0 80px #00FFFF;
      }
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 3px solid rgba(0, 255, 255, 0.2);
      border-top: 3px solid #00FFFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px #00FFFF;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      color: #00FFFF;
      font-size: 16px;
      opacity: 0.8;
    }

    #start-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(10, 0, 21, 0.7);
      backdrop-filter: blur(5px);
      z-index: 500;
    }

    #start-screen.visible {
      display: flex;
    }

    .start-title {
      font-size: 72px;
      color: #00FFFF;
      text-shadow: 
        0 0 20px #00FFFF,
        0 0 40px #00FFFF,
        0 0 80px #00FFFF;
      margin-bottom: 30px;
      animation: breathe 2s ease-in-out infinite;
    }

    .start-subtitle {
      font-size: 24px;
      color: #FF00FF;
      text-shadow: 0 0 10px #FF00FF;
      margin-bottom: 60px;
    }

    .start-instructions {
      text-align: center;
      color: #FFFFFF;
      font-size: 16px;
      line-height: 2;
      margin-bottom: 40px;
    }

    .start-instructions span {
      color: #FFFF00;
      text-shadow: 0 0 5px #FFFF00;
    }

    .start-hint {
      font-size: 20px;
      color: #00FFFF;
      text-shadow: 0 0 10px #00FFFF;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    #hud.visible {
      display: block;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .hud-left {
      text-align: left;
    }

    .hud-right {
      text-align: right;
    }

    .hud-label {
      color: #00FFFF;
      font-size: 12px;
      text-shadow: 0 0 5px #00FFFF;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 5px;
    }

    .hud-value {
      color: #FFFFFF;
      font-size: 24px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    .energy-bar-container {
      width: 200px;
      height: 20px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.5);
      border-radius: 3px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
      position: relative;
    }

    .energy-bar {
      height: 100%;
      background: linear-gradient(90deg, #0066FF, #9933FF);
      transition: width 0.2s ease;
      animation: energyPulse 2s ease-in-out infinite;
    }

    .energy-bar.low {
      background: linear-gradient(90deg, #FF3333, #FF6600);
      animation: energyLow 0.5s ease-in-out infinite;
    }

    @keyframes energyPulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    @keyframes energyLow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .hud-lives {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .life-icon {
      width: 20px;
      height: 20px;
      background: #FF3333;
      clip-path: polygon(50% 0%, 100% 35%, 80% 100%, 50% 75%, 20% 100%, 0% 35%);
      box-shadow: 0 0 10px #FF3333;
    }

    .life-icon.lost {
      background: rgba(255, 51, 51, 0.2);
      box-shadow: none;
    }

    #game-over-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 200;
      opacity: 0;
      transition: opacity 1s ease;
    }

    #game-over-screen.visible {
      display: flex;
      opacity: 1;
    }

    .game-over-title {
      font-size: 48px;
      color: #FF0066;
      text-shadow: 
        0 0 20px #FF0066,
        0 0 40px #FF0066,
        0 0 60px #FF0066;
      margin-bottom: 30px;
    }

    .game-over-score-label {
      font-size: 20px;
      color: #00FFFF;
      text-shadow: 0 0 10px #00FFFF;
      margin-bottom: 10px;
    }

    .game-over-score {
      font-size: 64px;
      color: #FFD700;
      text-shadow: 
        0 0 20px #FFD700,
        0 0 40px #FFD700;
      margin-bottom: 20px;
    }

    .game-over-high-score {
      font-size: 18px;
      color: #FFFF00;
      text-shadow: 0 0 10px #FFFF00;
      margin-bottom: 40px;
    }

    .game-over-restart {
      font-size: 24px;
      color: #FFFFFF;
      animation: pulse 1s ease-in-out infinite;
    }

    #damage-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 150;
      box-shadow: inset 0 0 100px rgba(255, 51, 51, 0);
      transition: box-shadow 0.1s ease;
    }

    #damage-overlay.active {
      box-shadow: inset 0 0 100px rgba(255, 51, 51, 0.8);
      animation: damageFlash 0.5s ease;
    }

    @keyframes damageFlash {
      0%, 100% { box-shadow: inset 0 0 100px rgba(255, 51, 51, 0.8); }
      50% { box-shadow: inset 0 0 200px rgba(255, 51, 51, 0.4); }
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  
  <div id="loading-screen">
    <div class="loading-title">霓虹狂飙</div>
    <div class="loading-spinner"></div>
    <div class="loading-text">加载中...</div>
  </div>

  <div id="start-screen">
    <div class="start-title">霓虹狂飙</div>
    <div class="start-subtitle">NEON RACE</div>
    <div class="start-instructions">
      <div><span>A / D</span> - 左右移动</div>
      <div><span>W</span> - 加速冲刺</div>
      <div><span>空格</span> - 跳跃</div>
    </div>
    <div class="start-hint">按 空格键 开始游戏</div>
  </div>

  <div id="hud">
    <div class="hud-top">
      <div class="hud-left">
        <div class="hud-label">分数</div>
        <div class="hud-value" id="score-value">0</div>
      </div>
      <div class="hud-right">
        <div class="hud-label">速度</div>
        <div class="hud-value" id="speed-value">0</div>
        <div class="hud-lives" id="lives-container">
          <div class="life-icon"></div>
          <div class="life-icon"></div>
          <div class="life-icon"></div>
        </div>
      </div>
    </div>
    <div style="margin-top: 20px;">
      <div class="hud-label">能量</div>
      <div class="energy-bar-container">
        <div class="energy-bar" id="energy-bar" style="width: 100%;"></div>
      </div>
    </div>
  </div>

  <div id="damage-overlay"></div>

  <div id="game-over-screen">
    <div class="game-over-title">游戏结束</div>
    <div class="game-over-score-label">最终得分</div>
    <div class="game-over-score" id="final-score">0</div>
    <div class="game-over-high-score" id="high-score">最高分: 0</div>
    <div class="game-over-restart">按 R 键重新开始</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
