<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音乐波形可视化编辑器</title>
  <style>
    :root {
      --bg-color: #1a1a2e;
      --panel-bg: #252548;
      --text-color: #e0e0e0;
      --text-muted: #9090b0;
      --button-bg: #4a4a8a;
      --button-hover: #6a6aaa;
      --accent-gold: rgba(255, 215, 0, 0.3);
      --accent-gold-border: #ffd700;
      --gradient-start: #4a9eff;
      --gradient-end: #a855f7;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      --radius: 12px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .app-header {
      text-align: center;
      padding: 12px 0;
    }

    .app-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }

    .app-header p {
      margin-top: 8px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .file-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position: relative;
    }

    .file-info {
      font-size: 14px;
      color: var(--text-muted);
    }

    .file-info strong {
      color: var(--text-color);
    }

    .panel {
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .panel-header {
      padding: 12px 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-muted);
    }

    .panel-header h3 {
      font-size: 15px;
      color: var(--text-color);
      font-weight: 600;
    }

    .canvas-wrap {
      position: relative;
      width: 100%;
      height: 280px;
    }

    .canvas-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .spectrum-wrap {
      position: relative;
      width: 100%;
      height: 180px;
    }

    .spectrum-wrap canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .playback-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      background: var(--button-bg);
      color: var(--text-color);
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 200ms ease-out;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      user-select: none;
    }

    .btn:hover:not(:disabled) {
      background: var(--button-hover);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(74, 74, 138, 0.35);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, #5aafff, #b865ff);
    }

    .btn-icon {
      width: 44px;
      padding: 0;
      justify-content: center;
      border-radius: 50%;
      font-size: 18px;
    }

    .file-label {
      cursor: pointer;
    }

    .file-label input {
      display: none;
    }

    .effect-controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .effect-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .effect-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-muted);
    }

    .effect-label span {
      color: var(--text-color);
      font-weight: 600;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 8px;
      border-radius: 4px;
      background: rgba(255, 255, 255, 0.1);
      outline: none;
      transition: background 200ms;
    }

    .slider:hover {
      background: rgba(255, 255, 255, 0.16);
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      cursor: pointer;
      transition: transform 150ms;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }

    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
      cursor: pointer;
      border: 2px solid rgba(255, 255, 255, 0.2);
    }

    .slider:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .progress-info {
      font-size: 12px;
      color: var(--text-muted);
      min-width: 110px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(4px);
    }

    .loading-overlay.active {
      display: flex;
    }

    .spinner {
      width: 64px;
      height: 64px;
      border: 4px solid rgba(74, 158, 255, 0.15);
      border-top-color: var(--gradient-start);
      border-right-color: var(--gradient-end);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .empty-hint {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 10px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .empty-hint-icon {
      font-size: 48px;
      opacity: 0.4;
    }

    .empty-hint p {
      font-size: 14px;
    }

    .hint-badge {
      display: inline-block;
      padding: 4px 10px;
      background: rgba(74, 74, 138, 0.4);
      border-radius: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      #app {
        padding: 16px;
        gap: 16px;
      }

      .app-header h1 {
        font-size: 22px;
      }

      .canvas-wrap {
        height: 220px;
      }

      .spectrum-wrap {
        height: 140px;
      }

      .controls {
        padding: 16px;
        gap: 16px;
      }

      .effect-controls {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .file-loader {
        flex-direction: column;
        gap: 10px;
        padding: 16px;
        text-align: center;
      }

      .btn {
        padding: 10px 18px;
        font-size: 13px;
      }

      .btn-icon {
        width: 44px;
      }

      .progress-info {
        font-size: 11px;
        min-width: 90px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>🎵 音乐波形可视化编辑器</h1>
      <p>加载音频 · 编辑波形 · 应用效果 · 实时预览</p>
    </header>

    <section class="file-loader panel">
      <label class="btn btn-primary file-label">
        <span>📁</span>
        <span>选择音频文件</span>
        <input type="file" id="fileInput" accept=".mp3,.wav,audio/mpeg,audio/wav,audio/x-wav" />
      </label>
      <div class="file-info" id="fileInfo">
        <span class="hint-badge">支持 MP3 / WAV 格式</span>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h3>📊 波形图 <span id="durationInfo"></span></h3>
        <span id="selectionInfo" class="hint-badge" style="display:none;"></span>
      </div>
      <div class="canvas-wrap">
        <canvas id="waveformCanvas"></canvas>
        <div class="empty-hint" id="waveformEmpty">
          <div class="empty-hint-icon">🎼</div>
          <p>加载音频文件以显示波形</p>
          <p style="font-size:12px;opacity:0.7;">拖拽鼠标选择片段 · 悬停滑块调节效果</p>
        </div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h3>🌈 实时频谱</h3>
        <span class="hint-badge">256 频段 · 绿→黄→红</span>
      </div>
      <div class="spectrum-wrap">
        <canvas id="spectrumCanvas"></canvas>
      </div>
    </section>

    <section class="controls">
      <div class="playback-controls">
        <button class="btn btn-icon" id="playBtn" disabled title="播放 / 暂停">▶</button>
        <button class="btn btn-icon" id="stopBtn" disabled title="停止">■</button>
        <div class="progress-info" id="progressInfo">00:00 / 00:00</div>
        <button class="btn" id="clearRegionBtn" disabled title="取消选区">清除选区</button>
      </div>

      <div class="effect-controls">
        <div class="effect-group">
          <label class="effect-label">
            🔊 音量放大
            <span id="volumeValue">1.00x</span>
          </label>
          <input type="range" id="volumeSlider" class="slider" min="0.5" max="2" step="0.05" value="1" disabled />
        </div>
        <div class="effect-group">
          <label class="effect-label">
            🌀 回声延迟
            <span id="echoValue">0 ms</span>
          </label>
          <input type="range" id="echoSlider" class="slider" min="0" max="1000" step="10" value="0" disabled />
        </div>
        <div class="effect-group">
          <label class="effect-label">
            🎚️ 低通截止
            <span id="lowpassValue">关闭</span>
          </label>
          <input type="range" id="lowpassSlider" class="slider" min="100" max="5000" step="50" value="5000" disabled />
        </div>
      </div>
    </section>
  </div>

  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <script type="module" src="/src/app.ts"></script>
</body>
</html>
