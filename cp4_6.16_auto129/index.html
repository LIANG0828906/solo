<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AetherGrid - 塔防游戏</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #121830;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    canvas {
      display: block;
    }
    #perf-stats {
      position: fixed;
      top: 10px;
      right: 10px;
      background: rgba(18, 24, 48, 0.9);
      color: #7DD3FC;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: monospace;
      z-index: 1000;
      pointer-events: none;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(125, 211, 252, 0.3);
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="perf-stats">FPS: -- | Towers: -- | Enemies: --</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
