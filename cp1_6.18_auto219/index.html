<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>音律彩窗</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0A0E1A 0%, #1A1F2E 100%);
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ffffff;
      user-select: none;
    }

    body::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
      pointer-events: none;
      z-index: 1;
    }

    body::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at center, rgba(108, 99, 255, 0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .app-title {
      position: absolute;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      z-index: 10;
      background: linear-gradient(90deg, #FF6347, #FFD700, #00CED1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .canvas-wrapper {
      position: relative;
      z-index: 5;
      border-radius: 8px;
      box-shadow: 
        0 0 60px rgba(108, 99, 255, 0.15),
        0 0 120px rgba(0, 0, 0, 0.5),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    #glassCanvas {
      display: block;
      border-radius: 8px;
    }

    .controls {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      z-index: 10;
      width: 100%;
      max-width: 520px;
      padding: 0 20px;
    }

    .buttons {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      letter-spacing: 1px;
      min-width: 100px;
    }

    .btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.4), rgba(108, 99, 255, 0.2));
      border-color: rgba(108, 99, 255, 0.5);
    }

    .btn-primary:hover:not(:disabled) {
      background: linear-gradient(135deg, rgba(108, 99, 255, 0.6), rgba(108, 99, 255, 0.4));
    }

    .upload-zone {
      width: 100%;
      border: 2px dashed rgba(255, 255, 255, 0.25);
      border-radius: 16px;
      padding: 24px 32px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
    }

    .upload-zone:hover {
      border-color: rgba(108, 99, 255, 0.5);
      background: rgba(108, 99, 255, 0.05);
    }

    .upload-zone.dragover {
      border-color: #6C63FF;
      background: rgba(108, 99, 255, 0.1);
      box-shadow: 0 0 30px rgba(108, 99, 255, 0.3), inset 0 0 20px rgba(108, 99, 255, 0.1);
      animation: glow-pulse 1.5s ease-in-out infinite;
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(108, 99, 255, 0.3), inset 0 0 20px rgba(108, 99, 255, 0.1); }
      50% { box-shadow: 0 0 50px rgba(108, 99, 255, 0.5), inset 0 0 30px rgba(108, 99, 255, 0.15); }
    }

    .upload-zone p {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 6px;
    }

    .upload-zone .hint {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.4);
    }

    .upload-zone .filename {
      color: #6C63FF;
      font-weight: 500;
      margin-top: 8px;
    }

    #fileInput {
      display: none;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
    }

    .volume-control label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1px;
    }

    .volume-control input[type="range"] {
      -webkit-appearance: none;
      width: 100px;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 2px;
      outline: none;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #6C63FF;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(108, 99, 255, 0.5);
      transition: all 0.2s ease;
    }

    .volume-control input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 15px rgba(108, 99, 255, 0.7);
    }
  </style>
</head>
<body>
  <h1 class="app-title">音律彩窗</h1>
  
  <div class="canvas-wrapper">
    <canvas id="glassCanvas" width="416" height="416"></canvas>
  </div>

  <div class="controls">
    <div class="upload-zone" id="uploadZone">
      <p>拖拽音频文件到此处，或点击选择</p>
      <p class="hint">支持 MP3 / WAV 格式，最长 30 秒</p>
      <p class="filename" id="filename"></p>
      <input type="file" id="fileInput" accept=".mp3,.wav,audio/mpeg,audio/wav" />
    </div>

    <div class="buttons">
      <button class="btn btn-primary" id="playBtn" disabled>播放</button>
      <button class="btn" id="resetBtn" disabled>重置</button>
      <div class="volume-control">
        <label>音量</label>
        <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
