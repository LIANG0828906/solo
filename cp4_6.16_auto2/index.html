<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 校园漫游系统</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0a0e1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #e0f7fa;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #loading-screen {
      position: fixed;
      inset: 0;
      background: linear-gradient(135deg, #0a0e1a 0%, #0d1b2a 50%, #0a0e1a 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      color: #4dd0e1;
      margin-bottom: 40px;
      text-shadow: 0 0 20px rgba(77, 208, 225, 0.5);
    }
    .loading-subtitle {
      font-size: 13px;
      color: #607d8b;
      letter-spacing: 4px;
      margin-bottom: 60px;
    }
    .progress-bar-wrapper {
      width: 360px;
      height: 3px;
      background: rgba(77, 208, 225, 0.1);
      border-radius: 3px;
      overflow: hidden;
      position: relative;
    }
    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00bcd4, #4dd0e1, #80deea);
      border-radius: 3px;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px rgba(77, 208, 225, 0.8);
    }
    .progress-text {
      margin-top: 18px;
      font-size: 12px;
      color: #80deea;
      letter-spacing: 2px;
    }
    #ui-controls {
      position: fixed;
      top: 24px;
      left: 24px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .control-panel {
      background: rgba(10, 14, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(77, 208, 225, 0.25);
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(77, 208, 225, 0.1);
    }
    .mode-label {
      font-size: 11px;
      color: #607d8b;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .mode-value {
      font-size: 16px;
      font-weight: 500;
      color: #4dd0e1;
      letter-spacing: 1px;
    }
    #ui-hints {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 10;
    }
    .hints-panel {
      background: rgba(10, 14, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(77, 208, 225, 0.25);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      gap: 20px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(77, 208, 225, 0.1);
    }
    .hint-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #b0bec5;
    }
    .key-cap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 24px;
      height: 24px;
      padding: 0 6px;
      background: linear-gradient(180deg, rgba(77, 208, 225, 0.2), rgba(77, 208, 225, 0.05));
      border: 1px solid rgba(77, 208, 225, 0.4);
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      color: #4dd0e1;
      font-family: monospace;
    }
    #info-card {
      position: fixed;
      top: 50%;
      right: 40px;
      transform: translateY(-50%) translateX(60px);
      width: 340px;
      background: rgba(10, 14, 26, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(77, 208, 225, 0.35);
      border-radius: 14px;
      padding: 28px;
      z-index: 20;
      opacity: 0;
      pointer-events: none;
      transition: all 0.45s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(77, 208, 225, 0.15);
    }
    #info-card.visible {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
      pointer-events: auto;
    }
    #info-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #00bcd4, #4dd0e1);
      border-radius: 14px 0 0 14px;
    }
    .card-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 28px;
      height: 28px;
      border: none;
      background: rgba(77, 208, 225, 0.1);
      color: #80deea;
      border-radius: 50%;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .card-close:hover {
      background: rgba(77, 208, 225, 0.25);
      transform: rotate(90deg);
    }
    .card-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, rgba(0, 188, 212, 0.2), rgba(128, 222, 234, 0.08));
      border: 1px solid rgba(77, 208, 225, 0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      font-size: 22px;
    }
    .card-title {
      font-size: 22px;
      font-weight: 600;
      color: #e0f7fa;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }
    .card-tag {
      display: inline-block;
      padding: 4px 12px;
      background: rgba(77, 208, 225, 0.12);
      border: 1px solid rgba(77, 208, 225, 0.3);
      border-radius: 20px;
      font-size: 11px;
      color: #4dd0e1;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }
    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
      padding: 18px 0;
      border-top: 1px solid rgba(77, 208, 225, 0.15);
      border-bottom: 1px solid rgba(77, 208, 225, 0.15);
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-label {
      font-size: 10px;
      color: #607d8b;
      letter-spacing: 2px;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 600;
      color: #80deea;
    }
    .card-desc-label {
      font-size: 10px;
      color: #607d8b;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }
    .card-description {
      font-size: 13px;
      line-height: 1.7;
      color: #b0bec5;
    }
    #fps-counter {
      position: fixed;
      top: 24px;
      right: 24px;
      z-index: 10;
      background: rgba(10, 14, 26, 0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(77, 208, 225, 0.25);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: monospace;
      font-size: 13px;
      color: #4dd0e1;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="loading-screen">
      <div class="loading-title">CAMPUS EXPLORER</div>
      <div class="loading-subtitle">虚拟校园漫游系统初始化中</div>
      <div class="progress-bar-wrapper">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
      <div class="progress-text" id="progress-text">准备资源 0%</div>
    </div>

    <div id="ui-controls">
      <div class="control-panel">
        <div class="mode-label">当前模式</div>
        <div class="mode-value" id="mode-display">第一人称漫游</div>
      </div>
    </div>

    <div id="ui-hints">
      <div class="hints-panel">
        <div class="hint-item"><span class="key-cap">W</span><span class="key-cap">A</span><span class="key-cap">S</span><span class="key-cap">D</span>移动</div>
        <div class="hint-item"><span class="key-cap">V</span>切换视角</div>
        <div class="hint-item"><span class="key-cap">拖拽</span>旋转俯瞰</div>
        <div class="hint-item"><span class="key-cap">点击</span>建筑信息</div>
        <div class="hint-item"><span class="key-cap">ESC</span>关闭卡片</div>
      </div>
    </div>

    <div id="fps-counter">FPS: --</div>

    <div id="info-card">
      <button class="card-close" id="card-close">✕</button>
      <div class="card-icon" id="card-icon">🏛️</div>
      <div class="card-title" id="card-title">建筑名称</div>
      <span class="card-tag" id="card-tag">教学楼</span>
      <div class="card-stats">
        <div class="stat-item">
          <span class="stat-label">楼层数</span>
          <span class="stat-value" id="card-floors">-</span>
        </div>
        <div class="stat-item">
          <span class="stat-label">类型</span>
          <span class="stat-value" id="card-type">-</span>
        </div>
      </div>
      <div class="card-desc-label">功能描述</div>
      <div class="card-description" id="card-desc">建筑功能描述内容将显示在这里。</div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
