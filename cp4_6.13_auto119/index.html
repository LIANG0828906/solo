<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天体轨道交互模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000011;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #ffffff;
    }

    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
    }

    .info-panel {
      position: fixed;
      top: 20px;
      left: 20px;
      padding: 20px 24px;
      min-width: 260px;
      background: rgba(20, 30, 60, 0.35);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(120, 180, 255, 0.25);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0, 10, 40, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease-in-out;
      z-index: 100;
    }

    .info-panel.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .info-panel h2 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 14px;
      background: linear-gradient(135deg, #7cc8ff, #a0e0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.5px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 14px;
      border-bottom: 1px solid rgba(120, 180, 255, 0.1);
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: rgba(180, 210, 255, 0.7);
    }

    .info-value {
      color: #ffffff;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .control-bar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(20, 30, 60, 0.4);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(120, 180, 255, 0.2);
      border-radius: 50px;
      box-shadow: 0 4px 24px rgba(0, 10, 40, 0.3);
      z-index: 100;
      font-size: 14px;
    }

    .control-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #3a7bd5, #5a9ff5);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .control-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 20px rgba(90, 159, 245, 0.5);
    }

    .control-btn:active {
      transform: scale(0.95);
    }

    .speed-control {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .speed-label {
      color: rgba(180, 210, 255, 0.8);
      white-space: nowrap;
    }

    .speed-slider {
      width: 120px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(120, 180, 255, 0.2);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7cc8ff, #a0e0ff);
      cursor: pointer;
      box-shadow: 0 0 10px rgba(124, 200, 255, 0.6);
      transition: transform 0.15s;
    }

    .speed-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .speed-value {
      min-width: 36px;
      text-align: right;
      color: #a0e0ff;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(180, 210, 255, 0.
