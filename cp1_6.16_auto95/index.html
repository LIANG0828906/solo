<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>虚拟手风琴 · 声波可视化</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #3E2723;
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #f5e6c8;
      user-select: none;
    }
    #app { width: 100%; height: 100%; position: relative; }
    canvas { display: block; }

    .ui-panel {
      position: absolute;
      z-index: 10;
      backdrop-filter: blur(12px);
      background: rgba(62, 39, 35, 0.75);
      border: 1px solid rgba(212, 175, 55, 0.35);
      border-radius: 12px;
      padding: 16px 20px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    .note-display {
      top: 24px;
      right: 24px;
      min-width: 240px;
      text-align: right;
    }
    .note-display .label {
      font-size: 12px;
      opacity: 0.7;
      letter-spacing: 2px;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .note-display .note-name {
      font-size: 32px;
      font-weight: 700;
      color: #ffd54f;
      text-shadow: 0 0 20px rgba(255, 213, 79, 0.6);
      margin-bottom: 12px;
      min-height: 40px;
    }
    .progress-container {
      width: 200px;
      margin-left: auto;
    }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b35, #ffd54f, #8bc34a, #4fc3f7, #ba68c8);
      background-size: 200% 100%;
      animation: shimmer 2s linear infinite;
      width: 0%;
      transition: width 0.1s linear;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .progress-label {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .control-panel {
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .btn-group {
      display: flex;
      gap: 8px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 10px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.2);
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.06);
      color: #f5e6c8;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease, box-shadow 0.2s ease;
      letter-spacing: 1px;
    }
    .btn:hover {
      transform: scale(1.1);
      background: rgba(212, 175, 55, 0.18);
      box-shadow: 0 0 20px rgba(212, 175, 55, 0.25);
    }
    .btn:active {
      transform: scale(0.95);
      transition: transform 0.05s ease;
    }
    .btn.active {
      background: linear-gradient(135deg, #d4af37, #b8860b);
      color: #3E2723;
      font-weight: 700;
      box-shadow: 0 0 24px rgba(212, 175, 55, 0.5);
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .slider-group .slider-label {
      font-size: 12px;
      opacity: 0.75;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }
    .slider-group input[type="range"] {
      width: 180px;
      height: 6px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 3px;
      outline: none;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #ffd54f, #d4af37);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.6);
      transition: transform 0.15s ease;
    }
    .slider-group input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .melody-select {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .melody-select select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid rgba(212, 175, 55, 0.3);
      background: rgba(0, 0, 0, 0.3);
      color: #f5e6c8;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    .melody-select select:focus {
      border-color: #d4af37;
      box-shadow: 0 0 12px rgba(212, 175, 55, 0.3);
    }

    .hint {
      position: absolute;
      bottom: 110px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 1px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="ui-panel note-display">
      <div class="label">当前音符</div>
      <div class="note-name" id="noteName">—</div>
      <div class="progress-container">
        <div class="label" style="font-size:11px; margin-bottom:0;">旋律进度</div>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-label" id="progressLabel">自由模式</div>
      </div>
    </div>

    <div class="hint">键盘 A S D F G H J K L ; ' 对应白键 · 鼠标点击琴键演奏</div>

    <div class="ui-panel control-panel">
      <div class="btn-group" id="modeGroup">
        <button class="btn active" data-mode="free">自由演奏</button>
        <button class="btn" data-mode="auto">自动演示</button>
      </div>

      <div class="melody-select" id="melodySelectWrap" style="display:none;">
        <span class="slider-label" style="font-size:12px; opacity:0.75;">选择旋律</span>
        <select id="melodySelect">
          <option value="polka">🎵 波尔卡 (欢快)</option>
          <option value="tango">🌹 探戈 (优雅)</option>
          <option value="folk">🌾 民谣 (舒缓)</option>
        </select>
      </div>

      <div class="slider-group">
        <span class="slider-label">
          <span>风速 (粒子消散)</span>
          <span id="windValue">1.0x</span>
        </span>
        <input type="range" id="windSlider" min="0.5" max="2" step="0.1" value="1" />
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
