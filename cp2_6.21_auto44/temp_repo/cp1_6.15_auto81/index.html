<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>街区绿化与微气候仿真</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #1a1a2e;
      font-family: 'Noto Sans SC', sans-serif;
      color: #f0f0f0;
    }

    #canvas-container {
      width: 100vw;
      height: 100vh;
      position: fixed;
      top: 0;
      left: 0;
    }

    canvas { display: block; }

    .ui-panel {
      position: fixed;
      background: rgba(30, 30, 50, 0.85);
      border-radius: 12px;
      padding: 16px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      z-index: 100;
      transition: all 0.3s ease;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(240, 240, 240, 0.6);
      margin-bottom: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      padding-bottom: 8px;
    }

    #climate-panel {
      left: 20px;
      bottom: 20px;
      min-width: 200px;
    }

    .climate-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .climate-label {
      font-size: 12px;
      color: rgba(240, 240, 240, 0.7);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .climate-label .icon {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .icon-temp { background: linear-gradient(135deg, #ff6b6b, #ffa500); }
    .icon-humid { background: linear-gradient(135deg, #4ecdc4, #45b7d1); }
    .icon-wind { background: linear-gradient(135deg, #a8e6cf, #88d8b0); }

    .climate-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 16px;
      font-weight: 600;
      color: #f0f0f0;
      transition: color 0.5s ease;
    }

    .climate-unit {
      font-size: 10px;
      color: rgba(240, 240, 240, 0.5);
      margin-left: 2px;
    }

    #greenery-panel {
      right: 20px;
      bottom: 20px;
      min-width: 160px;
      text-align: center;
    }

    .ring-container {
      position: relative;
      width: 100px;
      height: 100px;
      margin: 0 auto 8px;
    }

    .ring-container svg {
      transform: rotate(-90deg);
    }

    .ring-bg {
      fill: none;
      stroke: rgba(255, 255, 255, 0.08);
      stroke-width: 6;
    }

    .ring-progress {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transition: stroke-dashoffset 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                  stroke 0.3s ease;
    }

    .ring-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: #f0f0f0;
    }

    .ring-text span {
      font-size: 10px;
      font-weight: 400;
    }

    .greenery-count {
      font-size: 11px;
      color: rgba(240, 240, 240, 0.5);
    }

    #controls-panel {
      right: 20px;
      bottom: 180px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 12px;
    }

    .btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #f0f0f0;
      background: rgba(60, 60, 90, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-width: 120px;
    }

    .btn:hover {
      background: #4a4e6b;
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-simulate {
      background: rgba(46, 139, 87, 0.3);
      border-color: rgba(46, 139, 87, 0.4);
    }

    .btn-simulate:hover {
      background: rgba(46, 139, 87, 0.5);
    }

    .btn-simulate.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-simulate.error {
      background: rgba(220, 53, 69, 0.3);
      border-color: rgba(220, 53, 69, 0.4);
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #f0f0f0;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    #reset-btn {
      position: fixed;
      right: 20px;
      top: 20px;
      z-index: 100;
    }

    #tool-panel {
      position: fixed;
      left: 20px;
      top: 20px;
      z-index: 100;
      display: flex;
      gap: 6px;
      padding: 8px;
    }

    .tool-btn {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 12px;
      color: rgba(240, 240, 240, 0.7);
      background: rgba(30, 30, 50, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(8px);
    }

    .tool-btn:hover {
      background: #4a4e6b;
      color: #f0f0f0;
    }

    .tool-btn.active {
      background: rgba(46, 139, 87, 0.4);
      border-color: rgba(46, 139, 87, 0.5);
      color: #f0f0f0;
    }

    .tool-btn .tool-icon {
      margin-right: 4px;
    }

    #info-bar {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      font-size: 11px;
      color: rgba(240, 240, 240, 0.4);
      background: rgba(30, 30, 50, 0.6);
      padding: 6px 16px;
      border-radius: 20px;
      backdrop-filter: blur(4px);
      pointer-events: none;
    }

    #tooltip {
      position: fixed;
      z-index: 200;
      background: rgba(30, 30, 50, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 11px;
      color: #f0f0f0;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="tool-panel" class="ui-panel">
    <button class="tool-btn active" data-tool="tree">
      <span class="tool-icon">🌳</span>树木
    </button>
    <button class="tool-btn" data-tool="shrub">
      <span class="tool-icon">🌿</span>灌木
    </button>
  </div>

  <div id="climate-panel" class="ui-panel">
    <div class="panel-title">微气候数据</div>
    <div class="climate-row">
      <span class="climate-label"><span class="icon icon-temp"></span>温度</span>
      <span><span class="climate-value" id="temp-value">25.00</span><span class="climate-unit">°C</span></span>
    </div>
    <div class="climate-row">
      <span class="climate-label"><span class="icon icon-humid"></span>湿度</span>
      <span><span class="climate-value" id="humid-value">40.00</span><span class="climate-unit">%</span></span>
    </div>
    <div class="climate-row">
      <span class="climate-label"><span class="icon icon-wind"></span>风速</span>
      <span><span class="climate-value" id="wind-value">5.00</span><span class="climate-unit">m/s</span></span>
    </div>
  </div>

  <div id="greenery-panel" class="ui-panel">
    <div class="panel-title">绿化覆盖率</div>
    <div class="ring-container">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle class="ring-bg" cx="50" cy="50" r="42" />
        <circle class="ring-progress" id="ring-progress" cx="50" cy="50" r="42"
          stroke-dasharray="263.89"
          stroke-dashoffset="263.89" />
      </svg>
      <div class="ring-text" id="ring-text">0<span>%</span></div>
    </div>
    <div class="greenery-count" id="greenery-count">植物: 0 / 60</div>
  </div>

  <div id="controls-panel" class="ui-panel">
    <button class="btn btn-simulate" id="simulate-btn">运行模拟</button>
    <button class="btn" id="clear-btn">清除全部</button>
  </div>

  <button class="btn" id="reset-btn">重置视角</button>

  <div id="info-bar">左键点击添加植物 · 右键移除植物 · 滚轮缩放 · 左键拖拽旋转</div>
  <div id="tooltip"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
