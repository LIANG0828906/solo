<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加密信息球体 - Crypto Sphere</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    body {
      background: radial-gradient(ellipse at center, #1a2a3a 0%, #0a0f1a 50%, #000000 100%);
      cursor: grab;
    }

    body.grabbing {
      cursor: grabbing;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #fps-counter {
      position: absolute;
      left: 16px;
      bottom: 16px;
      color: #ffffff;
      font-size: 16px;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 12px;
      border-radius: 4px;
      backdrop-filter: blur(4px);
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }

    #progress-container {
      position: absolute;
      right: 16px;
      top: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      user-select: none;
      pointer-events: none;
      z-index: 10;
    }

    #progress-bar {
      width: 200px;
      height: 10px;
      background: #444444;
      border-radius: 5px;
      overflow: hidden;
      box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
    }

    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00BFFF, #FFD700);
      transition: width 0.3s ease-out, background 0.3s ease-out;
      border-radius: 5px;
    }

    #progress-text {
      color: #ffffff;
      font-size: 14px;
      min-width: 45px;
      text-align: right;
    }

    #flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      background: rgba(255, 235, 150, 0);
      transition: background 0.2s ease-out;
      z-index: 5;
    }

    #flash-overlay.active {
      background: rgba(255, 235, 150, 0.3);
    }

    @media (max-width: 600px) {
      #fps-counter {
        font-size: 14px;
        padding: 4px 8px;
        left: 8px;
        bottom: 8px;
      }

      #progress-bar {
        width: 120px;
        height: 8px;
      }

      #progress-text {
        font-size: 12px;
      }

      #progress-container {
        right: 8px;
        top: 8px;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="fps-counter">FPS: 60</div>
    <div id="progress-container">
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <div id="progress-text">0%</div>
    </div>
    <div id="flash-overlay"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
