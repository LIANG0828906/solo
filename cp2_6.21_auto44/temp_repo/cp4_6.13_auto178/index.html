<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光流3D粒子可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #000;
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, #0a0a2a 0%, #000000 100%);
    }

    #canvas-container canvas {
      display: block;
    }

    #video-element {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      opacity: 0;
      pointer-events: none;
    }

    #permission-prompt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(20, 20, 40, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 40px 48px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      text-align: center;
      max-width: 400px;
      z-index: 100;
      display: none;
    }

    #permission-prompt h2 {
      font-size: 20px;
      margin-bottom: 16px;
      font-weight: 600;
      color: #1e90ff;
    }

    #permission-prompt p {
      font-size: 14px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.75);
      margin-bottom: 24px;
    }

    #permission-btn {
      background: linear-gradient(135deg, #1e90ff, #6366f1);
      color: #fff;
      border: none;
      padding: 12px 32px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #permission-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 24px rgba(30, 144, 255, 0.4);
    }

    #permission-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    #fps-counter {
      position: fixed;
      top: 16px;
      left: 16px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      z-index: 10;
      pointer-events: none;
    }

    #control-panel {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 200px;
      background: rgba(30, 30, 50, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 20px;
      z-index: 50;
      user-select: none;
    }

    #control-panel.dragging {
      cursor: grabbing;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      cursor: grab;
    }

    .panel-header:active {
      cursor: grabbing;
    }

    .panel-title {
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .panel-drag-icon {
      color: rgba(255, 255, 255, 0.3);
      font-size: 14px;
      line-height: 1;
    }

    .control-group {
      margin-bottom: 16px;
    }

    .control-group:last-of-type {
      margin-bottom: 20px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .control-value {
      color: #1e90ff;
      font-weight: 600;
      font-family: 'Courier New', monospace;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #1e90ff, #6366f1);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(30, 144, 255, 0.6);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: linear-gradient(135deg, #1e90ff, #6366f1);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      box-shadow: 0 0 12px rgba(30, 144, 255, 0.6);
    }

    .reset-btn {
      width: 100%;
      background: rgba(255, 69, 0, 0.15);
      color: #ff4500;
      border: 1px solid rgba(255, 69, 0, 0.3);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .reset-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 69, 0, 0.25);
    }

    .reset-btn:active {
      transform: scale(0.95);
      transition: transform 0.1s ease;
    }

    #control-panel.no-anim .reset-btn,
    #control-panel.no-anim input[type="range"]::-webkit-slider-thumb,
    #control-panel.no-anim input[type="range"]::-moz-range-thumb {
      transition: none !important;
      transform: none !important;
      opacity: 1 !important;
      box-shadow: none !important;
      background: none !important;
      filter: none !important;
      animation: none !important;
      will-change: auto !important;
    }

    #control-panel.no-anim .reset-btn:hover,
    #control-panel.no-anim .reset-btn:active {
      transform: none !important;
      background: rgba(255, 69, 0, 0.15) !important;
      box-shadow: none !important;
      opacity: 1 !important;
    }

    #control-panel.no-anim input[type="range"]::-webkit-slider-thumb:hover,
    #control-panel.no-anim input[type="range"]::-moz-range-thumb:hover {
      transform: none !important;
      box-shadow: none !important;
    }

    #control-panel.no-anim * {
      pointer-events: auto;
    }

    #control-panel.no-anim .control-group input,
    #control-panel.no-anim .reset-btn {
      pointer-events: none;
    }

    #control-panel.no-anim .panel-header {
      pointer-events: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <video id="video-element" autoplay muted playsinline></video>
    <div id="fps-counter">FPS: --</div>

    <div id="permission-prompt">
      <h2>需要摄像头权限</h2>
      <p>本应用需要访问您的摄像头来实时分析画面中的运动轨迹。<br/>所有数据仅在本地处理，不会上传到任何服务器。</p>
      <button id="permission-btn">开启摄像头</button>
    </div>

    <div id="control-panel">
      <div class="panel-header" id="panel-drag-handle">
        <span class="panel-title">控制面板</span>
        <span class="panel-drag-icon">⋮⋮</span>
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>光流敏感度</span>
          <span class="control-value" id="sensitivity-value">0.50</span>
        </div>
        <input type="range" id="sensitivity-slider" min="0.1" max="1.0" step="0.05" value="0.5" />
      </div>
      <div class="control-group">
        <div class="control-label">
          <span>粒子数量</span>
          <span class="control-value" id="particle-value">2000</span>
        </div>
        <input type="range" id="particle-slider" min="500" max="5000" step="100" value="2000" />
      </div>
      <button class="reset-btn" id="reset-btn">重置粒子系统</button>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
