<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>洛伦兹力粒子模拟器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: linear-gradient(135deg, #0A0A1A 0%, #1A0A2E 100%);
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      color: #e0e0e0;
    }

    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    #canvas-wrapper {
      width: 800px;
      height: 600px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(108, 92, 231, 0.15), 0 0 80px rgba(108, 92, 231, 0.05);
    }

    #canvas-wrapper canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #status-info {
      position: fixed;
      left: 16px;
      bottom: 16px;
      background: rgba(30, 26, 46, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(108, 92, 231, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 12px;
      line-height: 1.8;
      color: #b8b5cc;
      min-width: 220px;
      pointer-events: none;
      z-index: 10;
    }

    #status-info .label {
      color: #6C5CE7;
      font-weight: 600;
    }

    #status-info .value {
      color: #A29BFE;
      float: right;
    }

    #control-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 280px;
      background: rgba(30, 26, 46, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(108, 92, 231, 0.4);
      border-radius: 12px;
      padding: 16px;
      z-index: 20;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #control-panel.collapsed {
      transform: translateX(calc(100% + 20px));
      opacity: 0;
      pointer-events: none;
    }

    #panel-toggle {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 44px;
      height: 44px;
      background: rgba(30, 26, 46, 0.9);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(108, 92, 231, 0.5);
      border-radius: 50%;
      color: #A29BFE;
      font-size: 20px;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 19;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    #panel-toggle:hover {
      box-shadow: 0 0 12px rgba(108, 92, 231, 0.5);
      border-color: #A29BFE;
    }

    #control-panel h3 {
      font-size: 13px;
      font-weight: 600;
      color: #A29BFE;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid rgba(108, 92, 231, 0.25);
      padding-bottom: 8px;
    }

    .slider-group {
      margin-bottom: 12px;
    }

    .slider-group .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      font-size: 11.5px;
    }

    .slider-group .slider-label {
      color: #b8b5cc;
    }

    .slider-group .slider-value {
      color: #A29BFE;
      font-weight: 600;
      font-size: 12px;
      min-width: 36px;
      text-align: right;
    }

    .slider-group input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #6C5CE7, #A29BFE);
      outline: none;
      cursor: pointer;
      transition: box-shadow 0.2s ease;
    }

    .slider-group input[type="range"]:hover {
      box-shadow: 0 0 8px rgba(108, 92, 231, 0.5);
    }

    .slider-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #6C5CE7;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(108, 92, 231, 0.4);
      transition: box-shadow 0.2s ease;
    }

    .slider-group input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(108, 92, 231, 0.7);
    }

    .slider-group input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #fff;
      border: 2px solid #6C5CE7;
      cursor: pointer;
      box-shadow: 0 0 6px rgba(108, 92, 231, 0.4);
    }

    @media (max-width: 1200px) {
      #control-panel.collapsed {
        transform: translateX(calc(100% + 20px));
        opacity: 0;
        pointer-events: none;
      }

      #control-panel:not(.collapsed) {
        transform: translateX(0);
        opacity: 1;
        pointer-events: all;
      }

      #panel-toggle {
        display: flex;
      }
    }

    @media (min-width: 1201px) {
      #panel-toggle {
        display: none !important;
      }
      #control-panel {
        transform: none !important;
        opacity: 1 !important;
        pointer-events: all !important;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-wrapper"></div>
    <div id="status-info"></div>
    <div id="control-panel"></div>
    <button id="panel-toggle">&#9881;</button>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
