<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>幻境弹球</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0f0c29, #302b63);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    #container {
      position: relative;
      width: 100%;
      max-width: 1000px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #gameCanvas {
      display: block;
      border-radius: 4px;
    }

    #gameHud {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 15px;
      color: #fff;
      font-size: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 10;
    }

    #gameHud .hud-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .heart {
      color: #ff4444;
      font-size: 18px;
    }

    .heart.lost {
      opacity: 0.3;
    }

    #modeSwitchGame {
      margin-top: 4px;
    }

    #editorUI {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      z-index: 10;
    }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 10px 15px;
    }

    #properties {
      position: absolute;
      top: 60px;
      right: 10px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
      padding: 15px;
      color: #fff;
      min-width: 160px;
      pointer-events: auto;
    }

    #properties h3 {
      margin-bottom: 8px;
      font-size: 14px;
      color: #aaa;
    }

    #selectedBrickInfo {
      font-size: 13px;
      line-height: 1.6;
    }

    #modeSwitchEditor {
      position: absolute;
      top: 10px;
      right: 10px;
      pointer-events: auto;
    }

    .btn {
      background: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.1s, transform 0.1s;
    }

    .btn:hover {
      background: #357abd;
    }

    .btn:active {
      background: #2a5f9e;
      transform: scale(0.96);
    }

    .btn.active {
      background: #2a5f9e;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
    }

    .color-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 2px solid transparent;
      cursor: pointer;
      transition: border-color 0.1s, transform 0.1s;
    }

    .color-btn:hover {
      transform: scale(1.1);
    }

    .color-btn.active {
      border-color: #fff;
    }

    .color-btn.red-btn {
      background: #ff4444;
    }

    .color-btn.blue-btn {
      background: #4488ff;
    }

    .color-btn.green-btn {
      background: #44ff44;
    }

    #gameOverOverlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.7);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #fff;
      z-index: 20;
    }

    #gameOverOverlay h2 {
      font-size: 36px;
      margin-bottom: 12px;
    }

    #gameOverOverlay p {
      font-size: 20px;
      margin-bottom: 20px;
    }

    #launchHint {
      position: absolute;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      pointer-events: none;
      z-index: 10;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @media (max-width: 600px) {
      #toolbar {
        flex-wrap: wrap;
        max-width: 90vw;
        justify-content: center;
      }
      .btn {
        padding: 6px 10px;
        font-size: 12px;
      }
      .color-btn {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <canvas id="gameCanvas"></canvas>

    <div id="gameHud" style="display:none">
      <div class="hud-row">
        <span>得分: <strong id="scoreDisplay">0</strong></span>
      </div>
      <div class="hud-row" id="livesDisplay"></div>
      <button class="btn" id="modeSwitchGame">切换到编辑器</button>
    </div>

    <div id="editorUI" style="display:none">
      <div id="toolbar">
        <button class="color-btn red-btn active" data-color="red" title="红色 (3血)"></button>
        <button class="color-btn blue-btn" data-color="blue" title="蓝色 (2血)"></button>
        <button class="color-btn green-btn" data-color="green" title="绿色 (1血)"></button>
        <button class="btn" id="saveBtn">保存关卡</button>
        <button class="btn" id="loadBtn">加载关卡</button>
        <button class="btn" id="clearBtn">清空网格</button>
      </div>
      <div id="properties">
        <h3>属性面板</h3>
        <div id="selectedBrickInfo">未选中砖块</div>
      </div>
      <button class="btn" id="modeSwitchEditor">切换到游戏</button>
    </div>

    <div id="gameOverOverlay" style="display:none">
      <h2>游戏结束</h2>
      <p>最终得分: <strong id="finalScore">0</strong></p>
      <button class="btn" id="restartBtn" style="font-size:18px;padding:12px 24px;">重新开始</button>
    </div>

    <div id="launchHint" style="display:none">点击发射球体</div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
