<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海盗船避障模拟</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #0D47A1 0%, #1A237E 100%);
      color: #FFFFFF;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 16px;
    }

    .header {
      width: 100%;
      max-width: 1040px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 600;
      color: #FFFFFF;
      letter-spacing: 1px;
    }

    .main-container {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      justify-content: center;
      flex-wrap: wrap;
      width: 100%;
      max-width: 1040px;
    }

    .game-area {
      display: flex;
      flex-direction: column;
      gap: 12px;
      flex-shrink: 0;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 800px;
      padding: 0 4px;
      gap: 16px;
      flex-wrap: wrap;
    }

    .distance {
      font-size: 16px;
      font-weight: 500;
      color: #E3F2FD;
      white-space: nowrap;
    }

    .health-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .health-label {
      font-size: 14px;
      color: #B0BEC5;
    }

    .health-bar {
      width: 200px;
      height: 16px;
      background: #E0E0E0;
      border: 1px solid #37474F;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .health-fill {
      height: 100%;
      transition: width 0.3s ease, background-color 0.3s ease;
    }

    .canvas-wrapper {
      position: relative;
      width: 800px;
      height: 600px;
      border: 1px solid #B0BEC5;
      border-radius: 4px;
      overflow: hidden;
      background: #1565C0;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .collision-count {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.5);
      color: #FFCDD2;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      background: #37474F;
      color: #FFFFFF;
      font-size: 14px;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .btn:hover {
      background: #546E7A;
      transform: translateY(-2px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .history-panel {
      width: 200px;
      background: #F5F5F5;
      border-radius: 8px;
      padding: 12px;
      color: #263238;
      flex-shrink: 0;
    }

    .history-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #37474F;
      border-bottom: 1px solid #E0E0E0;
      padding-bottom: 8px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .history-item {
      height: 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 8px;
      font-size: 12px;
      border-radius: 3px;
    }

    .history-item:nth-child(odd) {
      background: #FFFFFF;
    }

    .history-item:nth-child(even) {
      background: #FAFAFA;
    }

    .history-rank {
      font-weight: 600;
      color: #546E7A;
      width: 20px;
    }

    .history-info {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
    }

    .history-distance {
      color: #1565C0;
      font-weight: 500;
    }

    .history-health {
      color: #78909C;
      font-size: 11px;
    }

    .history-empty {
      padding: 20px 0;
      text-align: center;
      color: #B0BEC5;
      font-size: 12px;
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
        align-items: center;
      }

      .status-bar {
        width: 100%;
        max-width: 800px;
      }

      .canvas-wrapper {
        width: 100%;
        max-width: 800px;
        height: auto;
        aspect-ratio: 800 / 600;
      }

      .history-panel {
        width: 100%;
        max-width: 800px;
      }

      .game-area {
        width: 100%;
        align-items: center;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1 class="title">⛵ 海盗船避障模拟</h1>
    </div>

    <div class="main-container">
      <div class="game-area">
        <div class="status-bar">
          <span class="distance" id="distanceDisplay">已航行：0米</span>
          <div class="health-wrapper">
            <span class="health-label">生命值</span>
            <div class="health-bar">
              <div class="health-fill" id="healthFill" style="width: 100%; background: #4CAF50;"></div>
            </div>
          </div>
        </div>

        <div class="canvas-wrapper">
          <canvas id="gameCanvas" width="800" height="600"></canvas>
          <div class="collision-count" id="collisionCount" style="display: none;">碰撞次数：0</div>
        </div>

        <div class="controls">
          <button class="btn" id="startBtn">起航</button>
        </div>
      </div>

      <div class="history-panel">
        <div class="history-title">历史最佳记录</div>
        <div class="history-list" id="historyList">
          <div class="history-empty">暂无航行记录</div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
