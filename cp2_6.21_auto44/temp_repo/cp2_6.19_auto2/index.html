<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星云粒子可视化 | Nebula Visualization</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="loading-overlay">
    <div class="loading-container">
      <div class="loading-text">加载星云中...</div>
      <div class="loading-bar-container">
        <div class="loading-bar" id="loading-bar"></div>
      </div>
    </div>
  </div>

  <div class="constellation-left"></div>
  <div class="constellation-right"></div>

  <canvas id="canvas"></canvas>

  <div class="panel-toggle" id="panel-toggle">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="#6c63ff" stroke-width="2">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </div>

  <div class="control-panel" id="control-panel">
    <div class="panel-header">
      <h2>星云控制面板</h2>
      <button class="panel-close" id="panel-close">&times;</button>
    </div>
    <div class="panel-content">
      <div class="control-group">
        <label>粒子数量: <span id="count-value">7500</span></label>
        <input type="range" id="particle-count" min="5000" max="15000" step="200" value="7500" />
      </div>
      <div class="control-group">
        <label>旋转速度: <span id="speed-value">1.0</span>x</label>
        <input type="range" id="rotation-speed" min="0.1" max="2.0" step="0.1" value="1.0" />
      </div>
      <div class="control-group">
        <label>颜色主题</label>
        <div class="theme-buttons">
          <button class="theme-btn active" data-theme="default">默认</button>
          <button class="theme-btn" data-theme="neon">霓虹</button>
          <button class="theme-btn" data-theme="aurora">极光</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
