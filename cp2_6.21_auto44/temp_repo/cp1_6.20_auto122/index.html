<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roguelike 地牢探险</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div class="game-container">
      <aside class="sidebar left-sidebar">
        <div class="status-panel">
          <h2>玩家状态</h2>
          <div class="player-name">冒险者</div>
          <div class="level">
            <span class="label">等级</span>
            <span id="level-value">1</span>
          </div>
          <div class="health-bar-container">
            <div class="health-bar-label">
              <span id="health-text">20/20</span>
            </div>
            <div class="health-bar">
              <div id="health-fill" class="health-fill"></div>
            </div>
          </div>
          <div class="exp-bar-container">
            <div class="exp-bar-label">
              <span id="exp-text">0/20</span>
            </div>
            <div class="exp-bar">
              <div id="exp-fill" class="exp-fill"></div>
            </div>
          </div>
          <div class="stats">
            <div class="stat">
              <span class="label">攻击力</span>
              <span id="attack-value">5</span>
            </div>
            <div class="stat">
              <span class="label">防御力</span>
              <span id="defense-value">0</span>
            </div>
            <div class="stat">
              <span class="label">金币</span>
              <span id="gold-value">0</span>
            </div>
            <div class="stat">
              <span class="label">击杀</span>
              <span id="kills-value">0</span>
            </div>
          </div>
          <div class="equipped-panel">
            <h3>已装备</h3>
            <div class="equipped-slots">
              <div class="equipped-slot" id="slot-weapon">
                <div class="slot-label">武器</div>
                <div class="slot-item" id="equipped-weapon">-</div>
              </div>
              <div class="equipped-slot" id="slot-armor">
                <div class="slot-label">防具</div>
                <div class="slot-item" id="equipped-armor">-</div>
              </div>
              <div class="equipped-slot" id="slot-accessory">
                <div class="slot-label">饰品</div>
                <div class="slot-item" id="equipped-accessory">-</div>
              </div>
          </div>
        </div>
      </aside>
      <main class="main-area">
        <div id="game-map" class="game-map"></div>
        <div id="inventory-overlay" class="inventory-overlay hidden">
          <div class="inventory-panel">
            <h2>背包 <span class="inventory-title">(I 关闭)</span></h2>
            <div class="inventory-grid" id="inventory-grid"></div>
          </div>
        </div>
        <div id="gameover-overlay" class="gameover-overlay hidden">
          <div class="gameover-panel">
            <h1>GAME OVER</h1>
            <div class="final-score">
              <div class="score-item">
                <span>击杀数</span>
                <span id="final-kills">0</span>
              </div>
              <div class="score-item">
                <span>金币</span>
                <span id="final-gold">0</span>
              </div>
              <div class="score-item">
                <span>等级</span>
                <span id="final-level">1</span>
              </div>
              <div class="score-total">
                <span>最终得分</span>
                <span id="final-score">0</span>
              </div>
            </div>
            <p>按 R 键重新开始</p>
          </div>
        </div>
      </main>
      <aside class="sidebar right-sidebar">
        <div class="log-panel">
          <h2>战斗日志</h2>
          <div id="combat-log" class="combat-log"></div>
        </div>
        <div class="controls-help">
          <h3>操作说明</h3>
          <p>WASD / 方向键 - 移动</p>
          <p>I - 打开/关闭背包</p>
          <p>R - 重新开始</p>
        </div>
      </aside>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
