<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D地形生成与探索</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1A1A2E;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }
    #canvas-container {
      flex: 1;
      width: 80%;
      height: 100%;
      position: relative;
    }
    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    #gui-container {
      width: 280px;
      height: 100vh;
      overflow-y: auto;
      background: #16213E;
      padding: 0;
      position: relative;
    }
    #info-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.5);
      color: #FFFFFF;
      font-size: 12px;
      font-family: "Consolas", monospace;
      border-radius: 4px;
      line-height: 1.6;
      pointer-events: none;
      z-index: 10;
    }
    #fps-display {
      position: absolute;
      bottom: 10px;
      left: 10px;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.5);
      color: #00FF00;
      font-size: 14px;
      font-family: "Consolas", monospace;
      border-radius: 4px;
      font-weight: bold;
      pointer-events: none;
      z-index: 10;
    }
    #gui-container::-webkit-scrollbar {
      width: 6px;
    }
    #gui-container::-webkit-scrollbar-track {
      background: #16213E;
    }
    #gui-container::-webkit-scrollbar-thumb {
      background: #E94560;
      border-radius: 3px;
    }
    .dg.main {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif !important;
    }
    .dg.main .close-button {
      background-color: #E94560 !important;
    }
    .dg .cr {
      background-color: #16213E !important;
    }
    .dg .c .slider {
      background: #0F3460 !important;
    }
    .dg .c .slider-fg {
      background: #E94560 !important;
    }
    .dg .c input[type=text] {
      background: #0F3460 !important;
      color: #EAEAEA !important;
    }
    .dg li.title {
      background: #E94560 !important;
      color: #FFFFFF !important;
    }
    .dg .property-name {
      color: #EAEAEA !important;
    }
    .dg .c select {
      background: #0F3460 !important;
      color: #EAEAEA !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <div id="info-panel">
        <div>速度: <span id="speed-value">1.0</span></div>
        <div>坐标: <span id="coord-value">0.00, 0.00, 0.00</span></div>
      </div>
      <div id="fps-display">FPS: <span id="fps-value">60</span></div>
    </div>
    <div id="gui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
