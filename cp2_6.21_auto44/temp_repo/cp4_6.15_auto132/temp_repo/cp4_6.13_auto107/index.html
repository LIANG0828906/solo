<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>点云可视化与测量工具</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC',
        'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    #sidebar-container {
      position: absolute;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      z-index: 10;
    }

    @media (max-width: 768px) {
      #sidebar-container {
        width: 100%;
        height: 56px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="sidebar-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
