<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>光织·音之海 | Light Weave Sea of Sound</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-blue: #00d4ff;
      --primary-coral: #ff6b6b;
      --deep-ocean: #0a1628;
      --mid-ocean: #0f2847;
      --glass-bg: rgba(15, 40, 71, 0.55);
      --glass-border: rgba(0, 212, 255, 0.3);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Noto Sans SC', 'Orbitron', sans-serif;
      background: var(--deep-ocean);
      color: #ffffff;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    #canvas-container:active {
      cursor: grabbing;
    }

    .title-overlay {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    .title-overlay h1 {
      font-family: 'Orbitron', 'Noto Sans SC', sans-serif;
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, var(--primary-blue) 0%, var(--primary-coral) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 40px rgba(0, 212, 255, 0.5);
      animation: titleGlow 3s ease-in-out infinite;
    }

    .title-overlay p {
      font-size: 0.85rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(255, 255, 255, 0.6);
      margin-top: 8px;
    }

    @keyframes titleGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(0, 212, 255, 0.5)); }
      50% { filter: drop-shadow(0 0 25px rgba(0, 212, 255, 0.8)); }
    }

    .control-panel {
      position: absolute;
      left: 24px;
      bottom: 24px;
      width: 300px;
      padding: 24px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 0 40px rgba(0, 212, 255, 0.1);
      z-index: 100;
    }

    .panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary-blue);
      margin-bottom: 20px;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .panel-title::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--primary-blue);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--primary-blue);
      animation: pulseDot 2s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.2); }
    }

    .control-group {
      margin-bottom: 20px;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .btn {
      width: 100%;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-blue) 0%, #0099cc 100%);
      color: #ffffff;
      box-shadow: 
        0 4px 15px rgba(0, 212, 255, 0.3),
        0 0 20px rgba(0, 212, 255, 0.1);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 6px 25px rgba(0, 212, 255, 0.5),
        0 0 30px rgba(0, 212, 255, 0.2);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: var(--primary-blue);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
    }

    .slider-container {
      position: relative;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, 
        rgba(0, 212, 255, 0.3) 0%, 
        rgba(255, 107, 107, 0.3) 100%);
      outline: none;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-coral));
      cursor: pointer;
      box-shadow: 
        0 0 15px rgba(0, 212, 255, 0.6),
        0 2px 10px rgba(0, 0, 0, 0.3);
      transition: all 0.2s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      transform: scale(1.15);
      box-shadow: 
        0 0 25px rgba(0, 212, 255, 0.8),
        0 2px 15px rgba(0, 0, 0, 0.4);
    }

    .slider::-moz-range-thumb {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-coral));
      cursor: pointer;
      border: none;
      box-shadow: 
        0 0 15px rgba(0, 212, 255, 0.6),
        0 2px 10px rgba(0, 0, 0, 0.3);
    }

    .slider-value {
      display: flex;
      justify-content: space-between;
      margin-top: 8px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.5);
    }

    .slider-value span:last-child {
      color: var(--primary-blue);
      font-weight: 500;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .toggle-switch {
      position: relative;
      width: 48px;
      height: 26px;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.1);
      transition: 0.3s;
      border-radius: 26px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toggle-slider::before {
      position: absolute;
      content: '';
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background: rgba(255, 255, 255, 0.6);
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-coral));
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
    }

    input:checked + .toggle-slider::before {
      transform: translateX(22px);
      background: #ffffff;
    }

    .log-panel {
      position: absolute;
      right: 24px;
      bottom: 24px;
      width: 320px;
      max-height: 280px;
      padding: 20px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      box-shadow: 
        0 8px 32px rgba(0, 0, 0, 0.3),
        0 0 0 1px rgba(255, 255, 255, 0.05) inset,
        0 0 40px rgba(255, 107, 107, 0.08);
      z-index: 100;
      overflow: hidden;
    }

    .log-panel-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      color: var(--primary-coral);
      margin-bottom: 16px;
      letter-spacing: 0.1em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-panel-title::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--primary-coral);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--primary-coral);
      animation: pulseDot 2s ease-in-out infinite;
    }

    .log-list {
      list-style: none;
      max-height: 200px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0, 212, 255, 0.3) transparent;
    }

    .log-list::-webkit-scrollbar {
      width: 4px;
    }

    .log-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .log-list::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.3);
      border-radius: 2px;
    }

    .log-item {
      padding: 10px 12px;
      margin-bottom: 8px;
      background: rgba(255, 255, 255, 0.03);
      border-radius: 8px;
      border-left: 3px solid var(--primary-blue);
      animation: logSlideIn 0.3s ease-out;
      transition: all 0.2s ease;
    }

    .log-item:hover {
      background: rgba(0, 212, 255, 0.08);
    }

    .log-item.click {
      border-left-color: var(--primary-coral);
    }

    @keyframes logSlideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .log-node {
      font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--primary-blue);
    }

    .log-item.click .log-node {
      color: var(--primary-coral);
    }

    .log-time {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
    }

    .log-details {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.6);
    }

    .log-pitch {
      display: inline-block;
      padding: 2px 8px;
      background: rgba(0, 212, 255, 0.2);
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-weight: 500;
      color: var(--primary-blue);
      margin-right: 8px;
    }

    .log-item.click .log-pitch {
      background: rgba(255, 107, 107, 0.2);
      color: var(--primary-coral);
    }

    .log-empty {
      text-align: center;
      padding: 30px 0;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.85rem;
    }

    .fps-counter {
      position: absolute;
      top: 24px;
      right: 24px;
      padding: 8px 14px;
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: 0.8rem;
      color: var(--primary-blue);
      z-index: 50;
    }

    .hint-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.95rem;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 5;
    }

    .hint-text.hidden {
      opacity: 0;
    }

    .hint-text p {
      margin-bottom: 8px;
    }

    .hint-text p:last-child {
      margin-bottom: 0;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.2);
    }

    @media (max-width: 768px) {
      .control-panel, .log-panel {
        width: calc(50% - 36px);
        padding: 16px;
      }
      
      .title-overlay h1 {
        font-size: 1.5rem;
      }
    }

    @media (max-width: 480px) {
      .control-panel, .log-panel {
        width: calc(100% - 48px);
        left: 24px;
        right: 24px;
      }
      
      .control-panel {
        bottom: auto;
        top: 80px;
      }
      
      .log-panel {
        bottom: 24px;
        max-height: 180px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    
    <div class="title-overlay">
      <h1>光织·音之海</h1>
      <p>LIGHT WEAVE · SEA OF SOUND</p>
    </div>

    <div class="fps-counter">FPS: <span id="fps-value">60</span></div>

    <div class="hint-text" id="hint-text">
      <p>✨ 点击空间创建发光音符节点</p>
      <p>🎵 点击节点触发音爆特效</p>
      <p>拖拽旋转视角 · 滚轮缩放</p>
    </div>

    <div class="control-panel">
      <div class="panel-title">控 制 面 板</div>
      
      <div class="control-group">
        <button class="btn btn-primary" id="btn-add-node">
          ✦ 生成新节点
        </button>
      </div>

      <div class="control-group">
        <label class="control-label">音流强度</label>
        <div class="slider-container">
          <input type="range" class="slider" id="intensity-slider" min="0" max="100" value="50">
          <div class="slider-value">
            <span>轻柔</span>
            <span id="intensity-value">50%</span>
            <span>澎湃</span>
          </div>
        </div>
      </div>

      <div class="control-group">
        <button class="btn btn-secondary" id="btn-reset-view">
          ⟲ 重置视角
        </button>
      </div>

      <div class="control-group">
        <div class="toggle-row">
          <span class="control-label" style="margin-bottom: 0;">全屏模式</span>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-fullscreen">
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <div class="log-panel">
      <div class="log-panel-title">音 序 日 志</div>
      <ul class="log-list" id="log-list">
        <div class="log-empty" id="log-empty">
          等待第一次交互...
        </div>
      </ul>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
