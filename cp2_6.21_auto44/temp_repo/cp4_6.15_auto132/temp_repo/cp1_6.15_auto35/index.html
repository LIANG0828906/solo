<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动态数据流 3D 网络拓扑可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0a2e 0%, #1a1a3e 100%);
      color: #ffffff;
    }
    #app {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    .glass-panel {
      position: absolute;
      background: rgba(20, 20, 50, 0.45);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      color: #ffffff;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .info-panel {
      padding: 14px 18px;
      font-size: 13px;
      line-height: 1.7;
      pointer-events: none;
      min-width: 200px;
      transform-origin: bottom center;
      animation: panelPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .info-panel .title {
      font-size: 15px;
      font-weight: bold;
      color: #88ccff;
      margin-bottom: 8px;
      border-bottom: 1px solid rgba(136, 204, 255, 0.3);
      padding-bottom: 6px;
    }
    .info-panel .row {
      display: flex;
      justify-content: space-between;
      gap: 16px;
    }
    .info-panel .label {
      color: rgba(255, 255, 255, 0.6);
    }
    .info-panel .value {
      color: #aaffcc;
    }
    @keyframes panelPop {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    #monitor-panel {
      right: 20px;
      bottom: 20px;
      padding: 14px 18px;
      font-size: 12px;
      line-height: 1.8;
      min-width: 220px;
      z-index: 100;
      transition: all 0.3s ease;
      cursor: move;
      user-select: none;
    }
    #monitor-panel.collapsed {
      width: 64px;
      height: 64px;
      min-width: 64px;
      border-radius: 50%;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      cursor: pointer;
      overflow: hidden;
    }
    #monitor-panel.collapsed .panel-header,
    #monitor-panel.collapsed .panel-content {
      display: none;
    }
    #monitor-panel .collapsed-fps {
      display: none;
      text-align: center;
      font-size: 11px;
      line-height: 1.2;
    }
    #monitor-panel .collapsed-fps .fps-num {
      font-size: 20px;
      font-weight: bold;
      display: block;
    }
    #monitor-panel.collapsed .collapsed-fps {
      display: block;
    }
    #monitor-panel .collapsed-fps .fps-num.low {
      color: #ff6666;
    }
    #monitor-panel .collapsed-fps .fps-num.medium {
      color: #ffcc66;
    }
    #monitor-panel .collapsed-fps .fps-num.high {
      color: #66ff99;
    }
    #monitor-panel .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-weight: bold;
      color: #88ccff;
      font-size: 13px;
    }
    #monitor-panel .collapse-btn {
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 4px;
      transition: all 0.2s;
    }
    #monitor-panel .collapse-btn:hover {
      color: #ffffff;
      background: rgba(255, 255, 255, 0.1);
    }
    #monitor-panel .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    #monitor-panel .stat-label {
      color: rgba(255, 255, 255, 0.6);
    }
    #monitor-panel .stat-value {
      color: #aaffcc;
    }
    #monitor-panel.warning {
      border-color: #ff4444;
      animation: warningBlink 0.8s ease-in-out infinite;
    }
    @keyframes warningBlink {
      0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(255, 68, 68, 0); }
      50% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 16px 2px rgba(255, 68, 68, 0.6); }
    }
    #monitor-panel .fps-value.low {
      color: #ff6666;
    }
    #monitor-panel .fps-value.medium {
      color: #ffcc66;
    }
    #monitor-panel .fps-value.high {
      color: #66ff99;
    }
    .load-label {
      padding: 6px 12px;
      font-size: 12px;
      pointer-events: none;
      white-space: nowrap;
      animation: panelPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .load-label .bar {
      width: 80px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      margin-top: 4px;
      overflow: hidden;
    }
    .load-label .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #4488ff, #ff4444);
      border-radius: 2px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div id="node-info-panel" class="glass-panel info-panel" style="display: none; position: absolute;">
      <div class="title" id="info-title">节点信息</div>
      <div class="row"><span class="label">类型</span><span class="value" id="info-type">-</span></div>
      <div class="row"><span class="label">IP</span><span class="value" id="info-ip">-</span></div>
      <div class="row"><span class="label">处理速率</span><span class="value" id="info-rate">-</span></div>
      <div class="row"><span class="label">连接数</span><span class="value" id="info-conn">-</span></div>
    </div>

    <div id="edge-load-label" class="glass-panel load-label" style="display: none; position: absolute;">
      <div>负载 <span id="load-value">0%</span></div>
      <div class="bar"><div class="bar-fill" id="load-bar" style="width: 0%"></div></div>
    </div>

    <div id="monitor-panel" class="glass-panel">
      <div class="collapsed-fps">
        <span class="fps-num" id="collapsed-fps-num">60</span>
        <span>FPS</span>
      </div>
      <div class="panel-header">
        <span>性能监控</span>
        <span class="collapse-btn" id="collapse-btn">−</span>
      </div>
      <div class="panel-content">
        <div class="stat-row"><span class="stat-label">FPS</span><span class="stat-value fps-value high" id="fps-value">60</span></div>
        <div class="stat-row"><span class="stat-label">节点数</span><span class="stat-value" id="node-count">0</span></div>
        <div class="stat-row"><span class="stat-label">链路数</span><span class="stat-value" id="edge-count">0</span></div>
        <div class="stat-row"><span class="stat-label">平均延迟</span><span class="stat-value" id="avg-latency">0ms</span></div>
        <div class="stat-row"><span class="stat-label">粒子数</span><span class="stat-value" id="particle-count">0</span></div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
