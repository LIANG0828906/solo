<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>御膳房·古代庖厨模拟器</title>
  <style>
    @font-face {
      font-family: 'KaiTiCustom';
      src: local('楷体'), local('KaiTi'), local('STKaiti');
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #F5F5DC;
    }
    
    body {
      font-family: 'KaiTiCustom', '楷体', 'STKaiti', 'SimKai', serif;
    }
    
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: default;
    }
    
    #gameCanvas.dragging {
      cursor: grabbing;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
