<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="1 0 0 0 0.85
                                                     0 1 0 0 0.75
                                                     0 0 1 0 0.55
                                                     0 0 0 0.15 0" result="coloredNoise"/>
    </filter>
    <linearGradient id="paperGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E8D4A0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4C089;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#paperGradient)" filter="url(#paperNoise)" opacity="0.6"/>
  <g opacity="0.08">
    <path d="M0,50 Q100,30 200,60 T400,45" stroke="#8B4513" stroke-width="0.5" fill="none"/>
    <path d="M0,150 Q150,130 300,160 T400,140" stroke="#8B4513" stroke-width="0.3" fill="none"/>
    <path d="M0,250 Q120,230 250,270 T400,255" stroke="#8B4513" stroke-width="0.4" fill="none"/>
    <path d="M0,350 Q180,330 320,365 T400,350" stroke="#8B4513" stroke-width="0.3" fill="none"/>
    <path d="M50,0 Q30,100 60,200 T45,400" stroke="#8B4513" stroke-width="0.4" fill="none"/>
    <path d="M150,0 Q130,150 170,300 T140,400" stroke="#8B4513" stroke-width="0.3" fill="none"/>
    <path d="M250,0 Q230,120 270,250 T245,400" stroke="#8B4513" stroke-width="0.4" fill="none"/>
    <path d="M350,0 Q330,180 360,280 T345,400" stroke="#8B4513" stroke-width="0.3" fill="none"/>
  </g>
  <g opacity="0.05">
    <circle cx="80" cy="80" r="20" fill="#8B4513"/>
    <circle cx="320" cy="120" r="15" fill="#8B4513"/>
    <circle cx="200" cy="300" r="25" fill="#8B4513"/>
    <circle cx="100" cy="350" r="12" fill="#8B4513"/>
    <circle cx="350" cy="320" r="18" fill="#8B4513"/>
  </g>
</svg>
