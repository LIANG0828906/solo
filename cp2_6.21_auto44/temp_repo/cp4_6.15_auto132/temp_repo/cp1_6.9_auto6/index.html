<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D家居空间规划</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: #FFF8E7;
    }
    
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    
    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }
    
    #toolbar {
      position: absolute;
      top: 50%;
      left: 24px;
      transform: translateY(-50%);
      width: 80px;
      padding: 16px 12px;
      background: rgba(255, 248, 231, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 16px;
      border: 1px solid rgba(212, 165, 116, 0.3);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 100;
    }
    
    .toolbar-btn {
      width: 100%;
      aspect-ratio: 1;
      border: none;
      border-radius: 12px;
      background: linear-gradient(145deg, #E8D5BD, #D4A574);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: all 0.2s ease-out;
      position: relative;
      overflow: hidden;
    }
    
    .toolbar-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
      border-radius: 12px 12px 0 0;
    }
    
    .toolbar-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 4px 16px rgba(212, 165, 116, 0.4);
    }
    
    .toolbar-btn:active {
      transform: scale(0.96);
    }
    
    .toolbar-btn svg {
      width: 28px;
      height: 28px;
      color: #FFF8E7;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.2));
      z-index: 1;
    }
    
    .toolbar-btn span {
      font-size: 10px;
      color: #FFF8E7;
      font-weight: 500;
      z-index: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }
    
    #hint {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: rgba(255, 248, 231, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 24px;
      border: 1px solid rgba(212, 165, 116, 0.3);
      font-size: 13px;
      color: #8B7355;
      z-index: 100;
      user-select: none;
    }
    
    #hint kbd {
      display: inline-block;
      padding: 2px 8px;
      margin: 0 2px;
      background: #D4A574;
      color: #FFF8E7;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div id="toolbar"></div>
    <div id="hint">
      拖拽移动 | <kbd>R</kbd> 旋转 | <kbd>Delete</kbd> 删除 | 鼠标左键旋转视角 | 滚轮缩放
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
