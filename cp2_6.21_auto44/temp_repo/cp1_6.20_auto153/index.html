<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>交互式太阳系模拟器</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <div id="scene-container"></div>

    <div id="sun-glow"></div>

    <aside id="planet-panel" class="glass-panel">
      <h2 class="panel-title">行星列表</h2>
      <ul id="planet-list"></ul>
      <div id="planet-details" class="hidden">
        <h3 id="detail-name"></h3>
        <div id="detail-params"></div>
      </div>
    </aside>

    <div id="control-bar" class="glass-panel">
      <div class="control-group">
        <label for="view-mode-select">视角模式</label>
        <select id="view-mode-select">
          <option value="free">自由视角</option>
          <option value="top">俯视视角</option>
          <option value="side">侧视视角</option>
        </select>
      </div>

      <div class="control-group slider-group">
        <div id="speed-display">1.0x</div>
        <input type="range" id="speed-slider" min="0" max="10" step="0.5" value="1" />
        <span class="slider-label">速度</span>
      </div>

      <div class="control-group">
        <button id="pause-btn" class="icon-btn" title="暂停">
          <svg id="pause-icon" viewBox="0 0 24 24" width="20" height="20">
            <rect x="6" y="4" width="4" height="16" rx="1" fill="white"/>
            <rect x="14" y="4" width="4" height="16" rx="1" fill="white"/>
          </svg>
          <svg id="play-icon" viewBox="0 0 24 24" width="20" height="20" class="hidden">
            <polygon points="6,4 20,12 6,20" fill="white"/>
          </svg>
        </button>
      </div>

      <div class="control-group">
        <label class="toggle-switch">
          <input type="checkbox" id="orbit-toggle" checked />
          <span class="toggle-slider"></span>
          <span class="toggle-label">轨道倾角显示</span>
        </label>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
