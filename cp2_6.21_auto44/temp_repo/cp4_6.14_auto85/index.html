<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>抽象雕塑创作工作室</title>
  <link rel="stylesheet" href="./src/style.css" />
</head>
<body>
  <div id="app">
    <canvas id="scene-canvas"></canvas>

    <div id="capture-overlay" class="hidden">
      <div class="capture-frame"></div>
    </div>

    <header id="top-nav">
      <button id="mobile-menu-btn" class="mobile-btn" aria-label="打开工具栏">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
      <h1>抽象雕塑创作工作室</h1>
      <div class="nav-actions">
        <button id="capture-btn" class="nav-btn" title="保存快照">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
          <span>快照</span>
        </button>
        <button id="clear-btn" class="nav-btn" title="清空场景">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"></path>
          </svg>
          <span>清空</span>
        </button>
      </div>
    </header>

    <aside id="left-toolbar" class="panel">
      <div class="panel-title">几何体</div>
      <div class="tool-buttons">
        <button class="tool-btn" data-type="cube" draggable="true" title="立方体">
          <svg viewBox="0 0 48 48" width="32" height="32">
            <rect x="8" y="8" width="32" height="32" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="8" y1="8" x2="20" y2="4" stroke="currentColor" stroke-width="2"/>
            <line x1="40" y1="8" x2="40" y2="40" stroke="none"/>
            <line x1="40" y1="8" x2="48" y2="4" stroke="currentColor" stroke-width="2"/>
            <line x1="20" y1="4" x2="48" y2="4" stroke="currentColor" stroke-width="2"/>
            <line x1="48" y1="4" x2="48" y2="36" stroke="currentColor" stroke-width="2"/>
            <line x1="48" y1="36" x2="40" y2="40" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <button class="tool-btn" data-type="sphere" draggable="true" title="球体">
          <svg viewBox="0 0 48 48" width="32" height="32">
            <circle cx="24" cy="24" r="16" fill="none" stroke="currentColor" stroke-width="2"/>
            <ellipse cx="24" cy="24" rx="16" ry="6" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/>
            <path d="M24,8 Q32,16 24,24 Q16,32 24,40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="3,2"/>
          </svg>
        </button>
        <button class="tool-btn" data-type="cylinder" draggable="true" title="圆柱体">
          <svg viewBox="0 0 48 48" width="32" height="32">
            <ellipse cx="24" cy="10" rx="12" ry="5" fill="none" stroke="currentColor" stroke-width="2"/>
            <line x1="12" y1="10" x2="12" y2="38" stroke="currentColor" stroke-width="2"/>
            <line x1="36" y1="10" x2="36" y2="38" stroke="currentColor" stroke-width="2"/>
            <ellipse cx="24" cy="38" rx="12" ry="5" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
        <button class="tool-btn" data-type="cone" draggable="true" title="圆锥体">
          <svg viewBox="0 0 48 48" width="32" height="32">
            <path d="M24,6 L12,40" stroke="currentColor" stroke-width="2" fill="none"/>
            <path d="M24,6 L36,40" stroke="currentColor" stroke-width="2" fill="none"/>
            <ellipse cx="24" cy="40" rx="12" ry="5" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
        </button>
      </div>

      <div class="divider"></div>

      <div class="panel-title">布尔运算</div>
      <div class="bool-buttons">
        <button class="bool-btn" data-op="union" title="并集">
          <svg viewBox="0 0 48 48" width="28" height="28">
            <circle cx="18" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="30" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>并集</span>
        </button>
        <button class="bool-btn" data-op="intersect" title="交集">
          <svg viewBox="0 0 48 48" width="28" height="28">
            <defs>
              <clipPath id="clip1">
                <circle cx="18" cy="24" r="12"/>
              </clipPath>
            </defs>
            <circle cx="30" cy="24" r="12" fill="currentColor" clip-path="url(#clip1)" opacity="0.4"/>
            <circle cx="18" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="30" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>交集</span>
        </button>
        <button class="bool-btn" data-op="subtract" title="差集">
          <svg viewBox="0 0 48 48" width="28" height="28">
            <circle cx="18" cy="24" r="12" fill="currentColor" opacity="0.4"/>
            <circle cx="18" cy="24" r="12" fill="none" stroke="currentColor" stroke-width="2"/>
            <circle cx="30" cy="24" r="12" fill="#0f172a" stroke="currentColor" stroke-width="2"/>
          </svg>
          <span>差集</span>
        </button>
      </div>
      <div id="selection-info" class="selection-info">
        <span>已选: <strong id="selected-count">0</strong>/2</span>
      </div>
    </aside>

    <main id="scene-area">
      <div id="properties-panel" class="hidden">
        <div class="prop-header">
          <h3>属性编辑</h3>
          <button id="close-props" class="close-btn">&times;</button>
        </div>

        <div class="prop-section">
          <h4>尺寸</h4>
          <div class="slider-group">
            <label>缩放</label>
            <input type="range" id="prop-scale" min="0.5" max="3.0" step="0.1" value="1.0">
            <span id="prop-scale-val" class="val-display">1.0</span>
          </div>
        </div>

        <div class="prop-section">
          <h4>位置</h4>
          <div class="slider-group">
            <label>X</label>
            <input type="range" id="prop-pos-x" min="-10" max="10" step="0.1" value="0">
            <span id="prop-pos-x-val" class="val-display">0.0</span>
          </div>
          <div class="slider-group">
            <label>Y</label>
            <input type="range" id="prop-pos-y" min="-10" max="10" step="0.1" value="0">
            <span id="prop-pos-y-val" class="val-display">0.0</span>
          </div>
          <div class="slider-group">
            <label>Z</label>
            <input type="range" id="prop-pos-z" min="-10" max="10" step="0.1" value="0">
            <span id="prop-pos-z-val" class="val-display">0.0</span>
          </div>
        </div>

        <div class="prop-section">
          <h4>旋转 (°)</h4>
          <div class="slider-group">
            <label>X</label>
            <input type="range" id="prop-rot-x" min="0" max="360" step="1" value="0">
            <span id="prop-rot-x-val" class="val-display">0</span>
          </div>
          <div class="slider-group">
            <label>Y</label>
            <input type="range" id="prop-rot-y" min="0" max="360" step="1" value="0">
            <span id="prop-rot-y-val" class="val-display">0</span>
          </div>
          <div class="slider-group">
            <label>Z</label>
            <input type="range" id="prop-rot-z" min="0" max="360" step="1" value="0">
            <span id="prop-rot-z-val" class="val-display">0</span>
          </div>
        </div>

        <button id="delete-geo" class="delete-btn">删除几何体</button>
      </div>
    </main>

    <aside id="right-panel" class="panel">
      <div class="panel-title">历史快照</div>
      <div id="snapshots-container"></div>
      <div id="empty-history" class="empty-state">
        <svg viewBox="0 0 24 24" width="36" height="36" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect>
          <circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <p>暂无快照</p>
        <small>点击顶部"快照"按钮保存</small>
      </div>
    </aside>

    <button id="mobile-history-btn" class="mobile-btn floating-btn" aria-label="打开历史">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6"></path>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
      </svg>
    </button>
  </div>

  <div id="drag-ghost" class="hidden">
    <canvas width="96" height="96"></canvas>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
