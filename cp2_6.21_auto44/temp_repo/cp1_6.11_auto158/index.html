<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D 城市天际线生成器</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas {
      display: block;
    }
    #fps {
      position: absolute;
      bottom: 16px;
      left: 16px;
      color: #ffffff;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      text-shadow: 0 0 4px rgba(0, 0, 0, 0.8);
      z-index: 100;
      pointer-events: none;
    }
    #gui-container {
      position: absolute;
      bottom: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 12px;
      padding: 16px;
      z-index: 100;
    }
    #gui-container .lil-gui {
      --width: 280px;
      --background-color: transparent;
      --widget-color: rgba(255, 255, 255, 0.08);
      --hover-color: rgba(255, 255, 255, 0.1);
      --focus-color: rgba(255, 255, 255, 0.15);
      --text-color: #CCCCCC;
      --title-background-color: transparent;
      --title-text-color: #FFFFFF;
      --number-color: #CCCCCC;
      --string-color: #CCCCCC;
      --font-size: 13px;
    }
    #gui-container .lil-gui .controller {
      transition: background-color 0.2s ease;
      border-radius: 6px;
      padding: 4px;
    }
    #gui-container .lil-gui .controller:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }
    #gui-container .lil-gui .widget input[type=range] {
      transition: all 0.15s ease;
    }
    #gui-container .lil-gui .title {
      padding: 8px 4px;
      font-weight: 600;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="fps">FPS: --</div>
    <div id="gui-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
