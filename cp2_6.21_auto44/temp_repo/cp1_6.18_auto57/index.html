<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹幕织造</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0A0A1A; }
    canvas#gameCanvas { display: block; width: 100%; height: 100%; }
    #controlPanel {
      position: fixed;
      top: 20px;
      left: 20px;
      width: 200px;
      background: rgba(26, 26, 46, 0.92);
      border: 1px solid #2A2A44;
      border-radius: 12px;
      padding: 18px 16px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      gap: 14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    #controlPanel .panel-title {
      color: #ffffff;
      font-size: 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      letter-spacing: 1px;
      text-align: center;
      opacity: 0.9;
    }
    #controlPanel label {
      color: #ffffff;
      font-size: 12px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      opacity: 0.7;
    }
    #controlPanel .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    #controlPanel .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #controlPanel .bpm-value {
      color: #4ECDC4;
      font-size: 13px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
    }
    input[type="range"]#bpmSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #2A2A44;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]#bpmSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4ECDC4;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(78, 205, 196, 0.5);
      transition: box-shadow 0.2s ease;
    }
    input[type="range"]#bpmSlider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 12px rgba(78, 205, 196, 0.8);
    }
    input[type="range"]#bpmSlider::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #4ECDC4;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 6px rgba(78, 205, 196, 0.5);
    }
    input[type="range"]#bpmSlider::-moz-range-track {
      height: 4px;
      background: #2A2A44;
      border-radius: 2px;
      border: none;
    }
    #resetBtn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #FF6B6B;
      border: none;
      cursor: pointer;
      align-self: center;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 2px 8px rgba(255, 107, 107, 0.3);
    }
    #resetBtn:hover {
      transform: scale(1.11);
      box-shadow: 0 0 16px rgba(255, 107, 107, 0.6), 0 0 32px rgba(255, 107, 107, 0.3);
    }
    #resetBtn svg {
      width: 18px;
      height: 18px;
      fill: #ffffff;
    }
    #beatCounter {
      color: #ffffff;
      font-size: 14px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center;
      opacity: 0.85;
    }
    #fpsDisplay {
      color: #ffffff;
      font-size: 11px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      text-align: center;
      opacity: 0.4;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <div id="controlPanel">
    <div class="panel-title">弹幕织造</div>
    <div class="slider-row">
      <div class="slider-header">
        <label for="bpmSlider">BPM</label>
        <span class="bpm-value" id="bpmValue">120</span>
      </div>
      <input type="range" id="bpmSlider" min="60" max="180" value="120" step="1" />
    </div>
    <button id="resetBtn">
      <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-8 3.58-8 8s3.58 8 8 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>
    <div id="beatCounter">节拍: 0</div>
    <div id="fpsDisplay">FPS: 60</div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
