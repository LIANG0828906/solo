<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rhythm Reactor</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
      #root { width: 100%; height: 100%; position: relative; }
      canvas#gameCanvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 0; }
      #hud-root { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
      #hud-root > * { pointer-events: auto; }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <canvas id="gameCanvas"></canvas>
    <div id="hud-root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
