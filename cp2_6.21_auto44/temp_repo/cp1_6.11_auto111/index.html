<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D角色技能连招编辑器</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: radial-gradient(ellipse at center, #2D2D44 0%, #1E1E2E 100%);
      color: #FFF;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
    }

    .app-title {
      text-align: center;
      padding: 12px 0 8px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #FF8C42, #6A5ACD);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      flex-shrink: 0;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-panel {
      width: 45%;
      height: 100%;
      background: #2A2A3E;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    .editor-header {
      padding: 16px 20px 10px;
      font-size: 15px;
      font-weight: 600;
      color: #AAA;
      letter-spacing: 1px;
      border-bottom: 1px solid #3A3A52;
      flex-shrink: 0;
    }

    .skill-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .skill-list::-webkit-scrollbar {
      width: 4px;
    }
    .skill-list::-webkit-scrollbar-track {
      background: transparent;
    }
    .skill-list::-webkit-scrollbar-thumb {
      background: #5A5A7A;
      border-radius: 2px;
    }

    .skill-card {
      width: 220px;
      height: 60px;
      background: linear-gradient(135deg, #3B3B52, #4A4A6A);
      border-radius: 10px;
      padding: 8px 14px;
      cursor: grab;
      user-select: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 2px;
      position: relative;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 1px solid #5A5A7A;
    }

    .skill-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 12px rgba(0,0,0,0.45);
    }

    .skill-card:active {
      transform: scale(0.97);
    }

    .skill-card.dragging {
      opacity: 0.6;
      cursor: grabbing;
      z-index: 100;
    }

    .skill-card .card-name {
      font-size: 14px;
      font-weight: 600;
      color: #FFF;
    }

    .skill-card .card-info {
      font-size: 11px;
      color: #AAA;
      display: flex;
      gap: 8px;
    }

    .skill-card .card-type-indicator {
      position: absolute;
      top: 6px;
      right: 8px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .skill-card .card-type-indicator.type-normal { background: #E0E0E0; }
    .skill-card .card-type-indicator.type-fire { background: #FF6600; }
    .skill-card .card-type-indicator.type-ice { background: #66CCFF; }

    .skill-card .delete-btn {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 18px;
      height: 18px;
      border: none;
      background: rgba(244,67,54,0.7);
      color: #FFF;
      font-size: 11px;
      border-radius: 50%;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.2s;
    }

    .skill-card:hover .delete-btn {
      display: flex;
    }

    .skill-card .delete-btn:hover {
      background: #F44336;
    }

    .drop-placeholder {
      width: 220px;
      height: 4px;
      border-top: 2px dashed #888;
      margin: 2px 0;
      flex-shrink: 0;
    }

    .add-skill-btn {
      margin: 10px 20px 16px;
      padding: 10px 0;
      width: 220px;
      background: linear-gradient(135deg, #4A4A6A, #5A5A8A);
      border: 1px dashed #7A7AAA;
      border-radius: 10px;
      color: #CCC;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      flex-shrink: 0;
    }

    .add-skill-btn:hover {
      background: linear-gradient(135deg, #5A5A8A, #6A6AAA);
      color: #FFF;
      border-color: #9A9ACC;
    }

    .add-skill-btn:active {
      transform: scale(0.97);
    }

    .add-skill-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .divider {
      width: 3px;
      background: linear-gradient(to bottom, #FF8C42, #6A5ACD);
      flex-shrink: 0;
    }

    .replay-panel {
      width: 55%;
      height: 100%;
      background: #1A1A2E;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .canvas-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #game-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .dps-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(34, 34, 68, 0.9);
      border-radius: 10px;
      padding: 10px 18px;
      color: #FFF;
      font-size: 16px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      border: 1px solid rgba(106, 90, 205, 0.4);
    }

    .dps-panel.visible {
      opacity: 1;
    }

    .combo-label {
      position: absolute;
      top: 60px;
      right: 16px;
      color: #FFF;
      font-size: 24px;
      font-weight: 800;
      -webkit-text-stroke: 2px #FFD700;
      paint-order: stroke fill;
      opacity: 0;
      transform: scale(0);
      pointer-events: none;
    }

    .combo-label.visible {
      opacity: 1;
      transform: scale(1);
    }

    .combo-label.combo-5 {
      font-size: 32px;
      -webkit-text-stroke: 3px #FFD700;
    }

    .control-bar {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #16162A;
      border-top: 1px solid #2A2A3E;
      flex-shrink: 0;
      padding: 0 16px;
    }

    .ctrl-btn {
      width: 80px;
      height: 40px;
      border: none;
      border-radius: 8px;
      color: #FFF;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .ctrl-btn:active {
      transform: scale(0.9);
    }

    .ctrl-btn.play-btn {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
      box-shadow: 0 2px 8px rgba(76,175,80,0.3);
    }
    .ctrl-btn.play-btn:hover {
      box-shadow: 0 4px 12px rgba(76,175,80,0.5);
    }

    .ctrl-btn.pause-btn {
      background: linear-gradient(135deg, #FF9800, #F57C00);
      box-shadow: 0 2px 8px rgba(255,152,0,0.3);
    }
    .ctrl-btn.pause-btn:hover {
      box-shadow: 0 4px 12px rgba(255,152,0,0.5);
    }

    .ctrl-btn.reset-btn {
      background: linear-gradient(135deg, #F44336, #D32F2F);
      box-shadow: 0 2px 8px rgba(244,67,54,0.3);
    }
    .ctrl-btn.reset-btn:hover {
      box-shadow: 0 4px 12px rgba(244,67,54,0.5);
    }

    .frame-counter {
      color: #FFF;
      font-size: 16px;
      font-weight: 500;
      min-width: 100px;
      text-align: center;
      letter-spacing: 1px;
    }

    .edit-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .edit-overlay.visible {
      display: flex;
    }

    .edit-panel {
      background: #2A2A3E;
      border: 1px solid #5A5A7A;
      border-radius: 12px;
      padding: 24px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .edit-panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #FF8C42;
      text-align: center;
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .edit-field label {
      font-size: 12px;
      color: #AAA;
    }

    .edit-field input,
    .edit-field select {
      background: #2A2A3E;
      border: 1px solid #5A5A7A;
      border-radius: 6px;
      padding: 8px 10px;
      color: #FFF;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .edit-field input:focus,
    .edit-field select:focus {
      border-color: #FF8C42;
    }

    .edit-field select {
      cursor: pointer;
    }

    .edit-field select option {
      background: #2A2A3E;
      color: #FFF;
    }

    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .edit-actions button {
      flex: 1;
      padding: 8px 0;
      border: none;
      border-radius: 6px;
      color: #FFF;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.2s;
    }

    .edit-actions button:active {
      transform: scale(0.95);
    }

    .edit-actions .save-btn {
      background: linear-gradient(135deg, #4CAF50, #388E3C);
    }

    .edit-actions .cancel-btn {
      background: linear-gradient(135deg, #666, #555);
    }

    .edit-actions .delete-edit-btn {
      background: linear-gradient(135deg, #F44336, #D32F2F);
    }

    .empty-hint {
      color: #666;
      font-size: 13px;
      text-align: center;
      padding: 40px 0;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-title">2D角色技能连招编辑器</div>
    <div class="main-container">
      <div class="editor-panel">
        <div class="editor-header">连招序列编辑</div>
        <div class="skill-list" id="skill-list">
          <div class="empty-hint" id="empty-hint">暂无技能<br>点击下方按钮添加技能卡片</div>
        </div>
        <button class="add-skill-btn" id="add-skill-btn">+ 添加技能</button>
      </div>
      <div class="divider"></div>
      <div class="replay-panel">
        <div class="canvas-container">
          <canvas id="game-canvas"></canvas>
          <div class="dps-panel" id="dps-panel">DPS: 0/秒</div>
          <div class="combo-label" id="combo-label"></div>
        </div>
        <div class="control-bar">
          <button class="ctrl-btn play-btn" id="play-btn">播放</button>
          <button class="ctrl-btn pause-btn" id="pause-btn">暂停</button>
          <button class="ctrl-btn reset-btn" id="reset-btn">重置</button>
          <span class="frame-counter" id="frame-counter">0 / 0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="edit-overlay" id="edit-overlay">
    <div class="edit-panel">
      <div class="edit-panel-title">编辑技能属性</div>
      <div class="edit-field">
        <label>技能名称</label>
        <input type="text" id="edit-name" />
      </div>
      <div class="edit-field">
        <label>技能类型</label>
        <select id="edit-type">
          <option value="normal">普通攻击</option>
          <option value="fire">火焰技能</option>
          <option value="ice">冰冻技能</option>
        </select>
      </div>
      <div class="edit-field">
        <label>伤害值</label>
        <input type="number" id="edit-damage" min="1" />
      </div>
      <div class="edit-field">
        <label>前摇帧数</label>
        <input type="number" id="edit-startup" min="1" />
      </div>
      <div class="edit-field">
        <label>判定帧数</label>
        <input type="number" id="edit-active" min="1" />
      </div>
      <div class="edit-field">
        <label>后摇帧数</label>
        <input type="number" id="edit-recovery" min="1" />
      </div>
      <div class="edit-actions">
        <button class="save-btn" id="edit-save">保存</button>
        <button class="cancel-btn" id="edit-cancel">取消</button>
        <button class="delete-edit-btn" id="edit-delete">删除</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
