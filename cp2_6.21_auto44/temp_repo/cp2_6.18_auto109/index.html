<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PipeVue - 地下管线3D可视化与碰撞检测</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0F1E;
      font-family: 'Courier New', 'Consolas', monospace;
      color: #ffffff;
    }
    #canvas-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: fixed;
      z-index: 10;
      pointer-events: none;
    }
    .overlay > * {
      pointer-events: auto;
    }

    #legend {
      top: 20px;
      left: 20px;
      display: flex;
      gap: 20px;
      padding: 10px 18px;
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 6px;
      font-size: 13px;
      letter-spacing: 0.5px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .legend-dot.water { background: #2196F3; box-shadow: 0 0 6px #2196F380; }
    .legend-dot.power { background: #FFEB3B; box-shadow: 0 0 6px #FFEB3B80; }
    .legend-dot.gas { background: #FF9800; box-shadow: 0 0 6px #FF980080; }

    #collision-panel {
      bottom: 20px;
      right: 20px;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 6px;
      font-size: 12px;
      min-width: 200px;
      max-width: 300px;
      max-height: 300px;
      overflow-y: auto;
    }
    #collision-panel h3 {
      font-size: 13px;
      margin-bottom: 10px;
      color: #FF1744;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .collision-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .collision-row:last-child {
      border-bottom: none;
    }
    .collision-pair {
      color: #FF8A80;
      font-weight: 600;
    }
    .collision-dist {
      color: rgba(255,255,255,0.7);
    }
    .no-collisions {
      color: rgba(255,255,255,0.4);
      font-style: italic;
    }

    #property-panel {
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      width: 240px;
      padding: 20px;
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    #property-panel.visible {
      opacity: 1;
      visibility: visible;
    }
    #property-panel h3 {
      font-size: 14px;
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.12);
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .prop-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
    }
    .prop-label {
      color: rgba(255,255,255,0.5);
    }
    .prop-value {
      color: #ffffff;
      font-weight: 500;
    }
    .panel-section-title {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 14px;
      margin-bottom: 6px;
    }
    .conflict-item {
      padding: 4px 0;
      color: #FF8A80;
      font-size: 11px;
    }
    .panel-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 8px 0;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px;
      color: #ffffff;
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease;
      letter-spacing: 0.5px;
    }
    .panel-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.25);
    }
    .panel-btn.danger {
      color: #FF1744;
      border-color: rgba(255,23,68,0.3);
    }
    .panel-btn.danger:hover {
      background: rgba(255,23,68,0.15);
      border-color: rgba(255,23,68,0.5);
    }

    #hover-label {
      position: fixed;
      z-index: 20;
      padding: 6px 12px;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border-radius: 4px;
      font-size: 12px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
    }
    #hover-label.visible {
      opacity: 1;
    }

    @media (max-width: 1280px) {
      #collision-panel {
        display: none;
      }
      #collision-panel.expanded {
        display: block;
      }
      #property-panel {
        display: none;
      }
      #property-panel.expanded {
        display: block;
      }
      .toggle-btn {
        position: fixed;
        z-index: 15;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(4px);
        -webkit-backdrop-filter: blur(4px);
        border: 1px solid rgba(255,255,255,0.12);
        color: #ffffff;
        font-size: 16px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #toggle-collision {
        bottom: 20px;
        right: 20px;
      }
      #toggle-property {
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
      }
    }
    @media (min-width: 1281px) {
      .toggle-btn {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="canvas-container"></div>

  <div id="legend" class="overlay">
    <div class="legend-item">
      <div class="legend-dot water"></div>
      <span>供水 Water</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot power"></div>
      <span>电力 Power</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot gas"></div>
      <span>燃气 Gas</span>
    </div>
  </div>

  <div id="collision-panel" class="overlay">
    <h3>⚠ 碰撞检测</h3>
    <div id="collision-list">
      <div class="no-collisions">暂无冲突</div>
    </div>
  </div>

  <div id="property-panel" class="overlay">
    <h3 id="prop-title">管线属性</h3>
    <div id="prop-content"></div>
    <button class="panel-btn danger" id="btn-clear-markers">清除冲突标记</button>
    <button class="panel-btn" id="btn-reset-camera">重置视角</button>
  </div>

  <div id="hover-label"></div>

  <button class="toggle-btn" id="toggle-collision" style="display:none;">⚠</button>
  <button class="toggle-btn" id="toggle-property" style="display:none;">☰</button>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
