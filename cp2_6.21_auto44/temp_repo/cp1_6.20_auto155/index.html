<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D粒子系统沙盒</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #d0d0e0;
      user-select: none;
    }

    #app {
      width: 100%;
      height: 100vh;
      position: relative;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      background: linear-gradient(180deg, #0a0a2a 0%, #1a1a3a 100%);
    }

    #control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 320px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 24px;
      z-index: 100;
      border: 1px solid rgba(74, 144, 217, 0.2);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #control-panel::-webkit-scrollbar {
      width: 6px;
    }

    #control-panel::-webkit-scrollbar-track {
      background: rgba(42, 42, 74, 0.5);
      border-radius: 3px;
    }

    #control-panel::-webkit-scrollbar-thumb {
      background: #4a90d9;
      border-radius: 3px;
    }

    .panel-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      text-align: center;
      background: linear-gradient(135deg, #4a90d9, #357abd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin: 20px 0 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(74, 144, 217, 0.2);
      color: #a0b0d0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section-title:first-of-type {
      margin-top: 0;
    }

    .type-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .type-btn {
      padding: 10px 8px;
      border: 2px solid rgba(74, 144, 217, 0.3);
      border-radius: 10px;
      background: rgba(42, 42, 74, 0.6);
      color: #d0d0e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .type-btn:hover {
      border-color: #4a90d9;
      background: rgba(74, 144, 217, 0.15);
      transform: translateY(-1px);
    }

    .type-btn.active {
      border-color: #4a90d9;
      background: linear-gradient(135deg, rgba(74, 144, 217, 0.4), rgba(53, 122, 189, 0.4));
      box-shadow: 0 0 15px rgba(74, 144, 217, 0.3);
    }

    .type-btn.smoke.active {
      border-color: #a0a0a0;
      background: linear-gradient(135deg, rgba(160, 160, 160, 0.3), rgba(120, 120, 120, 0.3));
      box-shadow: 0 0 15px rgba(160, 160, 160, 0.2);
    }

    .type-btn.water.active {
      border-color: #3498db;
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.4), rgba(41, 128, 185, 0.4));
      box-shadow: 0 0 15px rgba(52, 152, 219, 0.3);
    }

    .type-btn.fire.active {
      border-color: #e74c3c;
      background: linear-gradient(135deg, rgba(231, 76, 60, 0.4), rgba(192, 57, 43, 0.4));
      box-shadow: 0 0 15px rgba(231, 76, 60, 0.3);
    }

    .slider-container {
      margin-bottom: 18px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .slider-name {
      color: #b0b0c8;
    }

    .slider-value {
      font-weight: 600;
      color: #4a90d9;
      font-variant-numeric: tabular-nums;
      min-width: 50px;
      text-align: right;
    }

    .slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #2a2a4a;
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }

    .slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #4a90d9, #357abd);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 rgba(74, 144, 217, 0.4);
      transition: box-shadow 0.2s ease, transform 0.1s ease;
    }

    .slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 15px rgba(74, 144, 217, 0.6);
    }

    .slider::-webkit-slider-thumb:active {
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(74, 144, 217, 0.8);
    }

    .slider::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: linear-gradient(135deg, #4a90d9, #357abd);
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 rgba(74, 144, 217, 0.4);
      transition: box-shadow 0.2s ease, transform 0.1s ease;
    }

    .slider::-moz-range-thumb:hover {
      box-shadow: 0 0 15px rgba(74, 144, 217, 0.6);
    }

    .slider::-moz-range-thumb:active {
      transform: scale(1.15);
      box-shadow: 0 0 20px rgba(74, 144, 217, 0.8);
    }

    .force-field-section {
      margin-bottom: 8px;
    }

    .force-buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .force-btn {
      padding: 10px 6px;
      border: 2px solid rgba(74, 144, 217, 0.2);
      border-radius: 10px;
      background: rgba(42, 42, 74, 0.5);
      color: #d0d0e0;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .force-btn:hover:not(:disabled) {
      transform: translateY(-1px);
    }

    .force-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .force-btn.gravity {
      border-color: rgba(231, 76, 60, 0.3);
    }
    .force-btn.gravity:hover:not(:disabled) {
      background: rgba(231, 76, 60, 0.15);
      border-color: #e74c3c;
      box-shadow: 0 0 12px rgba(231, 76, 60, 0.2);
    }

    .force-btn.vortex {
      border-color: rgba(52, 152, 219, 0.3);
    }
    .force-btn.vortex:hover:not(:disabled) {
      background: rgba(52, 152, 219, 0.15);
      border-color: #3498db;
      box-shadow: 0 0 12px rgba(52, 152, 219, 0.2);
    }

    .force-btn.wind {
      border-color: rgba(46, 204, 113, 0.3);
    }
    .force-btn.wind:hover:not(:disabled) {
      background: rgba(46, 204, 113, 0.15);
      border-color: #2ecc71;
      box-shadow: 0 0 12px rgba(46, 204, 113, 0.2);
    }

    .force-icon {
      font-size: 18px;
    }

    .force-list {
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .force-list::-webkit-scrollbar {
      width: 4px;
    }

    .force-list::-webkit-scrollbar-track {
      background: rgba(42, 42, 74, 0.5);
    }

    .force-list::-webkit-scrollbar-thumb {
      background: #4a90d9;
      border-radius: 2px;
    }

    .force-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: rgba(42, 42, 74, 0.4);
      border-radius: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .force-item-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .force-item-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    .force-item-dot.gravity { background: #e74c3c; box-shadow: 0 0 6px rgba(231, 76, 60, 0.5); }
    .force-item-dot.vortex { background: #3498db; box-shadow: 0 0 6px rgba(52, 152, 219, 0.5); }
    .force-item-dot.wind { background: #2ecc71; box-shadow: 0 0 6px rgba(46, 204, 113, 0.5); }

    .force-item-remove {
      background: rgba(231, 76, 60, 0.2);
      border: 1px solid rgba(231, 76, 60, 0.4);
      color: #e74c3c;
      width: 24px;
      height: 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .force-item-remove:hover {
      background: rgba(231, 76, 60, 0.4);
    }

    .hint-text {
      font-size: 11px;
      color: #707090;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .preset-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
    }

    .preset-btn {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s ease;
    }

    .preset-btn.save {
      background: linear-gradient(135deg, #4a90d9, #357abd);
      color: white;
    }

    .preset-btn.save:hover {
      background: linear-gradient(135deg, #5aa0e9, #458acd);
    }

    .preset-btn.load {
      background: rgba(46, 204, 113, 0.25);
      border: 2px solid rgba(46, 204, 113, 0.5);
      color: #2ecc71;
    }

    .preset-btn.load:hover {
      background: rgba(46, 204, 113, 0.35);
    }

    .preset-btn:active {
      transform: scale(0.95);
    }

    #file-input {
      display: none;
    }

    #fps-counter {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(20, 20, 40, 0.8);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 13px;
      z-index: 50;
      border: 1px solid rgba(74, 144, 217, 0.2);
    }

    .fps-row {
      display: flex;
      justify-content: space-between;
      gap: 20px;
      margin: 2px 0;
    }

    .fps-label {
      color: #8080a0;
    }

    .fps-value {
      color: #4a90d9;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .particle-count-warn {
      color: #e74c3c !important;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>

    <div id="fps-counter">
      <div class="fps-row">
        <span class="fps-label">FPS:</span>
        <span class="fps-value" id="fps-value">--</span>
      </div>
      <div class="fps-row">
        <span class="fps-label">粒子数:</span>
        <span class="fps-value" id="particle-count">0</span>
      </div>
      <div class="fps-row">
        <span class="fps-label">力场数:</span>
        <span class="fps-value" id="force-count">0/3</span>
      </div>
    </div>

    <div id="control-panel">
      <div class="panel-title">✦ 粒子系统沙盒 ✦</div>

      <div class="section-title">粒子类型</div>
      <div class="type-buttons">
        <button class="type-btn smoke" data-type="smoke">💨 烟雾</button>
        <button class="type-btn water" data-type="water">💧 水流</button>
        <button class="type-btn fire active" data-type="fire">🔥 火焰</button>
      </div>

      <div class="section-title">参数调整</div>
      <div class="slider-container">
        <div class="slider-label">
          <span class="slider-name">发射速率</span>
          <span class="slider-value" id="rate-value">30</span>
        </div>
        <input type="range" class="slider" id="rate-slider" min="1" max="100" value="30" step="1">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span class="slider-name">初始速度</span>
          <span class="slider-value" id="speed-value">2.0</span>
        </div>
        <input type="range" class="slider" id="speed-slider" min="0.1" max="5" value="2" step="0.1">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span class="slider-name">生命周期</span>
          <span class="slider-value" id="life-value">2.0</span>
        </div>
        <input type="range" class="slider" id="life-slider" min="0.5" max="5" value="2" step="0.1">
      </div>
      <div class="slider-container">
        <div class="slider-label">
          <span class="slider-name">粒子大小</span>
          <span class="slider-value" id="size-value">0.20</span>
        </div>
        <input type="range" class="slider" id="size-slider" min="0.05" max="0.5" value="0.2" step="0.01">
      </div>

      <div class="section-title">力场发生器</div>
      <div class="force-field-section">
        <div class="force-buttons">
          <button class="force-btn gravity" data-force="gravity">
            <span class="force-icon">●</span>
            <span>引力</span>
          </button>
          <button class="force-btn vortex" data-force="vortex">
            <span class="force-icon">🌀</span>
            <span>涡流</span>
          </button>
          <button class="force-btn wind" data-force="wind">
            <span class="force-icon">➤</span>
            <span>风场</span>
          </button>
        </div>
        <div class="force-list" id="force-list"></div>
        <div class="hint-text">
          💡 点击按钮添加力场，在3D场景中拖拽图标调整位置，最多3个力场。
        </div>
      </div>

      <div class="section-title">预设管理</div>
      <div class="preset-buttons">
        <button class="preset-btn save" id="save-preset">💾 保存预设</button>
        <button class="preset-btn load" id="load-preset">📂 加载预设</button>
      </div>
      <input type="file" id="file-input" accept=".json">
    </div>
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
