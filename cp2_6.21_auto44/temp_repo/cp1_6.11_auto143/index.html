<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>情感星云</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #D1D5DB;
      background: #0A0A23;
    }

    #app {
      display: flex;
      width: 100%;
      height: 100%;
    }

    .control-panel {
      width: 320px;
      min-width: 320px;
      height: 100%;
      background: #0F0F0F;
      border-right: 1px solid transparent;
      border-image: linear-gradient(to bottom, #2D2D2D, #1A1A1A) 1;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 10;
    }

    .panel-header {
      font-size: 18px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 8px;
    }

    .panel-description {
      font-size: 12px;
      color: #9CA3AF;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .input-label {
      font-size: 13px;
      font-weight: 500;
      color: #E5E7EB;
      margin-bottom: 8px;
    }

    .text-input {
      width: 300px;
      height: 200px;
      background: #1E1E1E;
      border: 1px solid #4A4A4A;
      border-radius: 8px;
      padding: 12px;
      color: #D1D5DB;
      font-family: inherit;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }

    .text-input:focus {
      border-color: #8B5CF6;
    }

    .text-input::placeholder {
      color: #6B7280;
    }

    .generate-btn {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
      border: none;
      border-radius: 6px;
      color: #FFFFFF;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: filter 0.2s, transform 0.1s;
    }

    .generate-btn:hover {
      filter: brightness(1.1);
    }

    .generate-btn:active {
      transform: scale(0.95);
    }

    .sliders-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: auto;
    }

    .slider-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: #E5E7EB;
    }

    .slider-value {
      color: #8B5CF6;
      font-weight: 500;
    }

    .custom-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #4A4A4A;
      border-radius: 3px;
      outline: none;
    }

    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .custom-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }

    .custom-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%);
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }

    .scene-container {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    #canvas-container {
      width: 100%;
      height: 100%;
    }

    #canvas-container canvas {
      display: block;
    }

    .export-btn {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background-color 0.2s;
      z-index: 5;
    }

    .export-btn:hover {
      background: #8B5CF6;
    }

    .export-btn svg {
      width: 20px;
      height: 20px;
      stroke: #FFFFFF;
    }

    .tooltip {
      position: fixed;
      background: rgba(0, 0, 0, 0.7);
      color: #FFFFFF;
      padding: 6px 12px;
      border-radius: 4px;
      font-size: 13px;
      pointer-events: none;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .tooltip.visible {
      opacity: 1;
    }

    .mobile-header {
      display: none;
      width: 100%;
      height: 60px;
      background: #0F0F0F;
      padding: 0 20px;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #2D2D2D;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 20;
    }

    .mobile-title {
      font-size: 16px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .toggle-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      transition: transform 0.3s;
    }

    .toggle-btn.expanded {
      transform: rotate(180deg);
    }

    .toggle-btn svg {
      width: 24px;
      height: 24px;
      stroke: #D1D5DB;
    }

    @media (max-width: 800px) {
      #app {
        flex-direction: column;
        padding-top: 60px;
      }

      .mobile-header {
        display: flex;
      }

      .control-panel {
        position: fixed;
        top: 60px;
        left: 0;
        width: 100%;
        height: calc(100% - 60px);
        transform: translateY(-100%);
        transition: transform 0.3s ease;
        border-right: none;
        border-bottom: 1px solid #2D2D2D;
      }

      .control-panel.expanded {
        transform: translateY(0);
      }

      .text-input {
        width: 100%;
      }

      .scene-container {
        height: calc(100vh - 60px);
      }
    }
  </style>
</head>
<body>
  <div class="mobile-header">
    <span class="mobile-title">情感星云</span>
    <button class="toggle-btn" id="toggle-btn" aria-label="展开面板">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="18 15 12 9 6 15"></polyline>
      </svg>
    </button>
  </div>

  <div id="app">
    <div class="control-panel" id="control-panel">
      <div>
        <div class="panel-header">情感星云</div>
        <div class="panel-description">输入文字，让情感在星空中绽放</div>
      </div>

      <div class="slider-group">
        <label class="input-label">输入文字</label>
        <textarea 
          class="text-input" 
          id="text-input" 
          placeholder="请输入诗歌、歌词或名言...&#10;&#10;例如：&#10;面朝大海，春暖花开&#10;从明天起，做一个幸福的人"
        ></textarea>
      </div>

      <button class="generate-btn" id="generate-btn">生成星云</button>

      <div class="sliders-container">
        <div class="slider-group">
          <label class="slider-label">
            粒子扩散速度
            <span class="slider-value" id="diffusion-value">1.5秒</span>
          </label>
          <input 
            type="range" 
            class="custom-slider" 
            id="diffusion-slider" 
            min="0.5" 
            max="3" 
            step="0.1" 
            value="1.5"
          >
        </div>

        <div class="slider-group">
          <label class="slider-label">
            色彩饱和度
            <span class="slider-value" id="saturation-value">100%</span>
          </label>
          <input 
            type="range" 
            class="custom-slider" 
            id="saturation-slider" 
            min="50" 
            max="150" 
            step="1" 
            value="100"
          >
        </div>

        <div class="slider-group">
          <label class="slider-label">
            背景深度
            <span class="slider-value" id="depth-value">10</span>
          </label>
          <input 
            type="range" 
            class="custom-slider" 
            id="depth-slider" 
            min="0" 
            max="20" 
            step="1" 
            value="10"
          >
        </div>
      </div>
    </div>

    <div class="scene-container">
      <div id="canvas-container"></div>
      <button class="export-btn" id="export-btn" aria-label="导出快照">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7 10 12 15 17 10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
      </button>
    </div>
  </div>

  <div class="tooltip" id="tooltip"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
