<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RiftRacer - 多人在线赛车竞速</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div id="app">
    <div id="lobby-screen" class="screen active">
      <div class="lobby-background"></div>
      <div class="lobby-container">
        <header class="lobby-header">
          <h1 class="game-title">RIFT<span>RACER</span></h1>
          <div class="profile-card" id="profileCard"></div>
        </header>
        <div class="lobby-content">
          <div class="rooms-section">
            <div class="section-header">
              <h2>房间列表</h2>
              <button id="refreshRoomsBtn" class="btn-secondary">刷新</button>
            </div>
            <div class="rooms-list" id="roomsList"></div>
            <div class="room-detail-panel" id="roomDetailPanel">
              <div class="room-detail-content"></div>
            </div>
          </div>
          <div class="actions-section">
            <div class="action-buttons">
              <button id="createRoomBtn" class="btn-primary">创建房间</button>
              <button id="joinRoomBtn" class="btn-primary">加入房间</button>
            </div>
            <div class="create-room-modal hidden" id="createRoomModal">
              <div class="modal-content">
                <h3>创建房间</h3>
                <input type="text" id="roomNameInput" placeholder="请输入房间名称" maxlength="20" />
                <div class="modal-actions">
                  <button id="cancelCreateBtn" class="btn-secondary">取消</button>
                  <button id="confirmCreateBtn" class="btn-primary">确认创建</button>
                </div>
              </div>
            </div>
            <div class="join-room-modal hidden" id="joinRoomModal">
              <div class="modal-content">
                <h3>加入房间</h3>
                <input type="text" id="roomIdInput" placeholder="请输入房间ID" maxlength="20" />
                <div class="modal-actions">
                  <button id="cancelJoinBtn" class="btn-secondary">取消</button>
                  <button id="confirmJoinBtn" class="btn-primary">确认加入</button>
                </div>
              </div>
            </div>
            <div class="room-info-card hidden" id="roomInfoCard">
              <h3 id="currentRoomName">房间名称</h3>
              <div class="player-list" id="playerList"></div>
              <button id="leaveRoomBtn" class="btn-secondary">离开房间</button>
              <button id="startGameBtn" class="btn-primary" disabled>开始游戏</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div id="game-screen" class="screen">
      <div class="game-container">
        <canvas id="gameCanvas"></canvas>
        <div class="hud" id="hud">
          <div class="hud-left">
            <div class="lap-info" id="lapInfo">1 / 3</div>
            <div class="position-info" id="positionInfo">
              <span class="position-number" id="positionNumber">1</span>
              <span class="position-suffix">st</span>
            </div>
          </div>
          <div class="hud-center">
            <div class="speed-meter" id="speedMeter">
              <svg viewBox="0 0 120 60" class="speed-svg">
                <defs>
                  <linearGradient id="speedGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" style="stop-color:#00ff88;stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#ffaa00;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff4444;stop-opacity:1" />
                  </linearGradient>
                </defs>
                <path d="M 10 50 A 50 50 0 0 1 110 50" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="8" stroke-linecap="round" />
                <path id="speedArc" d="M 10 50 A 50 50 0 0 1 110 50" fill="none" stroke="url(#speedGradient)" stroke-width="8" stroke-linecap="round" stroke-dasharray="157" stroke-dashoffset="157" />
              </svg>
              <div class="speed-value"><span id="speedValue">0</span> km/h</div>
            </div>
          </div>
          <div class="hud-right">
            <div class="drift-bar">
              <div class="drift-fill" id="driftFill"></div>
              <span class="drift-label">漂移</span>
            </div>
            <div class="item-slot" id="itemSlot1">
              <span class="slot-key">Q</span>
            </div>
            <div class="item-slot selected" id="itemSlot2">
              <span class="slot-key">E</span>
            </div>
            <button id="exitGameBtn" class="btn-exit">退出</button>
          </div>
        </div>
        <div class="race-result hidden" id="raceResult">
          <div class="result-card">
            <h2>比赛结束</h2>
            <div class="result-list" id="resultList"></div>
            <div class="result-stats" id="resultStats"></div>
            <button id="backToLobbyBtn" class="btn-primary">返回大厅</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
