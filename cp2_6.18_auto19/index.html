<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VortexViz - 3D 风场流场可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #minimap {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 100px;
      height: 100px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      z-index: 10;
    }
    #minimap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      background: #1E1E2E;
      border-radius: 10px;
      z-index: 20;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }
    .panel-header {
      padding: 16px 20px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
    }
    .panel-title {
      color: #00D4FF;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .panel-section {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }
    .section-header:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    .section-title {
      color: #E0E0E0;
      font-size: 13px;
      font-weight: 500;
    }
    .section-arrow {
      width: 12px;
      height: 12px;
      border-right: 2px solid #888;
      border-bottom: 2px solid #888;
      transform: rotate(45deg);
      transition: transform 0.3s ease;
    }
    .section-header.collapsed .section-arrow {
      transform: rotate(-45deg);
    }
    .section-content {
      padding: 0 20px 16px;
      overflow: hidden;
      max-height: 500px;
      transition: max-height 0.3s ease, padding 0.3s ease;
    }
    .section-header.collapsed + .section-content {
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
    }
    .control-item {
      margin-bottom: 14px;
    }
    .control-item:last-child {
      margin-bottom: 0;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .control-label span {
      color: #B0B0B0;
      font-size: 12px;
    }
    .control-value {
      color: #00D4FF;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .control-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #00D4FF;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
      transition: transform 0.15s ease;
    }
    .control-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
    }
    .control-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #00D4FF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
    }
    .fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00D4FF;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="fps-counter" id="fps-counter">FPS: --</div>
    <div id="minimap">
      <canvas id="minimap-canvas" width="100" height="100"></canvas>
    </div>
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">VortexViz 控制面板</div>
      </div>
      <div id="panel-sections"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
