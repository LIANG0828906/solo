<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VortexViz - 3D 风场流场可视化</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #0A0A1A;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #canvas-container {
      width: 100%;
      height: 100%;
    }
    #minimap {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: 100px;
      height: 100px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 4px;
      z-index: 10;
    }
    #minimap canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    #control-panel {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 280px;
      background: #1E1E2E;
      border-radius: 10px;
      z-index: 20;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      transition: opacity 0.3s ease, transform 0.3s ease;
      opacity: 1;
      transform: translateX(0);
    }
    #control-panel.hidden {
      opacity: 0;
      transform: translateX(40px);
      pointer-events: none;
    }
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(90deg, rgba(0, 212, 255, 0.15), transparent);
      border-bottom: 1px solid rgba(0, 212, 255, 0.2);
    }
    .panel-title {
      color: #00D4FF;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .panel-close-btn {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      cursor: pointer;
      color: #888;
      background: transparent;
      border: none;
      padding: 0;
      transition: background 0.2s ease, color 0.2s ease;
    }
    .panel-close-btn:hover {
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
    }
    .panel-close-btn:active {
      background: rgba(255, 255, 255, 0.12);
    }
    .panel-close-btn svg {
      width: 14px;
      height: 14px;
    }
    #panel-toggle-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(30, 30, 46, 0.85);
      border: 1px solid rgba(0, 212, 255, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 15;
      opacity: 0;
      transform: translateX(40px) scale(0.9);
      pointer-events: none;
      transition: opacity 0.3s ease, transform 0.3s ease, background 0.2s ease;
      backdrop-filter: blur(8px);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }
    #panel-toggle-btn.visible {
      opacity: 1;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    #panel-toggle-btn:hover {
      background: rgba(30, 30, 46, 1);
      border-color: rgba(0, 212, 255, 0.6);
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.2);
    }
    #panel-toggle-btn:active {
      transform: scale(0.95);
    }
    #panel-toggle-btn svg {
      width: 18px;
      height: 18px;
      color: #00D4FF;
    }
    .panel-section {
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      cursor: pointer;
      user-select: none;
      transition: background-color 0.15s ease;
    }
    .section-header:hover {
      background: rgba(255, 255, 255, 0.04);
    }
    .section-header:active {
      background: rgba(0, 212, 255, 0.08);
    }
    .section-header.collapsed:active {
      background: rgba(0, 212, 255, 0.08);
    }
    .section-title {
      color: #E0E0E0;
      font-size: 13px;
      font-weight: 500;
    }
    .section-arrow {
      width: 12px;
      height: 12px;
      border-right: 2px solid #888;
      border-bottom: 2px solid #888;
      transform: rotate(45deg);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }
    .section-header.collapsed .section-arrow {
      transform: rotate(-45deg);
    }
    .section-content {
      padding: 0 20px 16px;
      overflow: hidden;
      height: auto;
    }
    .control-item {
      margin-bottom: 14px;
    }
    .control-item:last-child {
      margin-bottom: 0;
    }
    .control-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .control-label span {
      color: #B0B0B0;
      font-size: 12px;
    }
    .control-value {
      color: #00D4FF;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Consolas', 'Monaco', monospace;
    }
    .control-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: #333;
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .control-slider:hover {
      background: #3A3A3A;
    }
    .control-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      background: #00D4FF;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    .control-slider::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      filter: brightness(1.2);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.7);
    }
    .control-slider::-webkit-slider-thumb:active {
      transform: scale(1.1);
    }
    .control-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #00D4FF;
      border-radius: 50%;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 212, 255, 0.5);
      transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
    }
    .control-slider::-moz-range-thumb:hover {
      transform: scale(1.2);
      filter: brightness(1.2);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.7);
    }
    .control-slider::-moz-range-track {
      background: #333;
      height: 4px;
      border-radius: 2px;
    }
    .fps-counter {
      position: absolute;
      top: 20px;
      left: 20px;
      color: #00D4FF;
      font-size: 12px;
      font-family: 'Consolas', 'Monaco', monospace;
      z-index: 10;
      background: rgba(0, 0, 0, 0.5);
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(0, 212, 255, 0.2);
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container"></div>
    <div class="fps-counter" id="fps-counter">FPS: --</div>
    <div id="minimap">
      <canvas id="minimap-canvas" width="100" height="100"></canvas>
    </div>
    <button id="panel-toggle-btn" title="显示控制面板">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </button>
    <div id="control-panel">
      <div class="panel-header">
        <div class="panel-title">VortexViz 控制面板</div>
        <button class="panel-close-btn" id="panel-close-btn" title="关闭控制面板">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div id="panel-sections"></div>
    </div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
