<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>回声歌剧院 - Echo Opera Puzzle</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      min-width: 800px;
      min-height: 600px;
      overflow: hidden;
      background: radial-gradient(ellipse at center, #2B0F3D 0%, #000000 100%);
      font-family: 'Georgia', serif;
    }

    .game-container {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .canvas-wrapper {
      position: relative;
      padding: 80px;
      background: repeating-linear-gradient(
        90deg,
        #4A2E1A 0px,
        #5C3A22 2px,
        #4A2E1A 4px,
        #3D2515 6px,
        #4A2E1A 8px
      );
      box-shadow: 0 0 60px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(0, 0, 0, 0.5);
    }

    .canvas-wrapper::before,
    .canvas-wrapper::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid #B8860B;
      transform: rotate(45deg);
      background: transparent;
      box-shadow: 0 0 10px rgba(184, 134, 11, 0.5);
    }

    .canvas-wrapper::before {
      top: 15px;
      left: 15px;
    }

    .canvas-wrapper::after {
      top: 15px;
      right: 15px;
    }

    .corner-decoration {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid #B8860B;
      transform: rotate(45deg);
      background: transparent;
      box-shadow: 0 0 10px rgba(184, 134, 11, 0.5);
    }

    .corner-decoration.bottom-left {
      bottom: 15px;
      left: 15px;
    }

    .corner-decoration.bottom-right {
      bottom: 15px;
      right: 15px;
    }

    #gameCanvas {
      display: block;
      background: #0a0a0f;
      cursor: crosshair;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }

    .ui-overlay {
      position: absolute;
      top: 80px;
      left: 80px;
      right: 80px;
      bottom: 80px;
      pointer-events: none;
    }

    .progress-indicator {
      position: absolute;
      top: 20px;
      left: 20px;
      padding: 12px 20px;
      background: rgba(0, 0, 0, 0.8);
      border: 1px solid rgba(255, 215, 0, 0.3);
      border-radius: 8px;
      color: #ffffff;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
      min-width: 80px;
      text-align: center;
    }

    .hint-panel {
      position: absolute;
      bottom: 30px;
      right: 30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(26, 26, 46, 0.3) 0%, transparent 70%);
      border: 1px solid rgba(106, 13, 173, 0.6);
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: auto;
    }

    .hint-content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .hint-icon {
      width: 30px;
      height: 30px;
      border: 2px solid rgba(0, 255, 255, 0.8);
      border-radius: 50%;
      position: relative;
      animation: pulse-hint 2s ease-in-out infinite;
    }

    .hint-icon::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 8px;
      background: rgba(0, 255, 255, 0.9);
      border-radius: 50%;
    }

    .hint-ring {
      position: absolute;
      width: 50px;
      height: 50px;
      border: 1px solid rgba(0, 255, 255, 0.4);
      border-radius: 50%;
      animation: ring-expand 2s ease-out infinite;
    }

    .hint-ring:nth-child(2) {
      animation-delay: 0.7s;
    }

    .hint-ring:nth-child(3) {
      animation-delay: 1.4s;
    }

    @keyframes pulse-hint {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    @keyframes ring-expand {
      0% { transform: scale(0.6); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .small-screen-warning {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 30px 50px;
      background: rgba(0, 0, 0, 0.95);
      border: 2px solid #B8860B;
      border-radius: 10px;
      color: #FFD700;
      font-size: 20px;
      text-align: center;
      z-index: 1000;
    }

    @media (max-width: 799px), (max-height: 599px) {
      .game-container {
        display: none;
      }
      .small-screen-warning {
        display: block;
      }
    }

    .flash-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0);
      pointer-events: none;
      transition: background 0.1s ease-out;
    }

    .flash-overlay.active {
      background: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="small-screen-warning">请使用更大的屏幕</div>
  
  <div class="game-container">
    <div class="canvas-wrapper">
      <div class="corner-decoration bottom-left"></div>
      <div class="corner-decoration bottom-right"></div>
      <canvas id="gameCanvas" width="800" height="600"></canvas>
      
      <div class="ui-overlay">
        <div class="progress-indicator" id="progressIndicator">0/3</div>
        
        <div class="hint-panel">
          <div class="hint-content">
            <div class="hint-ring"></div>
            <div class="hint-ring"></div>
            <div class="hint-ring"></div>
            <div class="hint-icon"></div>
          </div>
        </div>
        
        <div class="flash-overlay" id="flashOverlay"></div>
      </div>
    </div>
  </div>
</body>
</html>
